0 亿到 400 亿欧元，毛利率指引上调至 51% 到 53%，高于此前 340 亿到 390 亿欧元的区间，核心驱动同样来自 AI 设备需求。 这两个信号放在一起，意义非常直接。 台积电代表制造产能，ASML 代表设备供给，当产业链两端同步上修时，市场就很难再继续拿“AI capex 快见顶了”这个逻辑去压估值。 更重要的是，这轮景气度强化，不只是单点受益。2026 年美国云厂商在数据中心上的支出预计将超过 6000 亿美元，而且需求正在从训练端向推理端扩散。 这意味着，AI 的投资浪潮没有减弱，反而正在深化。资金给了趋势，基本面给了确信，所以市场接下来要重估的，也不再只是芯片设计这一个点，而是从先进制程、先进封装到设备、产能供给的整条硬件产业链。 情绪外溢：从“买确定性”走向“买故事” 当资金逻辑和产业逻辑同时成立时，市场情绪就一定会往外溢。 一个很明显的标志，就是和主线关联度并不高的公司，只要贴上热门标签，也能被资金极端追捧 。 鞋履品牌Allbirds（BIRD）周三宣布转型AI计算基础设施+出售资产融资5000万可转债，股价暴涨582%，单日成交近39亿美金，空头亏损超1300万美金。 紧接周四，社交公司Myseum（MYSE）改名“Myseum.AI”，盘前一度飙200%，收盘涨幅129.17%，跟随Allbirds跨界AI热潮。 这类行情说明，市场已经开始从“买确定性”走向“买故事”。这种现象通常会带来两个结果。 第一，指数层面会更抗跌。 因为主线太热，资金会不断寻找新的标的去承接热度。 第二，个股分化会迅速加剧。 因为当越来越多资金开始追逐概念时，错误定价也会明显变多。 接下来市场会分成三类资产： 有业绩、有订单，能兑现增长的（估值可以继续网上抬） 处在链条中间，跟随扩散的（吃估值外溢） 纯转型、纯改名、纯讲故事的（高度依赖情绪） ←左右滑动查看更多产品介绍图→ 浏览器打开 https://StockWe.com/vip 订阅 美股投资网是一家专门研究美股的金融科技公司，2008年成立于美国硅谷，由前纽约证券交易所分析师Ken创立，联合多位摩根斯坦利分析师，谷歌 Meta工程师利用AI和大数据，配合十多年美股实战经验和业内量化模型，建立了一个股市数据库 https://StockWe.com/ 每天处理千万级股票数据：捕捉期权大单，实时主力资金流向、机构持仓变化、川普突发新闻，精准K线信号第一时间发到您手机APP！ 联系方式 客服Telegram MaxMeigu 公众号 TradesMax 邮箱 buy@TradesMax.com Email: buy@TradesMax.com 美股大数据 StockWe.com"}, {"title": "美股最疯狂一幕！卖鞋的改名做AI，股价竟爆涨 800%！", "date": "2026-04-15", "ym": "2026-04", "time": "2026-04-15 23:34:02", "author": "StockWe.com", "desc": "周三美股市场，一只“卖鞋的”公司，突然成了 AI 赛道最靓的仔。曾经估值接近 40 亿美元、后来股价较高点跌", "url": "https://mp.weixin.qq.com/s/qAWKLyieqX4gOXSmComFsw", "path": "sources/news/wechat_mp/articles/美股最疯狂一幕-卖鞋的改名做AI-股价竟爆涨-800-31ac4dea93.md", "len": 3350, "ticks": [], "body": "周三美股市场，一只“卖鞋的”公司，突然成了 AI 赛道最靓的仔。 曾经估值接近 40 亿美元、后来股价较高点跌去 99% 的网红鞋履品牌 Allbirds（BIRD），靠着一纸改名公告和 5000 万美元的可转债融资计划，在美股市场演了一出“改命”大戏。 “ 3900 万 vs 5000 万：太荒诞 Allbirds 先把自己多年经营的鞋履业务和品牌资产，以 3900 万美元的价格卖掉；然后转头拿出 5000 万美元可转债融资，宣布切入 GPU-as-a-Service 和 AI 云服务。 消息出来后，资金直接冲进去，股价盘中一度暴涨 800%+。 这个反差，其实已经把问题说明白了。 在产业买家眼里，这家公司多年积累下来的品牌、渠道、产品和业务，合在一起只值 3900 万美元；但在二级市场眼里，只要它披上一层 AI 外衣，立刻就可以按另一套逻辑重新估值。 所以今天市场买的，根本不是它原来的业务价值，也不是它未来短期内的盈利能力，而是它突然多出来的 那层 “AI 壳”属性 。 “ 5000 万美元连个水花都算不上 从专业基建角度看，5000 万美元放在今天的 AI 算力竞争里，根本不算什么钱。 别说和微软、亚马逊、谷歌这种平台级玩家比，就算放在一个正常的数据中心扩容框架里，这笔钱也只能买到非常有限的一小块起步算力。 它买不来真正的技术壁垒，买不来规模化集群，更买不来平台级的客户基础和持续扩张能力。 所以，市场今天显然不是在认真推演 Allbirds 会不会真变成一家有竞争力的 AI 基础设施公司。 市场真正定价的，是另一件事： 它终于拿到了一张“重新上桌”的门票。 以前它是一只死气沉沉、没人想看的零售股； 现在它摇身一变，变成了一只可以被塞进 AI 叙事里的新票。 这才是今天股价暴涨背后最核心的逻辑。 “ 2026 版的“改名即暴涨” 这类走势，老交易员一看就明白，这就是 Long Blockchain 的 2026 翻版。 当年一家卖饮料的公司，因为把名字从“长岛冰茶”改成了“长链区块链”，股价一天暴涨近 300%。后来呢？业务没有实质进展，概念退潮之后，公司最终走向边缘化，留下一地鸡毛。 今天的 Allbirds，当然不是完全一样的故事，但市场给它的定价方式，几乎是同一种味道。 当资金愿意为一个几乎没有技术积累、没有数据中心资产、没有成熟客户基础的转型故事，支付这种级别的天价溢价时，逻辑够不够硬，已经不是最重要的了。 真正重要的是三件事： 情绪有没有共振，题材能不能点火，故事够不够有想象力。 这种票为什么最容易被做成妖股？因为它精准踩中了短线游资最喜欢的全部兴奋点： 低价 + 小盘： 极小的资金量就能掀起滔天巨浪； 低预期 + 旧壳： 之前已经跌到了尘埃里，没有任何基本面负担； 新故事 + 弱约束： 既然业务还没落地，就没法用业绩去证伪，全靠一张嘴。 所以结论是：今天的 Allbirds 涨的是“AI 壳”的稀缺性。对于专业交易员来说，这当然可能是一笔高弹性的机会；但它同时也是一个非常强的风险信号。 美股投资网认为， 当市场开始大规模奖励这种“改名游戏”的时候，通常说明两件事： 第一，核心 AI 资产的估值已经进入“恐高区”； 第二，资金开始往边缘垃圾资产里下沉，去追求更极致的弹性。 这往往意味着，接下来行情的波动率、换手率和分歧度都会明显抬升。 行情未必马上结束，但玩法已经开始变危险了。 特斯拉AI芯片里程碑！ 今天特斯拉大涨近 8%，创下近几个月最强单日表现之一， 直接催化剂是马斯克宣布：特斯拉 AI5 芯片已经完成流片。 对芯片来说，流片意味着设计完成，正式进入制造验证阶段；对特斯拉来说，这不是一句普通的技术更新，而是一个真正的工程里程碑。 但如果你把这件事只理解成“特斯拉又有一颗新芯片了”，那就浅了。 “ AI5 流片改变市场对 TSLA 的估值框架 过去市场看特斯拉，一直很拧巴。 你拿它当车企看，估值太贵； 你拿它当软件公司看，又不够纯； 你拿它当机器人公司看，兑现还远。 所以 TSLA 最大的争议，是它到底该按什么公司去估值。 AI5 流片这件事，至少让市场更认真地去看另一种可能： 特斯拉不只是 AI 的应用端，它正在往更底层的算力能力走。 这也是为什么市场会对这条消息给出这么强的股价反馈。华尔街分析师提到AI5 被市场视为特斯拉 physical AI 战略的重要底座，目标应用包括车辆、Optimus 机器人和数据中心。 当然，这里要说清楚，市场现在买的是“方向成立”，不是“终局已经兑现”。 比如外界流传的“单芯对标 Hopper、双芯对标 Blackwell、同时成本和功耗更优”这类表述，目前主要还是来自马斯克口径和二手转述，并没有完整第三方验证。 能确认的是：AI5 已经流片，AI6 和 Dojo3 也在推进中；不能确认的是，它现在就已经在性能和成本上全面坐实领先。 “ AI6、Dojo3 和更激进的芯片供给计划 马斯克在宣布 AI5 流片时，同时提到了 AI6、Dojo3 等后续芯片仍在研发中；而在 3 月，也有媒体报道过他曾表示，特斯拉下一代 AI6 可能在 2026 年 12 月完成流片。 这意味着特斯拉现在想做的，不只是设计一颗更强的自动驾驶芯片，而是把 芯片设计、自动驾驶算法、机器人场景、终端硬件 这些关键环节尽量往自己手里收。 说白了，过去特斯拉更多是在“用芯片”；现在市场开始相信，它想做的是更深度地掌握芯片路线图本身。 这个级别就不一样了。 因为一旦市场接受这个叙事，TSLA 的对标关系就不会再只盯着传统车企，而会部分往更贵的框架靠： 更像苹果式的垂直整合，也更像拥有自研算力故事的 AI 平台公司。 这 个映射未必会一步到位，但 AI5 流片确实让这种估值讨论更有抓手了。 “ 打在特斯拉最贵的三条叙事上 第一条，是 FSD。 自动驾驶往后拼的，本质就是边缘推理能力、功耗、成本和迭代速度。如果底层芯片更多掌握在自己手里，路线图和优化节奏都会更主动。 分析师表示，市场把 AI5 视为 robotaxi 和 AI edge computing 方向的重要进展。 第二条，是 Optimus。 机器人这个故事最怕的，不是没有 demo，而是算力、成本和量产闭环下不来。AI5 如果未来真能同时支撑车辆和机器人，那它对 Optimus 的意义就不只是“又一颗芯片”，而是更接近平台级底座。 第三条，是更大的 芯片供给与基础设施想象。 这也是最激进、最容易被写过头、但又最有张力的一层。3 月的报道显示，马斯克当时公开谈到所谓的 Terafab 计划，理由是现有供应商扩产速度追不上他对未来 AI 芯片需求的预期。 但这里一定要讲事实边界：Terafab 目前更像是高风险、高资本开支的远期构想，而不是已经落地并被验证的制造能力。 美股投资网认为，若特斯拉真往这条路推进，资本开支可能非常重，市场甚至已开始讨论 2026 年大额 capex 对自由现金流的压力。 一句话总结： 今天特斯拉上涨，表面上是 AI5 流片，实质上是市场开始重新给 TSLA 的 AI 身份定价。 它还远远谈不上兑现终局，但至少这一步，已经不再只是讲故事了。 扫码+30万人社群，更深度的美股市场分析 浏览器打开 https://StockWe.com/vip 订阅 美股投资网是一家专门研究美股的金融科技公司，2008年成立于美国硅谷，由前纽约证券交易所分析师Ken创立，联合多位摩根斯坦利分析师，谷歌 Meta工程师利用AI和大数据，配合十多年美股实战经验和业内量化模型，建立了一个股市数据库 https://StockWe.com/ 每天处理千万级股票数据：捕捉期权大单，实时主力资金流向、机构持仓变化、川普突发新闻，精准K线信号第一时间发到您手机APP！ 联系方式 客服Telegram MaxMeigu 公众号 TradesMax 邮箱 buy@TradesMax.com Email: buy@TradesMax.com 美股大数据 StockWe.com 美股投资网 TradesMax.com"}, {"title": "SEC新规！废除“日内交易”限制，美股散户交易门槛大幅降低！", "date": "2026-04-15", "ym": "2026-04", "time": "2026-04-15 13:55:59", "author": "StockWe.com", "desc": "重磅更新！", "url": "https://mp.weixin.qq.com/s/hhWBAUZsxyRQjRWsDwLDqQ", "path": "sources/news/wechat_mp/articles/SEC新规-废除-日内交易-限制-美股散户交易门槛大幅降低-5597c5cb4e.md", "len": 2178, "ticks": [], "body": "近日美国证券交易委员会 SEC 彻底重塑“日内交易（ Pattern Day Trading ）制度”。如果你做美股，这条规则的影响，远比你想象的大。 过去二十年，美股对散户日内交易有一道非常明确的门槛：账户低于 2.5 万美元，你基本没有资格高频交易。 规则很简单： 5 个交易日内超过 4 次日内交易 → 直接被标记为“ PDT 账户” → 交易权限被限制 这本质上是一个“ 阶级制度 ”： 有钱 → 可以做 T + 频繁交易 没钱 → 只能慢慢买卖 但这一次， SEC 直接把这套体系连根拔起。 二、新规到底改了什么？ 从“账户规模限制” → 变成“风险驱动限制” 具体来看： 1 ）取消 2.5 万美元门槛 最核心的一刀：不再要求最低账户资产，小资金也可以合法高频交易，这对散户来说，是历史性松绑 2 ）取消“日内交易者”身份定义 过去你一旦被贴上 PDT 标签：券商风控直接盯死你，灵活性极低 现在： 不再有这个标签 所有人统一规则 3 ）引入“实时风险保证金体系”（重点） 这是这次改革真正的核心，但很多人还没意识到。 未来的逻辑变成：你能不能交易，不看你有多少钱，而看你当前的风险敞口有多大 换句话说：不是限制你“做几次交易”，而是限制你“承担多少风险”，这已经是机构化风控思维了。 三、这件事为什么现在发生？ 表面上看，是监管“放松”。但本质上，是三股力量推动的结果： 1 ）散户力量已经无法忽视 从 2020 年开始： meme 股行情 零佣金交易 移动端券商崛起 散户已经从“边缘参与者”变成市场核心流动性提供者，监管不可能再用 20 年前的规则管现在的市场。 2 ）交易技术已经彻底改变 过去限制 PDT ，本质原因是：散户风控能力弱和高频交易容易爆仓 但现在：实时风控系统成熟，券商可以动态监控风险，所以规则从：“限制行为” → “控制风险” 3 ）券商也在推动（很关键） 别忽略一点：券商是最大受益者之一，美股投资网获悉，利好了 HOOD BULL SCHW IBKR 交易越频繁：订单流收入越高，融资融券收入越高 这背后其实是：交易自由化 + 券商商业模式升级 四、市场真正的影响（重点） 很多人会简单理解为：“散户利好”，但如果你站在更高维度看，会发现事情没那么简单。 1 ）短期：交易量爆炸 可以预期： 小账户开始频繁做 T 日内波动放大 流动性提升 尤其是： 小盘股 高波动 AI 概念股 波动可能明显增强 2 ）中期：散户分化加剧 规则放开 ≠ 都能赚钱 现实会是：一部分人交易能力强 → 放大收益 大多数人 → 放大亏损 因为：频率放开，本质是放大人性 3 ）长期：市场更“机构化” 听起来反直觉，但很关键：这套“风险驱动”的体系，本质是把散户： → 往机构交易模型上引导 未来市场会变成： 行为更像机构 风控更像机构 但参与者更多是散户 五、真正的机会在哪里？ 如果你只是把这条新闻理解为“可以多做几次交易”，那就太浅了。 据美股投资网，真正的机会在三个方向： 1 ）券商板块（直接受益） 交易频率提升 → 收入提升 重点关注：零佣金券商 高频交易用户占比高的平台 2 ）高波动资产（交易型资金涌入） 包括： AI 概念股，小盘科技股，期权活跃标的，这些地方会成为“新战场” 3 ）流动性驱动行情（核心逻辑） 未来一段时间，你会看到：价格不完全由基本面驱动，而是由“交易行为”驱动，这对你做交易来说，意义非常大。 六、总结 这条规则，本质上是把一个问题交还给市场：你到底有没有能力，在更自由的环境下活下来？ 以前是：监管帮你“限制风险”，以后是：市场直接“淘汰弱者” 如果你是长期投资者，这件事影响有限。 但如果你是短线中线投资者——这可能是过去十年最重要的一次规则变化。如果你想向前纽约证券交易所资深分析师 Ken 学习如何做短线做 Day Trade ，他拥有 25 年美股交易经验，熟悉机构的操盘方法和投资策略，这些都是普通网红博主难以具备的、源自华尔街一线工作的专业积累。 目前，他已经将系统学习技术 K 线交易课程 免费开放 ，感兴趣可以前往： https://StockWe.com/col/videos 需要注意的是，国内部分地区访问美国网站可能需要借助网络V.P.en工具。 美股第一季度动荡不安，但我们的账号仍旧实现超常规的巨大回报，让各位粉丝见证专业投资人的实力 如果你想复制我们的成功，使用顶级的美股AI量化分析工具 扫码加入 浏览器打开 https://StockWe.com/vip 订阅 美股投资网是一家专门研究美股的金融科技公司，2008年成立于美国硅谷，由前纽约证券交易所分析师Ken创立，联合多位摩根斯坦利分析师，谷歌 Meta工程师利用AI和大数据，配合十多年美股实战经验和业内量化模型，建立了一个股市数据库 https://StockWe.com/ 每天处理千万级股票数据：捕捉期权大单，实时主力资金流向、机构持仓变化、川普突发新闻，精准K线信号第一时间发到您手机APP！ 联系方式 客服Telegram MaxMeigu 公众号 TradesMax 邮箱 buy@TradesMax.com Email: buy@TradesMax.com 美股大数据 StockWe.com"}, {"title": "本周最值得关注的美国股票 NFLX TSM", "date": "2026-04-15", "ym": "2026-04", "time": "2026-04-15 01:12:20", "author": "StockWe.com", "desc": "本周美股怎么抓主线？", "url": "https://mp.weixin.qq.com/s/jSulKYFkDe-JSEb64D7YTg", "path": "sources/news/wechat_mp/articles/本周最值得关注的美国股票-NFLX-TSM-c6d004e8b5.md", "len": 2636, "ticks": ["NFLX", "TSM"], "body": "本周美股里，最值得重点关注的不是“便宜股”，而是“事件驱动最强”的股票。按当前时间 2026 年 4 月 14 日（周二） 来看，美股投资网会优先盯这 5 只： Wells Fargo 、 UnitedHealth 、 TSMC 、 Netflix 、 Apple 。理由是：它们要么正处于财报窗口，要么是宏观与行业情绪的核心传导标的，同时最新股价波动和市场关注度都很高。 1) Wells Fargo （ WFC ）— 本周“财报季风向标” Wells Fargo 的 Q1 2026 财报就在 4 月 14 日，属于本周最直接的事件股之一。最新股价约 81.70 美元，当日跌幅约 5.7% ，说明市场对财报或管理层指引已经出现明显反应。银行股通常是美股财报季的“第一棒”，其净息差、贷款需求、信用成本和管理层对美国消费者与企业信贷的表态，都会影响整个金融板块乃至大盘风险偏好。 看点： 管理层是否下调全年展望 消费者信用和商业贷款质量是否恶化 利率路径变化对净利息收入的影响 一句话判断： 如果你想看“本周市场对美国经济基本面的第一反应”， WFC 很值得盯。 2) UnitedHealth （ UNH ）— 防御板块的核心样本 UnitedHealth 最新股价约 314.19 美元，市盈率约 17.8 倍，在大型权重股里估值不算激进。医疗保险和医疗服务股常常在经济不确定阶段承担“防御资产”角色，所以 UNH 不只是看财报，更是在看市场是否愿意重新拥抱低波动、高现金流板块。 看点： 医疗成本率有没有超预期上升 Medicare Advantage 相关利润率趋势 2026 年全年指引是否稳健 一句话判断： 如果本周市场从高弹性科技切回防御， UNH 很可能是机构资金优先选择的锚点之一。这个逻辑带有推断性质，但与其估值位置和板块属性一致。 3) TSMC （ TSM ）— AI 链最重要的财报之一 TSMC 将在 2026 年 4 月 16 日 举行 1Q26 财报会，这是本周最关键的半导体事件之一。公司给出的季度指引区间显示， 1Q26 营收指引为 346 亿至 358 亿美元，毛利率指引为 63% 至 65% ，本身就反映出高端制程需求仍强。其美股最新价格约 379.89 美元，当日上涨约 2.9% 。 TSMC 的特殊性在于：它不是单一公司逻辑，而是 AI 资本开支、先进制程、先进封装、苹果 /NVIDIA 等终端需求的总交叉点。如果 TSMC 给出强指引，通常会外溢到整个芯片链；反之，如果管理层对需求、产能利用率或资本开支偏谨慎，半导体板块容易整体承压。 看点： 3nm 、 2nm 、先进封装需求 AI 相关订单延续性 美国扩产与资本开支节奏 对下半年行业景气的表述 一句话判断： 如果你本周只能选一只“最有行业穿透力”的股票， TSM 很可能排第一。 4) Netflix （ NFLX ）— 成长股情绪测试器 Netflix 是本周另一只非常值得盯的成长股。它当前股价约 106.28 美元，市值约 5095 亿美元，市盈率接近 48.8 倍，说明市场已经给了相当高的增长预期。高估值成长股最怕的不是利润差，而是 用户增长、 ARPU 、广告层级、自由现金流或下季指引不够强。 市场讨论重点通常不是“这一季好不好”，而是： 用户净增是否继续超预期 提价后留存率是否稳定 广告业务变现是否提速 管理层对后续季度的指引是否继续乐观 由于 Netflix 对风险偏好和长久期成长股情绪有较强代表性，它本周很像一个“成长股温度计”。 5) Apple （ AAPL ）— 宏观与供应链情绪核心资产 Apple 本周未必是最强事件股，但一定是最不能忽视的权重股。最新股价约 258.83 美元，总市值约 4.05 万亿美元，市盈率约 34.4 倍。它对指数影响极大，同时又处在消费电子、全球供应链和大盘权重三重交汇处。 近期 Apple 的看点并不只在自身财报，而在于： 全球消费电子需求恢复是否足够强 上游芯片与代工链的订单变化 贸易、关税与供应链重构对利润率的潜在影响 因为 Apple 与 TSMC 的链条高度相关，所以本周看 TSMC ，也是在间接看 Apple 。若 TSMC 对高端手机、 AI 设备、先进制程需求表述强劲， Apple 相关情绪往往也会受益。这个结论有一定推断成分，但逻辑链条清晰。 美股投资网研究团队给一个“本周关注优先级” 第一梯队： TSMC 、 Wells Fargo TSMC 看 AI 和半导体景气 WFC 看美国经济和银行风险偏好 第二梯队： Netflix 、 UnitedHealth NFLX 看成长股估值能否继续被消化 UNH 看防御资金是否回流 第三梯队： Apple 更偏指数锚和供应链情绪锚 不同风格投资者怎么选 偏短线事件交易： TSMC Netflix Wells Fargo 偏中线配置： Apple UnitedHealth TSMC 偏宏观判断： Wells Fargo + TSMC 这组最有信息量 美股大数据给你的结论 本周最值得关注的美国股票，不是单一一只，而是两条主线： 银行财报线： Wells Fargo AI 半导体财报线： TSMC 如果只能选 1 只，我会选 TSMC ； 如果只能选 2 只，我会选 TSMC + Wells Fargo 。 因为这两只对 行业景气、资金风格、指数情绪 的解释力最强。 扫码+ 险，交易地缘冲突，交易油价，交易通胀，交易“别出更大的事”。 而这两天，市场明显在往另一边切： 开始交易右侧机会 ，开始交易企业会不会重新出手，重新抢资产，重新做整合，重新争夺入口。也就是说，盘面已经从“先活下来”切换到“谁先抢未来”。这一步，才是最值钱的信息差。 今天最值得看的两件大事 “ 亚马逊收购 Globalstar 亚马逊宣布将以约 115.7 亿美元 收购卫星通信公司 Globalstar (GSAT) ，报价约为 每股 90 美元 。消息公布后， GSAT 股价大涨近 10%， AMZN 也同步走强近 4%。 但市场真正盯上的，不只是 GSAT 手里的那几十颗卫星，而是它的 D2D 直连能力 、频谱资源，以及背后对未来终端连接入口的卡位价值。按照亚马逊的说法， AMZN 计划在 2028 年 启动 D2D 服务，并在 2029 年前后 部署约 3200 颗卫星 。 这件事为什么重要？ 因为过去市场给亚马逊讲的，主要还是电商、AWS、广告、AI。而这笔交易等于突然多出来一层新的估值想象： 空间通信基础设施平台。 这不只是一笔收购，而是为亚马逊重新贴标签。 “ 联合航空与美国航空合并传闻 联合航空 (UAL) CEO Scott Kirby 被曝在今年 2 月曾向特朗普提出与美国航空 (AAL) 潜在合并的想法。消息传出后， AAL 股价一度大涨约 8% ， UAL 也同步走强。 表面看，这只是一则并购传闻。 但市场真正交易的，并不是这笔交易短期能否落地，而是航空业整合的可能性，第一次被重新摆上了台面。 为什么这点重要？因为如果 UAL 和 AAL 真合并，合并后的公司大约将控制 40% 的美国国内运力 ，并在 159 个机场 掌握至少一半的国内运力。 这样的体量，在正常监管语境下，反垄断压力极大。也正因为如此，这条消息一出来，市场立刻分成两派：一派在交易行业整合带来的 运力纪律、票价能力和盈利质量提升 ；另一派则在质疑，这种交易几乎不可能轻松过审。 但对股价来说，最关键的从来不是“最后会不会批”，而是 AAL 这种原本按 周期股、重资产、低估值 来定价的公司，突然被赋予了一层新的东西： 控制权溢价 。 原来市场看它，看的都是利润波动、成本压力、油价风险和经营执行； 现在市场开始给它算另一笔账： 如果航空业真的重新进入整合期，AAL 会不会成为那个被重新估值的资产？ 所以，这件事真正的意义，不只是航空股异动，而是在试探一个更大的问题： 特朗普时代的反垄断边界，会不会和过去几年明显不一样。 一旦这个边界被市场认为有松动，整个航空板块、甚至更广泛的传统行业，都可能重新获得一层并购估值溢价。 ←左右滑动查看更多产品介绍图→ 浏览器打开 https://StockWe.com/vip 订阅 美股投资网是一家专门研究美股的金融科技公司，2008年成立于美国硅谷，由前纽约证券交易所分析师Ken创立，联合多位摩根斯坦利分析师，谷歌 Meta工程师利用AI和大数据，配合十多年美股实战经验和业内量化模型，建立了一个股市数据库 https://StockWe.com/ 每天处理千万级股票数据：捕捉期权大单，实时主力资金流向、机构持仓变化、川普突发新闻，精准K线信号第一时间发到您手机APP！ 联系方式 客服Telegram MaxMeigu 公众号 TradesMax 邮箱 buy@TradesMax.com Email: buy@TradesMax.com 美股大数据 StockWe.com"}, {"title": "美股下周将会爆涨，你相信\"光\"吗？", "date": "2026-04-10", "ym": "2026-04", "time": "2026-04-10 21:18:59", "author": "StockWe.com", "desc": "300亿资金转多", "url": "https://mp.weixin.qq.com/s/6RZEkZcpG-zDNE9iOohX3Q", "path": "sources/news/wechat_mp/articles/美股下周将会爆涨-你相信-光-吗-955adc8b6a.md", "len": 3819, "ticks": [], "body": "“2028年的产能，两个季度内卖完。” “美国云巨头的AI资本开支，看不到尽头。” 这是光电器件龙头 Lumentum（LITE） 首席执行官 Michael Hurlston 周五在东京接受采访时，对美国云巨头 AI 资本开支给出的最直接定调。 如果说过去市场还在担心，AI 叙事是不是已经接近见顶，那么 Lumentum 抛出的这组信息，几乎是在重新定义整个光学板块的估值逻辑： 订单锁定： 目前所谓的“售罄”，不再是软性意向，而是签署了具有法律效力的不可取消协议。这意味着 2028 年的收入已经基本进入“保险箱”。 时间跨度： 仅仅在两个季度前，行业能见度还在 2027 年徘徊，但现在管理层明确表示，2028 年的产能已被抢空。 扩产斜率的极致： 尽管过去两年产能已疯狂翻了 12 倍，但大厂客户（如英伟达、微软、谷歌）依然在每天追问每一季度的增量交付。这说明 AI 数据中心对光互连的需求， 已经从“景气周期”转变为“产能极限挑战”。 为什么不能外迁？ 既然供不应求，为什么不去别的国家大规模铺产能？ Hurlston 给出的答案是：因为 磷化铟器件 不是 普 通制造业，它本质上是“精密工艺”与“工业黑盒”的结合。 环境变量极其苛刻： 高端磷化铟器件的生产，对水质、温度、湿度乃至生产线的微小震动都有极其严苛的要求。这不是简单的组装，而是复杂的半导体工艺物理实验。 供应链无法平移： 以日本相模原工厂为例，其周边形成的特种材料供应商、工艺专家以及精密加工网络，是长达数十年的工业积淀。这种“工业黑盒”无法通过资本投入在短期内实现快速复制。 时间成本的博弈： LITE 甚至在寻找日本老旧电子厂房进行改造，只为缩短投产周期。现在的瓶颈已不再是订单，而是物理空间、制造体系以及高端 InP 工艺本身的复制难度。 换句话说，这不是单纯的扩产问题，而是一个 全球少数玩家才具备能力的精密制造壁垒。 估值逻辑的暴利重估 以往光模块被视为强周期行业，但这一次： 英伟达背书： 3 月，英伟达分别向 LITE 和 COHR注资 20 亿美元。这不只是资金支持，更像是英伟达通过资本手段，对底层光学产能进行提前绑定和战略锁仓。 盈利弹性： 摩根大通在最新报告中对 LITE 极其看好，预测随着 CPO（光电共封装）和 OCS（光路开关）的规模化， 其 CY28 每股盈利（EPS）有望突破 36 美元。 定价权正在反转： 行业已进入“卖方市场”。以前是供应商求订单，现在是大厂为了锁定未来三年的产能，必须提前签署协议并支付溢价。 早在一个月前，美股投资网就发布深度报告，严重看好 LITE 和 COHR 光学板块的“集体共振” 受此消息刺激，光学板块再次开启了狂飙模式： LITE：盘前大涨 7.6%。当产能被一路锁到 2028 年，市场开始按“高确定性成长”而不是传统周期股来重新定价它。 COHR：大涨 9.17%，在 LITE 产能封顶后，它是承接全球大厂溢出订单的唯一顶级“军火库”。 （ 自2016年6月30日以来，LITE涨约3200%，COHR涨约1100% ） AAOI ：狂飙 15%+。拥有行业领先的 1.6T LPO 量产进度，是资金押注 AI 数据中心设备迭代速度的最强弹性标的。 POET ：暴涨 16%+。凭借独特的光引擎集成技术，POET 走的是“降低功耗、提升效率”的路线，因此也被资金视为解决 AI 数据中心“电力焦虑”的潜在黑马。 FN ： 大涨 9.46%。光学赛道的“台积电”，无论谁家的设计胜出，最终都要靠它无可替代的高端精密代工能力将蓝图变成现实。 美股投资网 2026 年 必買 GLW 同步上涨。全球光纤与玻璃基板霸主，它为 AI 互连提供了最基础的“物理血管”，是整个板块中确定性最高的底层基石。 我们VIP社群在3月9日在125美元附近重新入场GLW，截至目前，这一笔浮盈已经达到36%。 美股投资网早在两篇深度文章—— 《美股2026年必买10只股【中集】 GLW》 以及 《美股下一轮AI核心机会不在GPU，而在光电产业链》 中 ，其实已经系统拆解过这个逻辑，并重点介绍了GLW、LITE与COHR在产业链中的位置。 美股投资网认为 AI 的物理极限最终都会卡在“光”与“电”上。当 2028 年的产能都被提前抢购时，投资逻辑已经从“业绩预测”变成了“产能抢占”。下周，市场将继续验证这一逻辑的强度。 CoreWeave 凑齐“四大顶级客户” 就在锁定 Meta 210 亿美元协议的次日，算力租赁龙头 CoreWeave 再次宣布：与 Anthropic 达成多年期数据中心租赁协议。 至此，CoreWeave 的客户名单已全面覆盖全球 AI 四大模型厂商：OpenAI、Meta、Google、以及 Anthropic。 这一信号标志着： 在算力极度紧缺的时代，专注于 AI 负载的云计算供应商，正在掌握比传统云巨头更敏捷的分配权。 Anthropic 的 500 亿美金“豪赌” 作为估值 3800 亿美元的独角兽，Anthropic 正在全面提速基础设施建设： 解决响应延迟： 此前 Claude 曾多次因需求过载面临性能不稳定，核心瓶颈在于算力储备。 资本投入： 为支撑模型迭代，Anthropic 承诺向美国境内新建 AI 数据中心投入 500 亿美元。 能 市场还面临周五CPI数据的不确定性，但在地缘局势阶段性缓和的预期推动下，多头仍然占据主动。 停火预期托住市场情绪 推动本轮反弹的核心变量，仍然来自中东局势。 4月9日，以色列总理内塔尼亚胡表示，已下令尽快启动与黎巴嫩的直接和平谈判，重点包括解除真主党武装，并推动两国关系安排。 市场将这一表态视为局势降温的重要信号，这也成为当天美股维持强势的主要背景之一。 但需要看到的是，谈判预期并不等于风险已经解除。黎巴嫩方面仍希望先实现临时停火，再推动更广泛的谈判。这意味着，以色列与黎巴嫩之间虽然释放出直接对话信号， 但双方在谈判前提、停火条件以及推进节奏上并未形成完全一致的立场。 对美股市场而言，真正重要的仍然只有三个问题。 停火能否从短期安排走向持续执行。 霍尔木兹海峡的实际通航量能否恢复，而不是仅停留在口头缓和。 能否最终形成一份更长期、可验证的地区安排。 只要这三点中的任何一点反复，油价就很难真正回落，风险资产也很难建立持续上行的基础。 宏观数据仍然构成约束 盘前公布的一系列美国数据并不轻松，甚至已经显露出一定的滞胀压力。 美国2025年第四季度GDP增速下修至0.5%，明显弱于此前水平； 2月消费者支出几乎停滞，也反映出高通胀对内需仍在形成压制。与此同时，亚特兰大联储已将2026年第一季度GDP增长预估下调至1.3%。 更大的考验在周五即将公布的CPI数据。市场普遍预计，3月CPI同比增速将升至3.3%，环比上涨0.9%，如果兑现，将对应2022年以来较大的单月涨幅之一。 在医疗、金融服务通胀本就偏高的背景下，油价同比大涨继续成为价格压力的重要来源。这种宏观环境决定了，投资者即使参与反弹，也必须持续关注美债收益率和通胀预期的变化。 AI交易继续分化 周四盘面上，科技和大盘成长方向继续主导反弹，大型科技股已基本收复战争期间的跌幅，自低点累计上涨约12%。 但与此同时，软件板块却继续承压。标普500软件与服务指数今年以来累计跌幅已达25.5%，周四单日再跌2.6%。这说明当前市场并不是在简单地全面做多科技，而是在科技内部进行更明确的再定价。 导火索之一，是Anthropic发布新模型Claude Mythos 和 Claude managed agent ，但仅向少数大型科技公司开放预览，原因是公司担心模型能力过强，可能暴露潜在网络安全漏洞。 与此同时， META也推出了其超级智能团队的首个模型Muse Spark 。市场对此的解读非常直接：AI正在越来越快地从辅助工具走向执行层，而这一变化会直接冲击传统软件企业原本较为稳定的需求结构和估值逻辑。 这背后的交易主线已经越来越清晰。资金并不是简单地买科技、卖科技，而是在做更细致的结构选择：继续增配算力、基础设施、平台入口以及现金流兑现能力更强的环节，同时下调对传统SaaS和纯应用层公司的估值容忍度。 从这个角度看，美股投资网认为，捞底“软件股”的风险比追高“硬件股”风险大！机构和散户的资金都抛售了软件，反而会让硬件股继续创历史新高。 美股投资网机会 今天云基础设施公司NBIS大涨超 9%。 核心原因有两个： 第一，AI基础设施和neocloud赛道近期重新成为资金主线，NBIS本身就是这个方向里弹性最强的代表之一。 第二，公司此前接连拿下Meta相关大单，同时分析师持续上调目标价，市场对其2026年的增长预期也在不断抬升，因此资金选择继续往这个方向集中。 值得注意的是，我们在 3 月底就通知VIP社群在 96 美元买入，截至目前获利51%。 算力互联龙头——迈威尔科技（MRVL），今天同样大涨近 5%。 我们在今年1月底就提示VIP社群于81美元重仓30%潜伏，截至今天获利50%！ 2026年我们美股投资网年度 必買 股首选GLW，今天也再次稳步上涨3.5%。 文章回顾： 《美股2026年必买10只股【中集】GLW》 要知道，我们当时在视频里公开分享它的时候，价格只有85.33美元，走到今天，收益已经翻倍！ 此外我们VIP社群在3月9日在125美元附近重新入场GLW，截至目前，这一笔浮盈已经达到36%。 而被我们称为“小 SpaceX”的 FLY，今天继续走强，单日再涨超 7%。 就在上周五，我们还专门发布了深度文章 《美股 新开仓小SpaceX，太空股集体暴涨背后的机遇！FLY》 ，把我们看好 FLY 的核心逻辑写得非常清楚。 我们此前在 1.35美元 布局的 FLY 看涨期权（Call），短短几天之内，市场卖价已经冲到 9美元 左右，回报率接近 9倍。 美股VIP让你成为更专业的投资者 扫码 6800点成为关键分界线 从技术和筹码结构来看，标普500目前正处在一个非常微妙的位置。6800点附近，已经不是普通的整数关口，而是这一轮反弹能否继续延伸的关键分界线。 美股投资网判断，这一区域本质上是当前多空重新定价的交汇点。指数只要能够稳定在6800点上方，市场就还可以继续沿着“停火预期缓和、风险偏好修复”的逻辑交易；但如果反复站不稳，情绪就很容易重新转向谨慎。 更关键的是，期权市场放大了这种脆弱平衡。 SpotGamma数据显示，6800点上方堆积着较厚的正伽马和密集的看涨期权供给，这意味着指数上行过程中会持续遇到来自仓位与对冲盘的阻力，同时波动也会在一定程度上受到压制。 但下方支撑同样非常清晰，6740点和6700点是当前多头最重要的两道防线。一旦6700点被有效跌破，市场就可能迅速滑入负伽马区间。届时，卖方为了完成风险对冲，只能顺势减仓，市场波动也会从被压制转为被放大，回调速度可能明显加快。 散户在收缩风险 散户这一次的反应明显不同于过去几年。以往每逢利空缓和、指数反弹，散户往往会快速进场，形成典型的“逢跌买入”模式。但这一次，由停火消息带动的上涨，并没有换来散户资金的明显回流。 根据JPMorgan最新的零售交易追踪数据， 截至4月8日当周，散户资金流入总量只有48亿美元，明显低于过去12个月66亿美元的周均水平。 从结构上看，散户对ETF仍有53亿美元净买入，但个股整体却录得4.6亿美元净卖出。 这个细节非常重要，因为它说明散户并不是在主动提升风险暴露，而是在通过更分散、相对防御的方式保留市场敞口。 盘中的交易行为进一步说明了这一点。4月8日当天，上午11点，散户买入活跃度仅处于过去一年1.6%分位，ETF净卖出规模创近一年最大。 午后随着市场继续反弹，散户一度短暂回补ETF和个股，但到收盘时，ETF敞口又重新回落到0.4%分位，个股净买入也仅维持在7.6%分位的低位。也就是说，散户并非完全没有参与反弹，而是在每一次市场走强时，都表现出明显的保守倾向。 这背后反映出的，是行为模式的变化。散户正在从过去的“逢跌买入”，逐步转向现在的“逢涨减仓”。 这说明他们对这轮反弹的持续性并不完全信服。表面上看，市场在交易中东局势缓和；但散户更真实的反应是，先利用反弹降低仓位，再观察后续是否还会出现新的变量。 Mag7仍是散户主要配置方向 当然，散户并不是全面撤退。真正还能持续吸引资金流入的，依然是少数确定性最高、流动性最强的科技龙头。 本周，特斯拉TSLA获得4.94亿美元净买入，英伟达净流入2.98亿美元，微软净流入2.82亿美元，META净流入1.40亿美元，苹果净流入1.00亿美元，谷歌净流入6200万美元，只有亚马逊录得3600万美元净卖出。尤其是META，因为其超级智能团队发布新模型，额外吸引了一部分资金回流。 这说明，散户实际上是在主动收缩战线，把有限的风险预算集中投向最熟悉、流动性最好、逻辑也最强的少数核心股。 接力棒正在交给机构和系统性资金 当散户不愿意追高，市场若还想继续上行，就只能更多依赖机构资金、期货盘和系统性策略资金接棒。这也是当前这轮反弹最微妙的地方：指数还能上涨，但背后的买盘结构已经发生变化。 高盛交易台测算显示， 目前CTA大约仍持有300亿美元的标普500空头头寸 ，但模型已经接近转折点。 按照最新测算，未来一周CTA有望买入约340亿美元，完成平仓并转为多头。 如果这部分买盘真的落地，那么即便散户继续观望，指数层面依然可能获得一股不小的推力。 但这里也要看清楚，这种上涨和普遍意义上的风险偏好回升并不是一回事。 CTA回补，本质上更像是模型驱动下的仓位调整，而不是主动资金基于基本面改善而展开的全面加仓。它当然可以推高指数，尤其有利于继续强化大型科技和高流动性龙头的强势表现，但它的稳定性，终究不如由散户、机构和基本面预期共同支撑的广泛上涨。 浏览器打开 https://StockWe.com/vip 订阅 美股投资网是一家专门研究美股的金融科技公司，2008年成立于美国硅谷，由前纽约证券交易所分析师Ken创立，联合多位摩根斯坦利分析师，谷歌 Meta工程师利用AI和大数据，配合十多年美股实战经验和业内量化模型，建立了一个股市数据库 https://StockWe.com/ 每天处理千万级股票数据：捕捉期权大单，实时主力资金流向、机构持仓变化、川普突发新闻，精准K线信号第一时间发到您手机APP！ 联系方式 客服Telegram MaxMeigu 公众号 TradesMax 邮箱 buy@TradesMax.com Email: buy@TradesMax.com 美股大数据 StockWe.com"}, {"title": "美股这样涨下去不行吧？！SNDK GLW FLY", "date": "2026-04-08", "ym": "2026-04", "time": "2026-04-08 21:06:45", "author": "StockWe.com", "desc": "希望有 adesMax.com Email: buy@TradesMax.com 美股大数据 StockWe.com"}, {"title": "美股四连涨！特朗普放狠话没吓倒市场，FLY期权6倍大爆发！", "date": "2026-04-06", "ym": "2026-04", "time": "2026-04-06 20:47:13", "author": "StockWe.com", "desc": "美股最需要盯住的四个关键变量！", "url": "https://mp.weixin.qq.com/s/UyZB3yJgctamjQHeg-A_jg", "path": "sources/news/wechat_mp/articles/美股四连涨-特朗普放狠话没吓倒市场-FLY期权6倍大爆发-470e723452.md", "len": 3159, "ticks": ["FLY"], "body": "4月6日周一，美股经历了一次典型的高压测试。 白天，白宫一边释放出美伊谈判仍有回旋空间的信号，另一边特朗普又把最后期限说得更重， 明确表示4月7日周二晚间将是伊朗达成协议 、避免美国进一步升级打击的最终时点。受此影响，盘中避险情绪明显回潮，三大股指一度短线跳水，国际油价则迅速拉升。 但到了收盘，华尔街还是把票投给了另一种剧本： 冲突会继续施压，但短期内未必立刻失控。 在这种预期下，三大指数最终集体收涨，标普和纳指双双拿下四连阳。 盘前：市场先交易“谈判希望” 盘前阶段，市场先交易的仍然是“谈判还有希望”。 上周五强于预期的非农数据，给市场提供了基本面的底气；与此同时，中东多边斡旋仍在继续，令投资者暂时不愿把局势直接按最坏情形定价。股指期货因此整体表现平稳，说明资金在正式结果出来前，仍倾向于先观望。 更重要的是，华尔街实际上已经进入了标准的“事件驱动周”。伊朗问题进入关键窗口，美联储会议纪要即将公布，通胀数据也在路上，Q1财报季前哨同样临近。在这种节点上，市场通常不会轻易做出单边重仓选择，而是边走边看，等待新的催化剂决定方向。 不过，宏观面的压力并没有消失。 美国3月ISM非制造业指数从2月的56.1回落至54.0，显示服务业仍在扩张，但边际动能已经开始减弱。更值得警惕的是，支付价格分项创下逾13年来最大月度升幅，这背后指向的正是油价、运输和供应链成本的重新抬头。 这也让市场看到最不舒服的组合： 增长边际走弱，但通胀压力反而重新抬头。 一旦这种组合持续，2026年的交易逻辑就会发生变化。 市场关注的重点，正在从“美联储何时开启降息”，转向“高油价背景下，美联储是否会被迫把高利率维持得更久。 开盘：市场先按“冲突可控”来交易 开盘后，市场的第一反应是继续按“冲突可控”来交易。 三大指数延续了此前几天的修复势头， 说明交易员更愿意把当前的中东风险理解为阶段性扰动，而不是足以立刻改写全年主线的系统性冲击。 只要美伊谈判没有正式破裂，只要霍尔木兹海峡的通航问题没有彻底恶化，资金就愿意回到风险资产里做反弹和修复。 盘中：特朗普“最后通牒”砸出跳水 真正让盘面紧张起来的，是特朗普在盘中的强硬表态。 他再次强调，周二晚间是伊朗达成协议的最终期限，且这一期限不太可能再延长；如果伊朗未能在时限前作出让步，美国可能扩大对伊朗基础设施的打击范围。 与此同时，美国国防部长赫格塞思也释放出更强硬的军事信号，称周一将是本轮行动开始以来打击规模最大的一天，而周二的打击规模还会进一步升级。 这番话一出来，市场立刻开始重新评估最坏情景。 如果冲突升级，如果霍尔木兹海峡相关风险重新发酵，那么油价就不只是“高位震荡”，而可能进入新一轮冲击区间。 也正是在这段讲话期间，三大指数盘中均曾短线转跌，标普和纳指刷新日内低点，原油则同步加速走高。WTI原油收于112.41美元/桶，布伦特原油收于109.77美元/桶。 但市场的恐慌并没有进一步扩散。原因很简单， 特朗普虽然放了狠话，但并没有把谈判大门彻底关死。他同时提到，伊朗方面仍存在积极、有意愿的谈判参与者，并暗示会谈并未完全失去推进空间。 这意味着市场看到的并不是单边升级，而是“施压+留口子”的双重信号。也正因为如此，盘中的那波抛压最终没有演变成踩踏，反而在尾盘逐步被买盘消化。 FLY继续走强 此前，美股投资网的文章其实已经提前做过预告。被称为“小 SpaceX”的 FLY，今天继续走强，单日再涨近 6%。 而就在上周五，我们还专门发布了深度文章 《美股 新开仓小SpaceX，太空股集体暴涨背后的机遇！FLY》 ，把我们看好 FLY 的核心逻辑写得非常清楚。 文章回顾： 美股全线暴拉！3月最后一天，华尔街狠狠干了一票大的！ FLY 美股 势不可挡！强势股恒强，FLY 期权翻3倍 我们此前在 1.35美元 布局的 FLY 里是什么概念？目前全球市值最高的公司苹果约在3万亿美元左右，SpaceX若以1.75万亿估值上市，将一跃成为全球最有价值的上市公司之一。更有意思的是，SpaceX此前已完成对马斯克旗下AI公司xAI的收购，合并后实体的估值被定在1.25万亿美元，而本次IPO则在此基础上进一步大幅上调。 SpaceX的上市将早于OpenAI和Anthropic，成为本年度\"超大型IPO\"首发阵营中的第一枪。如果时间表按6月落地，今年夏天的IPO市场将是近年来最热闹的一次。 昨天，美股投资网文章已经预告过， 小SpaceX之称的 Firefly Aerospace Inc. (FLY) 今天继续暴涨10%。 它的看涨期权两天翻了3.5，从1块涨到3.5块，这就是期权的杠杆功能 美股期权系统学习课程 https://StockWe.com/col/videos 💡 焦点二：英伟达×迈威尔，NVLink生态版图进一步扩张 半导体板块今天再度成为做多的主力。英伟达向迈威尔科技（ MRVL ）投资20亿美元并达成战略合作，华尔街的解读已经趋于一致——这笔钱买的是 NVLink Fusion生态 的深度绑定。MRVL 今天继续暴涨8%，美股投资网VIP社群 赚麻了！ VIP推送截图曝光，81美元成本捞底，浮盈35%，昨天文章已经公布过我们的持股 Wedbush分析师Matt Bryson在研报中直接点出，此次合作的核心技术方向是NVLink、AI-RAM以及光网络/硅光子，迈威尔则将为微软、亚马逊等超大规模云厂商提供定制XPU（加速处理器），并接入英伟达的NVLink互联架构。换句话说，英伟达不只是在卖GPU，它在构建一个封闭的AI基础设施生态——谁想用最好的算力，就得用英伟达的连接层。 Cantor Fitzgerald当日重申英伟达\"跑赢大市\"评级，认为此次合作让英伟达又打开了一条渗透超大规模客户的新通道。美银证券将迈威尔目标价从110美元上调至125美元，Roth MKM则更激进，从94.54美元一口气调到135美元，均维持\"买入\"。 简单说：英伟达用20亿美元\"买了张门票\"，锁定了迈威尔帮它把NVLink标准推进超大规模客户的AI定制芯片领域。这条路如果走通，对英伟达生态价值的贡献不亚于单纯的GPU销售。 📈 焦点三：AMD重回视野，富国银行看7月\"加速AI\"活动为催化剂 今天 AMD 尾盘上涨约3.7%，直接导火索是富国银行将其纳入二季度战术性选股名单。分析师Arun Rakers重申\"买入\"评级，目标价345美元，较当前约210美元的水平有超过60%的潜在空间。 富国银行的逻辑分两段：短期看， AMD将于5月5日发布一季报，EPYC服务器CPU需求强劲，叠加潜在的AI GPU新品发布，财报前市场情绪料偏积极 ；中期看，7月的\"加速AI\"活动是下一个重要催化剂，这类技术活动历来是AMD发布新品路线图、与英伟达正面竞争的重要舞台。 不过，今天还有一条插曲： 4月1日有消息流传说AMD已同意收购英特尔，这自然是愚人节的玩笑，但有意思的是，英特尔今天大涨近9% ，说明部分资金仍在这个方向上押注转机叙事。目前没有任何可靠信息支持这笔交易的存在。 📉 今日最惨：耐克暴跌14%，创近一年最大单日跌幅 如果今天有一家公司让人看了揪心，那就是耐克（ NKE ）。第三财季业绩本身还行，但指引一出，股价当场崩了——公司预测四季度营收将下滑2%至4%，而分析师此前普遍预期是同比增长2%，差距直接打在脸上。 最让市场担忧的是中国区：中国销售额单季下滑20%，叠加库存与利润率双重压力。CEO Elliott Hill说\"方向已经明确，我们正在全力推进\"，但市场听到的是\"问题还没解决\"。耐克年内跌幅已接近30%，进入道指成分股里表现最差的行列。 🔭 幕后看点：OpenAI二级市场无人问津，对手Anthropic溢价抢筹 这条消息不在股市，但对理解AI板块的估值逻辑极有价值。据私募股权二级市场平台NextRound创始人Ken Smythe透露，OpenAI的股票需求正在明显降温——有持有大额股权的对冲基金和风险投资机构拿着约6亿美元的股份在找接盘方， 却在数百家机构投资者中找不到买家。这在去年几乎不可想象 。 与此同时，Anthropic的情况截然相反。NextRound和另一平台Augment都收到大量对Anthropic股权的出价，隐含估值约6000亿美元，较上一轮融资溢价接近58%。摩根士丹利和高盛都在向高净值客户主动分发OpenAI的份额，且不收业绩提成——这本身就是一个信号。而Anthropic的份额，高盛仍按常规收取15%至20%的业绩提成，供不应求。 Augment联合创始人Adam Crawley的评价道出了当下的市场逻辑 试探 盘前市场原本并不算太差。经历上周连续回撤后，美股期指一度温和反弹，交易员一开始押注的是两件事： 一是前期跌幅已经不小， 短线存在技术性修复 ； 二是特朗普盘前关于正与伊朗一个“更理性的Z府”讨论的说法，让部分资金短暂按“局势可能不会继续快速升级”来交易。盘前这波反弹，本质上更像风险偏好的一次试探。 但这波风险偏好的试探极其脆弱，因为最核心的宏观资产——原油，并没有给出配合的信号。盘前WTI原油期货已重新逼近102美元，布伦特原油更是升至116美元附近高位。 原油交易员依然在为霍尔木兹海峡可能遭遇的封锁支付极高的风险溢价。在原油价格没有出现实质性回落的背景下，期指的反弹缺乏坚实的宏观基本面支撑，注定只能是昙花一现。 开盘冲高 道指、标普500、纳指开盘时都曾上行，标普500一度上涨接近0.9%。这说明市场在开盘阶段，仍试图把此前的连续下跌先按“超跌修复”来处理。可这种反弹持续时间并不长。 美股投资网认为，标普500早盘冲高后很快回吐涨幅，随后转入震荡走弱。也就是说，周一并不是开盘就一路下杀，而是先有过一次 “市场想稳住” 的尝试，只是后来被更强的宏观变量打断了。 盘中的关键变量 鲍威尔在当天的讲话中明确传达了“暂不转鹰”的信号 ：他强调当前美国货币政策“处在合适位置”，面对由战争和油价推升的供给侧能源冲击，美联储不会仓促做出反应。在评估冲突对经济的长期影响之前，联储将保持“观望”。 这一表态对美债市场起到了立竿见影的安抚作用，10年期美债收益率迅速回落至4.34%附近。然而，这里出现了一个极度值得警惕的跨资产背离信号：原油价格在狂飙，而美债收益率却在下跌（债券被买入）。 按照经典的宏观交易框架，油价飙升通常会推升长期通胀预期，从而引发债券抛售、收益率上行。但周一盘中的表现却截然相反。这揭示了华尔街主力资金的逻辑切换—— 债市交易员已经不再单纯交易“通胀反弹”，而是开始提前计价“高油价反噬实体经济引发衰退”的风险。 面对这种衰退预期，鲍威尔的口头安抚显得苍白无力。他坦言目前评估地缘影响“言之尚早”， 这意味着美联储只是按兵不动，并没有真正开启新的宽松周期。 根据利率掉期市场的最新定价，资金已明显撤回对年内降息的押注，甚至一度开始重新计入今年再加息一次的可能。 （市场已撤回约50bp的年内降息定价） 油价主导 真正把指数从高位重新压下来的，还是中东。 特朗普周一一边继续释放谈判表态，另一边又重申，如果霍尔木兹海峡问题得不到解决，美国可能打击伊朗的油井、发电设施和关键出口基础设施。 午后， 随着特朗普再度发出“彻底摧毁”伊朗油气设施的强硬威胁 ，叠加伊朗议会对霍尔木兹海峡收费法案的强硬回应，大盘彻底放弃抵抗。市场主线由“联储鸽派”单边切换至“原油冲击”，股指随之单边震荡走弱。 从更大的框架看，周一市场还给出了一个更值得重视的新信号： 口头安抚，已经越来越难单独改变价格方向。 财政部长贝森特当天表示，全球油市目前仍算供应充足，未来会逐步恢复对霍尔木兹海峡的控制，实现航行自由，美国护航或多国护航都在选项之内。 但从资产价格反应看，交易员并没有因此显著下调风险溢价。油价没有明显回落，美股也没有像样反弹。 这说明当前市场真正缺的不是表态，而是能实质压低风险溢价的政策动作。市场开始从单纯的headline交易，慢慢转向“最后一步会不会出手”的交易。 板块表现 从板块表现看，科技股成为全天大盘最沉重的拖累，费城半导体指数重挫超4.2%。除了高油价带来的估值压制外，受谷歌存储新技术可能大幅降低硬件依赖的冲击，内存条现货价格跳水，引发华尔街对AI硬件周期可能见顶的深度恐慌。高久期、高估值的存储芯片首当其冲，美光（MU）暴跌近10%，西部数据（WDC）重挫8.6%。 相对亮一点的方向，在金融板块（收涨1.1%）。其核心驱动力来自 美国劳工部发布的重磅指引草案——明确受托方可向401(k)退休计划中加入另类资产。 （这一政策敞口未来也有望惠及 Bitcoin 等资产）。 这意味着高达数万亿美元的养老金池即将向私募股权和信贷敞开大门。资管巨头应声暴涨，黑石集团（BX）收涨3.3%，KKR（KKR）收涨2.1%。 此外，受大佬Bill Ackman唱多刺激，房利美（FNMA）与房地美（FMCC）分别飙升超51%和47%，上演了罕见的资金逼空。 到收盘，道指上涨0.11%；标普500下跌0.39%；纳指下跌0.73%；罗素2000下跌约1.5%。 美股投资网观察到，标普500目前较年内高点回落约9.1%，道指、标普500和纳指在内的主要指数都已较各自高点回落逾10%， 市场整体仍处在技术性调整区域，风险偏好修复远谈不上稳固。 华尔街的分歧也在进一步加剧。Wolfe Research建议死守防御性仓位；摩根士丹利则认为抛售已近尾声，市场对增长的担忧被过度放 “买药救急”。 你看辉瑞，2025 年刚花了 100 亿美元抢购 Metsera，拿下了超长效 GLP-1 减肥药；此前更是斥资 430 亿美元买下 Seagen，只为拿下 ADC（抗体偶联药物）核心资产。 艾伯维为了保住利润，也连续耗资 101 亿和 87 亿美元，将两家创新药企（ImmunoGen和Cerevel）收入囊中，强行补足了肿瘤和神经领域的缺口。 大厂的这种焦虑，华尔街的“聪明钱”早就看在眼里。资本市场根本不需要等到并购协议最终签署，只要小公司发布了超出预期的临床数据，资金就会迅速涌入，提前在二级市场上，把这种“稀缺资产”的溢价空间直接拉满。 在今天的文章里，我会做两件事情： 第一，把这两家暴涨公司的底层“基因”拆开，看看它们到底做对了什么，凭什么能被市场强力重估。 第二，沿着同样的产业逻辑，我们筛选出了2家底层资产完美对标、且未来极具爆发潜力、有可能冲击10倍以上涨幅的公司。 如果你不想总是在新闻满天飞、别人已经赚翻了之后才后知后觉，如果你想提前埋伏这场极具确定性的产业红利……接下来的内容，你绝对不能错过。 老规矩，点赞、收藏、转发！ 给我们加星标以免你错过超重磅文章！ ERAS暴涨基因拆解 我们先来拆解第一家，抗癌新药研发公司 Erasca，美股代号ERAS。这家公司是从去年11月开始从2美元一路涨到16.4美元，涨幅800%。 （美股投资网当初调研价格） 凭什么？因为它打出了一套堪称完美的‘连招’，在三个层面上形成了极其强烈的利好共振。 第一招：硬核突破，攻克‘不可成药’的绝对壁垒。 Erasca 的核心资产直接瞄准了肿瘤界几十年都没能解决的硬骨头：RAS 基因突变。 这种突变在胰腺癌、肺癌等致命大癌种里非常普遍，患者基数极大。但因为技术难度实在太高，过去一直被医学界判了死刑，称为‘不可成药’靶点。 但是，就在今年1月的摩根大通医疗大会上，Erasca 甩出了核心资产 ERAS-0015 的早期数据，直接把全场点燃了！市场敏锐地捕捉到了两个黄金信号：第一，剂量很低就能看到明确疗效；第二，起效的同时，安全性极高，没有出现严重的副作用。 （ERAS 领衔的全球 RAS 靶向药研发竞争全景图） 在创新药的圈子里，‘低剂量起效 + 安全性过关’的组合，就等于两个字：值钱！这意味着它不仅单打独斗很强，未来还能和其他药物联合使用，想象空间巨大。大家瞬间明白，这不是一个普通的试验项目，而是一个有望成长为‘超级重磅炸弹’的稀缺资产。 第二招：教科书级的精准融资，彻底打消‘稀释恐惧’。 买过生物科技股的朋友肯定都有阴影：这个板块最怕的不是没故事，而是刚出点利好、股价刚涨，公司马上就反手抛出定增融资，把老股东的权益稀释得一干二净。 但 Erasca 这波操作堪称教科书级别。它精准踩中了数据利好、股价上行的黄金窗口期，迅速以每股 10 美元的价格，完成了一笔超额认购， 一次性抽血 2.59 亿美元！ 高明在哪？它利用了高股价，用最少的股权稀释，换来了最多的现金。这笔钱一到账， 足够把研发一路保驾护航到 2028 年下半年 。等于直接给市场吃了一颗定心丸：未来两三年，我们不缺钱！ 第三招、把自己打造成巨头眼里的‘完美猎物’。 在确立了价值和资金后，Erasca 迅速完成了最后一块拼图：果断出手，收回了核心资产的“全球独家商业化权益”， 并确认专利保护期延续至 2043 年。 这步棋极其高明。在生物科技圈，大厂并购最忌讳的就是“产权不清晰”。而 Erasca 通过这次权益收回，把自己变成了一套“100% 产权、豪华装修、且拎包入住”的顶级精装房。 对于急于补齐收入缺口的巨头来说，这种拿来就能直接变现、且拥有近 20 年市场垄断力的“现金奶牛”，就是最完美的溢价标的。 TERN暴涨基因拆解 接着来看第二家公司——Terns，美股代号 TERN，一家聚焦肿瘤和肥胖赛道的生物科技公司。从去年10月的7美元起步，股价一路飙升到如今的53美元，累计涨幅高达660%。 （美股投资网当初调研价格） 如果说刚才讲的 Erasca 是在教你怎么打造一个‘精装房’，那么 Terns 本质上也是同一套剧本，只不过动作更狠、落地更快。 第一、先做聚焦，再用数据说话。 很多小盘生物科技公司是怎么把自己玩死的？就是核心资产太散，什么都想要，最后疯狂烧钱。Terns 原本也挤在极度内卷的减肥药赛道里，但在早期临床中发现肝酶升高的安全性隐患，管理层直接一刀砍掉整个代谢业务线！ 把所有的资源 100% 集中到最有潜力的白血病TERN-701 上。 事实证明，这种‘断臂求生’换来的是极具统治力的数据。在 2025 年 12 月的美国血液学（ASH）年会上，Terns 甩出了一份王炸报告：在极其难治的白血病患者中， TERN-701 的关键反应率高达 64%；在核心剂量组，更是直接飙升到了 75%！ 而且，几乎没有严重的副作用！这直接向全市场宣告：我们就是这个领域的‘同类最佳’。 第二，同样是趁高位把钱一次融够。 借着数据利好带来的估值提升，Terns 很快完成了一笔超过 7.4 亿美元 的大融资。这笔钱到位之后，公司账面现金直接抬升到 10 亿美元量级，管理层预计足以支撑到 2031 年，甚至覆盖到药物潜在获批上市。 第三，同样的“终局”：从并购预期到现实验证。 当一家公司拥有了干净的资产结构（无杂乱业务）、顶尖的药物数据和无需买家注资的现金流时，它就变成了巨头眼中的“完美猎物”。这与 Erasca 打造“精装房”的逻辑完全一致。 在大药企急需填补专利悬崖带来的收入缺口的背景下，这种资产显得尤为珍贵。这一逻辑在 2026 年 3 月 25 日 得到了终极验证： 制药巨头默沙东（MRK）正式宣布收购 Terns。 这意味着，市场此前押注的并购逻辑，最终真的变成了现实交易。原本只是想象空间的东西，最后变成了真金白银。 所以你看到这里，其实已经很清楚了：这两家公司暴涨，表面上看各有各的故事，但底层逻辑几乎一模一样。就是能打的数据+够用的钱+干净的资产=巨头必买的稀缺资产。 那么问题来了：在相同的产业逻辑下，下一家最有可能复刻这种极端重估行情的公司会是谁？ 如果你觉得本文对你有帮助，老规矩先点赞再收藏，关键时刻能帮忙 美国热线 626 378 3637 免疫重置+精准肿瘤双轮驱动 CGEM 美股投资网给出的第一个答案是走‘肿瘤+自免’双轮驱动路线的 Cullinan Therapeutics，美股代号CGEM。 如果我们用刚才总结的“暴涨基因”去套用 CGEM，它已经具备了大部分条件，甚至在某些地方，比当时的 ERAS 更“稳”，但它还差最后一步——那组真正点火的数据。 （美股投资网当初调研价格） 具体来看，支撑它逻辑的有三个关键点： 第一，克制的资本纪律与清晰的‘跨界’潜力。 CGEM 的管理层展现出了成熟的资本纪律。在 2025 年，他们果断清退了表现平平的 CLN-619 和 CLN-617 两个项目。这向市场传递了一个明确的信号：公司绝不把宝贵的现金浪费在赢面不大的劣质资产上。 与此同时，在战略规划上，CGEM 选择了更务实的‘双轨并行’。它的核心看点，在于资产的跨界应用潜力。 比如核心资产 CLN-978，公司将原本用于抗癌的前沿 T 细胞技术，拓展到了狼疮、类风湿等自身免疫疾病领域。这是一个非常聪明的商业策略，因为自身免疫疾病的患者基数远超罕见肿瘤，一旦临床跑通，其对应的商业化空间将被彻底打开。 而在肿瘤老本行，与 Taiho 合作的 Zipalertinib 已经进入了新药上市申请阶段。可以说，它的每一步都踩在真实的需求上。 第二、充裕的账面资金直接消除了“稀释风险”。 我们前面提到的 生物科技股最怕的就是刚出点成绩，公司就半路缺钱被迫伸手要钱，这会严重稀释老股东的权益。而 CGEM 目前最大的底气之一，就是它极其充沛的现金流。截至 2025 年底，公司账面上手握 4.39 亿美元的现金及短期投资。 按照目前的研发速度，这笔资金足以支撑公司平稳运营至 2029 年。 第三，密集的事件催化剂，进入估值重塑期。 有了干净的资产和充足的现金，接下来看什么？看时间表。 目前，包括花旗在内的华尔街投行纷纷重申了对 CGEM 的‘买入’评级， 平均目标价给到了 30 至 33 美元区间。 相比目前 13 美元左右的股价，市场给出了比较高的溢价预期。 这个预期并非凭空而来，而是因为 CGEM 马上要进入一个密集的数据交付期。现在正值 2026 年 3 月底，我们可以看下它接下来的关键节点： 今年二季度： CLN-978 将公布首批自身免疫领域的核心数据；同时，CLN-049 将启动扩展队列。 今年下半年： CLN-049 将公布关键的剂量爬坡进展。 今年年底： 已经提交 NDA 的 Zipalertinib，预计将公布一锤定音的关键研究结果。 在接下来的几个季度里，CGEM 几乎每个季度都有明确的事件驱动。只要这些数据能够如期落地并且符合预期，市场就会根据这些基本面的变化，一步步去重新定价它的商业价值。 精准肿瘤药公司CRDF 美股投资网给出的第二家潜力公司，是精准肿瘤药研发公司 Cardiff Oncology。 美股代号CRDF。 如果说第一家 CGEM 靠的是‘钱多、资产多’的稳健防守，那么 CRDF 玩的则是集中火力的‘单点爆破’。 它正试图在一个长达二十年都没有被真正颠覆的领域里，砸出改写全球标准疗法的硬核数据。 CRDF 几乎把全部筹码都压在了一款叫 onvansertib 性结直肠癌。 这是一个极其庞大的市场。单单在美国，每年新发患者就有大约 15 万人，其中接近一半都带有这种突变。 更重要的问题：谁在接盘？ 当散户开始卖出，市场必须回答一个问题： 谁来接？ 如果是机构接盘—— 说明这是健康轮动，行情还能延续 如果没有人接—— 那就不是回调，而是“趋势终结”的开始 目前来看，答案还不明确。 但可以确定的是： 过去那种“无脑买NVDA就赚钱”的阶段，已经结束了。 五、真正的交易信号在哪里？ 如果你是做交易的，这里有一个更实用的观察框架： 接下来重点看三件事： 1） NVIDIA 是否持续被净卖出（而不是一天数据） 2）AI板块是否出现“领涨股补跌” 3）资金是否开始流入非AI板块 如果三者同时发生—— 那就不是波动，而是 风格切换 。 美股投资网点评 市场从来不会在最热的时候结束， 但一定会在“最坚定的人开始动摇”时，出现裂缝。 而这一次，裂缝，出现在散户身上。 AI牛市没有结束，但它，已经不再安全了。 扫码+万人VIP社群，更深度的美国市场分析 美股量化交易工具使用 浏览器打开 https://StockWe.com/vip 订阅 美股投资网是一家专门研究美股的金融科技公司，2008年成立于美国硅谷，由前纽约证券交易所分析师Ken创立，联合多位摩根斯坦利分析师，谷歌 Meta工程师利用AI和大数据，配合十多年美股实战经验和业内量化模型，建立了一个股市数据库 https://StockWe.com/ 每天处理千万级股票数据：捕捉期权大单，实时主力资金流向、机构持仓变化、川普突发新闻，精准K线信号第一时间发到您手机APP！ 联系方式 客服Telegram MaxMeigu 公众号 TradesMax 邮箱 buy@TradesMax.com Email: buy@TradesMax.com 美股大数据 StockWe.com"}, {"title": "七巨头单周蒸发8500亿！美股大盘的下一个支撑位在哪里？", "date": "2026-03-27", "ym": "2026-03", "time": "2026-03-27 21:13:58", "author": "StockWe.com", "desc": "科技巨头迎估值重估", "url": "https://mp.weixin.qq.com/s/_ECpdCb_4jQMoDxG8_Fqdg", "path": "sources/news/wechat_mp/articles/七巨头单周蒸发8500亿-美股大盘的下一个支撑位在哪里-b1b5cbd40a.md", "len": 3709, "ticks": [], "body": "周五美股市场整体呈现单边下行态势。在地缘政治冲突升级与能源供给担忧的双重压制下，三大股指继续深幅下探，彻底击穿了多头的心理防线。 标普500跌破6400点关口，录得2022年以来最长的周线五连跌；而科技股扎堆的纳指，更是在过去11周里走出了10周下跌的罕见极端行情。 盘前：幻想破灭，资金紧急避险 周五盘前的核心交易线索，完全被中东地缘局势的突变主导。本周初，市场一度对特朗普 Z府的“口头施压”（包括五天延迟、十天宽限期等）抱有侥幸心理。 但盘前传出的消息直接打碎了这种预期： 美以对伊朗工业及核设施的实质性空袭不仅没有降温，反而引发了伊朗方面的强硬反击。 在这个阶段，跨资产市场出现了一个极其关键且反常的信号： 10年期美债收益率在日内短暂冲高后，迅速掉头转跌。 按照常理，油价暴涨会推升通胀预期，导致美债收益率走高。但长债收益率不升反降，这说明大资金的真实意图已经暴露——宏观交易员的关注点，已经从单纯的“通胀重燃” ，迅速切换到了“地缘冲突拖累全球经济陷入衰退”的最坏剧本上。 避险资金疯狂涌入美债，直接压制了开盘前的市场风险偏好。 开盘：无差别下杀，科技股承压 三大股指毫无悬念地承压低开。开盘阶段的盘面特征非常明显：由于对资金面收紧和避险情绪极为敏感，科技股和成长股率先成为了资金抛售的重灾区，直接被大盘的暴跌无情拖累。 不过，作为成熟的投资者，越是在恐慌的时候，越要透过现象看本质。大盘这种无差别的恐慌性抛售，往往会带来优质资产的“错杀”。 比如我们一直重点追踪的AI硬件生态、半导体制造环节以及光通信板块，今天开盘虽然也跟着大盘集体走弱，但这很大程度上是因为市场资金在恐慌避险、急于套现，而不是这些公司本身的业务出了问题。 从产业调研来看，不论是头部科技巨头对自研AGI芯片的迫切需求，还是高速光模块的订单排产，其底层的商业逻辑和高景气度丝毫没有因为中东炮火而改变。这种系统性风险引发的回调，实际上正在为那些真正具备业绩支撑的硬科技赛道砸出未来的空间。 盘中：原油飙升，期权加剧踩踏 进入午盘，局势的恶化开始全方位反噬 盘面。 伊朗方面不仅警告报复，甚至放出考虑退出《不扩散核武条约》的狠话，并宣布拦截试图通过霍尔木兹海峡的商船。 这直接戳中了能源市场最敏感的神经。美股投资网调研数据显示，亚洲原油市场已经出现现货短缺， 市场的定价逻辑从“流量可能中断”变成了“库存实质性枯竭”。 WTI原油现货价格盘中单边狂飙近8%，强力突破100美元关口；中东阿曼迪拜原油期货也大涨超5.5%。 原油的狂飙直接拉爆了市场的恐慌情绪。衡量波动率的VIX指数盘中直线拉升，最终收于31.05，正式突破30这道生死线。 这里需要给大家普及一个期权市场的专业机制。VIX突破30意味着标普500陷入了极度危险的“负Gamma”状态。说白了，在这种状态下，大盘越跌，期权做市商为了自保，就越被迫在二级市场顺势卖出 股.票。 这种被动对冲机制犹如滚雪球，直接导致了美股在午后的加速下坠。与此同时，包括 Bitcoin 在内的高风险资产，也同样遭遇了资金的无情抛售。 收盘：全线破位，静待市场寻底 截至收盘，道指跌幅1.72%，纳指大跌2.15%，标普500下挫1.67%。道指和纳指均较历史高点回撤超10%，正式宣告进入技术性回调区间。 复盘全天走势，当前美股的定价逻辑已经完全被宏观对冲仓位和恐慌波动率所主导，基本面因素暂时被晾在了一边。美股投资网总结到： 在伊朗局势出现明确解决方向、能源市场企稳之前，市场很难组织起持续性的反弹。 从技术面来看，高盛交易台盘后发出警告，标普500已跌穿所有主要均线，年内跌幅来到8%左右。目前下方仅在6330点附近有少量0DTE空头认沽期权提供微弱缓冲，支撑效力极其有限。美股投资网认为， 下一个真正需要警惕的关键防线，是6300点整数关口。 资金在往哪里逃? 避险与大调仓=现金流出创10周之最(350亿美元)+美股流出创13周之最(236亿美元)。 资金疯狂涌入安全资产=短期债券流入133亿美元(史上第三大)+美国国债持续流入。 这意味着:Q1市场的“共识交易”正在经历剧痛(Pain trade)>现实是能源跑赢了科技+现金跑赢了AI债券+新兴市场跑赢了美股。过去几个月基于“流动性见顶+AI资本开支繁荣”的乐观定价正在被修正。 七巨头单周狂泻8500亿！ 过去这一周，“美股七巨头”整体市值缩水超过8500亿美元。这场抛售的直接导火索确实是宏观环境：油价飙升重燃通胀担忧，市场开始对美联储年内的降息路径进行重新定价。对于高度依赖长端利率贴现的科技成长股而言，估值中枢下移是必然的系统性反应。 但如果把目光拉回企业自身的业务层面，会发现宏观利空仅仅是导火索。这轮大跌更核心的内部原因是： 市场对AI的宽容度正在下降。 资金不再单纯为“AI预期”买单，而是开始用真实的财务标准，去检验这些巨头过去两年的天量投资到底能不能转化为利润。 以Meta为例，该股本周暴跌超11%，年初至今累计跌幅已达20%，创下去年10月以来的最差单周表现。表层原因是公司在涉及“未成年用户保护”的标志性诉讼案中败诉，面临合规风险。 但更深层的隐忧在于其庞大的AI资本开支（CapEx）。 在宏观流动性预期收紧的当下，华尔街对Meta在AI基础设施和开源模型上动辄百亿美元的投入正逐渐失去耐心。 微软本周重挫6.5%，年初至今累计跌幅已26%。 资金恐慌出逃的核心，是华尔街开始担忧AI智能体（AI Agent）正在颠覆微软赖以生存的SaaS护城河。 随着OpenAI等初创公司推出更强大的底层AI服务，企业客户完全可以绕过微软直接采购，用少数AI包揽工作流。这意味着微软过去几十年来“按人头按月收租”的Office 365商业模式面临严重威胁，AI正从高价售卖的附加值，变成摧毁其传统软件生态的杀手。 与此同时，微软与OpenAI的合作裂痕更是给盘面补上了一刀。本周OpenAI公布了软银牵头的400亿美元巨额融资，但在长长的新财团名单里，最大金主微软竟离奇缺席。这种关键时刻的“被出局”，让大资金严重怀疑双方的蜜月期已亮起红灯，动摇了其作为“AI领头羊”所享受的超高估值溢价基础。 谷歌本周大跌近9%，年初至今累计跌幅近13%。谷歌本周发布的一款旨在大幅降低AI内存占用的新算法。这个技术迭代，客观上加速了产业内部的结构性再平衡。科技巨头们为了控制日益失控的AI算力成本，正试图通过软件层面的算法优化，来降低对昂贵硬件的依赖。 这直接引发了市场对存储芯片未来采购量下降的担忧，导致美光、西部数据、闪迪等标的周四大跌，并顺势拖累了英伟达（本周下挫3%，年初至今跌幅约10%）等核心硬件厂商。 这标志着AI赛道的一个重要演进： 过去那种“只要是AI芯片就能无脑享受溢价”的粗放阶段正在结束，软硬件的成本博弈正式开始。 不过苹果成为了本周唯一表现抗跌的巨头，本周微涨0.33%。这不仅是因为其具备充沛的自由现金流防御属性，更在于市场看清了苹果在AI生态位上的底层商业逻辑。 美股投资网了解到，苹果将在iOS 27中引入一套名为“Extensi 的私人信贷市场正面临越来越多的投资者赎回，同时也受到更严格的审视。分析师警告称，这一市场可能", "url": "https://mp.weixin.qq.com/s/q5d4Em18GlHVBYIQSr0XTQ", "path": "sources/news/wechat_mp/articles/什么是私募信贷-为什么它可能引发比伊朗战争更严重的危机-d3da24c6d6.md", "len": 3074, "ticks": [], "body": "价值约3万亿美元的私人信贷市场 正面临越来越多的投资者赎回，同时也受到更严格的审视。分析师警告称，这一市场可能存在 不透明贷款风险以及人工智能带来的行业冲击 。 关键要点 规模约 3万亿美元的私人信贷基金 正在出现资金外流，原因是投资者担忧科技行业贷款以及AI可能带来的冲击。 按市价计价（Mark-to-Market）会放大损失 ，因为资产被迫按当前市场价格估值，可能形成“甩卖价格”。 一些情况与 2008年金融危机 出现相似迹象，例如透明度不足、银行提高贷款利率，以及资产管理公司限制赎回。 要理解为什么私人信贷基金出现资金外流，可以用一个“房子”的例子来解释。 假设银行每天根据你房子在市场上当天可能卖出的价格，来调整你的房贷月供，你大概率会觉得这非常不公平。 私人信贷基金现在遇到的情况其实类似。 根据美股大数据StockWe.com 这些基金位于一个 3万亿美元市场的核心 ，目前它给华尔街带来的担忧，甚至可能比美国与伊朗的战争风险更大。 私人信贷基金通常由专业投资机构设立： 向投资者募集资金 使用杠杆 向中小企业发放贷款 这种投资的收益率通常 高于股票和债券 ，但缺点是 流动性很差，很难退出 。 而现在， 很多投资者正试图退出。 原因之一是： 私人信贷基金对 科技行业（尤其是软件公司）发放了大量贷款 。 但随着 人工智能的崛起 ，市场突然开始担心： 很多软件公司未来可能受到AI冲击 这些公司的贷款安全性可能下降 但实际上， 没有人真正知道影响会有多大。 华尔街在给资产估值时通常采用一种方法： 按市价计价（Mark-to-Market）。 意思是： 资产价值按 当前市场价格 计算，而不是按长期基本面。 这种方式有明显优点： 提高市场透明度 交易更流动 所有人看到同样价格 但也存在明显缺陷： 如果市场恐慌，价格可能跌到 远低于真实价值 ，形成所谓的 “甩卖价格（Fire Sale）” 。 这会引发严重连锁反应。 资产价格下跌有时确实是风险信号。 但市场也可能 过度反应 。 例如： 如果一家软件公司一直稳定盈利并按时还款，仅仅因为某家原本做卡拉OK设备的公司推出AI产品，贷款价值就大幅波动，这显然可能是不合理的。 但问题是： 如果市场真的这样波动，你该怎么办？ 投资者面临两难： 提前赎回资金，放弃高收益 或继续持有，承担更大亏损风险 类似的问题在 2008-2009金融危机 期间也出现过。 当时纽约联储与财政部： 以接近市场价格的一半 购买了 210亿美元次级贷款 并将这些资产放入三个基金中持有到期。 这些基金被称为 Maiden Lane 。 最终，这些资产 赚了120亿美元利润 。 但关键是： 美联储并不需要每天按市价计价。 另一个有趣的事实是： 金融危机后，美股开启长达十年的牛市。 而几乎同时， 美国财务会计准则委员会放松了“按市价计价”的规则 。 换句话说： 一些人认为，当年市场痛苦的很大一部分，其实是 会计规则放大出来的，而不是真实资产价值崩塌。 今天的私人信贷市场规模虽然只有 3万亿美元 ，小于2008年 7.2万亿美元的住房抵押债券市场 。 但它仍然可能带来严重冲击。 原因是： 两者都存在一个共同问题——透明度不足。 2008年房地产市场崩溃时： 银行不知道风险到底在哪里。 于是银行之间停止互相贷款，也减少对实体经济贷款。 同时： 一些投资基金 限制投资者赎回 。 这导致： 信贷市场冻结 货币市场基金崩跌 全球股市暴跌 现在也出现了一些类似迹象： 银行无法看清私人信贷投资组合里的真实风险 银行开始提高贷款利率 一些大型资产管理公司开始 限制赎回 同时下调贷款资产估值 目前来看，影响仍然是**“可控的”**。 违约率仍然较低（虽然在上升）。 很多私人信贷机构仍然保持乐观。 分析师也认为： 市场对AI对软件行业的冲击可能 被夸大 。 但“可控”这个词非常危险。 2007年春天，美联储主席伯南克曾用“可控”形容次贷问题。 接下来两年： 标普500下跌近 50% 全球经济陷入衰退 研究机构 Unicus 的负责人表示： 现在还不能说私人信贷会演变成次贷危机。 但也不能忽视风险。 她警告： 把这次混乱当作一次警告。 2008年亏钱的投资者，并不是因为太早恐慌。 而是因为 他们注意得太晚。 二、美股投资网 核心解读（这件事为什么重要） 我帮你提炼出 5个真正关键的信号 。 1 私人信贷已经变成影子银行 规模： 3万亿美元 主要玩家： Blackstone Apollo Ares KKR Blue Owl 他们在做的事情其实就是： 替代银行贷款 但监管更少。 这就是典型的 Shadow Banking（影子银行） 。 2 最大风险：科技公司贷款 私人信贷最近几年大量贷款给： SaaS公司 AI创业公司 软件公司 问题是： AI可能改变软件行业格局。 很多软件公司未来可能： 收入下降 被AI取代 或盈利模型被颠覆 这会直接影响： 贷款偿付能力 3 最大结构性问题：流动性错配 私人信贷本质是： 长期贷款资产 但很多基金却提供： 季度赎回 甚至月度赎回 一旦投资者一起撤资： 基金就必须 低价卖贷款 这就是： Fire Sale 4 和2008年的相似点 三个危险相似点： 1 不透明 没人知道谁持有风险 2 资产估值人为 Mark-to-market 会制造恐慌 3 限制赎回 基金开始 Gate Redemption 2008年： 房地产基金 货币基金 都做过这件事。 5 目前还没爆，但正在形成压力 当前状态： 违约率：低但上升 银行行为： 提高贷款利率 基金行为： 限制赎回 资产： 开始减值 这说明系统正在进入： Stress Phase 而不是 Crisis Phase。 三、如果风险扩大，对市场意味着什么 最坏情况的传导路径可能是： AI冲击软件行业 ↓ 软件公司现金流下降 ↓ 私人信贷违约上升 ↓ 基金资产减值 ↓ 投资者赎回 ↓ 被迫抛售贷款 ↓ 信贷市场冻结 ↓ 科技融资减少 ↓ 科技股估值压缩 四、投资者应该关注的3个指标 未来是否演变成系统性风险，看三个数据： 1 Private Credit Default Rate 违约率 2 Fund Redemption Gates 基金是否越来越多限制赎回 3 Bank Lending Spread 银行贷款利差是否快速扩大 五、一个重要结论 很多人没意识到： 私人信贷是过去十年最大的金融泡沫之一。 规模增长： 2008 ≈ 0.5T 2024 ≈ 3T 增长 6倍 。 而且监管非常少。 扫码+VIP，提前获取更深度的美国市场分析 浏览器打开 https://StockWe.com/vip 订阅 美股投资网是一家专门研究美股的金融科技公司，2008年成立于美国硅谷，由前纽约证券交易所分析师Ken创立，联合多位摩根斯坦利分析师，谷歌 Meta工程师利用AI和大数据，配合十多年美股实战经验和业内量化模型，建立了一个股市数据库 https://StockWe.com/ 每天处理千万级股票数据：捕捉期权大单，实时主力资金流向、机构持仓变化、川普突发新闻，精准K线信号第一时间发到您手机APP！ 联系方式 客服Telegram MaxMeigu 公众号 TradesMax 邮箱 buy@TradesMax.com Email: buy@TradesMax.com 美股大数据 StockWe.com"}, {"title": "如果AI让企业护城河变成暂时的，资本市场会发生什么？", "date": "2026-03-22", "ym": "2026-03", "time": "2026-03-22 19:16:53", "author": "StockWe.com", "desc": "我们从马斯克第一性原理开始分析，现代资本市场的整个架构都建立在一个很少被认真审视的假设之上：竞争优势会随着时", "url": "https://mp.weixin.qq.com/s/4wxRy0NXjpYuwMB9VWSAig", "path": "sources/news/wechat_mp/articles/如果AI让企业护城河变成暂时的-资本市场会发生什么-046f395e02.md", "len": 3328, "ticks": [], "body": "我们从马斯克第一性原理开始分析， 现代资本市场的整个架构都建立在一个很少被认真审视的假设之上： 竞争优势会随着时间复利增长。 企业的护城河会持续存在，品牌能够长期保持影响力，网络效应可以形成防御。如果把这个假设拿掉，你不仅是在重新定价某些美股，而是在动摇一个世纪以来资本配置方式的哲学基础。 有一个值得认真思考的情景： AI 极大降低了颠覆成本，同时极大提高了创新速度，以至于没有任何公司能够可靠预测五年后的自由现金流。 当你利用 AI 去颠覆一个行业巨头时，已经有人在利用更好的模型准备颠覆你。这个循环不断加速，直到市场不再为一家企业在第七年及以后可能赚到的钱买单，因为第七年的情况已经变得不可预测。 结果就是，股.票不再按照未来现金流折现来定价，而是按照企业当前产生的现金流乘以某个倍数来定价。 这就像 2011 年人们给出租车牌照定价一样——就在 Uber 出现之前。 在讨论这种变化的影响之前，需要先理解为什么自由现金流倍数的压缩可能是一种理性的市场反应，而不是恐慌或过度反应。 首先是无风险利率，也就是投资者在零风险情况下可以获得的回报。 美国十年期国债是一个很好的参考，目前收益率大约在 4%。这是一个底线。 理性的投资者不会接受风险资产的回报低于无风险资产，因此任何股.票估值都必须先超过这个门槛。 从无风险利率到股.票应有的回报，需要加上股权风险溢价。这是投资者因承担企业经营风险而要求的额外回报。 长期来看，这个溢价大约在 4% 到 5% 之间，因此稳定且没有增长的企业，其合理回报率大约在 8.5% 到 9.5%。如果把这个回报率转换成估值倍数，就会得到大约 10 到 12 倍自由现金流的估值。 这是一个稳定、没有增长但也没有生存威胁的企业在理性情况下应有的估值水平。 如果一家企业每年有 20% 的概率被 AI 淘汰，在快速变化的行业中，这并不是一个不合理的假设。那么这家企业的预期寿命大约只有五年。用 9% 的资本成本对五年的现金流折现，大约只能得到 3.9 倍自由现金流的估值。如果颠覆概率提高到 30%，估值大约变成 2.8 倍。如果概率只有 10%，估值则接近 6.5 倍。因此在合理假设下，估值可能落在 2 到 7 倍自由现金流之间。关键在于，当企业寿命的不确定性成为主要变量时，估值模型会变得非常敏感。 市场历史上已经多次出现类似的重新定价。 根据 美股大数据StockWe.com ，2005 年到 2015 年的报纸行业就是一个例子。随着数字广告摧毁传统印刷商业模式，报业公司的估值从 12 到 15 倍 EBITDA 压缩到 2 到 4 倍。很多报纸公司最终破产。第一年的现金流是真实存在的，但到了第七年就消失了。市场实际上是在为一个逐渐枯竭的资产定价，而不是为一个可持续经营的企业定价。 2016 年到 2020 年的零售行业也是如此。随着亚马逊不断瓦解传统线下零售模式，百货公司和专业零售商的估值压缩到 3 到 6 倍自由现金流。市场不是在否定它们当前的盈利，而是在定价一个问题：在业务彻底衰退之前，你还能收回多少年的现金流。 2019 年到 2021 年的能源公司同样经历过类似的估值压缩。尽管这些公司拥有几十年的石油储量，但市场开始担心未来石油需求下降，从而导致这些储量无法实现价值，于是估值压缩到 4 到 6 倍自由现金流。 出租车牌照的案例最为极端。纽约出租车牌照曾经价值超过一百万美元，但随着 Uber 的出现，价值跌到不到十万美元。这些牌照曾经是拥有几十年稳定现金流的资产。但一旦市场认定这些现金流的持续时间已经结构性结束，价格就会迅速接近零。 如果 AI 颠覆的逻辑类似，那么这种历史上只发生在某一个行业的估值压缩，可能会同时出现在整个经济体系中。 目前标普 500 的市盈率大约在 22 倍。顶级科技公司的市盈率在 30 到 60 倍之间。很多高增长 SaaS 公司甚至可以获得 8 到 20 倍的市销率，即使它们几乎没有自由现金流。因为市场是在为它们未来建立的商业帝国买单。 对于很多公司来说，60% 到 80% 的股权价值并不来自当前盈利，而是来自终值，也就是十年以后现金流的折现总和。 如果市场只愿意支付 5 倍自由现金流，那么市场实际上只是在为企业短期产生的现金买单，而不会为未来增长、潜力或未来可能建立的商业帝国付费。在这种情况下，未来在真正到来之前几乎是没有价值的。 美股投资网 获悉， 标普 500 当前总市值大约 58 万亿美元，而企业每年产生的自由现金流大约是 2.8 万亿美元。如果按照 5 倍自由现金流重新定价，整个股市的价值将只有 14 万亿美元，也就是下跌 75%。如果按 2 倍定价，损失几乎是毁灭性的。即使按 7 倍定价，也会有大约三分之二的股权财富消失。 这种变化将导致增长型投资模式失效。增长投资的核心逻辑是牺牲今天的现金流来换取未来几十年的市场统治地位。但如果企业可能在五到十年内被颠覆，那么这种模式就不再合理。 风险投资也会受到冲击。如果没有终值，谁会以 10 亿美元的估值投资一家还没有收入的公司？IPO 市场将大幅收缩，只剩下已经拥有稳定现金流的企业能够上市。 资本不会消失，而是会转移。 资金将流向那些不容易被 AI 颠覆的资产，比如能源基础设施、农田、收费公路、水资源、大宗商品生产商以及短期Z府债券。这些都是具有物理属性、需求稳定且难以被数字技术取代的资产。 黄金可能表现良好，短期Z府债券也会受到青睐，因为它们不依赖终值假设。 一个有趣的悖论是，目前推动 AI 发展的科技公司每年投入 3000 亿到 5000 亿美元建设 AI 基础设施。这种投资只有在相信未来 7 到 15 年能持续获得回报时才合理。如果市场只愿意给企业 2 到 7 倍自由现金流的估值，这种长期投资将无法融资。 如果私营资本无法为长期项目提供资金，国家资本可能会填补空白。拥有高储蓄率和强大财政能力的国家，比如美国、海湾国家、挪威、新加坡，可能会在长期投资方面获得巨大的结构性优势。 在企业层面，变化也会非常明显。研发项目会更多依赖现有现金流来支持，资本支出周期大幅缩短。并购也会改变逻辑，收购方不再为未来协同效应买单，而是要求交易立即带来自由现金流增长。 股.票期权这种激励长期价值创造的薪酬机制也会失去作用。员工可能更倾向于要求现金薪酬。企业管理层会更加关注未来一年到一年半的表现，因为市场只为短期业绩买单。 这种状态可能并不会长期稳定。如果市场真的将企业估值压缩到 2 到 7 倍自由现金流，那么推动 AI 发展的资本支出将会枯竭，从而导致技术进步放缓。随着颠覆速度下降，企业护城河又可能重新变得稳固，估值体系也可能逐渐恢复。 更可能出现的情况是一种不断波动的过渡期： 周期更短，波动更大，市场会周期性地怀疑终值，但在技术发展放缓时又恢复信心。 即使终值只下降 30% 或 40%，而不是完全消失，也将成为战后以来资本市场最大的结构性变化。这不仅仅是一次估值调整，而是对资本市场存在意义的重新定义。 最终的问题不再只是 AI 是否会颠覆行业，而是这种颠覆是否会快到改变资本市场本身的定价机制。 扫码+万人VIP社群，更深度的美国市场分析 美股量化交易工具使用 浏览器打开 https://StockWe.com/vip 订阅 美股投资网是一家专门研究美股的金融科技公司，2008年成立于美国硅谷，由前纽约证券交易所分析师Ken创立，联合多位摩根斯坦利分析师，谷歌 Meta工程师利用AI和大数据，配合十多年美股实战经验和业内量化模型，建立了一个股市数据库 https://StockWe.com/ 每天处理千万级股票数据：捕捉期权大单，实时主力资金流向、机构持仓变化、川普突发新闻，精准K线信号第一时间发到您手机APP！ 联系方式 客服Telegram MaxMeigu 公众号 TradesMax 邮箱 buy@TradesMax.com Email: buy@TradesMax.com 美股大数据 StockWe.com 美股投资网 TradesMax.com"}, {"title": "最后2分钟，资金突然出手！美股尾盘急拉，这是什么信号？", "date": "2026-03-19", "ym": "2026-03", "time": "2026-03-19 21:10:59", "author": "StockWe.com", "desc": "散户情绪变了！", "url": "https://mp.weixin.qq.com/s/wr2PffxyXIFcr2M69qtz7Q", "path": "sources/news/wechat_mp/articles/最后2分钟-资金突然出手-美股尾盘急拉-这是什么信号-347657be8a.md", "len": 2809, "ticks": [], "body": "周四美股录得连续第二个交易日收跌。尽管在尾盘时段，受油价回落的带动，主要股指从盘中低点有所回升，但整体市场情绪依然受到中东局势的显著影响。投资者密切关注伊朗战争的最新进展，这对能源价格和通胀预期构成了直接压力。 截至收盘，道指跌幅为0.44%；纳指跌幅为0.28%；标普500跌幅为0.27%。 盘前：油价冲上来，市场慌了 今日盘前，市场的核心关注点集中在中东局势对能源供应的影响。受地缘政治紧张局势升级的推动，国际油价快速上行。布伦特原油盘中一度触及111美元附近，WTI原油也升至97美元上方。 对于美股而言，油价的大幅波动不仅仅是商品价格的变动，更引发了市场对宏观经济环境的重新评估。投资者主要担心三个方面： 一是高油价可能推升通胀水平； 二是通胀压力可能导致美联储将高利率维持更长时间； 三是能源成本上升可能压缩企业利润空间。 此外， 市场担忧的焦点不仅是航运通道是否被完全封锁，而且还包括持续的冲突威胁。 只要能源设施仍面临风险，航运和保险成本就难以恢复正常。即使航道理论上保持畅通，实际运输成本和风险溢价的上升也是不可避免的。 因此，盘前市场交易的逻辑是持续性的能源冲击，这种冲击将直接传导至通胀预期和风险偏好。 开盘：市场反应悲观预期 开盘后，市场迅速对油价飙升做出反应，优先计价最坏情形。标普500指数早盘跌幅一度超过1%，随后才逐步收窄。 投资者担心，如果能源冲击导致通胀重新抬头，美联储将缺乏降息空间来安抚市场，这将给高估值资产带来更大压力。 因此，对利率敏感、依赖估值支撑的资产表现最为脆弱。此时，市场的担忧已从单纯的经济放缓，转向了更为复杂的“高油价与高利率并存”的局面。一旦市场接受这一组合，许多资产的估值逻辑都需要重新调整。 盘中：缓和信号促使市场修复 真正的转折出现在盘中。 随着消息面出现一些缓和信号，市场最悲观的预期开始 往回收。 特朗普表示战争“很快会结束”；同时又传出，以色列在特朗普要求下，将暂缓继续打击伊朗气田。 这样的信号，并不代表局势真的已经转向，但足以让市场先把最极端的供给中断预期降一降。 于是你会看到一个很典型的盘中结构：油价从最疯狂的位置回落，股指也跟着把部分跌幅修回来。 美股投资网分析认为，这波修复的本质，不是风险偏好突然回来了，也不是资金重新全面看多，而是市场发现： 白天的局势并没有朝最坏方向继续恶化。只要油价不继续往失控方向冲，美股就有机会喘一口气。 经济韧性未必转化为利好 如果只看今天公布的美国经济数据，其实并不差。 美国劳工部数据显示，截至3月7日当周，首次申请失业救济人数为21.3万人，较前周减少1000人；全美地产经纪商协会数据显示，2月成屋销售环比增长1.7%，折年率升至409万套。说明美国经济本身并没有突然垮掉，居民和就业端至少还保持着一定韧性。 然而，在当前环境下，稳健的经济数据未必能刺激市场上涨。这是因为市场当前的核心矛盾并非经济增长问题，而是通胀是否会再次上升。 在油价剧烈波动的背景下，经济数据偏稳反而意味着美联储没有急于降息的必要。 过去“数据好则市场安心”的逻辑在此时并不完全适用。 美股投资网分析认为，投资者的注意力已从“增长担忧”切换至“再通胀风险”，这将决定未来几个季度市场估值中枢的位置。 散户情绪也在转冷 除了指数本身的波动，今天还有一个值得注意的信号：美国散户情绪也在明显降温。 根据美国个人投资者协会最新周度会员调查， 未来六个月看空美股的散户比例从上周的46.4%升至52%，创下去年5月以来的高位； 看多比例则从31.9%降至30.4%，降至去年9月以来较低水平；持中性看法的比例只有17.6%，同样处在偏低区间。 这说明，当前市场情绪已经不只是“谨慎”，而是明显朝悲观一侧倾斜。 前面市场担心的那些问题——油价冲击、通胀压力、高利率维持更久——已经不只体现在盘面波动里，也开始真实反映在散户预期中。 当然，情绪极度悲观本身并不等于市场马上见底。站在反向投资的角度看， 悲观情绪升温意味着更多个人投资者可能已经完成卖出、手里现金变多，后续一旦风险缓和，这部分资金确实可能重新回流市场。 但在眼下这个阶段，它更像是在提醒我们：市场的恐慌情绪正在积累，而不是告诉我们拐点已经确认。 尾盘与展望：三巫日将至，波动可能放大 临近收盘，市场进一步收窄跌幅，表明盘中的恐慌情绪未继续恶化，短线资金开始进行回补和再平衡操作。 但从最终收盘结果看，这种回拉更像是对白天过度悲观定价的一次修正，并不意味着市场已经重新转强。标普500、纳指和道指最终仍然收跌，只有罗素2000小幅收涨， 说明当前资金并未形成明确共识，而是在高波动环境下快速调整仓位。 更值得注意的是，根据美股大数据StockWe.com 实时订单流来看，今天尾盘最强的信号是机构资金在最后两分钟集中扫入大量 SPY 看涨期权。 图中显示，15点57分到15点58分之间，SPY 几乎被大额 Call 单刷屏，最大一笔权利金高达 5.92 亿美元，随后又连续出现多笔 4 亿和 3 亿美元级别的大单，而且绝大多数都被标记为买方看涨。 更关键的是，这些订单大多集中在 3 月 20 日到期，也就是明天周五，说明资金抢的不是中期趋势，而是明天这一个交易日的波动本身。同时，这批 Call 的行权价从 355 一路覆盖到 630，分布非常广，说明这不是零散押注，而是大资金在整条 SPY 期权链上进行集中布局。 所以，单看这张图，尾盘资金明显是在押注明天市场存在向上修复甚至冲高的可能。 但问题在于，这些仓位大多集中在明天到期，再叠加三巫日的到期效应，明天即便出现反弹，更多也可能是技术性资金推动下的短线脉冲，而不一定代表市场已经重新回到稳固上升趋势。 再加上明天本身就是本季度的三巫日，股.票期权、股指期权和股指期货集中到期，成交量通常会明显放大，尾盘波动也更容易加剧。在当前又叠加油价和地缘局势扰动的背景下，市场很容易被技术性力量推向更极端的位置。 扫码+VIP，提前获取更深度的美国市场分析 浏览器打开 https://StockWe.com/vip 订阅 美股投资网是一家专门研究美股的金融科技公司，2008年成立于美国硅谷，由前纽约证券交易所分析师Ken创立，联合多位摩根斯坦利分析师，谷歌 Meta工程师利用AI和大数据，配合十多年美股实战经验和业内量化模型，建立了一个股市数据库 https://StockWe.com/ 每天处 的影响仍存在不确定性”， 为后续的政策谨慎埋下伏笔。 内部共识转向： 反对票由之前的2票缩减至1票。 理事米兰仍主张降息，但此前支持降息的沃勒理事转而支持维持利率不变。这种“倒戈”显示出美联储内部鹰派共识正在形成。 点阵图预期收敛： 点阵图显示，多数官员仍预期今年将降息一次，2027年再降一次，但具体时间不明。相较去年12月，支持今年不降息的人数增加。市场此前押注今年至少降息两次甚至三次， 但目前对2026年的降息预期已急剧收敛至最多一次。 上调通胀预测 ： 美联储将2026年核心PCE通胀预测中值从2.5%上调至2.7%，承认物价压力仍显著高于2%的目标。 第二轮冲击：鲍威尔亲手打破幻想下午2:30，鲍威尔的新闻发布会带来了真正的“轰炸”。 鲍威尔明确表示，美国与伊朗冲突的影响尚不明朗， 美联储在压低通胀方面的进展“没有原先希望的那么显著”。 此言一出，市场情绪瞬间转趋悲观，股市跌至当日低点。他进一步强调，部分油价冲击将反映在核心通胀中， “如果我们看不到通胀方面的显著进展，就不会降息”。 市场最大的震撼在于，在资产价格下跌的时刻，美联储没有选择安抚市场。鲍威尔这番表态，等于打破了市场对“美联储看跌期权”的期待——即投资者一直相信，一旦美股大跌，美联储最终会出手托底。 资产全面重估 因果链条至此，股债市场的反应顺理成章且惨烈。 债市先行： 美国财政部3月18日公布的收益率曲线显示，10年期美债收益率升至4.26%，高于前一日的4.20%。长端收益率上行，意味着市场正用更高的贴现率审视未来现金流，这对高估值成长股尤为不利。 股市跟跌： 标普500、纳指、道指和罗素2000指数全线下跌，且从盘面节奏看，越到尾盘，随着鲍威尔讲话的深入，抛压越明显。 板块分化： 油气成为少数相对受益的方向，完全符合这一逻辑链。 综上所述，周三的市场下跌并非单一因素所致，而是地缘政治引发的供给侧冲击、顽固的通胀数据以及美联储“冷眼旁观”的政策态度三者共振的结果。 市场正在重新定价一个“高油价、高通胀、高利率且无兜底”的新常态。 美光2026财年第二财季分析 美东时间3月18日周三盘后，存储龙头美光 MU 公布了2026财年第二财季财报。营收、毛利率、每股收益、自由现金流等多项核心指标都刷新了公司单季纪录，说明AI算力需求对存储行业的拉动还在持续，而且强度比市场原先预想的还要高。 财报本身，确实没什么可挑剔的 先看数字。美光第二财季营收约238.6亿美元， 同比接近翻了两倍 ；非GAAP口径下每股收益12.20美元，也明显高于市场预期。 更亮眼的是利润率。 非GAAP毛利率从上一季的56.8%进一步升至74.9%，非GAAP营业利润率升至69.0%。 这说明公司这轮增长不是单纯靠出货量堆出来的，而是在价格、产品结构和经营杠杆三方面同时受益。简单说，就是卖得更多、卖得更贵，而且高毛利产品占比也在提升。 从这个角度看，这份财报最强的地方，不只是收入高增长，而是利润端释放得比收入还要快。这通常意味着行业景气度非常高，公司在这一轮周期里的位置也非常好。 AI还是这份财报最核心的主线 从业务结构看，美光这一季的增长主引擎非常清楚，还是AI相关需求，尤其是数据中心和高端存储。 云存储业务收入77.5亿美元，核心数据中心业务收入56.9亿美元，两块加起来已经占到总营收一半以上。 与此同时，移动、客户端、汽车和嵌入式业务也在同步走强。这说明美光现在不是只有单一业务爆发，而是整个产品线都在受益，只不过AI链条最强、弹性最大。 这也是为什么市场会越来越把美光看成AI基础设施的一部分，而不只是传统意义上的存储周期股。过去市场看存储，更容易把它理解成价格波动大的周期行业；但现在，随着HBM等高端产品的重要性提升，存储正在变成算力体系里更关键的一环。 更重要的是，指引继续很强 相比已经很亮眼的当季业绩，美光给出的下一季指引，其实更能说明问题。 公司预计第三财季营收中值335亿美元，远高于市场此前预期；非GAAP每股收益中值19.15美元，同样明显高于分析师预估。管理层还给出约81%的毛利率目标。 这组指引传递出的信息很直接：至少从公司目前看到的订单、价格和供需情况来看，这轮景气还没有结束，而且短期内仍在继续往上走。换句话说，美光不是在讲未来故事，而是管理层已经在用下一季的数字告诉市场，需求还在，价格也还在，盈利能力也还在继续抬升。 那为什么股价盘后还是跌了 这也是投资者最关心的问题。 更合理的理解，不是市场否定这份财报，而是市场在财报落地后，开始从“这季有多强”转向“后面还能强多久”。 第一，美光今年以来涨幅已经不小，财报前市场对它的预期本来就很高。 在这种情况下， 即便公司交出一份好财报，短线资金先做部分获利了结，其实很常见。 很多强势股都会出现这种情况，不是财报不好，而是利好落地之后，市场先把已经赚到的利润锁住。 第二，市场开始更认真地看资本开支。 美光把2026财年的资本开支指引上调到250亿美元，并预计下一财年还会继续明显增加。从产业逻辑看，这当然是对未来需求有信心的体现；但从交易逻辑看，市场也会担心，更高的投入会不会压制后续自由现金流，或者让未来利润率的上行节奏没现在这么顺。 第三，市场现在看美光，标准已经变得更高了。 投资者关心的已经不只是这季赚了多少，而是下一代HBM产品、数据中心订单、以及AI需求能不能继续兑现到更长期的业绩里。也就是说，财报越强，市场对后续的要求反而越高。 还有一个不能忽略的背景，就是 当天整个市场环境本身就偏弱。 周三美联储会后维持利率不变，但整体表态偏谨慎；再加上PPI高于预期，市场对年内降息的预期继续收缩。在这种宏观环境下，半导体股即使交出好财报，也更容易出现“先涨一下，再被整体风险偏好拖回去”的走势。 所以，美光盘后的回落，既有公司自身高预期消化的因素，也有今天整个大盘氛围不友好的影响。不能简单理解成市场对财报失望，更不能直接理解成基本面开始转弱。 怎么理解这份财报更合适 更稳妥的结论是：美光这份财报，依然是一份好财报，而且是很强的好财报。AI带动下的存储需求还在高位，公司的盈利弹性也在继续释放，这一点从业绩和指引都能看得很清楚。 盘后股价回落，更像是高预期下的获利了结，以及市场对后续资本开支和景气持续时间的重新权衡，而不是基本面出现了反转。 对后续股价来说，市场接下来真正要看的，已经不只是单季财报有多亮眼，而是这轮高景气能持续多久，HBM和数据中心需求能不能继续兑现到订单、收入和利润里。 我们仍旧看好MU 今年后市表现 扫码+VIP，提前获取更深度的美国市场分析 浏览器打开 https://StockWe.com/vip 订阅 美股投资网是一家专门研究美股的金融科技公司，2008年成立于美国硅谷，由前纽约证券交易所分析师Ken创立，联合多位摩根斯坦利分析师，谷歌 Meta工程师利用AI和大数据，配合十多年美股实战经验和业内量化模型，建立了一个股市数据库 https://StockWe.com/ 每天处理千万级股票数据：捕捉期权大单，实时主力资金流向、机构持仓变化、川普突发新闻，精准K线信号第一时间发到您手机APP！ 联系方式 客服Telegram MaxMeigu 公众号 TradesMax 邮箱 buy@TradesMax.com Email: buy@TradesMax.com 美股大数据 StockWe.com"}, {"title": "周二美股这个信号不简单！我们极度看好美光财报！三大焦点决定股价方向！", "date": "2026-03-17", "ym": "2026-03", "time": "2026-03-17 21:14:34", "author": "StockWe.com", "desc": "MU 创历史新高！", "url": "https://mp.weixin.qq.com/s/IZA0jIB6MiJnx1eVYSOkyA", "path": "sources/news/wechat_mp/articles/周二美股这个信号不简单-我们极度看好美光财报-三大焦点决定股价方向-46e083a5da.md", "len": 4750, "ticks": ["MU"], "body": "周二美股收盘，三大指数连续第二个交易日集体收涨。虽然涨幅不算大，但盘面释放了一个很关键的信号： 美股终于开始摆脱“被油价牵着鼻子走”的被动局面，市场定价也在慢慢从地缘风险，重新回到经济和盈利本身。 截至收盘，标普500上涨0.20%，纳指上涨0.50%，道指上涨0.10%，罗素2000上涨0.70%。罗素2000跑得更快，说明今天的反弹不只是几只超大盘科技股.票在撑场面，风险偏好确实在往更广的范围扩散。 开盘：市场开始不再一看到油价涨就先慌 周二开盘时，外部环境其实并不轻松。布伦特原油一度冲到103美元附近，WTI原油也重新回到95美元上方。10年期美债收益率虽然从前一日的4.23%小幅回落到4.20%，但仍明显高于伊朗冲突爆发前的3.97%。 但真正重要的是，市场对这些压力的反应变了。 前几个交易日，只要油价一跳涨，资金的第一反应基本都是先撤、先降风险敞口；但周二开盘后，标普500一度反而冲高0.7%。这说明投资者开始接受另一种可能： 地缘冲突当然还在，但它对美国企业盈利和经济增长的伤害，未必会继续朝最悲观的方向演化。 说白了，市场开始不再用同一个逻辑去压所有资产了。这种变化看起来只是情绪回暖，但其实很重要，因为它意味着市场开始 从“先恐慌”切回“先判断”。 从资金面看，这种变化也有支撑。 高盛交易台数据显示，周二美股整体交投活跃度较前两周均值明显抬升，对冲基金和长线资金都出现了净买入。 这说明这波反弹不只是空头回补，也有一部分机构资金在重新加仓，押注市场开始进入修复阶段。 盘中：航空股.票站出来，市场重新开始看基本面 周二盘中最强的线索，不在AI，而是在航空。 达美航空（DAL）收涨6.54%，美国航空（AAL）收涨3.53%。 两家公司盘中同步上调收入展望 ，理由其实很直接：终端需求比市场担心的更稳。 这个信号为什么重要？因为最近市场最担心的一件事，就是高油价会不会一边压利润，一边拖需求，最后把航空和消费一起带下来。但从周二盘中的反馈看，至少目前还不是这样。资金给出的答案很明确：只要需求还在，成本压力就不一定会立刻把利润打穿。 所以今天航空股.票走强，意义不只是一个板块反弹，而是说明市场的交易逻辑正在变化。前几天是“宏观一有风吹草动，先把全市场压一遍”；而周二开始，资金重新回到更熟悉的框架里——谁的需求更稳，谁的定价能力更强，谁就更值得买。 这其实是个很好的变化。因为一旦市场重新开始按基本面筛选，而不是按情绪一刀切，盘面就会更健康，机会也会更清晰。 科技股的分层与轮动 在科技股表现上，今日纳指的走势呈现出明显的内部结构优化。尽管 2026 年 GTC 大会正如火如荼地进行，英伟达今日却小幅收跌 0.67%，报 181.93 美元。 这种走势并非基本面走弱，而是典型的“利好兑现”与筹码再平衡： 黄仁勋的“澄清”：黄仁勋在采访中明确， 1 万亿美元仅指 Blackwell 与 Vera Rubin 平台到 2027 年的积压订单 ，尚未计入 CPU、存储及网络等全栈产品。他强调：“增长实际上还在加速，我们已经进入推理市场的拐点。” 预期的“分层”：尽管增长叙事宏大，但在联储议息会议（FOMC）前夕，部分获利盘选择在此时点减仓。与此同时，资金并未撤离科技行业，而是横向流向了估值更具性价比的权重大厂：苹果上涨 0.56%，特斯拉上涨 0.94%。 怎么理解今天这次收盘？ 我觉得可以落到两点，而且这两点都很关键。 第一，美股最恐慌的阶段，大概率先过去一段了。 截至周二，本周标普500累计上涨1.3%，纳指上涨1.7%，道指上涨0.9%。这至少说明，市场已经从前几天那种连续去风险的状态，切换到了“边观察、边回补”的节奏。这个转变不代表后面不会反复，但至少最脆弱的那段情绪，阶段性释放得差不多了。 第二，接下来市场会越来越看基本面，而不只是盯着油价方向。 周二最强的是航空，不是因为油价突然不重要了，而是因为公司用更强的需求信号证明：成本压力可以消化，利润不一定立刻失守。后面真正能跑出来的，未必是最不受宏观影响的公司，而是那些能证明自己扛得住成本、守得住收入、稳得住利润的公司。 这其实也是美股最熟悉的剧本： 宏观负责制造波动，真正决定股价中期方向的，还是企业盈利。 接下来该看什么？ 在美联储利率决议前夕，市场普遍预期官员将维持利率不变。Nick Timiraos也提到，中东局势升级，反而强化了美联储暂时按兵不动的共识。 但真正影响市场的，不会只是“这次不加不降”本身，而是接下来三件事： 第一，看政策声明怎么写。 措辞如果更强调通胀和不确定性，市场会自然往偏鹰的方向解读。 第二，看点阵图有没有变化。 如果降息路径继续收缩，利率预期会再往上修，成长股估值压力就会重新浮现。 第三，看鲍威尔新闻发布会。 他的表述会直接决定市场是把这次会议理解为“暂时观望”，还是“宽松周期可能提前结束”。 对于当前的美股来说，这三项信号的权重，甚至比单次利率决议本身更高。因为现在市场最大的敏感点，不是利率有没有动，而是未来的宽松想象空间还剩多少。 美光科技创历史新高，开启“AI 存储”超级周期 周二美股存储芯片股普涨，西部数据（WDC） 飙升逾 9%，希捷科技（STX） 涨超 5%，而美光（MU)则大涨逾 4%。 值得所有投资者关注的信号是：美光已成为本轮科技股调整以来，首个成功创下历史新高的主要半导体标的。 这一突破不仅是股价的胜利，更是市场对 AI 基础设施重心从“算力单引擎”转向“算力+存储双驱动”的重新定价。 美股投资网一直非常看好MU 早在 2025年1月14日 ，我们就在 《 2025年最有潜力10只美股【下集】不为人知的AI公司！ 》 里重点提到MU。那时候股价才 95美元 ， 到现在已经涨了 接近5倍 。 到了 2026年1月9日 ，我们又在《 美股2026年必买10只股【中集】不为人知的潜力公司 》 里，再次把MU列进“2026必买10股”。 按视频发布时 284.79美元 的价格算，到现在又涨了 64% 。 真正的机会，从来不是运气，而是长期、扎实、反复验证过的调研！ 扫码+VIP，提前获取更多牛股 为什么资金开始重新定价美光？ 加拿大皇家银行资本市场（RBC Capital Markets）最新上调了 美光目标价从425美元一口气上调到525美元 ，并维持“跑赢大盘”评级。核心判断是，存储行业这一轮上涨，并不只是传统意义上的短周期修复，而更像是一轮由AI、数据中心和高带宽内存共同推动的“超级周期”。 RBC分析师Srini Pajjuri团队的意思其实可以概括成一句话：市场过去低估了这轮存储景气持续的时间，也低估了HBM对行业盈利结构的改变。 以前大家看存储，更像看典型周期股：价格涨了，供给很快跟上，利润高点也就过去了。但这一轮不一样。即便未来传统DDR价格可能会有波动，HBM的高溢价、AI服务器单机搭载量的持续提升，以及数据中心需求的结构性扩张，都让这个周期比过去更长，也更难被快速打断。 例如，英伟达下一代Rubin Ultra平台的HBM搭载量相比前代有大幅提升。这个变化很重要，因为它意味着行业不只是“价格在涨”，而是单台设备所对应的存储价值量也在同步上升。量和价一起往上走，市场自然会重新给估值。 HBM，才是这轮行情最关键的变量 如果说传统DRAM和NAND决定的是行业景气度，那么HBM决定的，就是美光现在的估值天花板还能抬多高。 从管理层近期释放的信息看， 美光2026年的HBM产能基本已经售罄，说明至少未来一段时间，供需依旧非常紧。与此同时，市场关注的重心也正在从HBM3E，逐步转向下一代HBM4。 RBC预计，HBM4的定价有望比HBM3E再高出30%到50%。而美光目前的计划，是在2026年第一季度开始量产交付HBM4。这意味着什么？意味着就算未来部分传统存储产品价格涨势放缓， 美光仍然有机会靠更高端、更高毛利的产品组合，把整体盈利能力维持在高位。 这也是市场最近越来越愿意追美光的原因。 大家买的已经不只是“存储涨价”，而是AI时代下，美光在高端存储环节的话语权和盈利弹性。 数据中心需求，正在把这轮周期拉长 更值得注意的是，这轮存储景气背后的驱动力，已经和过去完全不同。 以前存储行业主要还是看PC、手机这些消费电子；现在真正决定方向的，是数据中心，尤其是AI服务器。目前数据中心已经占到DRAM行业营收的很大一部分，而随着训练和推理需求同步扩张，HBM、DDR以及企业级SSD的搭载量都在持续往上走。 比如新一代AI服务器平台，内存容量提升得非常快。原因也不复杂：模型更大了，推理工作负载更重了，上下文窗口也更长了，最后都会落到对内存和带宽的更高要求上。 这就意味着，未来几年AI基础设施升级，不只是GPU在受益，存储同样在吃到最核心的一块增量。 也正因为这样，市场现在对美光的判断开始发生变化。 即便PC和智能手机需求依然偏弱，只要AI和数据中心这条线继续强，传统消费端的疲软就不足以改变整体趋势。换句话说，这轮行情的底层逻辑，已经从“消费电子复苏”变成了“AI基础设施扩容”。 财报前，市场真正盯着三件事 美东时间3月18日周三盘后，美光就要公布2026财年第二季度财报。 在股价已经站到历史高位附近的情况下，这份财报的重要性不只是“业绩好不好”，而是要回答一个更核心的问题：市场现在讲的这套“存储超级周期”故事，能不能继续被数字验证。 这次财报，市场大概率会重点看三件事。 第一，看盈利能力到底能强到什么程度。 目前市场一致预期，美光本季度营收大约191亿美元，同比增幅超过一倍；每股收益同比增幅也非常惊人。真正决定股价反应的，可能不是营收本身，而是毛利率。上季度公司毛利率是56%，本季给出的指引上限是68%。如果这次财报能继续往上靠，甚至进一步超出预期，那就说明涨价红利确实在快速兑现到利润表上，市场对“超级周期”的信心会更强。 第二，看HBM4推进到哪一步。 HBM现在是美光最重要的增长引擎，也是估值继续抬升的关键。市场会特别关注管理层怎么讲HBM4的量产节奏、客户验证进度，以及和英伟达、AMD这些核心客户的合作情况。尤其是在市场有一些关于供应链份额变化传闻的背景下，这部分表述会直接影响投资者对美光中长期收入确定性的判断。 第三，看公司怎么平衡扩产和盈利。 美光已经把2026财年的资本开支预算上调到约200亿美元，重点投向HBM和先进制程。问题不在于会不会扩，而在于扩得快不快、猛不猛。因为对于存储这种行业来说，景气高的时候最怕一窝蜂扩产，最后自己把价格打下来。所以市场真正想看到的，不是“拼命扩”，而是在需求足够强的前提下，仍然保持有节制的扩张。只有这样，这轮高景气才更有机会延续。 浏览器打开 https://StockWe.com/vip 订阅 美股投资网是一家专门研究美股的金融科技公司，2008年成立于美国硅谷，由前纽约证券交易所分析师Ken创立，联合多位摩根斯坦利分析师，谷歌 Meta工程师利用AI和大数据，配合十多年美股实战经验和业内量化模型，建立了一个股市数据库 https://StockWe 科威特、伊拉克、阿联酋、巴林和阿曼等多个国家，使得局势短期内降温、甚至迅速达成解决方案的希望明显减弱。 经济数据方面，美国商务部大幅下调了第四季度 GDP 增速预期，这一数据在近期一系列令人失望的经济指标中尤为引人关注。与此同时，个人消费支出 PCE 报告显示，美联储最关注的通胀指标基本保持稳定，而其他数据显示耐用品需求依然疲软，进一步反映出美国经济增长动能正在放缓。 美股大数据追踪 \" 科技七巨头 \" 的指数收盘较 10 月历史高点跌逾 10% ，正式步入技术性调整区间 ，七家公司股票年内全线录得负收益。这一集体性下挫， 标志着过去两年大型科技股超级牛市周期的阶段性结束。 此轮抛售的核心驱动力来自市场对人工智能投资回报路径的疑虑持续升温，投资者对科技巨头承诺投入数千亿美元建设 AI 基础设施，却难见近期盈利的商业逻辑愈发谨慎； AI 新工具对软件等细分行业带来的颠覆性风险，也对该板块形成叠加压制。 美股潜在机会 今天我们根据 美股大数据 StockWe.com AI 量化Data监控 ，发现机构在布局一个板块，那就是美国化工企业 代号 DOW 根据美股大数据【美股期权异动】交易时间 2026-03-13 10:48:21 DOW 到期日 2026-04-17 Call 买方看涨 总价值 216 万美元，行权价 37.50 成交量 10000 竞价 2.16 未平仓合约 23603 隐含波动率 51.76 背后的原因我们已经分享到 VIP 社群，【【独家分析】】 全球石化供给正在面临潜在冲击。如果中东冲突影响到霍尔木兹海峡、油气运输通道以及中东地区的石化工厂，全球能源和化工供应链就可能受到明显干扰。一旦运输受阻或部分产能停产，市场上可供使用的石油和化工原料就会减少，进而推动石油价格上涨。在这种情况下，全球化工供应总体将出现收缩，而供应减少通常意味着化工产品价格上涨。 第二个关键因素是美国化工企业的结构性优势。化工行业最大的成本其实是原料。全球很多化工厂主要使用石油衍生的石脑油作为原料，而美国大量化工企业则使用天然气提取的乙烷作为主要原料。由于天然气价格通常远低于石油，当油价上涨时，欧洲和亚洲依赖石脑油的化工企业成本会大幅上升，而美国企业的原料成本变化相对有限。这样的成本差异往往会带来美国化工企业利润率的扩张。 北美化工企业成本优势扩大 这种原料优势预计将提升美国化工企业的利润率，尤其是在 聚乙烯和烯烃市场 。 今年上半年 聚乙烯价格将上涨约每磅 12 美分 ，随后在行业周期中逐渐回归正常。 分析师估计，这一涨价将使综合利润率提高 每磅 4 到 8 美分 ，尤其是那些拥有低成本美国生产资产的企业。 与此同时，中东甲醇供应也受到冲突影响。全球超过 15% 的甲醇产能可能受到限制 ，这将收紧下游化学品市场，例如 乙酰类化学品和 MTBE ，进一步扩大行业价差。 因此美股投资网认为，市场长期以来认为大宗化工“供应过剩”的叙事可能正在转向 供应趋紧的新环境 。 谁是最大受益者 从产业链来看，受益程度排序大致是： 第一梯队 DOW ， LYB 第二梯队 WLK ， OLN 第三梯队 EMN ， CE 原因很简单： 前两家是 北美烯烃和聚乙烯巨头。 他们最受益于： 乙烷成本优势。 一年30倍上涨的超级AI牛股 此外，一年30倍上涨的超级AI牛股诞生，它就是 代号 AXTI，股价从去年3月的1块多，涨到现在51美元，翻了3000% 美股AXTI为什么上涨这么多？ AXT Inc公司介绍 ：是一家半导体材料公司，主要生产磷化铟、砷化镓和锗等化合物半导体衬底材料。这些材料广泛用于光通信、激光器、5G、卫星通信以及部分国防电子系统。过去一年 AXTI 股价出现非常惊人的30倍上涨，但核心原因并不是公司基本面突然出现同等幅度的增长，而是人工智能基础设施需求、光通信产业链预期以及小市值资金推动共同作用的结果。 微信公众号【美股投资网】深度分析，首先最重要的驱动来自人工智能数据中心建设。随着AI 算力需求快速增长，大型数据中心之间需要更高速的光通信连接。从400G、800G 到未来 1.6T 的光模块，核心部件都需要高速激光器，而磷化铟正是制造这些激光器的重要材料。因此在AI 数据中心建设爆发之后，市场开始寻找光通信产业链的上游公司，AXT 因为拥有磷化铟材料技术，被很多投资者视为AI 光通信材料供应链中的潜在受益者。 第二个原因是磷化铟业务本身在2025 年出现明显增长。 公司订单积压金额创下历史新高，一些季度中磷化铟相关收入出现非常快的增长速度。虽然公司整体收入规模仍然不大，但这种增长信号让市场认为AI 光模块需求正在向更上游的材料环节传导，从而强化了投资者对AXTI 的成长预期。 第三个原因是公司市值非常小。AXT 在行情启动之前市值只有一到两亿美元，流通盘也很小。当AI 相关资金开始关注光通信材料赛道时，一部分资金进入这类小市值股票就会对股价产生非常大的推动作用。小市值叠加热门赛道往往会带来极高的股价弹性，因此股价在短时间内出现数倍甚至十倍级别上涨。 第四个因素是部分机构资金的介入。2025 年之后有一些机构开始买入AXTI 股票，这给市场释放出一个信号，说明机构也在研究AI 光通信材料这一赛道。虽然买入规模并不算特别巨大，但在小市值股票中已经足以强化市场情绪，从而进一步推动股价上涨。 第五个原因是 AI 产业链的资金扩散效应。AI 行情最初集中在算力芯片公司，例如 NVIDIA、AMD 以及部分网络和芯片公司。随后资金开始向产业链上游扩散，从 GPU 芯片到网络设备，再到光模块公司，最后进一步寻找更上游的材料供应商。AXT 就属于这种上游材料公司，因此在资金寻找 AI 概念新标的的过程中被不断推高。 不过需要注意的是，AXT 的基本面增长并没有和股价涨幅同步。 公司的年度收入仍然只有几千万到一亿美元级别，而且过去一段时间公司仍然处于亏损状态。这意味着股价上涨更多是基于未来预期，而不是当前盈利能力的快速提升。 AXTI 也分享在我们的VIP社群，详情订阅 Stockwe.com/vip 扫码+万人VIP社群，更深度的美国市场分析 美股量化交易工具使用 浏览器打开 https://StockWe.com/vip 订阅 美股投资网是一家专门研究美股的金融科技公司，2008年成立于美国硅谷，由前纽约证券交易所分析师Ken创立，联合多位摩根斯坦利分析师，谷歌 Meta工程师利用AI和大数据，配合十多年美股实战经验和业内量化模型，建立了一个股市数据库 https://StockWe.com/ 每天处理千万级股票数据：捕捉期权大单，实时主力资金流向、机构持仓变化、川普突发新闻，精准K线信号第一时间发到您手机APP！ 联系方式 客服Telegram MaxMeigu 公众号 TradesMax 邮箱 buy@TradesMax.com Email: buy@TradesMax.com 美股大数据 StockWe.com 美股投资网 TradesMax.com"}, {"title": "美股的麻烦可能才刚开始！NBIS 狂飙背后的逻辑是什么？", "date": "2026-03-11", "ym": "2026-03", "time": "2026-03-11 21:24:51", "author": "StockWe.com", "desc": "200美元油价警告！", "url": "https://mp.weixin.qq.com/s/zb2cqdcuDVUt_NTRYAxyHg", "path": "sources/news/wechat_mp/articles/美股的麻烦可能才刚开始-NBIS-狂飙背后的逻辑是什么-56a631b1e8.md", "len": 3399, "ticks": ["NBIS"], "body": "今日美股市场呈现出典型的“利空出尽”与“地缘溢价”拉锯战的局面，原油价格在剧烈波动后依然坚挺，而美股在此背景下显得承压。 尽管国际能源署（IEA）宣布了创纪录的原油储备释放计划，同时特朗普Z府试图向外界传递“局势可控”的信号，但这些措施未能从根本上缓解市场的担忧，反而加剧了股债双市的动荡。 原油“放储”失灵 国际能源署署长法提赫·比罗尔11日表示， 国际能源署32个成员国已同意释放4亿桶战略石油储备。 该 规模远远超过2022年俄乌冲突后成员国释放的1.83亿桶原油。 特朗普同日表示，美国Z府正设法维持石油供应的流动。据报道， 美国下周开始将从战略石油储备释放1.72亿桶石油。 根据既定的释放速度，预计这个过程将持续大约120天。 特朗普认为： IEA释放战略石油储备将大幅压低油价。油价正在下跌，还将下跌。油价将（继续）下跌，但我们不会提前离开（伊朗）。 然而，原油市场的反应却出乎意料，油价在消息公布之初出现了短线回调，随即反弹走高，展现出典型的V型反转，WTI原油重回90美元关口。 关键在于“细节缺失”。 IEA的声明中并未透露具体的放储时间表、释放速度以及地理分配等关键信息，这让市场对其有效性的信心大打折扣。 美股投资网分析认为，除非这些储备能迅速填补霍尔木兹海峡供应中断的空缺，否则它们的实际影响有限，充其量只是心理安慰。 此外，“利空出尽”的效应也在其中起到了推波助澜的作用。 周二晚间关于释放储备的消息已经提前透出，市场早有预期。在正式宣布后，空头选择了获利了结，导致油价再次上涨。 然而，只要中东局势没有根本性缓和，原油的“地缘政治溢价”就很难被几亿桶储备所消除。 降息预期收缩 通胀方面，今天盘前公布的2月CPI数据原本应该是利好的信号。2 月CPI同比上涨2.4%，核心CPI同比上涨2.5%，是近五年来的最小增幅，显示出美国物价已经逐渐进入温和区间。 然而，市场的反应并不积极，原因在于“滞后效应”的放大与能源价格的“二次通胀”压力。 美债市场全线遭到抛售，收益率大幅攀升，特别是此前做多2年期和5年期美债的投资者因美联储降息预期缩水而遭遇损失。 目前的市场定价反映出一个残酷的现实： 交易员普遍预期美联储今年可能只会降息一次。 美股投资网分析认为，尽管美联储历史上曾倾向于忽视能源价格带来的短期影响，但在经历了五年的高通胀之后，这一次美国Z府与央行恐怕很难再保持冷静。如果原油价格持续高企，市场对美联储降息的预期将面临严重下修。 甲骨文表现与私募信贷信号 在宏观压力的背景下，美股三大指数的表现出现了明显的分化： 道指下跌约0.6%，金融和能源板块表现不佳，成为拖累指数的主要力量。 标普500小幅收跌0.08%，整体市场情绪偏空，但并未出现大幅下跌。 纳指则在尾盘获得一定的支撑，微涨0.08%，其中科技股表现尤为突出，尤其是与AI相关的股.票。 甲骨文在财报公布后大涨近10%，成为今天的焦点。其云基础设施收入激增84%，AI积压订单飙升至5530亿美元，这无疑为整个AI板块注入了强劲的正能量。甲骨文的强势表现，带动了“七巨头”中的大部分科技股跑赢标普500的成分股，进一步显示出市场资金在不确定性中的避险行为。 然而，市场并非一片乐观，尤其是在私募信贷领域。 摩根大通开始通知部分私募机构，下调与软件行业相关贷款的抵押物价值。 随着AI技术的迅速发展，传统软件企业的债务偿还能力可能受到威胁，这使得私募信贷市场的流动性问题进一步加剧。 据报道， Cliffwater等知名私募基金已经面临超过7%的投资者赎回，市场正在为这种“流动性枯竭”定价。 盘后中东局势再度升级 海峡开火： 伊朗革命卫队向通过霍尔木兹海峡的商船直接开火，两艘装有炸药的伊朗船只在伊拉克水域袭击了两艘油轮。 价格恐吓： 伊朗方面发出强硬喊话， 要求世界准备好迎接“200美元一桶”的油价。 政坛博弈： 特朗普试图淡化威胁，称伊朗已“没什么可炸的”，油价会下降。但以色列扬言要“不限时间”打到底。 受此重磅刺激，WTI原油在盘后交易中直线拉升，一度触及93美元/桶。原本收盘微涨的纳指期货随即转跌，市场避险情绪瞬间拉满。 总结与后市展望 今日的市场反映了一个核心矛盾：Z府在用行政手段（放储、推特降温）对抗地缘政治带来的通胀惯性，而资本市场选择了用脚投票。 原油层面： 90美元 可能只是心理关口，真正的考验在于霍尔木兹海峡的封锁是否会演变为常态化冲突。 利率层面： 2.4%的CPI已是过去式。如果油价站稳90美元上方，下半年降息的逻辑将彻底崩塌。 风险防范： 极度避开高杠杆且易被AI颠覆的二三线软件股.票，同时警惕私募信贷违约带来的金融传染风险。 NBIS 今日大涨解析 今日AI基础设施NBIS盘中大涨近18%！ 背后最直接、最关键的消息是：英伟达今日宣布将向 NBIS 投资 20 亿美元，作为双方战略合作的一部分——重点用于 Nebius 在全球范围内建设并部署超大规模 AI 云与数据中心基础设施 市场解读这笔投资的影响主要体现在： 资本支持解决成长性质疑： NBIS 作为一家大型 AI 云基础设施提供商，过去虽有高速增长潜力，但资金密集型扩张与资本压力一直是市场担忧点。这笔 20 亿美元的投资大幅缓解了融资节奏的不确定性。 获得英伟达潜在 GPU 优先供给与生态加成 ： 在 AI 计算市场中，GPU 是核心生产力。直接得到英伟达投资，意味着 NBIS 不仅可以提升硬件获取效率，也可能获得更深的技术与渠道合作，这明显提升了市场对其长期营收与增长的预期。 2030 年 5 GW 容量部署目标： 公告中提到，双方合作将覆盖未来几年内超过 5 吉瓦的 AI 计算容量部署规模，这足以支撑数百万个大型 AI 模型的训练与推理服务，对订单能见度的提升效果显著。 这些因素共同推动市场对 NBIS 的基本面认知从“潜力故事”向“可执行商业框架”转变，点燃了股价表现。 值得一提的是， NBIS 其实是我们在 2025 年 7 月以及 2026 年持续重点看好的 必買 股之一。 当时的核心逻辑一直没变，就是看中它在 AI 云基础设施 这个方向上的稀缺性。 文章回顾： 美股 7月看好一只AI基建股，翻X倍潜力！ 美股 2026年最强10只股【下集】不为人知的潜力公司 NBIS...... 2025 年 7 月，NBIS 股价还只有 50 美元左右。当时我们就明确判断，这家公司具备翻倍潜力。 原因很简单：在 AI 算力需求持续爆发的背景下，真正能承接大规模 GPU 集群、云平台和数据中心落地的公司并不多，NBIS 恰恰站在这个最有想象力  2 月 CPI 数据发布。重点观察能源分项对整体通胀预期的扰动。 地缘局势： 关注白宫与伊朗方面是否有进一步实质性动作，而非仅仅是社交媒体上的“口水战”。 光通信板块继续大涨 今天，美股光通信概念股再次表现出色，核心标的普遍大幅上涨。其中AAOI涨近9%，GLW涨8%，COHR涨超3%，LITE涨近5%，FN涨近3%。 值得注意的是，我们 美股投资网 早在该赛道的质变初期就已敏锐捕捉到了光通信产业的长期投资机会，并且反复提醒投资者要重点关注这一赛道的核心公司。 就在上周，我们发布了深度长文 《规模三年暴增3倍！英伟达押新赛道！利好这五家公司》 文中我们系统梳理了 AI 数据中心从“铜”到“光” 的路径切换，强调随着 AI 工作负载的快速增长，传统的铜缆互联技术已无法满足需求，光互连成为未来数据中心的核心技术。 这一行业变革不仅推动了光通信产品的需求暴增，也使得包括 AAOI、GLW、COHR、LITE 和 FN 在内的五家公司，成为行业内的核心受益标的。 复盘 被我们列为“2026 必买股”之一的 GLW，调研时价格仅 85 美元，而如今已上涨至 139.36 美元，涨幅高达 64%。 我们VIP社群也在125美元入场了，目前浮盈12% 此前我们在 《美股下一轮 AI 核心机会不在 GPU，而在“光电”产业链》 中提示的 LITE（当时 548 美元）和 COHR（当时 216 美元），目前分别报收于 674.5 美元和 272.2 美元， 涨幅分别为 23% 和 26%。 此外我们还在1月底，提示 VIP社群81美元买入MRVL ，财报后暴涨22%，全群赚麻了！ 我们认为，Marvell 在光互连技术 和 定制化芯片 方面的技术领先地位正在逐步被市场认可，公司在与 AI 和 大数据处理 相关领域的持续扩展使其前景更加乐观。 截止今天，MRVL 的股价已经上涨至 94.07美元，涨幅超 16%， 这一表现验证了我们对其未来成长性和市场预期的精准判断。 市场永远不会辜负那些懂得研究、敢于决策的人！ 扫码提前获取更多牛股分析 今天光通信板块情绪的爆发点在于即将到来的行业顶级盛会。 下周，备受瞩目的英伟达 GTC 大会与全球光通讯领域最高规格的美国光纤通讯展览会及研讨会 (OFC) 将同步开启，光互连技术（Optical Interconnects）已提前锁定市场焦点。 物理瓶颈的终结： 从“铜”到“光”的跨越 随着 AI 算力集群规模呈几何倍数增长，传统铜导体在高频率、长距离传输中的信号衰减与功耗问题已逼近物理极限。 光互连技术凭借其高带宽、低损耗及极低延迟的特性，成为连接数万颗 GPU 协同工作的唯一解。 巨头入局： CPO 技术或迎“奇点时刻” 美银在最新研报中抛出重磅观点：到 2030 年，光互连市场规模有望增长四倍，达到 730 亿美元。美银分析师 Vivek Arya 指出， 英伟达作为算力霸主，极有可能在本次 GTC 大会上引领变革，成为首家将传统铜基服务器背板更换为共封装光学（CPO）技术的集成系统供应商。 一旦英伟达在 GB300 等下一代架构中大规模引入 CPO 或光连接方案，将彻底改写数据中心的硬件生态，为光模块及组件厂商打开数量级的增长空间。 高盛与摩根大通最新预警 尽管特朗普释放了关于中东局势缓和的信号，短暂提振了市场的风险情绪，但高盛和摩根大通的最新交易台预警显示，市场深层次的结构性问题仍未解决。系统性抛售压力和仓位未完全出清的核心矛盾，正在将市场推向新一轮的高波动区间，投资者应谨慎对待当前的市场环境。 CTA策略基金成为市场卖方，抛售压力加剧 高盛的最新报告指出，近期市场剧烈波动已经迫使CTA（商品交易顾问）策略基金启动了风险控制机制。CTA基金的一个显著特点是，它们依赖算法策略，根据市场走势进行自动化交易。这意味着，未来一段时间内，CTA将成为股.票市场的净卖方，无论市场是上涨还是下跌，都将持续进行卖出操作。 高盛特别强调，预计未来一周内，CTA基金的抛售规模可能创下历史新高。具体而言，若标普500指数跌破关键的技术支撑位，CTA基金将立即启动更为猛烈的抛售潮。 高盛指出，这一机制将使得市场面临巨大的系统性卖压，对股市产生较大冲击。算法交易基金的操作，可能成为未来一段时间内市场失血的主要源头，投资者需要警惕市场因算法基金的抛售而产生的剧烈波动。 做市商和负Gamma环境加剧市场波动 另一个值得关注的问题是做市商的Gamma敞口。根 据高盛的分析，做市商的Gamma敞口已经降至今年以来最负的水平，这意味着市场的波动性将大大加剧。 做市商通常会通过对冲操作来平衡市场波动，但在当前的负Gamma环境下，他们的对冲行为将放大价格波动，无论是市场上涨还是下跌，做市商的操作都可能加剧市场的波动性。高盛特别指出，这种负Gamma环境可能会导致股市的上涨或下跌变得更加剧烈，从而加剧市场的不稳定性。 流动性枯竭和恐慌情绪上升 流动性问题也是当前市场的另一大隐患。 高盛指出，E-mini期货合约的盘口深度已接近历史低点，这表明市场的流动性已经接近枯竭。 同时，波动率恐慌指数（VIX）已经接近历史极值，这意味着市场的风险偏好已经降至低点，投资者普遍缺乏方向性判断。随着流动性枯竭和投资者情绪低迷，市场的反弹力将大大受到限制，未来市场可能会更加容易受到外部冲击和不确定因素的影响。 摩根大通：仓位未出清，反弹空间有限 摩根大通指出，尽管市场经历了剧烈震荡，但投资者的仓位并未完全出清。 摩根大通的分析团队表示，尽管过去四周的仓位已经有所下降，但整体仓位依然处于中性水平，远未达到市场的“清洗点”。 这一点与市场自中东局势爆发以来的走势相吻合，表明市场的去杠杆化进程仍然不够彻底。 摩根大通进一步表示，当前市场的反弹主要是由空头回补和情绪修复驱动的，而并非基于新一轮配置周期的开启。由于市场的仓位未完全出清，投资者在短期内并未完全放下心理负担，这使得市场反弹的空间受到限制。 因此，摩根大通认为，当前的反弹并不意味着市场已经走出了困境，未来仍然面临巨大的下行压力。 资金流向和去杠杆的脆弱性 摩根大通还指出，从资金流向来看，去杠杆规模有限。尽管市场出现了一些反弹信号，但数据显示对冲基金的换手率保持在正常水平，没有出现明显的资金流入。尤其是美国市场的对冲基金换手率和ETF对冲需求的上涨都没有持续性。这表明市场缺乏彻底去杠杆后的反弹动能，反弹的持续性和力度依然存疑。 欧洲市场的分化：卖压最强 与美国市场相对平稳的情况不同，欧洲市场出现了显著的区域分化。摩根大通数据显示，过去一周，欧洲的对冲基金换手率飙升至+2.4个标准差，远高于美国和亚太地区。这表明， 欧洲市场的卖压更为严重 ，且其波动率指数V2X相对VIX的溢价处于近五年来的95%分位水平，这意味着欧洲市场的风险溢价异常高，市场的不稳定性更为突出。 综合高盛与摩根大通的分析，当前市场的核心矛盾在于地缘政治局势的潜在缓和与技术面和仓位面的结构性压力并存。 美股投资网认为在CTA全面转向做空、Gamma环境持续为负、流动性枯竭的多重压力下，市场的反弹空间有限，未来的波动性可能进一步加大。 投资者需要警惕市场可能出现的二次探底压力，并对短期内的高波动保持高度警觉。 浏览器打开 https://StockWe.com/vip 订阅 Open the browser and go to https://StockWe.com/vip to subscribe. 美股投资网是一家专门研究美股的金融科技公司，2008年成立于美国硅谷，由前纽约证券交易所分析师Ken创立，联合多位摩根斯坦利分析师，谷歌 Meta工程师利用AI和大数据，配合十多年美股实战经验和业内量化模型，建立了一个股市数据库 https://StockWe.com/ 每天处理千万级股票数据：捕捉期权大单，实时主力资金流向、机构持仓变化、川普突发新闻，精准K线信号第一时间发到您手机APP！ 联系方式 客服Telegram MaxMeigu 公众号 TradesMax 邮箱 buy@TradesMax.com Email: buy@TradesMax.com 美股大数据 StockWe.com 美股投资网 TradesMax.com"}, {"title": "特朗普一句话，美股上演V形大反转！", "date": "2026-03-09", "ym": "2026-03", "time": "2026-03-09 21:10:46", "author": "StockWe.com", "desc": "美股风险解除？", "url": "https://mp.weixin.qq.com/s/0wPIwBNb_HP1ao0OPBnDIw", "path": "sources/news/wechat_mp/articles/特朗普一句话-美股上演V形大反转-3a641a89db.md", "len": 2431, "ticks": [], "body": "美东3月9日周一这天，美股走的是非常典型的 “消息主导型” 行情。 整天市场几乎只围绕一个变量波动—— 油价。 中东局势升级一度把原油推向极端位置，华尔街短时间内开始定价“高油价 + 高通胀 + 低增长”的滞胀风险；但临近尾盘，随着特朗普连续释放战争可能很快结束的信号，油价迅速回落，股指也在最后一个小时完成V形反转。 最终，美股三大指数全线收涨。标普500收涨0.8%；纳指收涨1.4%；道指收涨0.5%；罗素2000收涨1.1%。 美股开盘之前，全球市场已经先经历了一轮明显的避险冲击。 随着市场担心伊朗战争升级、霍尔木兹海峡运输可能受到影响，原油价格在亚洲和欧洲时段快速拉升。布伦特原油一度冲到119.50美元附近，WTI原油也在美股早盘触及119.48美元。 这几乎是自2022年以来最猛烈的一次日内上冲。 油价突然飙升带来的冲击非常直接， 如果原油在高位持续时间过长，美国通胀可能再次被推高，而更高的能源成本也会压缩居民消费能力与企业利润。 因此盘前美股期货明显承压。市场担心的不是战争本身，而是油价持续高位带来的二次通胀风险。 到了美股开盘，这层担忧迅速被市场价格化。 早盘股指迅速下探，标普500一度跌1.5%，道指最大跌幅接近900点。与此同时，10年期美债收益率一度升破4.20%。 这一点非常关键。因为如果市场只是担心经济衰退，利率通常会下行。但当天收益率反而上行，说明交易员当时并不是在交易“衰退”，而是在交易油价驱动的通胀冲击。 换句话说，市场一度在定价一个最糟糕的宏观剧本： 如果霍尔木兹海峡运输受扰持续数周，油价不是短期脉冲，而是在高位停留，那么航空、运输、零售、工业甚至数据中心等高能耗行业都会面临利润挤压，美国通胀也会被重新推高。 当时华尔街真正担心的是：美国经济已经在放缓，但油价却在上涨。 然而，日内的抛售潮在美股午盘迎来了转折。 首先出现的是政策层面的稳定信号。七国集团（G7）随后召开紧急视频会议，并在会后发布联合声明称， 各国“随时准备采取必要措施支持全球能源供应”，以稳定能源市场。 这句话虽然没有直接宣布具体措施，但市场很清楚其含义——如果油价继续快速飙升，各国可能通过释放战略石油储备、协调供应、甚至调整运输和产能来缓冲冲击。 美股投资网认为，G7是在向市场传递一个信号： 油价失控的情况不会被放任不管。 这一表态让原油的上涨势头开始明显收敛。 但真正触发市场情绪逆转的，是随后特朗普的一系列讲话。 特朗普在接受 CBS 采访时表示： “The war is very complete, pretty much.” （这场战争基本已经完成了） “We’ve already won in many ways, but we haven’t won enough.” （我们在很多方面已经赢了，但还没有赢够） “The Iranian navy is gone.” （伊朗海军已经不存在了） 随后在公开活动讲话中表示，这是一次 “短期行动” ；他还怕你没听清楚，暗示的不够明显，于是 “短期行动”直接连续说了两遍... 美股投资网认为， 从市场角度看，这些表态释放了三层信号。 第一层信号，是战争规模可能不会继续扩大。 特朗普用 “short-term excursion” 这种接近“短途行动”的表达来形容战争，本质是在刻意淡化冲突的持续时间。这意味着美国方面希望把这次军事行动框定为一次有限打击，而不是长期战争。 第二层信号，是主要军事目标可能已经完成。 当他说“very complete”时，市场的解读是：核心军事任务已经基本实现，后续大规模军事行动的概率下降。 第三层信号，则是能源供应冲击可能不会长期存在。 如果战争持续时间短，霍尔木兹海峡运输风险就更可能是阶段性冲击，而不是长期供应危机。对全球市场而言，这一点比战争本身更关键。 正是这三个信号的叠加，让市场迅速改变了对油价的预期。随着“战争可能提前结束”的判断升温，原油价格迅速掉头。 布伦特原油从接近120美元快速回落，下午收于98.96美元附近，随后进一步跌破90美元。WTI原油则从盘中119.48美元高位回落，最终结算在94.77美元，盘后甚至一度跌向85美元附近。 油价一旦开始回落，美股的压力也随之明显缓解。 此前因为能源冲击而被抛售的科技股和成长股率先获得资金回补，指数在最后一个小时快速反弹，最终完成日内V形反转。 所以如果把3月9日周一这一天总结成一句话，其实很简单： 早盘市场交易的是“霍尔木兹海峡风险”，尾盘市场交易的是“战争可能提前结束”。 也正因为行情完全被政治和能源驱动，今天的反弹并不意味着风险已经解除。相反，只要中东局势再出现新的变数，油价仍然可能再次剧烈波动，美股的情绪也可能随时反转。 在特朗普这种高度不确定的政策风格下，市场很清楚一件事—— 反转，随时都可能再次发生！ 扫码+VIP，提前获取更深度的美国市场分析 浏览器打开 https://StockWe.com/vip 订阅 Open the browser and go to https://StockWe.com/vip to subscribe. 美股投资网是一家专门研究美股的金融科技公司，2008年成立于美国硅谷，由前纽约证券交易所分析师Ken创立，联合多位摩根斯坦利分析师，谷歌 Meta工程师利用AI和大数据，配合十多年美股实战经验和业内量化模型，建立了一个股市数据库 https://StockW AI网络相关环节。 在VIP报告中，我们把MRVL的业务拆解为两大方向： AI Custom Silicon（云厂定制AI芯片）； AI数据中心网络基础设施。 这两条主线决定了MRVL在AI周期中的增长弹性，而不是单纯取决于某一个季度的半导体周期波动。 MRVL在AI数据中心中的位置 MRVL的产品结构，本质上对应AI数据中心底层架构。核心产品包括： • Custom ASIC（云厂定制AI芯片）； • SerDes / DSP（高速互连）； • 光模块DSP； • 网络交换芯片； • 存储控制器。 这些产品的共同特点是： 与大规模AI训练和推理集群扩张直接相关。 随着AI集群规模扩大，系统效率越来越依赖网络互连与数据流架构，而不仅仅是GPU本身。 MRVL正处在这一产业链的关键位置。 我们在财报前提示的两条增长主线 在VIP前瞻研究中，我们重点强调了MRVL未来增长的两个驱动因素。 1、AI Custom Silicon（定制AI芯片） MRVL深度参与多个云计算巨头的AI芯片项目，包括 亚马逊 谷歌 微软 Meta 定制芯片业务的关键不只是“有没有项目”，而是项目从设计导入到量产爬坡的节奏。一旦客户项目进入量产阶段，收入弹性会明显放大。 2、AI网络基础设施 随着AI训练与推理集群规模持续扩大，系统瓶颈开始从单卡算力转向网络互连效率。 因此需求快速增长的环节包括： • SerDes高速互连芯片； • 光模块DSP； • 网络交换芯片。 而这些正是MRVL的核心产品。 我们在财报前就提示过： AI集群规模越大，网络与互连的投入比例就越高。 财报给出验证 MRVL这次财报实现全面超预期，周五狂飙18.35% 数据显示截至2026财年第四季度，公司营收22.2亿美元，同比增长超过20%，创历史新高；调整后每股收益0.80美元，同样高于华尔街预期。 但对投资者更关键的是两点：收入结构与指引强度。 首先是收入结构。 数据中心业务当季贡献约16.5亿美元，占总营收约74% ，同比增长约21%。这说明公司增长的主引擎已经清晰集中在数据中心，并且这一引擎仍在扩张。换句话说，MRVL的增长与AI数据中心投资节奏绑定得越来越紧，而不是依赖传统半导体分散的终端周期。 其次是指引强度。 公司给出的下一季度营收指引中值约24亿美元，明显高于市场此前约22.7亿美元的预期。 这一点的重要性在于：它不仅确认当季需求强，且意味着云厂订单与交付节奏在财报窗口之后仍能延续。对“AI基础设施是否只是短期情绪”的质疑，指引本身就是直接回应。 从产业链角度看，这与我们在财报前给出的框架一致： 生成式AI应用加速落地，云计算巨头持续扩大AI数据中心投资，投入不仅流向GPU，也同步流向定制ASIC、互连、光网络与数据中心存储控制等配套基础设施。 而MRVL正处在这些环节的交汇处。 为什么说兑现正在发生? AI ASIC业务有一个重要行业特征：设计 → 验证 → 量产。整个周期通常需要：2—3年。 因此在产业早期阶段，市场看到的更多是：design win（设计订单）而不是立即体现在收入中的大规模出货。 这也是为什么我们在VIP前瞻中强调：短期市场会交易“当季超预期”，但决定中期股.票定价的，是两类信息能否被管理层持续确认： 其一，AI custom silicon项目是否继续新增或扩大（backlog与客户覆盖面）； 其二，AI网络与光互连相关产品是否在更大规模集群部署中持续放量。 本次财报给出的结构与指引，说明兑现已经开始出现，同时也意味着未来几个季度仍存在进一步上修的空间——尤其当更多定制芯片项目进入量产爬坡、AI集群网络规模继续提升时，数据中心业务的增量仍有可能继续扩大。 AI ASIC赛道的核心公司 在定制AI ASIC设计平台领域，目前最重要的两家公司是AVGO与MRVL。两者都深度参与云计算巨头的AI基础设施建设，但侧重点不同： AVGO更偏大型定制化平台与部分客户的深度绑定； MRVL同时覆盖定制芯片与网络互连关键器件。 因此在“算力+网络”共同扩容的阶段，市场更关注其综合受益程度。 美股投资网VIP研究的价值 这次MRVL财报的意义在于：市场用财报数据确认了AI数据中心基础设施的增长延续，而我们在财报发布前已经把影响MRVL定价的关键变量拆解清楚，并给到VIP客户可执行的观察框架。 对于AI基础设施链条，最有价值的信息往往发生在财报前后的“预期差”阶段，而不是事后复盘。 美股投资网VIP持续跟踪： AI芯片 AI数据中心基础设施 AI网络与光模块 AI推理产业链 为VIP客户提供更前瞻、更系统的美股科技投资研究。 扫码+VIP，提前获取更深度的美国市场分析 浏览器打开 https://StockWe.com/vip 订阅 Open the browse 南北向流量”。 但在 AI 数据中心中，绝大多数数据交换发生在 GPU 与 GPU 之间，形成巨大的 “东西向流量”。 当数万甚至数十万 GPU 组成训练集群时，服务器之间的数据交换规模会呈现指数级增长。这一变化带来了三条清晰的需求曲线。 第一是 横向扩展（Scale-out）：随着 AI 集群规模扩大，机架之间的连接数量迅速增加。 第二是 纵向升级（Scale-up）：机架内部大量使用的铜缆正在逼近带宽与功耗极限，未来将逐步被光互连替代。 第三是 跨数据中心互联（Scale-across）：分布式 AI 训练需要多个数据中心协同运行，长距离高速光模块需求开始快速增长。 在这三条曲线的叠加下，高端光模块的出货量，可能从 2025 年的 2000 万只，猛增到 2026 年的 5300 万只，并在 2028 年逼近 8000 万只。这不是线性增长，这是指数级爆发。 算力瓶颈正在从 GPU 转向“互连” 随着 AI 集群规模不断扩大，一个新的瓶颈开始出现： 算力系统的限制，正在从 GPU 本身转向 GPU 之间的数据连接效率。 在 224G 传输速率下，传统铜线的有效传输距离已经缩短到 不足 1 米。 这意味着，当 GPU 集群规模继续扩大时，仅依赖铜互连已经无法满足数据传输需求。 因此，光互连正在从一种性能升级选项，变成 AI 数据中心的基础设施。在华尔街的一些技术报告中出现了这样非常形象的类比： 在上一轮 AI 基建周期中，先进封装（CoWoS）决定了 GPU 的产量。 而在下一轮 AI 基建周期中，光互连能力很可能决定 AI 集群的扩展速度。 这也正是英伟达选择提前布局光互连产业链的核心原因。 那么为什么英伟达选择 LITE 和 COHR？ 问题来了，在众多光通信公司中，为什么英伟达偏偏选择了LITE 和 COHR？答案其实就藏在光模块的“身体结构”里。 我们可以把 AI 数据中心想象成一个超大型工厂。GPU 是干活的机器，光模块是连接机器的传送带。现在机器跑得飞快，传统的“铜传送带”扛不住了，必须换成“光传送带”。 但在光模块这个小盒子里，真正决定它能不能跑得快、跑得稳的核心部件，只有一个——那就是激光器。 如果把光模块比作一辆跑车，外壳和组装只是车身，而 激光器就是发动机。车身再漂亮，如果发动机动力不足，这辆车在 800G 甚至 1.6T 的“超级高速公路”上，根本跑不起来。而且在 AI 场景下，这个发动机不仅马力要大，还得极度“省油”，否则数据中心瞬间就会变成巨大的电暖炉。 但是全世界能造出这种顶级“发动机”的厂家，屈指可数。这就是英伟达的逻辑：LITE 和 COHR，是这个细分领域里几乎无法绕过的“双寡头”。 先看 Lumentum (LITE)。 它手里握着一张王牌材料——磷化铟 (InP)。 你可以把它理解为光通信界的“特种钢材”。只有在磷化铟平台上，才能造出满足 1.6T 时代高频、低功耗要求的顶级激光器。 特别是在未来的 CPO 架构中，所需的高功率连续波激光器，Lumentum 目前处于绝对领跑地位。英伟达投它，买的是 技术的天花板。 再看 Coherent (COHR)。 它更像是一个拥有全产业链能力的“巨人”。 从最底层的晶体材料生长，到芯片加工，再到器件封装，Coherent 全部自己能搞定。这种垂直整合的模式，让它在产能保障、成本控制和良率提升上，有着极强的韧性。英伟达投它，买的是 供应链的安全垫。 为什么要现在投？ 因为过去两年的教训告诉英伟达：光模块交货慢，往往不是组装厂没工人，而是卡在了上游的激光芯片上。英伟达这 40 亿美元，表面是投资， 实则是锁定了未来几年核心零部件的 “优先提货权”。 这里还有一个很关键的商业逻辑： 经营杠杆 。激光器行业，技术代差带来的利润非常惊人。 比如新一代的 200G 激光器，售价可能是老款的两倍，但因为工艺成熟，成本可能只增加了百分之十几。这种“售价翻倍、成本微增”的剪刀差，就是华尔街最看重的利润爆发点。 除了这两家激光器龙头，产业链中还有两家值得关注的公司： Fabrinet（FN） 是光模块制造代工龙头 ，很多高端光学产品最终都要通过它生产；而 Applied Optoelectronics（AAOI） 则是正在快速崛起的光模块厂商， 800G 产品预计今年开始放量。 简单来说，这四家公司分别代表了 AI 光通信产业链的四个关键位置： LITE → 激光器技术龙头； COHR → 光学器件综合平台； FN → 高端光模块制造代工； AAOI → 光模块厂商中的成长黑马。 如果你觉得本文对你有帮助，老规矩先点赞再收藏，关键时刻能帮忙 美国热线 626 378 3637 CPO：中期变量，而非短期杀手 当光互连从“可选升级”变成“必选底座”之后，市场关注点自然会转向下一层：互连技术的路线将如何演进。 当前 AI 数据中心最主流的方案仍然是 可插拔光模块（pluggable transceiver）。这种架构生态成熟、维护方便、成本也相对可控，因此仍然是当前大规模部署的核心形态。 随着网络速度不断提高，行业也在寻找更加紧密结合的解决方案——把光引擎进一步靠近交换芯片，甚至直接与芯片共封装，这就是 CPO（共封装光学）。 正是因为这种“技术路线升级”的叙事存在， 市场才产生了一种典型误判：很多人认为，一旦 CPO 成熟，传统光模块就会被迅速取代。 但事实恰恰相反。产业链模型测算显示，CPO 在未来几年仍处于非常早期阶段：2026 年对光模块需求影响约 3%2027 年约 11%2028 年约 16%. 换句话说，在未来三到四年时间里，CPO 的渗透仍然非常有限！ 原因其实很简单——工程现实。 第一是 制造良率。CPO 需要将光引擎直接封装到交换芯片附近，封装与测试复杂度远高于传统模块。 第二是 散热问题。随着交换芯片功耗不断提升，共封装结构对热管理提出更高要求。 第三是 维护成本。传统可插拔光模块出现问题时，只需要更换单个端口模块；但在 CPO 架构下，一旦光引擎发生故障，可能影响整块五十太比特每秒以上的交换模块。 目前 CPO 的整体成本仍然约为传统方案的 8—10 倍。因此，未来的数据中心光互连架构更可能形成一种多层共存结构： 可插拔光模块 NPO（近封装光学） CPO（共封装光学） 不同技术针对不同距离和功耗需求，各自发挥作用，而不是简单的替代关系。 所以结论其实很清晰： CPO 是长期方向，但在 2026—2028 年这个建设周期里，真正的赢家仍然是那些能够同时布局可插拔、NPO 与 CPO 多条技术路线的厂商。 现代战争正在变成一条“算法杀伤链” 现在我们来谈最近的战争。这套对伊“手术刀式”精准打击的背后，其实已经不是传统的“导弹加雷达”。真正运转的，是一整套由卫星网络、数据平台、AI和无人系统组成的作战体系。 在这条链条里： SpaceX 的星盾（Starshield）负责通信网络； Palantir（PLTR）负责数据整合； Anthropic 与 xAI 提供AI推理； 而 Anduril 则提供无人系统执行。 整场行动，本质上是一条从“图像数据到精确打击”的高速信息闭环。 首先改变战场节奏的，是 SpaceX 的军用卫星网络“星盾”。 过去的军事卫星大多在约3.6万公里的高轨道上运行。信号从地面发到卫星，再返回地面，往返距离接近7万公里，即便以光速传输，也会产生大约500毫秒以上的延迟。半秒听起来很短，但在高速移动目标面前，这已经足够让画面变成“过去发生的事情”。 而星盾使用的是约550公里高度的低轨卫星网络，延迟被压缩到20毫秒左右。 简单理解就是：过去指挥中心看到的是“半秒前的画面”，而现在看到的几乎就是“正在发生的画面”。 同时， 星盾还能提供接近 500Mbps 的数据带宽。 这意味着战场上传回的，不再只是简单的坐标和语音，而是持续的视频画面、多光谱传感器数据以及无人机实时影像。 但问题也随之出现——当信息太多时，人类反而更难判断。 这时，Palantir（PLTR） 的平台开始发挥作用。这家由硅谷投资人彼得·蒂尔（Peter Thiel）创立的公司，本质上是在 为军方提供一个“数据操作系统”。 Palantir 的 Gotham 平台早已深度嵌入美国国家安全体系，美国国防部、陆军以及情报机构都在使用这套系统来整合战场信息。在这个平台上，来自不同来源的数据会被汇总到同一张数字地图中——卫星影像、无人机画面、电磁信号，甚至公开网络信息，都可以被快速整合并持续更新。 在这种系统里，目标不再只是一个静止坐标，而是一条被持续计算和追踪的运动轨迹。简单说，指挥官不再需要在多个系统之间切换，而是可以在一张实时地图上看到整个战场。 接下来，AI开始参与决策。 Anthropic 的 Claude 模型和 xAI 的系统在这里更像一个数字化参谋团队。 它们可以在短时间内分析大量信息，并模拟不同战术路径，例如：哪条路径更容易避开防空系统，哪种打击方式附带损伤更小。 这种AI辅助决策，让许多战术判断可以在几秒钟内完成。 当最终指令下达， 执行任务的是 Anduril 的无人系统。 Anduril 的核心系统叫 Lattice，它可以让多架无人机在同一网络下协同工作。 这些无人机在飞行过程中，会不断接收新的信息和指令。如果目标移动或者环境变化，系统会实时调整飞行路径。在低延迟通信支持下，打击轨迹可以在最后阶段持续修正，从而提高整体精度。 四维战争如何重写军工与美股结构 当卫星通信、数据整合、AI和无人系统连接在一起时，战争的组织方式就发生了变化。 过去几十年，军工体系的核心价值几乎全部集中在大型武器平台上——战机、航母、导弹和装甲车构成了军事实力的象征。谁能制造更强的武器平台，谁就能在军工市场中占据主导地位。 但在新的作战体系中，决定胜负的关键开始发生变化。 越来越多的价值，不再来自单个武器平台，而是来自信息系统本身。 谁能更快获取信息； 谁能更快处理数据； 谁能更快完成决策。 当战争开始比拼信息速度与决策效率时，军工产业的价值重心也开始从“钢铁平台”转向“信息网络”。 在美股市场，这种变化已经逐渐显现。传统军工巨头依然占据重要位置，例如： 洛克希德·马丁（LMT） 雷神技术（RTX） 诺斯罗普·格鲁曼（NOC） 这些公司仍然主导着战机、导弹和防空系统等核心装备。但如果把整个作战体系拆开来看，就会发现，一条新的技术基础设施正在逐渐形成——低轨卫星通信、数据平台、AI与云计算。 也正因为如此，资本市场的关注点开始从单一武器平台，转向支撑这套体系运转的底层技术。对于投资者来说，更值得研究的，其实是围绕这一基础设施形成的整条美股供应链。 战争重新定价的美股供应链 首先是通信与光学链路。 低轨卫星网络的关键并不只是卫星数量，而是通信效率。Broadcom（AVGO）在通信芯片领域占据重要位置，而 Coherent（COHR）与 Lumentum（LITE）则深耕激光器件与光模块技术。随着星间激光通信的发展，高端光通信设备的需求可能明显增加。 第二层是算力与数据系统。 低轨卫星提供信息来源，但真正决定效率的是数据处理能力。Palantir的平台可以整合卫星影像、无人机视频以及电磁信号，而AI模型则依赖英伟达等公司提供算力支持。 第三层是无人系统与边缘节点。 无人机正在从侦察工具演变为战场执行节点。例如 AeroVironment（AVAV）长期提供战术无人机系统；Ondas Holdings（ONDS）则布局无人机平台与专用通信网络，其软件定义无线电技术可以帮助无人机形成自组织通信网络，从而提高协同能力与抗干扰能力。 当通信网络、算力平台和无人系统逐渐连接在一起时，一条新的军工产业链也随之形成。对于投资者来说，这意味着军工板块的结构正在发生变化。传统平台型公司依然稳定， 但未来估值弹性更大的，往往是那些掌握通信链路、数据入口和算力资源的企业。 如果低轨卫星网络、AI系统和无人平台继续融合，那么“空间 + 数据 + 无人系统”，很可能会成为未来几年军工产业最重要的一条结构主线。 好了，今天的文章就到这里。当战争形态升级、算力成为军备、光互连成为基础设施，你会如何调整自己的资产配置，来参与这场 军工与 AI 的代际革命？欢迎在评论区分享你的看法，我们一起在变局中寻找确定性。 如果你还没有关注我们美股投资网的 小红书和抖音号 ，立即关注，不然你会错过很多重磅分析。 精彩深度文章回顾 美股 微软、亚马逊、奈飞，哪个最值得捞底？ 美股 下一轮AI核心机会不在GPU，而在“光电xxx”产业链 美股2026年最值得关注的新股IPO，提前把券商账号开好！ 美股 2026年10家不为人知的潜力公司【上集】 美股2026年必买10只股【中集】不为人知的潜力公司 美股 2026年最强10只股【下集】不为人知的潜力公司 TTMI...... 美股软件股还有救吗？几大投行研报，揭秘AI能否摧毁SaaS行业 美股 2026年五大投资主题！千万别错过！ 现在投资5大量化指标，用专业金融数据给你揭晓答案！ 美股 投资一家高PE 低PS的AI公司，到底存在什么风险？ 美股 一次全曝光“谷歌AI芯片”最强核心供应商，有哪些公司将利好？ 美股 这家公司将超越英伟达5万亿市值 AI股集体暴涨背后！英伟达的危机！附送几只潜力股 IREN NBIS ..... 美股 揭秘价值千万的选股逻辑！ 看懂秒变高手，轻松抓住10倍、100倍机会！ 美股 7月看好一只AI基建股，翻X倍潜力 NBIS！ 美股6月必捞四只股，全新上市！CRCL GOOG LLY...... 美股 解密一条公式，让你投资稳定盈利！ 美股4月2日将变盘！交易策略公开，长期看涨的动力因素有哪些？ 2025年最有潜力10只美股【下集】 不为人知的AI公司！【深度调研】 2025年最有潜力10只美股【中集】 不为人知的AI公司！【深度调研】 2025年最有潜力10只美股【上集】 不为人知的AI公司！【深度调研】 美股核能股爆涨，哪家最值得投资？OKLO LEU NNE 美股投资网 是一家专门研究美股的金融科技公司，2008年成立于美国硅谷，由前纽约证券交易所分析师Ken创立，联合多位摩根斯坦利分析师，谷歌 Meta工程师利用AI和大数据，配合十多年美股实战经验和业内量化模型，建立了一个股市数据库 https://StockWe.com/ 每天处理千万级股票数据：捕捉期权大单，实时主力资金流向、机构 级—风险资产下跌”的逻辑演进，但美股的走势却是不一样的剧本。 韧性经济数据，对冲地缘政治冲击 支撑美股走出独立行情的核心力量，来自于周三公布的一系列经济数据。这些数据不仅明显好于市场预期，更重要的是，它们同时传递出两个信号：经济依然强劲，同时通胀正在边际回落。这正是市场最希望看到的组合。 服务业表现明显强于预期。 美国2月ISM非制造业PMI升至56.1，创2022年7月以来新高 ，也远高于市场此前预期的53.5。PMI高于50意味着经济仍在扩张， 而56以上的水平通常代表需求依然非常强劲。 考虑到服务业占美国经济比重接近70%，这一数据直接强化了市场对美国经济韧性的信心。 更关键的是通胀信号出现缓和。ISM服务业价格支付指数降至近一年低位，显示服务业的价格压力正在边际回落。在过去一年中，服务业一直被视为通胀最顽固的部分，因此这一变化对市场意义非常重要。 简单来说，经济仍然在增长，但通胀压力没有继续上升，这为风险资产提供了理想的宏观环境。 就业市场也继续保持稳定。 美国2月ADP就业人数增加6.3万，为三个月以来最高水平。 虽然这一数字本身并不算特别强劲，但它至少证明劳动力市场并未出现明显降温。 与此同时，市场还一度受到一则地缘消息的影响。《纽约邮报》报道称，伊朗方面曾通过间接渠道接触美国中央情报局（CIA），试探推动谈判结束冲突的可能性。 虽然相关消息随后被否认，但这种“外交空间”的存在仍然在短期内缓和了市场的避险情绪。 科技股领衔反击 从市场结构来看，周三的上涨很大一部分由科技股推动，尤其是半导体板块表现最为突出。 美光（MU）与 AMD均上涨约6%，成为今天表现最强的芯片股之一。英伟达 与博通也分别上涨约2%。AI算力需求依然是市场最确定的增长逻辑之一，而芯片板块继续承担着“风险偏好风向标”的角色。 除了半导体之外，软件板块同样出现连续反弹。此前市场一度担心美国Z府可能对AI公司Anthropic采取更严格的限制措施，但随着政策预期逐渐稳定， 这一担忧反而转化为行业竞争格局变化的潜在利好 。软件股已经连续第三个交易日出现上涨。 科技板块的整体表现再次证明，在当前市场结构中，AI与算力相关资产依然是资金最重要的配置方向。 能源降温，防御板块走强 周三表现最好的板块包括非必需消费品与公用事业。前者通常受益于经济增长预期，后者则具备稳定现金流与高股息属性，说明资金在追逐增长的同时，也在增加防御配置。 值得注意的是， 能源板块反而成为当日表现最弱的行业。 按照传统逻辑，中东冲突升级通常会推高油价并带动能源股上涨，但本轮市场反应明显不同。 美股投资网分析认为，能源市场此前已经提前消化了战争溢价，甚至存在一定程度的过度定价，因此即使冲突进一步升级，对板块的边际推动作用也已经明显减弱。 美股投资网认为，虽然局势仍存在升级风险，但更可能出现的情景是市场短暂进入风险厌恶状态，随后随着冲突逐步降温，市场情绪将快速恢复。 市场在赌什么？ 当前市场的核心逻辑其实非常简单。 市场并没有忽视战争，而是在评估战争是否会改变经济。 历史经验显示，美国经济对地缘政治冲击的吸收能力非常强。从海湾战争到俄乌冲突，大多数情况下市场的波动都停留在情绪层面，而经济基本面最终重新成为资产定价的核心。 战争时期与美股表现（1928–2024） 只要经济增长仍在持续、企业盈利没有明显恶化，市场往往会把地缘政治风险视为短期扰动，而不是长期趋势。因此本轮市场连续三天出现“低开高走”的走势，本质上是一种重新定价的过程。 市场正在确认一件事：美国经济依然是全球最强的增长引擎。当这一前提没有改变时，恐慌往往只是阶段性的。在这样的环境下，每一次情绪驱动的下跌，都可能成为资金重新入场的机会。 正如巴菲特那句被无数次引用的话—— 别人贪婪时我恐惧，别人恐惧时我贪婪。 当然，这句话真正成立的前提是：经济基本面依然健康。而至少从目前的数据来看，市场暂时还没有看到相反的信号。 资金继续押注英伟达 特斯拉长期多头、亿万富翁Leo KoGuan周二透露，已买入100万股英伟达股.票，总价值约1.8亿美元。 Leo KoGuan在社交平台X上表示： “我坚信AI不是泡沫，这仅仅是开始。” 他同时透露，计划在近期再买入100万股英伟达，以此向当前紧张的市场情绪表达支持。 在AI板块估值持续受到讨论的背景下，这种公开加仓行为本身具有较强的信号意义。Leo KoGuan此前因长期重仓特斯拉而在市场上知名，他的表态在一定程度上也代表了部分长期资金对于AI周期的判断——当前阶段仍处于产业扩张初期，而不是泡沫末期。 与此同时，英伟达CEO黄仁勋在摩根士丹利科技、媒体与电信会议上也释放了新的信号。 黄仁勋表示，英伟达对OpenAI的约300亿美元投资，很可能是OpenAI在上市前的“最后一次”融资支持。 由于OpenAI预计将在今年年底前后推进IPO，因此此前讨论过的、规模可能达到1000亿美元的进一步投资计划，目前已经不在考虑范围内。 从产业角度来看，这意味着AI基础设施投资正在进入新的阶段：大型模型公司正在逐步走向资本市场，而算力与基础设施仍将持续扩张。 博通财报再次强化AI需求 周三盘后，博通（AVGO）公布最新季度业绩。表面看，数字并不“爆表”，但胜在两点：AI数据中心需求继续强，管理层对未来几个季度给出了更清晰、更可兑现的增长路径。 公司披露当季营收创纪录并保持两位数增长，同时强调AI半导体收入同比大增，并预计下一季AI半导体收入继续加速，叠加总体营收指引大体符合华尔街预期。 同时， 博通宣布启动最高100亿美元的股.票回购计划。 对盘后交易来说，回购不是“锦上添花”，而是直接改变短期供需：在流动性更薄的盘后时段，回购信号往往能快速稳定买盘预期，尤其在市场对估值敏感、资金容易做短线再定价的阶段。 在财报电话会上，博通管理层还透露了几个极具分量的行业信息。 首先，A I模型公司Anthropic预计将在2027财年带来约3GW的算力需求。 这个数字意味着什么？3GW几乎相当于一座中型城市的用电负荷，也意味着未来几年AI训练和推理所需要的数据中心规模仍将继续扩大。 其次， OpenAI预计将在2027年前后开始大规模部署定制芯片。 这意味着AI基础设施正在从单一GPU架构逐步走向“GPU + ASIC”的混合模式。GPU仍然负责大规模训练，但在推理和规模化部署阶段，定制芯片可以提供更高效率和更低能耗。 此外， Meta的定制AI芯片路线图也在持续推进， 博通管理层表示项目进展顺利。 这些信息共同指向一个趋势：大型AI公司正在构建自己的算力体系，而博通正是其中最重要的ASIC合作伙伴之一。 财报公布后的第一时间，博通股价一度小幅上涨，但随后短暂转跌。部分资金选择先行获利了结，原因在于AI板块目前整体估值较高，投资者对财报的审视也更加严格。 尤其是博通的软件业务，本季度收入仅小幅增长。在AI交易拥挤、估值敏感的背景下，一些资金开始重新评估增长结构、现金流和负债变化，这也导致盘后交易初期出现波动。 但随着业绩电话会的进一步展开，市场情绪迅速发生变化。 当管理层明确披露未来几年AI客户的部署节奏之后，市场重新定价了博通在AI产业链中的角色。Anthropic、OpenAI和Meta的算力需求时间表，使得未来几年AI基础设施投资的可见度大幅提升。 这一信息直接改变了市场的预期。 资金意识到，博通不仅仅是短期受益者，而是未来AI基础设施长期扩张的重要参与者。随着这一逻辑逐渐被消化，盘后股价迅速由跌转涨，涨幅一度扩大至5%以上。 被忽视的“大动脉” 在AI产业链中，市场的注意力往往集中在GPU上，但真正限制大型算力集群规模的，越来越是网络。 算力集群规模越大，服务器之间的数据通信就越密集。当数万块GPU同时工作时，如果网络带宽不足，计算效率就会迅速下降，GPU利用率甚至可能大幅降低。 因此， AI数据中心正在经历一轮通信技术升级。 目前行业正从400G光模块逐步向800G、甚至1.6T光模块升级，以支撑更大规模的数据传输需求。高速光通信已经成为AI基础设施的关键组成部分。而博通正是全球最重要的光通信芯片和交换机芯片供应商之一。 如果用一个简单的比喻来理解：GPU是AI时代的“发动机”，而光通信与网络系统则是“高速公路”。当GPU数量不断增加，数据中心之间的数据流量也会爆发式增长，这就要求网络带宽同步扩容。 车越来越多，路就必须越来越宽。 这也是为什么越来越多机构开始重新评估博通的价值。它不仅在ASIC定制芯片领域深度参与AI算力建设，在网络与光通信领域同样占据核心位置。 从产业角度来看，AI基础设施已经从单一GPU竞争，逐渐演变为完整系统工程。 英伟达负责计算能力； 博通负责网络连接与部分定制算力； 光通信则承担着整个数据中心的数据传输任务。 随着AI模型规模持续扩大，数据中心已经从单一算力竞争，演变为完整基础设施体系的竞争。 GPU决定算力上限，而网络与通信决定算力能否真正跑满。在这一阶段，谁能解决大规模算力集群的连接效率问题，谁就更有可能成为下一轮AI基础设施升级的核心受益者。 显然博通正处在这个体系的关键位置。 扫码+万人VIP社群，更深度的美国市场分析 美股量化交易工具使用 美股投资网是一家专门研究美股的金融科技公司，2008年成立于美国硅谷，由前纽约证券交易所分析师Ken创立，联合多位摩根斯坦利分析师，谷歌 Meta工程师利用AI和大数据，配合十多年美股实战经验和业内量化模型，建立了一个股市数据库 https://StockWe.com/ 每天处理千万级股票数据：捕捉期权大单，实时主力资金流向、机构持仓变化、川普突发新闻，精准K线 p.weixin.qq.com/s/JHTMnBQlT78nDLAu_tMG4g", "path": "sources/news/wechat_mp/articles/在美国把401K转IRA好处和坏处-aced220154.md", "len": 1809, "ticks": [], "body": "把 401(k) 转到 IRA（Rollover IRA） 是很多人在 离职、退休、或想自己管理投资 时会考虑的操作。 核心本质是：👉 从“公司退休账户”转成“个人退休账户”。 下面美股投资网帮你系统拆解 好处 vs 坏处 。 ✅ 一、401(k) 转 IRA 的好处 1️⃣ 投资选择大幅增加 401(k) 通常只有公司提供的几十只基金。 而 IRA 可以投资： 个股 ETF 债券 REIT 期权（部分券商） 更低费率指数基金 例如你可以直接买： Vanguard S&P 500 ETF Invesco QQQ Trust 个股如 NVIDIA Corporation 👉 对主动投资者非常重要。 2️⃣ 管理费通常更低 很多公司401(k)隐藏费用较高： Plan administration fee 高 expense ratio 基金 Advisor fee IRA 可选超低费 ETF： 费用可低至 0.03% 长期差距非常大（几十年可能差几十万美元）。 3️⃣ 账户更集中、易管理 换工作后： 很多人有： 旧公司401k ×3 新401k ×1 转 IRA 后： ✅ 一个账户管理全部退休资金 ✅ 资产配置更清晰 4️⃣ 更灵活的退休提款策略 IRA 提供更多策略： Roth Conversion（税务规划神器） 分批提款 自定义资产出售顺序 高收入人群常用。 5️⃣ 遗产规划更灵活 IRA： beneficiary 设置更自由 继承规则更清晰 ❌ 二、401(k) 转 IRA 的坏处（很多人忽略） 1️⃣ 失去“法律保护优势”（很关键） 401(k) 受 ERISA 法律保护： 👉 债权人几乎无法追讨 👉 破产保护极强 IRA： 保护程度取决于州法律 有上限（联邦约 $1.5M+） 如果你是： 企业主 医生 高诉讼风险职业 ⚠️ 401(k) 可能更安全。 2️⃣ Backdoor Roth 可能被破坏（高收入者重点） 如果你未来想做： 👉 Backdoor Roth IRA 拥有 Traditional IRA 会触发： 📌 Pro-Rata Rule（按比例纳税） 结果： 原本免税操作 变成要交税 很多高收入科技/金融人士因此 不 rollover 。 3️⃣ 55岁规则（Rule of 55）可能消失 如果你： 55岁后离职 钱仍在401(k) 可以 提前提款且无10%罚金 。 转 IRA 后： ❌ 通常要等到 59½ 岁。 4️⃣ 机构级低费基金可能消失 部分大型公司401(k)有： Institutional share class 超低成本基金 有时比 IRA 还便宜。 5️⃣ 延迟强制提款策略减少 仍在工作的401(k)： 👉 可延迟 RMD（Required Minimum Distribution） IRA： ❌ 73岁必须开始提款。 ✅ 三、什么时候“建议转 IRA” 通常适合： ✅ 已离职 ✅ 想自己投资 ✅ 401k费用高 ✅ 想做资产配置优化 ✅ 不打算做 Backdoor Roth ❌ 四、什么时候“不要转” 更适合保留401(k)： ✅ 高收入要做 Backdoor Roth ✅ 接近55岁退休 ✅ 高法律风险职业 ✅ 公司401k费用极低 ⭐ 五、很多专业投资人真实做法（重点） 常见策略： 👉 旧401k → 新公司401k（不是IRA） 好处： 避开 Pro-Rata Rule 保留401k法律保护 仍可 Backdoor Roth 这是很多高净值人士的隐藏路径。 扫码+万人薇信社群聊 美股投资网是一家专门研究美股的金融科技公司，2008年成立于美国硅谷，由前纽约证券交易所分析师Ken创立，联合多位摩根斯坦利分析师，谷歌 Meta工程师利用AI和大数据，配合十多年美股实战经验和业内量化模型，建立了一个股市数据库 https://StockWe.com/ 每天处理千万级股票数据：捕捉期权大单，实时主力资金流向、机构持仓变化、川普突发新闻，精准K线信号第一时间发到您手机APP！ 联系方式 客服Telegram MaxMeigu 公众号 TradesMax 邮箱 buy@TradesMax.com Email: buy@TradesMax.com 美股大数据 StockWe.com 美股投资网 TradesMax.com"}, {"title": "特朗普关税“翻车”成利好！三大指数集体收涨", "date": "2026-02-20", "ym": "2026-02", "time": "2026-02-20 19:06:42", "author": "StockWe.com", "desc": "突发！", "url": "https://mp.weixin.qq.com/s/iAxXsiILoQo0sU8Y7zFOAw", "path": "sources/news/wechat_mp/articles/特朗普关税-翻车-成利好-三大指数集体收涨-c8d4136e97.md", "len": 2282, "ticks": [], "body": "周五（2月20日），美国最高法院裁定特朗普的关税政策违法，令美股低开高走，最终三大指数集体收涨。但是关税收入预期的落空引发了对美国财政赤字扩大和发债增加的担忧，导致美债收益率上行和美元日内走软。打伊朗紧张叠加通胀粘性，则推升了黄金等避险及抗通胀资产。 截至收盘，道琼斯指数上涨0.47%，标普500指数上涨0.69%，纳斯达克指数上涨0.9%。此前受关税压力最大的零售板块一度大幅拉升，显示市场快速重估供应链成本预期。不过盘中又出现回吐，反映出投资者对政策后续走向仍然存疑。 这次裁决的核心在于总统是否可以通过IEEPA绕开国会长期性征收广泛关税。最高法院明确否定了这种扩张性解释。问题的关键并未就此结束—— 已经征收的关税是否需要退还？如果退还，规模多大？资金来源如何安排？这一切都需要下级法院进一步厘清。 FBB Capital Partners高级研究分析师Michael Brenner指出，如果政府需要大规模退税，某种意义上将形成“被动财政刺激”。 从宏观角度看，这可能在短期内提振消费与企业利润，但同时也会进一步扩大财政赤字。 真正令债券市场敏感的正是这一点。关税收入原本是部分财政收入的补充来源，一旦预期落空，市场自然将目光投向更大规模的国债发行。结果是美债收益率盘中上行，而美元出现走软。财政可持续性问题再次成为核心变量——在美国赤字率仍处高位、利息支出占比不断攀升的背景下，任何收入端的不确定都会被迅速放大。 值得注意的是，尽管裁决本身具有象征性意义，但散户并未明显跟进。 美股大数据显示，散户参与度在裁决后并未显著上升。 CNBC评论员Rick Santelli甚至直言，如果只看盘面，你可能根本不会意识到当天发生了关税裁决。这说明当前市场主导力量更多来自机构资产配置与宏观预期再平衡，而非情绪性交易。 然而政策博弈并未结束。特朗普随即表示，将依据《1974年贸易法》第122条，在现有关税基础上额外对全球输美商品加征10%关税。这一表态为未来的不确定性重新打开窗口。122条款赋予总统在特定情境下采取临时性贸易措施的权限，但持续性与范围仍可能面临新的法律挑战。市场需要重新评估行政权力与司法审查之间的动态拉锯。 就在宏观政策震荡的同时，科技板块内部也出现结构性冲击。Anthropic发布的Claude AI新增代码安全扫描功能，声称模型已能有效识别长期隐藏的漏洞，并预测未来全球大量代码将被AI扫描。这一技术突破对传统网络安全公司构成直接威胁。 网络安全板块随即重挫。SailPoint暴跌9.4%，Okta下跌9.18%，Cloudflare跌幅超过8%，Global X网络安全ETF收跌4.9%，创2023年以来新低。市场正在重新思考一个问题：如果AI可以自动发现漏洞并提供修复建议，传统以人工检测、订阅制服务为核心的安全商业模式是否会被压缩利润空间？ 这场冲击不仅仅是短期情绪波动，更是“AI替代逻辑”开始向企业软件盈利模式渗透的信号。类似的逻辑此前已出现在客服、内容生产、数据分析等领域。资本市场正在快速从“AI赋能”过渡到“AI重构行业”。 OpenAI酝酿AI音箱、眼镜与智能灯，最早2027年发货 硬件层面也在酝酿新的浪潮。OpenAI正在布局AI原生设备，内部已有超过200人参与研发，计划推出智能音箱、智能眼镜以及智能台灯。其中智能音箱预计定价200至300美元，最早2027年出货，搭载摄像头与环境感知功能，支持类似Face ID的人脸识别支付验证。智能眼镜预计2028年量产。 这一布局与OpenAI此前以65亿美元收购前苹果设计师Jony Ive创立的io Products高度呼应。Ive曾是苹果设计灵魂人物，其参与意味着OpenAI并非简单推出“AI外设”，而是意图打造以AI为核心交互入口的硬件生态。 如果将这一战略放入更大背景，会发现科技产业正在形成新一轮终端革命预期：从手机时代的触控交互，向AI时代的环境感知与持续对话转型。谁掌握硬件入口，谁就可能掌握下一代分发权。 综上，这一天的市场看似平静，实则多条长期逻辑正在悄然转向。司法对行政权力的制衡影响财政预期，财政预期
