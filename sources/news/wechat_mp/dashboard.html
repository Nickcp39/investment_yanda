缘政治摩擦升级。 特别是 AI 行业的“泡沫”争议正在升温。路透社甚至直言， 如果 AI 最终证明只是泡沫，整个经济都有可能随之破裂。 在这种背景下，Palantir 的独特优势就在于，它不像一些 AI 概念股只靠预期撑估值，而是有实打实的订单、与政府的长期合同，以及不断扩大的商业客户群。 Palantir 当然不是没有风险。它的市盈率依旧高企，一旦市场整体估值回调，高成长股必然首当其冲。此外，作为一家高度依赖政府合约的公司，它的命脉也部分系于政策与国防预算的走向。 但从长期逻辑看，Palantir 具备几个罕见的优势：第一，它在 AI 应用落地的护城河深厚，不容易被竞争对手复制；第二，它绑定美国政府和盟友，订单稳定性强；第三，它正逐步打入商业客户市场，形成“双腿走路”的增长模式。 结语 AI 竞赛是一场持久战，短期的明星可能昙花一现，但长期能真正赚到钱的，往往是那些能把技术变现的公司。从这个角度看，Palantir 的故事，或许才刚刚开始。 未来的赢家未必是估值最高的巨头，而是那些能在最复杂的现实中，把 AI 真正用起来的“隐形冠军”。如果说 2020 年是特斯拉的狂飙，2023 年是英伟达的高光，那么 2025 年之后，Palantir 会不会是下一个被资本市场追捧的名字？ 订阅美股VIP ←左右滑动查看更多产品介绍图→ 美股投资网是一家专门研究美股的金融科技公司，2008年成立于美国硅谷，由前纽约证券交易所分析师Ken创立，联合多位摩根斯坦利分析师，谷歌 Meta工程师利用AI和大数据，配合十多年美股实战经验和业内量化模型，建立了一个股市数据库 https://StockWe.com/ 每天处理千万级股票数据：捕捉期权大单，实时主力资金流向、机构持仓变化、川普突发新闻，精准K线信号第一时间发到您手机APP！ 联系方式 客服Telegram MaxMeigu 公众号 TradesMax 邮箱 buy@TradesMax.com 美股大数据 StockWe.com 美股投资网 TradesMax.com"}, {"title": "OpenAI失去最强大脑！清华天才为何选择Meta？", "date": "2025-10-11", "ym": "2025-10", "time": "2025-10-11 19:06:15", "author": "StockWe.com", "desc": "9月25日，一条突如其来的新闻在AI圈子里炸开了锅——Meta超级智能实验室宣布，OpenAI前战略探索团队", "url": "https://mp.weixin.qq.com/s/8gpgPt830VuQBp6qbyDlXw", "path": "sources/news/wechat_mp/articles/OpenAI失去最强大脑-清华天才为何选择Meta-176cd6da86.md", "len": 2307, "ticks": [], "body": "9月25日，一条突如其来的新闻在AI圈子里炸开了锅——Meta超级智能实验室宣布，OpenAI前战略探索团队负责人宋飏（Yang Song）正式加盟，担任研究首席。 而就在不久前，OpenAI CEO山姆·奥特曼还在公开场合调侃Meta挖人不过是“小打小闹”。转眼间，自己核心的技术大脑就投向了竞争对手。这场戏剧性的反转，不仅是科技圈的热门话题，也在美股市场投下了一枚不小的炸弹。 从连云港走出的清华天才 宋飏的故事足够传奇。1998年出生于江苏连云港，他从小就是数学和理科方面的尖子生。高一便完成大部分课程， 16岁便提前参加高考，并以当地理科状元被清华大学录取。 更特别的是，他并非通过竞赛保送或政策加分，而是凭借原始成绩和综合面试“裸分”进入清华数理基础科学班。那是一个专为顶尖理工天才打造的精英班级，汇聚了清华最看重的科研潜力股。 在清华，宋飏不仅完成了高年级课程，还开始接触当时还很前沿的机器学习与生成模型问题。2016年毕业后，他进入斯坦福大学，跟随生成模型领域的知名学者Stefano Ermon学习。 博士期间，他完成了让学界至今难以忽视的成就—— 提出了基于分数的随机微分方程生成建模方法。 这项研究被视为扩散模型的数学基石，就像为AI生成领域奠定了“牛顿定律”。 从学术前沿到OpenAI核心大脑 2022年博士毕业后，宋飏加入OpenAI，三年时间里成为公司最核心的研究员之一。他负责领导战略探索团队，一个人数虽少却产出巨大的小组。这个团队专注于前瞻性研究，涵盖模型跨模态能力拓展、未来AGI的安全边界探索等。 公开信息显示，他们贡献了OpenAI一半以上的核心专利。 宋飏在OpenAI最广为人知的贡献，是2023年提出并开源的一致性模型（Consistency Models）。 原本的扩散模型虽然能生成极为逼真的图像，但速度极慢。宋飏提出的新方法，能直接从噪声一步映射到数据，使生成速度提升几十倍。在OpenAI内部测试中，一致性模型在3.5秒内就能生成64张高清图像，同时保持高质量。该成果一经开源，迅速被全球开发者下载使用 ，堪称“终结扩散模型慢时代”的标志性突破。 在这之后，宋飏的战略探索团队不仅做前沿研究，也充当OpenAI的“哨兵”，在数据隐私、模型对齐和安全边界上建立防线。可以说，他既是科研突破者，也是守护公司底线的重要角色。 Meta的“抢人行动” 2025年，Meta其旗舰大模型Llama 4在AI排行榜上连前50都没进，扎克伯格重组原有团队，并亲自下场主导。他砸下千亿美元算力组建Meta超级智能实验室（MSL）。更是传出开出3亿美元的四年期薪酬方案，在全球范围搜罗顶尖AI研究员。并且首批招募的11位成员，几乎都来自OpenAI、Anthropic和谷歌DeepMind等顶尖机构。 7月，Meta CTO通过LinkedIn主动联系宋飏，抛出“无限GPU资源”的诱饵。宋飏起初婉拒，称自己对OpenAI的使命感仍有留恋。但8月，扎克伯格亲自出马，在一次私人聚会上“偶遇”并与他进行两小时的长谈，讨论生成模型的未来与AGI的安全议题。与此同时，宋飏在OpenAI的老同事已跳槽至Meta，出任首席科学家的赵晟佳也不断劝说。 最终，在Meta开出年薪+股权高达5000万美元的惊人条件双方达成共识。9月24日，宋飏的Slack账号停用，次日Meta官宣他将领导生成模型子组。 从谈判过程来看，这并不是一次普通的挖角，而是Meta押注未来的一场豪赌。扎克伯格的亲自出面、核心资源倾斜以及高额待遇，都说明Meta把宋飏视为“改变局势的关键人物”。 OpenAI失去了最宝贵的大脑？ 对于OpenAI而言，宋飏的离开无疑是重大损失。作为战略探索团队的负责人，他不仅带走了研究方向与专利经验，更带走了组织内的一部分“精神支柱”。一个公司的人才流失，往往比资金流失更致命。尤其在AI这样依赖顶尖头脑的领域，核心人物的离开会直接影响研发节奏，甚至可能导致内部项目延期。而一个接着一个的核心人物的流失，对OpenAI造成了巨大的损失。 据我们美股投资网了解，OpenAI的下一代模型o5可能因此而推迟发布。彭博社也预测，2026年Meta在生成式AI的市场份额有望超过30%，而OpenAI因核心人才流失，可能陷入防守。 结语 资本市场永远在追逐故事，而最好的故事往往和人有关。宋飏的跳槽，不仅是一个科学家的职业选择，更是一场商业巨头之间的博弈。对于投资者的我们来说，这背后真正有价值的信息是：AI赛道的竞争已经进入人才为王的阶段，Meta和OpenAI的此消彼长，将在未来几年里决定AI板块的估值走势。 所以，别只是当这件事是一条科技新闻看过去。它可能是未来AI赛道格局转变的起点，也是投资决策中不可忽视的信号。 加 30万粉丝群，一起交流美股心得！ ←左右滑动查看更多产品介绍图→ 美股投资网是一家专门研究美股的金融科技公司，2008年成立于美国硅谷，由前纽约证券交易所分析师Ken创立，联合多位摩根斯坦利分析师，谷歌 Meta工程师利用AI和大数据，配合十多年美股实战经验和业内量化模型，建立了一个股市数据库 https://StockWe.com/ 每天处理千万级股票数据：捕捉期权大单，实时主力资金流向、机构持仓变化、川普突发新闻，精准K线信号第一时间发到您手机APP！ 联系方式 客服Telegram MaxMeigu 公众号 TradesMax 邮箱 buy@TradesMax.com 美股大数据 StockWe.com 美股投资网 TradesMax.com"}, {"title": "美股为何突发“四月暴跌”式重挫？", "date": "2025-10-10", "ym": "2025-10", "time": "2025-10-10 20:33:40", "author": "StockWe.com", "desc": "两大“灰犀牛”撞击华尔街！", "url": "https://mp.weixin.qq.com/s/e7uiFUKelnn4YZypEPuZ8A", "path": "sources/news/wechat_mp/articles/美股为何突发-四月暴跌-式重挫-db091d989a.md", "len": 2985, "ticks": [], "body": "美东时间10月10日周五，美股市场经历了一场急剧而残酷的“变脸”。早盘三大指数尚在历史高位附近维持震荡，多头情绪和观望资金在高位对峙。 然而，临近午间，市场神经被中美贸易关系突发冲击和Z府停摆期的“永久性裁员”重磅消息连环引爆，恐慌情绪迅速蔓延，导致三大股指集体高台跳水，重演了半年前的“四月暴跌”行情。 截至收盘，纳指暴跌3.56%，标普500大跌2.7%，道指也下挫近2%。标普500直接“一口吐回”了过去十多天的所有涨幅，市场抛售潮席卷所有板块，恐慌情绪被彻底点燃。 贸易战升级叠加Z府“永久性裁员” 今天的急跌由两个核心利空消息在短时间内叠加触发，直接打破了市场原本谨慎的平衡状态。 首先，是中美贸易关系的骤然恶化。临近11点， 特朗普Z府宣布将大幅提高对中国商品的关税，紧接着中国方面亦宣布对停靠中国港口的美国船舶征收额外费用，贸易紧张局势迅速升级。 这一消息是市场情绪从谨慎转向恐慌的第一个引爆点。不过美股投资网分析认为，每次特朗普制造关税风暴，导致美股大跌，其实都是捞底的好时机！ 然而，真正将市场恐慌推向高潮的是白宫预算办公室（OMB）主任Russell Vought稍后在社交媒体上发布的一条重磅消息： 特朗普Z府已开始在Z府停摆期间实施大规模的永久性裁员（RIF，即“减少人力”）。 这一行动史无前例。过往的Z府关门，联邦雇员仅是“停薪休假”（furlough），而非永久解雇。此次永久性裁员影响至少九个联邦部门、数千名雇员，打破了惯例，标志着两党在是否延续奥巴马Z府医疗补贴等核心问题上的对峙已升级至政治博弈的深水区。 政治僵局叠加财政不确定性，使得华尔街对未来的信心出现动摇。市场担忧，在Z府停摆仍无解的情况下，史无前例的“永久性裁员”不仅会影响数千个家庭的消费能力，更重要的是，它释放了白宫将利用Z府关门对民主党选区项目进行永久性削减的信号。 这种政治上的高度不确定性和对抗性，极大地加剧了华尔街对未来经济政策和运行稳定性的担忧。 高位积压的焦虑集中爆发 尽管突发利空是急跌的导火索，但美股投资网分析认为， 此次急跌的深层原因在于市场结构和资金面的长期积累。 过去数周，美股，尤其是科技、AI及MEME股等高风险板块，在散户情绪高涨的推动下持续强势上行。这种背景下，市场对美股高估值与AI泡沫的担忧早已心怀忐忑，积累了大量焦虑情绪。 今天的“裁员”与“贸易摩擦”只是一个强力催化剂，使得原本积压的焦虑集中爆发，最终演变成全盘性的抛售。 从资金面来看，此次下跌呈现出高度的程序化特征。CTA量化策略的推波助澜是加剧市场下行深度的重要因素。 自进入9月初开始，CTA已经进入几乎满仓的多头头寸， 而高盛估计，CTA的买盘动能从7月的2766亿美元大幅下降至9月的296亿美元。这一资本的枯竭使得CTA在市场趋势反转时容易遭遇强制平仓，进而加剧了市场的下行压力。 一旦贸易战和Z府裁员等突发事件导致趋势信号反转，系统性卖盘就会被触发并涌出，在短时间内造成市场流动性骤降，导致美股出现“自由落体”式的下跌。 巨额资本开支能否兑现利润？ 在标普500指数今年迄今已创下34次历史新高、市值从熊市边缘反弹暴增16万亿美元的背景下，华尔街的警示声正越来越高。 最新的 Markets Pulse 调查揭示了一个核心矛盾： 尽管投资者普遍相信由AI推动的企业业绩优异趋势将持续，但关于企业在AI上的巨额投入是否物有所值的疑虑正在升温。 这种心态加剧了人们对这波科技主导的涨势正逼近临界点的担忧。 看好AI趋势，质疑投入产出 Markets Pulse于9月29日至10月8日进行的调查（共149名参与者）反映出市场对AI投资回报的复杂心态。 调查显示，超过三分之二的受访者认为，由AI驱动的企业业绩表现优异的趋势将会持续。这印证了市场对AI作为下一轮增长动力的广泛信心。 然而，几乎大致同样多的受访者表示，企业在AI上的花费与其回报并不相称。这种信念的裂痕，恰恰反映了市场在高歌猛进背后的深层焦虑——“AI军备竞赛”的成本可能远超短期收益。 这种矛盾在本周得到了新的维度印证：尽管AI巨头英伟达公司及其竞争对手AMD均公布了数十亿美元的交易，但这些交易被部分市场人士批评为“循环”交易，凸显出市场对实际业绩转换的敏感和审视。 BCA Research首席策略师Irene Tunkel指出：“几乎每天都有关于大型科技公司人工智能军备竞赛的新头条。在这股狂热降温之前，总账单很容易就会达到数万亿美元。值不值？这取决于谁在花钱。” 财报季焦点：AI资本开支的审视时刻 关于美股市场是否处于泡沫之中的疑问，最快可能在下周得到回答，届时摩根大通公司及其他美国大型银行将拉开第三季度财报季。 卖方研究人士目前预计，标普500指数成份股三季度利润同比增长7.2%，这将是八个季度以来最慢的增速。同时，预计今年全年每股收益将增长近11%。不过，超过一半的受访者认为这一预期过于乐观，他们正准备迎接关税在2025年最后两个季度对企业业绩产生显著影响。 在即将到来的财报季中，有一项科目势必会受到格外审视：资本开支，尤其是与人工智能相关的部分。调查结果的疑虑焦点，正指向了这一巨额支出能否被货币化。 数据显示，美国超大市值公司的AI支出预计将在2026年至2029年间达到1.1万亿美元，而全部的人工智能相关支出将超过1.6万亿美元。这一支出水平远高于过去12个月“科技股七巨头”（不含特斯拉）合计3090亿美元的资本开支，其中大部分已基本投向AI建设。 Wells Fargo Investment Institute高级全球市场策略师Scott Wren表示：“在未来几年里，需要将其人工智能投资货币化的不止是少数几家超大市值公司。对许多公司而言，目前人工智能还是成本而不是收入来源。或许现在还不是重大阻力，但未来会成为问题。” 从Markets Pulse的调查结果，到Paul Tudor Jones等亿万富豪发出的警告（他警示称，泡沫破裂可能“甚至比1999年更具爆炸性”），华尔街的基调已不再是单纯的乐观。市场正处在一个关键的临界点：一方面是AI技术变革带来的无限想象空间，另一方面是巨额资本开支对企业利润和估值的现实压力。 即将到来的财报季，将成为检验AI投资是否真正“物有所值”的关键窗口。如果企业不能清晰展现AI投资向收入和利润转化的路径，那么当前由AI驱动的市场狂热，恐将面临一次严峻的估值调整。 加 30万粉丝群，一起交流美股心得！ ←左右滑动查看更多产品介绍图→ 美股投资网是一家专门研究美股的金融科技公司，2008年成立于美国硅谷，由前纽约证券交易所分析师Ken创立，联合多位摩根斯坦利分析师，谷歌 Meta工程师利用AI和大数据，配合十多年美股实战经验和业内量化模型，建立了一个股市数据库 https://StockWe.com/ 每天处理千万级股票数据：捕捉期权大单，实时主力资金流向、机构持仓变化、川普突发新闻，精准K线信号第一时间发到您手机APP！ 联系方式 客服Telegram MaxMeigu 公众号 TradesMax 邮箱 buy@TradesMax.com 美股大数据 StockWe.com 美股投资网 TradesMax.com"}, {"title": "微软Azure最大危机曝光！美股AI太火把自家云“榨干”了？", "date": "2025-10-09", "ym": "2025-10", "time": "2025-10-09 20:33:49", "author": "StockWe.com", "desc": "AI狂潮下，微软Azure被迫限制AI.....", "url": "https://mp.weixin.qq.com/s/gUg8zBkPdmsfQ0ZQeFHH-A", "path": "sources/news/wechat_mp/articles/微软Azure最大危机曝光-美股AI太火把自家云-榨干-了-04e7f968af.md", "len": 2395, "ticks": [], "body": "美股市场在缺乏关键经济数据的情况下，波动性有所增强。 投资者对前期涨幅巨大的科技股和周期性资产可能存在的泡沫风险表现出担忧，导致日内获利了结的压力显著增强。 尽管尾盘时段，市场对微软数据中心需求的乐观预测带来了支撑，促使大盘跌幅收窄，但标普500、纳指和道指最终仍以下跌收盘。 从资金流向来看，投资者正在进行明显的板块轮动：资金抛售了对经济周期敏感的板块，并转向了医疗保健、必需消费品等防御性板块，这体现了市场对宏观不确定性的对冲需求。 英伟达延续昨日涨势，今日该股创盘中与收盘历史新高，市值逼近4.7万亿美元。 据美股投资网了解到，美国商务部工业和安全局已根据今年5月达成的双边人工智能协议条款，向英伟达公司颁发出口许可证，批准其向阿拉伯联合酋长国出口价值数十亿美元的芯片。 甲骨文收高3.06%，其上涨受到华尔街分析师的积极推动。 券商TD Cowen在最新的研报中，将甲骨文列为“首选股”（Top Pick） ，明确看好其AI业务将产生巨大的收益增长。，贝尔德公司也于当日首次覆盖甲骨文，并直接给予了“跑赢大盘”的评级。 英伟达创历史新高，恭喜长期持股的 VIP会员们，一直持有2050年 微软预测：算力短缺危机将持续到2026年！ 10月9日，据美股投资网了解到， 微软公司内部的最新预测显示，包括北弗吉尼亚州和得克萨斯州等关键服务器集群在内，其多个美国数据中心区域正经历物理空间或服务器的严重短缺。 这一现状直接导致Azure云服务的新订阅服务受到了限制。 值得注意的是，这一供应紧张的持续时间似乎比微软此前向市场传递的信号更长。微软首席财务官Amy Hood曾在今年7月份的财报电话会议上表示， 当前的供应限制预计将持续至2025年底。现在，市场正在消化更持久的供需失衡风险。 当前的供应紧缺并非仅限于支持尖端AI工作的图形处理单元（GPU）工作负载，而是全面波及了以中央处理器（CPU）为主的传统云服务数据中心。 作为微软最重要的增长引擎，Azure在2025财年创收超过750亿美元，其扩张速度一直超越主要竞争对手亚马逊和谷歌，因此这一“增长的烦恼”尤为引人关注。 AI与传统业务：双重需求“榨干”产能 分析来看，当前的产能危机源于两大核心需求的共同挤压。 首先，人工智能的强劲计算需求无疑是数据中心新增需求的主要驱动力。微软首席技术官Kevin Scott在10月初曾直言：“自ChatGPT和GPT-4发布以来，几乎不可能以足够快的速度建设产能。即使是我们最雄心勃勃的预测也经常被证明是不够的。” 市场对大模型训练和推理的需求，消耗了海量的GPU资源。 然而，AI工作负载并非唯一的“需求黑洞”。微软在支撑互联网应用和网站的传统云基础设施方面同样面临巨大的需求紧缩。有报道指出，在基于CPU的工作负载方面，OpenAI同样是微软最大的客户，这表明AI生态对通用计算资源的需求同样庞大。 此外，微软自身的庞大业务，如Office套件，也在不断消耗着大量的计算资源。为节约产能，有消息称，一些微软员工已被告知在受影响的区域关闭内部项目，这侧面反映了产能紧缺的严峻性。 客户与微软的应对策略 面对Azure的容量限制，客户正在采取务实的应对策略。 一些遇到容量问题的客户选择将业务转向其他云服务商，这无疑给亚马逊AWS和Google Cloud带来了潜在的机会。 另一些客户则选择利用多个Azure区域，或仅将关键工作负载发送到云端，等待更多产能释放。 微软方面正在积极补救，试图通过多种方式平衡供需。公司发言人表示，美国大多数Azure服务和区域“仍有可用容量，现有客户可以继续增长”，并在出现意外需求高峰时，采取“容量保存方法”来调配资源。 内部指引显示，当首选设施空间不足时，微软销售人员会引导客户转向其他有容量的区域。 不过，媒体指出，这种变通方案可能会增加系统的复杂性和数据传输延迟。对此，微软表示将定期与大客户合作规划需求激增期间的需求，并承诺在客户面临成本或延迟增加的异常情况下，补偿他们的额外费用。 值得一提的是，美国以外的地区，特别是微软的许多欧洲区域，可用性明显更好，可以不受限制地处理新客户订阅。 历史性建设热潮与供应链瓶颈 为应对爆发式增长的需求，微软已启动了一场历史性的数据中心建设热潮，在过去一年里增加了超过两吉瓦的容量，相当于胡佛水坝的发电量。然而，巨大的投入仍难解“近渴”。一个数据中心从初步规划到服务器正式上线，其建设周期可能长达数年。 更关键的制约因素在于供应链瓶颈。熟悉流程的人士透露，从半导体芯片本身到变压器等电力基础设施，数据中心的许多关键部件都面临漫长的交付周期。这种持续的供应短缺不断打乱微软的建设计划。 首席财务官Amy Hood在7月的表态，印证了公司在预测供应改善方面遇到的困难：“我曾在1月说过，我以为到6月我们的供需状况会更好。而现在（7月）我想说，我希望到12月情况能好转。” 这种一再延后的预期，凸显了在当前全球供应链环境下，科技巨头实现大规模、快速扩张的难度。 长按 订阅美股VIP更多内容 ←左右滑动查看更多产品介绍图→ 美股投资网是一家专门研究美股的金融科技公司，2008年成立于美国硅谷，由前纽约证券交易所分析师Ken创立，联合多位摩根斯坦利分析师，谷歌 Meta工程师利用AI和大数据，配合十多年美股实战经验和业内量化模型，建立了一个股市数据库 https://StockWe.com/ 每天处理千万级股票数据：捕捉期权大单，实时主力资金流向、机构持仓变化、川普突发新闻，精准K线信号第一时间发到您手机APP！ 联系方式 客服Telegram MaxMeigu 公众号 TradesMax 邮箱 buy@TradesMax.com 美股大数据 StockWe.com 美股投资网 TradesMax.com"}, {"title": "《炒美股的人开始恐惧：不是怕跌，而是怕“踏空”》", "date": "2025-10-09", "ym": "2025-10", "time": "2025-10-09 15:06:47", "author": "美股分析师 TradesMax", "desc": "细思极恐的现象！", "url": "https://mp.weixin.qq.com/s/-IE5TXZ_NHz_B9aL476niQ", "path": "sources/news/wechat_mp/articles/炒美股的人开始恐惧-不是怕跌-而是怕-踏空-62cdefdeb9.md", "len": 1876, "ticks": [], "body": "当下这个市场，有一个细思极恐的现象： 投资者不再害怕下跌，他们害怕的是——错过。 无论是做多美股的大资金，还是跟风参与的散户，情绪都在被一种“FOMO”（害怕踏空）快速裹挟。近期，期权成交数据几乎疯狂—— 看涨期权的成交量远超看跌期权，溢价飙到四年来的极值 ，这不是正常的乐观，这是典型的“狂欢式押注”。 数据来源 StockWe.com 📈 情绪高烧：市场进入“只问涨幅，不问估值”的阶段 标普500不断创新高，但隐含波动率却被压低到接近历史底部。 与此同时， 个股波动预期却在飙升 ，尤其是人工智能、半导体、金属这些热门赛道。 这说明资金的态度非常明确：“大盘稳稳走，热门股疯狂飞。” 交易桌上传出的声音非常一致： 不是没人担心风险，而是没人愿意下车。 💥 期权推动的“正向循环”正在形成 以英伟达、博通等为代表的AI链条股票，已经不只是上涨那么简单，而是出现了“资金-期权-现货”循环放大的机制： 投资者抢着买看涨期权； 做市商为了对冲，被迫买入更多现货； 现货价格上行，期权价值激增，吸引更多资金接力； 形成自我强化的上涨链条。 这不是自然上涨，而是“交易结构驱动的上涨”。 技术派说，这叫“Gamma squeeze”；资金派说，这叫“情绪爆表的拉盘”。 美股大数据StockWe.com 获悉 这一次，散户的情绪异常高涨 巴克莱的“股票狂欢指标”显示，散户的看涨情绪已经 连续一个月维持在极高区间，远超历史均值近三个标准差 。 一个很典型的变化是： 以前大家讨论的是怎么防跌，现在讨论的是—— “如果市场继续涨，怎么对冲自己没买够的痛苦？” 这也是当前市场最危险，但也是最容易赚钱的阶段： 理性分析不再重要，情绪和速度更重要。 📉 狂欢背后的隐忧：每一次情绪过热，都会伴随回报衰减 历史数据反复验证： 当太多股票出现“期权狂热 + 高杠杆追涨”信号后， 市场的后续平均回报会显著下降 。 但问题在于—— 泡沫不是一夜终结的，最疯狂的钱，往往赚在泡沫的最后浪尖。 90年代末的互联网泡沫阶段，最赚钱的不是早期买入的人，而是“明知是泡沫，却依然敢押注”的那批资金。 这一轮“AI狂潮”与2000年的“互联网狂潮”最大的区别是：这一次美国科技股有业绩。 如图所示： #标普500 科技板块的业绩（灰线代表动态EPS）与股价（红线）的上升同步，这与1999年-2001年不同。 法兴银行认为，终结科技股牛市的条件是以下三个： -美联储启动加息，且加息三次以上； -信用债息差开始扩大； -美国ISM制造业指数达到60（意味着更广泛的经济回暖） 🎭 投资者的真实处境：不上车怕踏空，上车怕遇顶 这就是当下市场最真实的投资心理： 情绪 表现 踏空焦虑 看到AI、芯片、机器人还在涨，忍不住想补仓 估值担忧 每天说“这估值太夸张了”，但还是下单 战术性上车 不敢重仓买股，但敢买期权搏一个波段 结构性投机 不是看好长期逻辑，只是做短期趋势套利 美股投资网认为，资金已经从“价值定价”转向“交易游戏”。 ✅ 给策略型投资者的建议思路（可选附图/PPT延伸，我可以继续做） 仓位分层 ：核心持仓 + 情绪交易仓 + 对冲仓，分开管理。 看多但设防 ：不是简单做多，而是“左手看涨，右手盯着风险开关”。 警惕低波动陷阱 ：当大盘波动率低于个股波动率，这是典型的 末端阶段特征 。 短期趋势可以利用，长期风险要记住 ： 赚钱可以冲，爆仓不能冲。 🎯 结语：这不是投资的舒适区，而是交易者的天堂 当市场从“担心亏钱”切换到“担心少赚钱”时，整个游戏规则就彻底变了。 未来的行情可能依旧火爆，但波动会越来越剧烈，节奏会越来越快—— 这是一场速度与耐力的博弈。 “牛市从来不是理性的，它是一场情绪主导的资本盛宴。” 长按 订阅美股VIP更多内容 ←左右滑动查看更多产品介绍图→ 美股投资网是一家专门研究美股的金融科技公司，2008年成立于美国硅谷，由前纽约证券交易所分析师Ken创立，联合多位摩根斯坦利分析师，谷歌 Meta工程师利用AI和大数据，配合十多年美股实战经验和业内量化模型，建立了一个股市数据库 https://StockWe.com/ 每天处理千万级股票数据：捕捉期权大单，实时主力资金流向、机构持仓变化、川普突发新闻，精准K线信号第一时间发到您手机APP！ 联系方式 客服Telegram MaxMeigu 公众号 TradesMax 邮箱 buy@TradesMax.com 美股大数据 StockWe.com 美股投资网 TradesMax.com"}, {"title": "美股 不为人知的，准备爆涨的量子计算股", "date": "2025-10-04", "ym": "2025-10", "time": "2025-10-04 20:24:17", "author": "StockWe.com", "desc": "下一只量子计算潜力公司！", "url": "https 09%。纳指未能延续涨势，收跌0.28%，报22780.506点，结束了其强势上涨势头，不过本周仍累计上涨1.32%。 美股已进入“狂热”泡沫区 当前的美股市场正处于一种矛盾的“狂热”状态：尽管估值过高、Z府停摆等风险警钟持续响起，但投资者情绪却充耳不闻，依旧盲目追逐上涨行情。巴克莱和彭博行业研究（BI）的情绪指标均已触及或逼近历史高位的“狂热”区域。这种极度乐观情绪，历史上往往预示着后续市场回报将趋于平平。 然而，在 AI热潮 的强大驱动下，投资者担心错过涨势（FOMO），使得很少有人愿意逆势押注市场见顶。 情绪指标的量化支撑与预警 彭博行业研究的市场脉搏指数，作为衡量市场广度、个股相关性等因素的指标，已连续保持在 “狂热” 区间。历史数据显示，处于此区间时，罗素3000指数在随后三个月内平均仍能上涨约9%，但分析师仍将其视为一个“非常早期的预警信号”。 这表明，市场确实可以持续处于狂热状态，因为形成顶部需要时间。同时，期权市场也体现了这种极度乐观，高盛数据显示，看涨期权合约的日均成交量已创下历史最高纪录。 核心驱动力与潜在风险 推动美股这波强劲涨势的核心驱动力有二： 一是源源不断投入 AI 领域的资金，营造出强烈的错失恐惧情绪； 二是市场对 美联储将持续降息的乐观预期，这被视为推动股市上涨的催化剂。 正是这些因素，盖过了对估值泡沫化、劳动力市场疲软和Z府停摆等风险的担忧。简而言之，市场正被动物精神（非理性繁荣）主导，短期内这种乐观情绪的惯性仍在继续，但其内在的脆弱性已不容忽视。 木头姐”本周持续加仓阿里、百度！ 根据ARK Invest每日交易记录显示，以“木头姐”Cathie Wood为首的基金正在持续加大对中国科技巨头的投资力度。 在近期的中概股强劲反弹背景下，ARK Innovation ETF（ARKK）这只旗舰基金进行了连续且大规模的增持操作，凸显了其对特定中国互联网巨头价值重估的看好。 数据显示，ARK Invest对两家主要中概股的增持频率和规模在近期达到高点： 阿里巴巴（BABA）：ARKK基金周四买入了14,453股，按当日收盘价（189.34美元）计算，价值约274万美元。值得注意的是，ARKK在周初已进行连续买入：周三和周二分别买入价值550万美元和410万美元的阿里巴巴。此外，上周一，ARK旗下的两只ETF总共买入了约1,630万美元的阿里巴巴股.票。 百度（BIDU）：ARKK周四购买了45,478股百度股.票，按收盘价（140.23美元）计算，价值约640万美元。此前，该基金在周三和周二也进行了买入，价值分别为297万美元和690万美元。 此举发生在中概股经历强劲反弹的背景之下——阿里巴巴今年股价已上涨超过一倍，而百度近期的涨势也同样迅猛。ARK Invest选择在股价强劲上行阶段持续加仓，表明其相信这两家公司的上行空间尚未完全释放，正在积极建立其在该板块的战略头寸，以捕捉估值修复带来的回报。 订阅美股VIP ←左右滑动查看更多产品介绍图→ 美股投资网是一家专门研究美股的金融科技公司，2008年成立于美国硅谷，由前纽约证券交易所分析师Ken创立，联合多位摩根斯坦利分析师，谷歌 Meta工程师利用AI和大数据，配合十多年美股实战经验和业内量化模型，建立了一个股市数据库 https://StockWe.com/ 每天处理千万级股票数据：捕捉期权大单，实时主力资金流向、机构持仓变化、川普突发新闻，精准K线信号第一时间发到您手机APP！ 联系方式 客服Telegram MaxMeigu 公众号 TradesMax 邮箱 buy@TradesMax.com 美股大数据 StockWe.com 美股投资网 TradesMax.com"}, {"title": "美股 别只盯着英伟达了！AI存储硬盘才是最大赢家，四大牛公司名单曝光！WDC ...", "date": "2025-10-03", "ym": "2025-10", "time": "2025-10-03 17:11:19", "author": "前纽约证券Ken", "desc": "深度研报！", "url": "https://mp.weixin.qq.com/s/e5R_oJTqdsUJBp_UDdBMWg", "path": "sources/news/wechat_mp/articles/美股-别只盯着英伟达了-AI存储硬盘才是最大赢家-四大牛公司名单曝光-WDC-3cb10a24cd.md", "len": 6176, "ticks": ["WDC"], "body": "黄仁勋公开表态：OpenAI 将是下一个市值数万亿美元的超级公司！ 其核心逻辑是：OpenAI 不只是做一个产品，而是构建一个完整的“生态系统”； B2C（消费者端）：ChatGPT、Sora类产品，已经形成稳定的付费订阅模式。 B2B（企业端）：提供 API，支持无数公司接入 GPT 模型，这类似“AI 云基础设施”，商业模式清晰，有望复制苹果、微软、谷歌的生态级扩张。 本周推出的Sora2更加认证了这一点，每个人通过AI生成带音效的有趣视频，然后发布到Sora应用，和好友互动，吸引粉丝关注，直接挑战 短视频老大Tiktok和谷歌的地位。 而关键的关键，是AI 应用背后真正的瓶颈是数据的存储！也是我们今天要讨论的投资机会的核心。 每一条 Sora2 视频、每一次 AI 交互，都会形成海量数据。这些数据不仅需要算力来处理，更需要无数的硬盘和存储系统去承载。 现实正在发生。三星和海力士本周三的声明，OpenAI CEO Sam Altman 已在首尔签署意向书，将两家存储巨头纳入 “星际之门”超级数据中心计划。 随着项目扩张，OpenAI 的存储需求可能达到 每月 90 万片晶圆——是当前全球 HBM 总产能的两倍多！ 为什么会是这么恐怖的需求量？我们一看便知。 基础媒体的数据量 文字（文本）： 数据量 极小 ，几乎不产生存储压力。 图片： 开始有体量，大约 1MB/张 。 音频/歌曲： 数据量增大，约为 5MB/首 。 基础视频： 数据量 暴增 ，每分钟需要 50MB 数据的真正挑战出现在内容的 多样性和裂变 上： 多语言翻译： 如果一个视频需要翻译成 10 种语言 ，数据量直接乘以 10，达到 500MB/分钟 ( 50 MB × 10 )。 变种创作（个性化）： 每个用户对视频进行的 变种创作 （如卡通化、换脸、古风化），都相当于生成一个 全新的、独立的高清视频 。由于用户的创意是无穷无尽的，这种裂变带来的数据体量几乎就是 无穷无尽 的。 以 Instagram 30 亿用户 为例，即使只有很小一部分用户参与裂变创作，所产生的数据总量也将是天文数字。 因此，一旦 Sora 2 普及， OpenAI 毫无疑问将成为全球最大的存储买家之一。 它不仅要买进海量的内存（DRAM/HBM）和闪存（NAND），还要疯狂采购 HDD 和 SSD， 甚至直接与存储寡头签下十年级的战略合作 。 此外微软、谷歌、亚马逊、Meta 这些云计算巨头它们已经提前出手，不计成本地以天价长约，锁定了未来几年存储芯片的核心产能！ 换句话说，未来几年，整个 AI 生态都会成为全球最大的存储需求引擎。真正要爆发的，不是一家公司的订单，而是整个 存储产业链的系统性繁荣。 这就引出了三个决定性的问题： 谁能在 内存市场（DRAM/HBM，高速内存） 里真正跑出来，赚到最多的钱？ 当 闪存芯片（NAND） 涨价、供不应求时，谁能像“卖水人”一样，躺着收钱？ 在 硬盘和固态硬盘（HDD/SSD） 领域，谁会在这场 AI 数据爆发里，那几家美股公司将会成为最大赢家？ 文章你一定要看到最后，保证让你收获满满！ 大家好，这里是 美股投资网 ，我们团队 2008年成立于美国硅谷 ，投入超百万美元招聘哈佛、清华、北大的数据科学研究员，以及谷歌Meta工程师，专注于打造可媲美高盛、摩根士丹利等华尔街投行级别的美 股AI量化分析软件工具StockWe.com ，并 免费开放给全球美股投资者使用 ，只需登录官网即可！热线电话 626 378 3637 存储芯片：「饥饿游戏」开启 如果算力是 AI 城市的“电力引擎”，那么存储就是确保电力永不中断的“电网与能源命脉”。如今，全球存储芯片市场正在进入一场前所未有的“饥饿游戏”——供给紧张，而需求却在无休止地膨胀和抢夺。 在深入理解这场抢夺战之前，我们需要先理清 AI 的存储体系。CPU 和 GPU 是“大脑”，而三类存储芯片则构成了它的“记忆结构”： 1、DRAM 像办公桌，速度最快，用来处理眼前的数据，但一旦断电就会清空； 2、NAND 像文件柜，速度稍慢，却能长期保存，是 SSD 等核心存储的基础； 3、HDD 则是档案库，容量最大、成本最低，专门存放冷数据和备份。 一句话概括，AI 的大脑依靠 DRAM 高速处理数据，结果和资料再被分流回 NAND 或 HDD，以保证既能即时运算，又能长期存储。 过去，像 DRAM、NAND 这样的专业芯片，只在半导体行业扮演着默默无闻的“配件”角色。但随着 Sora 2等生成式 AI 应用的蓄势待发，存储芯片正从幕后走向台前，成为了整个科技产业无法回避的战略物资。 训练大型AI模型时，数据量动辄 PB 级（百万 GB），强依赖 HBM（高性能 DRAM）与 DRAM 的高速缓存，这就像 AI 需要一个无比巨大的超级临时工作台。 而在我们每一次使用 ChatGPT、每一次生成 AI 视频时，背后都需要在极短时间内调用庞大的内存资源。简而言之，AI 不是在“消耗存储”，而是在“吞噬存储”，其对存储的依赖程度远远超过以往任何一种应用场景。 问题是，这场“饥饿游戏”的紧张感，来自供需严重失衡。 在需求端，大客户正在疯狂提前锁货。 据美股投资网了解到，全球三大内存巨头，三星、SK 海力士、美光的库存几乎被 AWS、微软、谷歌、Meta 这些云厂商包揽一空。为了保证 2026 年 AI 项目的顺利交付，这些公司在 2025 年就大幅增加订单，直接透支了未来的供应。 在供给端，厂商为了追求更高的利润率，将有限的产能优先分配给利润丰厚的 HBM 和企业级 NAND 产品，导致面向普通市场的标准产品供给进一步收紧。 研究机构预测，从 2025 年四季度开始，DRAM 与 NAND 的价格将持续上调，而到 2026 年，缺货程度可能比此前预期更为严重。当供给有限，而需求刚性且不断上涨时，价格和利润率在未来几年被系统性抬升，是必然的结局。 与此同时，传统存储环节的变动也同步加剧了市场紧张。H DD（传统硬盘）厂商如西部数据（WDC）和希捷科技（STX），在利润压力下不得不选择削减部分产能。 虽然冷数据的存储需求并没有消失，但这使得高容量 HDD 的交付周期被迫拉长。 面对这种不确定性，一部分对稳定性和速度要求更高的云厂商，不得不将订单转向 SSD（固态硬盘）或企业级 eSSD。 由于 SSD 主要由 NAND Flash 构成，这种连锁反应进一步推高了 NAND 的需求与紧张度。当高速存储（NAND）和低速存储（HDD）的供需错配同时出现，整个存储产业链都陷入了前所未有的“供不应求”局面。 摩根大通大幅上调了全球存储市场的规模预测，将未来两年全球存储市场的规模将比原先高出 6% 至 24%，到 2027 年，更是有望逼近 3000 亿美元！ 要知道，这并不是普通的半导体周期反弹，而是一场由 AI 爆发式需求 + 高额资本壁垒 推动的超级繁荣。扩产需要至少一到两年，而 AI 的数据洪流却在当下加速喷涌。 这意味着什么？意味着供给迟缓、需求汹涌的“饥饿游戏”，已经无法避免。未来三到四年，存储将不再是配角，而会成为重塑整个半导体版图的核心力量。赢家，必将诞生在这场供需对决的刀尖之上。 核心存储芯片制造商 在全球存储格局中，真正的核心玩家是掌握 DRAM/HBM、NAND 与 HDD 三大赛道的寡头厂商。他们既是价格的制定者，也是技术路线的掌舵者。 DRAM与 HBM赛道 行业重心正在从传统的通用内存向高附加值的高带宽内存转移。 HBM 已经成为AI芯片的关键配套资源，直接决定了 AI 算力的效率。 在这一过程中， 美光（MU）正处在一个由“追赶者”转向“份额兑现者”的阶段。 公司不仅确认 2025 年 HBM 产能已全部售罄，并预计 2026 年的产能将在数月内被锁定。这种极高的订单可见度，让美光在与客户谈判中拥有了更强的定价权。 同时，数据中心业务已成为利润的核心来源，占比提升至 56%，，毛利率高达 51.5%。 虽然 SK 海力士依旧保持领先， 但MU正在英伟达供应链中不断提升存在感，并且已经着手推进下一代 HBM4 的商务谈判。 这意味着，在高端内存领域，美光不仅能受益于需求爆发，还能逐渐提升行业中的话语权。 NAND Flash赛道 根据最新预测， 2025 年 Q4 NAND 合同价将继续上涨 5%–10%，部分品类甚至出现 15%–20% 的短期跳升， 这证明了 AI 数据需求驱动下的刚性扩张正在传导至价格端。 全球三大 NAND 供应商目前产能利用率均已接近满载， 而订单提前锁定至 2026 年，使现货市场更为紧俏。 MU在 NAND 赛道具备双主业的结构性优势。公司 3D NAND 正迈向 >300 层，并在 2025 年进入量产。 层数越高，意味着单芯片容量越大、存储成本越低，这是决定 NAND 龙头竞争力的关键指标。 随着大模型推理和 AI 视频生成对高速大容量 SSD 的需求暴涨，MU在“算力+存力”的双周期中同步受益，具备穿越单一品类波动的对冲与弹性。 此外SanDisk（SNDK）已经从WDC分拆独立上市，成为市场上少见的纯 NAND 标的。这意味着投资者终于能够直接押注 NAND 周期本身，而不是通过混合业务的WDC间接参与。 SNDK 的纯粹性让其在 NAND 上行周期中具备更强的业绩弹性，但同时也更容易受到价格波动和资本开支的影响，风险与机会并存。 在 NAND 产业链中，慧荣科技（SIMO）是典型的“卖水人”。 作为全球最大的独立 SSD 控制器供应商，它不直接参与 NAND 制造，却是 SSD 系统不可或缺的“大脑”。 控制器的作用在于调度读写、进行错误纠正和寿命管理， 因此无论 NAND 的价格如何波动，SIMO都能跨周期稳定变现。 它的 PCIe Gen5 控制器已经量产，在客户端和数据中心 SSD 中均有重要地位，这种“卖水人”模式为产业链提供了一种相对稳定的投资选项。 HDD（传统硬盘）赛道 目前全球 HDD 基本上由WDC和STX两家公司掌控。 由于市场过于集中，这两家公司拥有强大的定价权。特别是在近年来 HDD 厂商因利润压力选择主动减产的背景下，市场供给收紧，进一步增强了它们提价的能力。 对于亚马逊、谷歌云和 Meta 这样的超大规模数据中心运营商而言，HDD 依旧是平衡成本与容量的选择。 在这两大巨头中，WDC的优势在于它既保留了 HDD 业务的现金流基础，同时又通过旗下 NAND 业务分享闪存周期的红利。虽然 SNDK 的分拆让它的 NAND 敞口被削弱，但作为一体化的存储巨头，WDC 依然具备跨品类的平衡能力。 相比之下，STX则更专注于高容量 HDD 技术的迭代，聚焦在冷存储市场，以稳健的现金流为其价值核心。 企业级存储系统 Pure Storage（PSTG） 提供了与芯片制造和组件业务不同的投资视角，它代表了企业级存储市场从传统硬件转向服务和软件的趋势。 与传统芯片厂商不同，PSTG 并不生产 NAND，而是提供全闪存存储阵列与软件定义存储解决方案。它的增长逻辑在于 HDD 向 SSD 的替代趋势，以及 AI 数据中心对高性能存储的刚性需求。 FlashArray 和 FlashBlade 已在企业级客户和云服务商中获得越来越多的订单，这让 PSTG 能够获得高毛利的合同和持续的成长动力。不过，由于高度依赖上游 NAND 的供应，其毛利结构依旧会受到一定影响，这也意味着它更像是“结构性成长股”，而不是价格的制定者。 今天的文章到这里就结束了，你最看好哪家？欢迎评论区留言，打开官网StockWe.com订阅我们VIP会员获得更多有深度、有价值的内容和分析，临走前记得点赞、打开小铃铛通知，你的每一次互动，都是我们美股投资网持续输出优质美股内容的最大动力。 长按 订阅美股VIP更多内容 ←左右滑动查看更多产品介绍图→ 精彩深度文章回顾 最全美股K线视频， 解读每一个形态背后的含义! 美股 英伟达变身AI“央行”！1000亿背后谁将是下一波大赢家？NVDA AI股集体暴涨！英伟达战略！几只潜力股NBIS ..... 美股 英伟达8月财报前瞻预测，万字深度报告 NVDA 美股 揭秘价值千万的选股逻辑！ 看懂秒变高手，轻松抓住10倍、100倍机会！ 美股 2025年最强科技股上市，设计软件独角兽Figma深度分析！会是下一个CRCL吗？ 美股 英伟达 10万亿市值潜力！背后逻辑分析！ 美股 CRCL是否值得捞底？ HOOD要颠覆美股投资的方式！ 两只美股，准备入手，潜力巨大！ 美股6月必捞四只股，全新上市！CRCL...... 美股 英伟达后市分析，解读背后关键数据，被大家忽略的长期风险！ 英伟达5月财报预测，深度分析报告 NVDA 美股 解密一条公式，让你投资稳定盈利！ 自动驾驶将在今年大爆发！ 这四家美股公司必须关注！ TSLA LYFT 美股META财报预测，捞底两家公司！ 支撑美股大跌后反弹的底层逻辑！ 捞底前必看！ 每次经济衰退前，这8个信号都提前预警了美股大跌！ 美股4月2日将变盘！交易策略公开，长期看涨的动力因素有哪些？ 特斯拉反弹是否能持续？ 从暴跌背后看做空机构资本运作规律！ 【深度报告】英伟达2025年2月财报预测！业内人士爆料 美股 下一个PLTR HIMS APP如何找？ 他们都有什么共同点？ 美股 特斯拉1月财报预测，风险预警！ 2025年最有潜力10只美股【下集】 不为人知的AI公司！【深度调研】 2025年最有潜力10只美股【中集】 不为人知的AI公司！【深度调研】 2025年最有潜力10只美股【上集】 不为人知的AI公司！【深度调研】 下一个英伟达是AVGO？ 博通凭ASIC能打破英伟达AI芯片垄断地位！ 美股2025年五大主题和估值风险！ 美股核能股爆涨，哪家最值得投资？OKLO LEU NNE 美股英伟达5月财报预测，深度报告，坚定看涨 美股投资网是一家专门研究美股的金融科技公司，2008年成立于美国硅谷，由前纽约证券交易所分析师Ken创立，联合多位摩根斯坦利分析师，谷歌 Meta工程师利用AI和大数据，配合十多年美股实战经验和业内量化模型，建立了一个股市数据库 https://StockWe.com/ 每天处理千万级股票数据：捕捉期权大单，实时主力资金流向、机构持仓变化、川普突发新闻，精准买卖信号第一时间发到您手机APP！ 美股大数据多个核心功能终身免费使用，为什么免费？ 美股投资网的使命就是帮助全球投资者在美股市场做出更明智的决策、把握更多赚钱机会、实现真正以大数据驱动赋能投资，最终让普通人也能像专业机构一样高效投资、稳健获利。 联系 m": "2025-10", "time": "2025-10-01 15:12:31", "author": "StockWe.com", "desc": "深度分析！", "url": "https://mp.weixin.qq.com/s/gC7Yk7m-RVxA0RaVptnmyw", "path": "sources/news/wechat_mp/articles/美股AFRM-UPST-PGY-SOFI-近日为什么大跌-71d80b2826.md", "len": 2632, "ticks": ["AFRM", "UPST", "PGY", "SOFI"], "body": "近期 美股金融科技 Fintech 板块的 AFRM UPST PGY SOFI 大幅下跌并非单一因素造成，而是宏观重新定价、行业性信用信号与市场情绪三股力量在短期内叠加发酵的结果。 起因看似是 BTIG 一份关于 Upstart ABS （资产支持证券） 8 月逾期率的研报，但导火索背后的路径更深： 9 月中旬的 FOMC （及鲍威尔的新闻发布会）改变了市场对降息节奏的预期 ；当宏观资金面开始重新定价时，一份“看起来很糟”的行业性数据立刻被放大，诱发跨股、跨策略的连锁抛售。 BTIG 报告本身随后被修正，但市场在信息被澄清前已经先行出清仓位，造成了放大的下跌。 把这条逻辑拆开来讲，先看宏观面。 9 月 17 日的 FOMC 会议以及随后的鲍威尔讲话，没有给市场一个明确的“快速降息”路线图。虽然会议做出了一步降息，但主席在记者会上强调了未来路径的不确定性，谨慎口吻使得此前建立在“快速放松”预期上的风险资产估值支撑被削弱。对那些高度依赖低利率来保持高成长估值的 Fintech 公司来说，这本身就是一记重击。官方会议记录和发言文本显示出官员对通胀与就业权衡的谨慎态度，这个信息被市场迅速解读为“降息不如预期快”。 在宏观预期发生变化、资金开始重新定价利率风险的窗口期， BTIG 的研究报告进入视野：该报告指出， Upstart 在其 ABS 证券化池中， 8 月的 30 天以上逾期率出现显著上升（ BTIG 最初给出的加权估算数字一度被市场解读为“剧烈恶化”）。由于 ABS 的信用质量直接由底层贷款表现决定，这一结论被市场迅速放大成“消费信贷普遍变差”的信号，导致 Upstart （ UPST ）本身以及同类公司（如 Pagaya 、 SoFi 等）被抛售。值得注意的是， BTIG 之后对自己的数字做了修正（将最初的极端估算下修到较温和的水平），但修正并未在第一个卖盘波次前发生——市场的恐慌已经形成。媒体对 BTIG 报告、随后的更正以及市场波动的连贯报道，完整还原了这个“触发 → 放大 → 更正”链条。 把镜头拉远，你会发现这不是单一家公司的信用质量突变，而是一个“脆弱点”被点燃后的连锁反应。 Fintech 公司常见的融资 / 业务模型——通过将零散的个人贷款打包成 ABS 、销售给资本市场或第三方资金方——使得行业对“证券化池表现”和“资金渠道稳定性”高度敏感。根据美股大数据 StockWe.com 评级机构与券商对这些交易的评级与流动性评估（例如 KBRA 、其他评级与发行公告）表明，市场能容纳的风险空间在不断收缩：当期限延长、利率上行或就业数据转弱时，老旧贷款的逾期暴露最先显现，而这些老旧 vintage 的表现正是 BTIG 指出的主要来源之一。换言之，行业并非毫无瑕疵，但“信息误读 + 高估值 + 宏观回调”的叠加放大了冲击。 从市场反应层面看，这次下跌既有基本面担忧，也有技术性、策略性放大：一方面，多家媒体与数据聚合平台报道了 UPST 、 PGY 、 SOFI 在报告公布时出现显著下挫（部分个股单日下跌幅度可观），引发跨股抛售；另一方面，基金与量化策略在止损线触发后会加剧卖压，期权 / 波动率交易也放大了短期方向性。随后一些大型机构（例如 Morgan Stanley ）对 ABS 数据给出更为中性的解读，称 8 月的月度变动“温和”，并提醒投资者注意数据口径与加权方法的差异；这些理性的声音在 BTIG 修正后帮助止住了部分下跌，但短期情绪已难以完全回补。 所以，真相里既有“误差”（ BTIG 的计算偏差或口径差异），也有客观的“风险上升”（部分 vintage 的逾期确实在上升），还有市场微观结构带来的“放大器”。这其中的教学点对投资者尤其重要：第一， Fintech 个股的信用风险通常通过证券化池与资金方敞口表现出来，投资者要看“谁把贷款留在账上、谁卖给第三方、 ABS 的信用增强程度如何”；第二，高估值股票在宏观边际不利时极易失血；第三，市场会第一时间以最坏情况进行定价 —— 因为流动性和情绪能把“概率事件”瞬时放大成“确定性损失”。 KBRA 、评级报告与近期的发行公告会是核查这类风险的直接材料。 美股投资网对读者与投资者的实用结论：现在不是凭单篇研报惊慌抛售或盲目追底的时候，而是回到基本面与资金结构上做功课。重点观察三件事：一，公司贷款是否大量回到自有资产负债表（ balance-sheet risk ）；二， ABS 的信用增强与 vintage （老款 vs 新款）分布如何；三，机构投资者（包括对冲基金与做市商）在该股的仓位与期权敞口是否已明显压缩或放大。若你是长线投资者，逢低需建立在对商业模式与风控的充分理解上；若你是短线交易者，警惕情绪驱动的单日反弹与再波动。以上这些点都可由公司披露、评级机构报告与 ABS performance 数据去逐一验证。 最后一句话：本次事件是一次典型的“宏观 + 行业信号 + 市场结构”三要素联动下的风暴。 BTIG 的数据修正告诉我们——在高波动时代，信息口径比以往任何时候都更重要；在信息被澄清之前，市场往往先以最坏的故事行动。作为编辑与分析师，我会继续追踪三类来源：官方 FOMC / 鲍威尔发言与数据（以把握利率路径）； ABS 与评级机构月度表现报告（以看底层信用）；以及券商 / 投行的后续调研（以识别机构共识的转向）。若你需要，我可以把这些来源的原文、相关 ABS performance 表格和几家核心公司的短中期风险清单整理成一份可直接发给投资决策团队的 PDF 报告。 订阅美股VIP ←左右滑动查看更多产品介绍图→ 美股投资网是一家专门研究美股的金融科技公司，2008年成立于美国硅谷，由前纽约证券交易所分析师Ken创立，联合多位摩根斯坦利分析师，谷歌 Meta工程师利用AI和大数据，配合十多年美股实战经验和业内量化模型，建立了一个股市数据库 https://StockWe.com/ 每天处理千万级股票数据：捕捉期权大单，实时主力资金流向、机构持仓变化、川普突发新闻，精准K线信号第一时间发到您手机APP！ 联系方式 客服Telegram MaxMeigu 公众号 TradesMax 邮箱 buy@TradesMax.com 美股大数据 StockWe.com 美股投资网 TradesMax.com"}, {"title": "逢低买盘救场美股反弹！特斯拉目标价上调至600美元，还要涨36%？", "date": "2025-09-26", "ym": "2025-09", "time": "2025-09-26 20:49:43", "author": "StockWe.com", "desc": "英特尔与苹果台积电的合作要“摊牌”了？", "url": "https://mp.weixin.qq.com/s/452J775CSduyn64cAVFe9A", "path": "sources/news/wechat_mp/articles/逢低买盘救场美股反弹-特斯拉目标价上调至600美元-还要涨36-588fbb4bb9.md", "len": 2503, "ticks": [], "body": "周五美股市场在宏观数据利好与政策不确定性的拉锯中震荡上行，最终以三大指数全线收涨收官。截至收盘，标普500涨幅0.59%，道指涨幅0.65%；纳指涨幅0.44% 市场核心驱动力来自盘前公布的8月核心PCE物价指数 ，其环比增0.2%的结果完全符合预期。这一温和数据有效提振了市场对美联储降息的预期，为美股开盘定下积极基调。 PCE数据的积极影响使得道指盘初即录得0.4%的涨幅。然而，早盘公布的美国消费者信心数据降至四个月低点，源于对收入的担忧，这一信号一度对大盘构成压力，但未能逆转由核心通胀数据奠定的上涨趋势。 午盘，医药板块的不确定性因素得以厘清。针对此前特朗普威胁对进口药品征收高关税的言论，白宫迅速澄清，该措施不适用于已与美国达成贸易协定的国家，且对欧盟的关税上限仍为15%。消息澄清后，在美上市的欧洲医药巨头股.票普遍上扬。 市场对Z府关门风险的担忧持续存在。尽管特朗普对可能出现的混乱表示不以为然，但分析师指出， Z府关门可能导致下周五原定的9月非农就业报告被迫延迟发布，这将给美联储的政策决策带来新的不确定性，成为悬在市场头上的潜在风险。 美股尾盘迎来强劲反弹，收复了日内及本周的部分失地。标普500指数的全部11个板块均收涨，展现出市场普涨的韧性。最为关键的是， 大型科技股在尾盘发力，成功收复了本周的大部分跌幅，成为推动指数上行的主要力量。 特斯拉目标价上调至600美元 特斯拉股价收涨4.02%，主要得益于知名投行韦德布什证券的重磅看好。该机构的分析师 Dan Ives将特斯拉的目标股价大幅上调至600美元。 这一目标价意味着预测该股在周五收盘价440.40美元的基础上，还有 约36% 的显著上涨空间。 Dan Ives强调，支撑这一估值提升的核心在于特斯拉加速推进其AI计划和自动驾驶领域的潜力。他认为，该领域蕴含着1万亿美元的巨大机遇，并预测特斯拉的市值到2026年有望达到3万亿美元。 英特尔与苹果台积电的合作要“摊牌”了？ INTC收高4.44%，消息人士透露，英特尔已主动接触包括苹果和台积电在内的顶尖公司，讨论投资或制造合作事宜。 值得注意的是，这些努力早在上个月特朗普总统公开对英特尔表示兴趣前就已启动，但自从美国Z府持有英特尔10%的股.票后，这些合作讨论的进程已明显加速。 这种Z府直接持股并推动合作的行为，强调了英特尔作为美国科技产业基石的独特地位： 战略价值超越市值： 与波音或苹果等其他知名品牌类似，英特尔的重要性已远超其当前的市值。它的价值难以用量化的财务指标完整衡量，因为它已经成为美国技术主权的核心贡献者。 军备竞赛的关键一环： 英特尔更是被视为未来国际人工智能军备竞赛中不可或缺的组成部分。Z府的介入，明确了其作为国家安全利益资产的战略定位。 鲍威尔给美股牛市预期“泼冷水”的深意？ 美联储主席鲍威尔本周二对美股估值的表态——指出“从许多指标来看，美股价格估值相当高”——随后引发了市场连续三天的抛售。 美股投资网分析认为，在当前美国面临高额债务与通胀反弹风险的复杂局面下，鲍威尔的言论旨在通过预期管理，实现对全球资本流向和货币政策独立性的双重保护。 对冲降息预期，稳固美元资产价值 鲍威尔此番“泼冷水”的首要目的，是避免市场对美联储降息的幅度与频率形成一致性的单边预期，以此来维护美元的全球价值锚定地位。 防止美元指数过度下跌： 如果降息预期被过度强化，美元指数下跌将不可避免。这将削弱全球资本向美国本土的回流动力，可能导致投资下降和经济衰退。 应对脆弱的财政体系： 当前美国债务占GDP比重已超过123%，财政基础脆弱。尤其在“大而美法案”影响下，美元资产的价值锚定效应正在丧失。若此时美联储持续降息，全球投资者很可能将抛售美元资产视为避险的占优策略，这是鲍威尔极力避免的局面。 复杂化“自然利率”寻找： 美元持续走弱和资本外流的风险，叠加Z府关税政策对经济的扭曲影响，将使得美联储寻找最优“自然利率”（Neutral Rate）的过程变得更加复杂和困难。 因此，鲍威尔选择在力所能及的范围内打压美股的热度，是以小幅度的“利率刹车”来观察市场反应，防止市场过早、过多地给降息定价，从而为后续的货币政策调整预留战略空间。 宣示独立性，防御通胀反弹 尽管市场普遍预期美联储为应对Z府债务压力会“情非得已”地降息，但鲍威尔的言论也是向市场释放一个明确信号：美联储不会因此而妥协其核心使命。 关税与通胀的滞后效应：经济数据具有滞后性。Z府的关税政策正导致全球供应链破坏和重组，现有证据表明，由此推高的商品价格影响将在6个月左右逐渐兑现。 坚持2%通胀目标：如果遏制通胀的成果最终因贸易政策而功亏一篑，美联储将难以向公众解释其“坚定致力于实现2%的通胀目标”。因此，预防美国通胀反弹的任务依然艰巨且复杂。 平衡政治与经济：在美国选民政治的规则下，强劲的经济增长是现任Z府寻求连任的关键助力。美联储需要巧妙地在“适应增长”和“遏制通胀”之间求得平衡，同时避免市场交易美国经济可能走向衰退的预期。 整体来看，未来联邦基金利率走低是大概率事件，以平衡经济增长的目标。但鲍威尔的“泼冷水”行为，恰恰是为了避免市场形成单边的一致性预期，从而增强美联储在复杂的政治和财政环境下影响利率和资本流向的工具箱。 加 30万粉丝群，一起交流美股心得！ ←左右滑动查看更多产品介绍图→ 美股投资网是一家专门研究美股的金融科技公司，2008年成立于美国硅谷，由前纽约证券交易所分析师Ken创立，联合多位摩根斯坦利分析师，谷歌 Meta工程师利用AI和大数据，配合十多年美股实战经验和业内量化模型，建立了一个股市数据库 https://StockWe.com/ 每天处理千万级股票数据：捕捉期权大单，实时主力资金流向、机构持仓变化、川普突发新闻，精准K线信号第一时间发到您手机APP！ 联系方式 客服Telegram MaxMeigu 公众号 TradesMax 邮箱 buy@TradesMax.com 美股大数据 StockWe.com 美股投资网 TradesMax.com"}, {"title": "90后清华量化天才，从华尔街2000万美元薪资到SEC全球通缉！", "date": "2025-09-26", "ym": "2025-09", "time": "2025-09-26 13:50:26", "author": "StockWe.com", "desc": "2025年9月11日，美国纽约南区联邦检察官宣布起诉 34岁的华裔金融才俊吴舰，指控其涉嫌电汇qi诈、证.券", "url": "https://mp.weixin.qq.com/s/GLKVUlXqqXVfXss8IP63bw", "path": "sources/news/wechat_mp/articles/90后清华量化天才-从华尔街2000万美元薪资到SEC全球通缉-aa16f9c3e6.md", "len": 2232, "ticks": [], "body": "2025年9月11日，美国纽约南区联邦检察官宣布起诉 34岁的华裔金融才俊吴舰 ，指控其涉嫌电汇qi诈、证.券qi.诈和洗$等罪名。曾是 华尔街炙手可热的量化专家 ，现却因涉嫌通过虚假模型骗取巨额奖金，陷入司法风暴。 从清华天才到华尔街高管 能进顶尖对冲基金的人，无疑聪明指数爆表 吴舰是1991年出生的安徽合肥人，从小就是个学霸。2006年，他读高中的时候，就靠着全国中学生物理和数学竞赛的双料省一等奖，直接被保送到 清华大学 了。 在2011年获得北京清华大学工学学士学位。之后赴美留学深造， 2017年获得康奈尔大学 运筹学博士学位 。 大家也都知道对 冲基金是爱招博士 的 。 在攻读博士期间，吴舰有幸在著名对冲基金城堡证券（Ken Griffin的对冲基金）实习，并提前接触了华尔街的核心圈子。 2018年，他凭借过硬的学术背景和实习经验，顺利加入 量化投资巨头Two Sigma ，这家公司管理着超过600亿美元的资产，致力于通过数据和科学方法进行投资。 吴舰在Two Sigma负责开发股市走势预测模型，他的模型表现出色，帮助他在短短几年内迅速晋升。 2022年1月，他升任量化研究副总裁；仅一年后，2023年1月，他又升任高级副总裁。不到六年时间，吴舰就完成了常人难以想象的 职业“三级跳” 。 篡改数据骗取高额激励 然而，就在他事业一路高歌猛进的背后，一场风暴正在悄悄酝酿。 根据美国司法部和SEC的指控，吴舰的骗局是从2021年11月开始的。 他所在的Two Sigma公司有个规定：新模型必须和旧模型“去相关化”。简单说，就是每个新模型都得有自己独特的预测能力，不能和之前的模型一样，这样才能带来新的利润。 但吴舰却反其道而行之， 他开发的14个新模型都是“假的” 。他通过篡改参数，让这些所谓的“新”模型，其实只是在复制老模型的预测结果，制造出一种“能赚大钱”的假象。 导致Two Sigma误判其模型具有独特盈利能力，因而大幅提高了其激励薪酬。公司还频繁地使用吴舰的模型，致使其代表客户进行了非预期的证券买卖操作。 相关模型的使用造成众多客户遭受损，损失了至少1.65亿美元。 而吴舰的个人收入飞速提升：从2018年的41.5万美元到2020年的420万美元，再到2022年的2350.9万美元。 2000多万美元的年薪 里，包括25.9万美元的基本工资、1600万美元现金奖金和725万美元的绩效奖励。 美股大数据了解到， 吴舰高昂收入的来源是全是靠通过虚假模型骗取的奖金和奖励。而除了操纵参数，他还被指控在公司开始调查后，继续进行未经授权的修改，以掩盖篡改痕迹。 小红书“炫富”成为导火索 2023年1月2日，一篇小红书“炫富帖”引爆行业讨论。发帖人自称华尔街量化从业者，在平台晒出来自己的营收。2022年收入高达235.9万美元。虽然发帖人隐去身份，但很快就有相关业内人士根据奖金体量，迅速将其锁定为Two Sigma的员工。 之后就有美国媒体向Two Sigma公司求证，公司虽未正面回应，但却触发了内部调查。 在内部调查中，很快发现吴舰模型与其他模型“综合预测”存在异常高的相关性。而面对质问，他将原因归咎于市场状况，直到技术团队排查数据库记录，其篡改参数的行为才逐渐暴露。 到2023年8月，吴舰被正式停职，次年1月遭到解雇。吴舰被处理后，在 2023年10月6日，Two Sigma致信客户并主动赔偿客户损失，偿还约1.65亿美元。 司法起诉与逃逸 9月11日，美国纽约南区检察官办公室正式宣布起诉吴舰，指控其电汇欺诈、证券欺.诈和洗钱三项罪名，每项罪名最高可判处20年监禁。除了司法部的刑事诉讼，SEC同时提起民事诉讼，要求其返还非法所得、支付罚款，并永久禁止担任任何投资顾问相关职务。 在起诉书中，披露已经没收吴舰利用非法所得购置的财产，其中包括一套位于纽约曼哈顿价值百万美元豪华公寓。房产信息显示，2023年3月23日，吴舰夫妇以大约658.78万美元的价格买下了这套公寓。 但检方表示，吴舰目前未被拘捕，已被列为在逃人员。在2023年11月就有小道消息称他已逃回国。 警示与反思 吴舰案给整个量化投资行业敲响了警钟：在算法主导的投资时代，虽然技术提高了效率，但风险也隐藏得更深、更难发现。有时候，仅仅是对一行代码的修改，或是几个参数的调整，都可能引发巨大的金融风险。 尤其当员工的薪酬与模型的业绩深度挂钩时，诱惑也变得更大。为了保住高额的奖金，吴舰选择了用虚假的模型造假。未来，量化投资行业亟需加强监管和审计机制，避免类似“天才”变成“赌徒”的悲剧重演。 加 30万粉丝群，一起交流美股心得！ ←左右滑动查看更多产品介绍图→ 美股投资网是一家专门研究美股的金融科技公司，2008年成立于美国硅谷，由前纽约证券交易所分析师Ken创立，联合多位摩根斯坦利分析师，谷歌 Meta工程师利用AI和大数据，配合十多年美股实战经验和业内量化模型，建立了一个股市数据库 https://StockWe.com/ 每天处理千万级股票数据：捕捉期权大单，实时主力资金流向、机构持仓变化、川普突发新闻，精准K线信号第一时间发到您手机APP！ 联系方式 客服Telegram MaxMeigu 公众号 TradesMax 邮箱 buy@TradesMax.com 美股大数据 StockWe.com 美股投资网 TradesMax.com"}, {"title": "美股下跌的背后真相竟然是？....CoreWeave靠OpenAI一人吃饱？", "date": "2025-09-25", "ym": "2025-09", "time": "2025-09-25 20:19:19", "author": "StockWe.com", "desc": "", "url": "https://mp.weixin.qq.com/s/KkXAspOz_xh0mXedQV4cWQ", "path": "sources/news/wechat_mp/articles/美股下跌的背后真相竟然是-CoreWeave靠OpenAI一人吃饱-bbfd273302.md", "len": 1857, "ticks": [], "body": "美股市场连续第三个交易日收跌。，截至收盘，标普500跌幅0.50%；道指跌幅0.38%；纳指跌幅0.50%； 本次回调并非传统利空消息触发， 反而是经济数据超预期强劲 。初请失业金人数降至年内最低，二季度GDP意外上修至3.8%，创两年新高。 强劲数据削弱了美联储（Fed）降息的理据。此前市场过度透支的降息预期正在被修正，导致股.票估值面临压力。 Z府10月暂停降息的概率已升至15%左右， 确认了市场对Fed政策路径的重新评估。当“好消息”不再意味着流动性宽松，它就成了引发市场调整的诱因. 除了宏观因素，两个关键信号加剧了市场的谨慎： AI叙事遭遇质疑： 投资者开始担忧AI板块的融资节奏和资本开支扩张过快，其模式类似1999-2000年的互联网泡沫。若资金链在紧缩周期中承压，高估值股.票容易引发“踩踏”。 美元美债齐涨： 美元突然上涨，并伴随美债收益率一同起飞。这表明全球资金正在重新定价美国资产。无风险收益率的提高对美股估值构成系统性压力。 标普500已连续108个交易日没有出现超2%的跌幅，长时间的平静期积累了较高的“脆弱性”。就像一根绷紧的橡皮筋，轻微的拨动也可能造成剧烈的弹动。 CoreWeave再获$65亿算力大单 云计算服务商CoreWeave（CRWV）周四宣布与OpenAI达成一项价值$65亿的新合作协议 ，进一步加强了其作为AI算力基础设施核心供应商的地位。此举意味着CRWV将为ChatGPT的母公司提供额外算力，以满足OpenAI模型训练与运行的爆发式需求。 OpenAI算力需求几何级扩张 这已是CRWV与OpenAI签订的多份数十亿美元级合作中的最新一笔。回顾历史合作，两家公司最初于去年3月签署了价值119亿的算力协议，随后在今年5月又追加了一份40亿的协议。 如今，新的$65亿订单使双方的合作规模再次扩大，CRWV联首席执行官迈克尔・英特拉托尔对能扩大与AI前沿领导者OpenAI的合作表示荣幸。 OpenAI对算力资源的持续、巨额投入，不仅印证了其在AI技术上的雄心，也侧面反映出当前顶尖AI模型的研发和运营，仍是资金和算力密集型游戏，对于高性能GPU集群的需求是几何级增长且无止境的。 客户集中度风险浮现 然而，市场对CRWV的狂热增长模式也开始出现警惕的声音。 Hedgeye Risk Management周四发布的研报明确指出，客户高度集中的趋势即将显现。 报告分析，CRWV作为OpenAI和英伟达这两家AI生态核心公司的基础设施伙伴，其未来业务的集中度极高。分析师预测： “我们认为到2027年底，英伟达和OpenAI将成为CRWV仅有的两大核心客户。” CRWV最新财报数据显示， 仅微软一家贡献的营收占比就达到了70%。 虽然微软既是CRWV的客户，同时也是OpenAI的重要投资者和云服务伙伴，但这种营收的极端集中性，对CRWV的未来增长稳定性构成了显著“集中度风险”。 CRWV的“双刃剑”  今天 数字广告平台公司Cardlytics (CDLX) 股价 暴涨超过100% 。这次大涨的直接原因是，美国运通周四宣布对其旗舰白金信用卡进行重大更新，以应对高端消费市场日益激烈的行业竞争。 早CDLX暴涨32%的时候，就被美股大数据 AI量化模型扫描到 从32%涨到102%，也有70%的上涨利润空间！ 美国运通表示，更新后的个人版和商业版白金卡年费将从695美元提升至895美元，涨幅约为29%。不过，持卡人每年可获得的福利总额也相应增加，达到3,500美元，是之前福利额度的两倍多。 这些福利主要以消费抵扣的形式发放，覆盖了Uber、Lululemon、Oura、酒店和流媒体服务等多个领域。此外，商业白金卡用户还将获得新的酒店和戴尔、Adobe采购抵扣。 美国运通美国消费者服务总裁霍华德·格罗斯菲尔德（Howard Grosfield）强调，这些新增福利都是在原有权益基础上叠加的，没有任何削减。 为什么这条新闻对 CDLX 至关重要？ 这条新闻对 Cardlytics (CDLX) 非常重要，也正是知名做空机构Citron 称它为“下一只将大涨的堕落天使”的原因。类似 APPlovin。 1、更重视一方数据 美国运通对旗舰产品的这次大规模投资，核心在于希望增强与持卡人之间的互动，而不仅仅是消费。这包括鼓励用户登录App、领取福利、使用各种数字服务。用户互动越多，银行就能获得越多的第一方数据点，例如用户何时领券、购买了什么、在哪里消费等。 对于 CDLX 来说，这意味着更多的变现机会。 CDLX 为美国运通、摩根大通、美国银行、花旗等主要金融机构提供卡联营销平台。持卡人互动越频繁，CDLX 就能获得越多的广告和营销机会。 2、更高的年费 = 更强的互动需求 年费从695美元涨到895美元，意味着美国运通必须让用户感受到这笔钱花得“物超所值”。为此，他们需要提供更多精心挑选的、更精准的福利和广告，以及更多能刺激消费的活动。 这恰恰是 CDLX 的核心价值。通过将持卡人数据与商户优惠相匹配，CDLX 能够精准地向用户推送返现或账单抵扣等激励措施，从而有效推动消费。 3、全行业的“奖励平台军备竞赛” 美国运通的这次调整是高端信用卡市场“军备竞赛”的一部分。摩根大通更新了其 Sapphire Reserve 卡，花旗也推出了新的高端卡，美国银行和富国银行同样在加码奖励平台。 而 CDLX 已经与这些主要银行全部建立了合作关系。竞争越激烈，CDLX 作为这些奖励体系关键基础设施的地位就越发稳固。 4、潜在的“APP式蜕变” Citron Research 所说的“像 APP 一样的转型”，指的是 AppLovin (APP) 的发展历程。AppLovin 曾被市场低估，后来因其广告网络成为应用变现的必备基础设施而股价暴涨。 如果银行和信用卡发行方通过 CDLX 平台引导更多的消费和福利，CDLX 的抽佣率和收入就可能实现加速增长，从而走上与 AppLovin 相似的价值重估之路。 结论 这条新闻显示对 Cardlytics 是重大利好： 持卡人更积极参与→更多数据 年费更高→银行更有压力提供精准福利 CDLX 已经是这些福利体系的核心引擎 只要执行得好，CDLX 可以搭上整个行业的顺风车，估值大幅重估——这正是 Citron 看多的原因。 英伟达50亿投资英特尔 本周四，英伟达宣布将以每股23.28美元的价格，向英特尔投资50亿美元。 这个价格比前一天的收盘价要低一些。在与英特尔CEO陈立武共同举行的新闻发布会上，英伟达CEO黄仁勋表示，这是一项“历史性”协议，将为两家公司带来新的市场机会，而特朗普Z府并未参与此次交易。 消息公布后，英特尔股价高开逾27%， 盘中一度上涨30% ，最终收涨约22.8%，创下自1987年10月以来的最大单日涨幅。 今年3月，我们就公开发视频以及文章： 准备入手两只美股科技股INTC、HOOD 我们当 时INTC 价格为21.4美元，目前涨幅50% HOOD 当时价格仅43美元，现在价格120，几乎翻3倍！ 合作背后的市场逻辑与技术细节 黄仁勋透露，英伟达和英特尔的工程师团队已为此合作了一年。他强调，新协议的核心在于定制芯片开发，预计将解决250亿至500亿美元的巨大市场机会。他预计，投资英特尔的回报将是巨大的。 具体而言，这项合作将为英伟达带来两方面的战略性突破： 数据中心领域：英特尔将为英伟达构建定制化的x86 CPU。英伟达将把这些CPU集成到其AI基础设施平台中，并推向市场。 这意味着英伟达将成为英特尔服务器CPU的主要客户 ，进一步巩固其在AI领域的领先地位。 个人计算领域：双方将共同打造融合CPU和GPU处理器的SOC芯片。英特尔将构建并推出集成英伟达RTX GPU芯片的x86片上系统，用于新一代的笔记本电脑。这不仅为英伟达打开了广阔的笔记本市场，也为消费者带来了更强大的游戏和图形处理性能。 黄仁勋表示，获得x86架构的使用权，将为英伟达提供进一步扩展超级计算机规模的灵活性 。陈立武也对这次合作感到兴奋，称其是“改变游戏规则”的时刻，将惠及整个科技行业。 政治考量与市场猜测 尽管黄仁勋明确表示此次合作与Z府无关，但媒体评论指出，这笔投资的时机值得玩味。据美股投资网了解到 ，早在特朗普上月公开批评陈立武、呼吁其辞职前，英特尔和英伟达就已经在商谈合作。 马斯克今日表示，英特尔CEO是伟大的！ 而就在特朗普Z府确认入股英特尔前一日，软银也曾宣布投资英特尔20亿美元，其CEO孙正义公开承认此举旨在“取悦总统”。 因此，市场对英伟达的这次投资也存在两种解读： 一是纯粹出于商业和技术考量，是双方长期合作的开端；二是部分高管将此举视为在当前复杂地.缘政.治背景下，取悦华盛顿的一种方式。 当被问及制造工艺和代工厂问题时，两位CEO的回答都显得十分谨慎。黄仁勋强调，周四公布的协议纯粹是关于定制芯片的合作，而非具体的生产方式或地点。 但他也明确表态，只要是英特尔芯片的供应商，英伟达就会成为英特尔芯片的大买家。这一表态似乎在暗示，未来的合作可能不仅限于芯片设计，也可能涉及生产环节。 美股投资网分析认为，尽管外界对此次投资的动机众说纷纭，但从商业本质看，英伟达与英特尔的合作是各取所需的战略联盟。英伟达押注英特尔在x86架构上的优势，英特尔则获得了急需的资本和市场信心。不过，真正的价值释放，可能取决于双方在未来的制造和技术整合上能走多远。这笔交易或许只是一个开始，其深远影响，仍值得我们持续观察。 订阅美股VIP ←左右滑动查看更多产品介绍图→ 美股投资网是一家专门研究美股的金融科技公司，2008年成立于美国硅谷，由前纽约证券交易所分析师Ken创立，联合多位摩根斯坦利分析师，谷歌 Meta工程师利用AI和大数据，配合十多年美股实战经验和业内量化模型，建立了一个股市数据库 https://StockWe.com/ 每天处理千万级股票数据：捕捉期权大单，实时主力资金流向、机构持仓变化、川普突发新闻，精准K线信号第一时间发到您手机APP！ 联系方式 客服Telegram MaxMeigu 公众号 TradesMax 邮箱 buy@TradesMax.com 美股大数据 StockWe.com 美股投资网 TradesMax.com"}, {"title": "美股 特斯拉放弃造新车？背后惊人布局曝光！", "date": "2025-09-18", "ym": "2025-09", "time": "2025-09-18 17:16:07", "author": "StockWe.com", "desc": "特斯拉最新5000字研报！", "url": "https://mp.weixin.qq.com/s/bKpR6ECOc-1AES8hYtQ5OA", "path": "sources/news/wechat_mp/articles/美股-特斯拉放弃造新车-背后惊人布局曝光-7e9bcfe80f.md", "len": 6166, "ticks": [], "body": "你有没有发现，特斯拉已经整整五年没发布全新车型了。 就连迟到多年的 Cybertruck，其实也是 2019 年就亮相的。更令人意外的是，在最新的《宏图规划第四部分》中，马斯克竟然一辆新车都没提！马斯克到底在憋什么大招？ 我们美股投资网专访了在几位硅谷的科技大佬，得到的答案惊人： 特斯拉并不是像苹果iPhone一样创新停滞，而是特斯拉在酝酿一场彻底的颠覆。 当其他车企还在拼续航、比配置时，马斯克已经盯上了更高的维度——下一款车，要么不出，一旦推出，就没有方向盘，它将完全摆脱人类驾驶，车内设计被彻底重构，开启汽车作为交通工具的全新篇章。 那么，马斯克要如何把这个全新的故事讲给华尔街听？ 特斯拉的战略如何从“造车公司”转向“AI机器人 + 储能帝国”？ 对散户投资者来说，这将带来怎样的潜在回报？ 美股投资网团队成立于美国硅谷 ，投入超百万美元招聘哈佛、清华、北大的数据科学研究员，以及谷歌Meta工程师， 从2008年开始 就专注于打造 可媲美高盛、摩根士丹利等华尔街投行级别的AI量化软件工具 ， 并免费开放给全球美股投资者使用 ，只需登录官网 StockWe.com 美国热线电话 626 378 3637 特斯拉想要退出汽车行业 如果只看“卖车”，特斯拉的处境确实不好看。 在全球主要市场，特斯拉的份额都在下滑。2025 年 8 月，它在美国电动车市场的占有率跌至 38%，创下 2017 年以来的新低。在欧洲，德国和英国的上牌量同比几乎腰斩。而在中国，2025年8月的市场份额仅为5.1%，远低于比亚迪的27.8%。 这些数据共同指向一个结论： 单纯依靠“多卖车”这条路，特斯拉已经很难重现过去的辉煌了。 问题来了：销量这么差，为什么特斯拉不干脆回头造一款更便宜、配置更豪华的平价车，把市场重新抢回来？毕竟，凭借超级工厂的规模化生产和全球最成熟的供应链，特斯拉完全有能力这么做。 这背后，其实是特斯拉一个非常核心的战略考量：它根本不想沦为一家大众化车企。 首先，我们来看一个残酷的现实：造便宜的平价车，利润低得可怜。这个市场早已陷入了激烈的价格战，竞争白热化。许多车企为了抢占市场份额，不惜牺牲利润空间。 以比亚迪为例，今年5月23日，比亚迪宣布对近二十款车型推出以旧换新优惠，折扣幅度最高达34%，其中最便宜的智能驾驶车型“海鸥”换购后起售价仅为55,800元人民币，降幅达20%。 2025年第二季度，比亚迪的毛利率跌至16.3%，是自2022年第二季度以来的最低水平。剔除比亚迪电子的利润贡献后，其汽车业务的单车利润在第二季度仅为4800元，远低于第一季度的8800元，回到了2022年以来的最低点。 如果特斯拉贸然陷入低端市场的价格战，那将是一场危险的豪赌。这时候特斯拉铁粉可能会跳起来反驳：“特斯拉能和国内车比吗？”——确实不能比。但问题是，国内消费者未必有这种清晰认知，他们很容易被铺天盖地的地铁广告和营销话术左右了购买决策。 特斯拉目前的毛利率为17.2%本身就不高，一旦陷入价格战，利润空间将再次被压缩。为了维持低价，特斯拉必须在供应链和生产工艺上做出妥协，长此以往，公司的财务健康将受损，更关键的是，它赖以生存的研发投入和技术创新也会被拖累，从而削弱其核心技术优势。这无异于“釜底抽薪”，断送了未来发展。 对于华尔街来说，估值标准完全不同。 汽车公司主要看利润、销量和市场份额，而科技公司更关注增长潜力、技术壁垒和市场领导力。如果特斯拉为了销量牺牲利润，它将不再被视作高速增长的科技公司，而是与大众、丰田等传统车企并列。这就像一个曾经的“科技新贵”因迎合大众市场而失去独特身份，最终被拉下神坛， 特斯拉的高估值将被彻底摧毁 。 此外特斯拉的品牌形象会受到毁灭性打击。 这就像一个奢侈品牌为了销量开始卖廉价商品，不仅会失去那些原本愿意为高端技术和独特设计买单的客户，还会让自己的品牌价值大打折扣。曾经看中特斯拉创新的消费者，可能会转向其他更具性价比的品牌。特斯拉的“领先者”光环一旦褪去，其市场领导地位将岌岌可危。 现在可以这么说， 特斯拉的未来，从来都不在于多卖几辆车。它的战略，是在构建一个横跨交通、能源和人工智能的综合性生态系统。 在这个蓝图中，汽车只是一个入口，未来的利润增长点在于自动驾驶、储能系统、机器人等高价值业务。 这在特斯拉最新发布“第四版总体规划”中体现得淋漓尽致。该规划并未提及任何正在研发的新型电动汽车，而是将重点放在了自动驾驶出租车（robotaxi）、人工智能和机器人等更具前瞻性的领域。 规划中的配图也暗示了这一点：一家人在玩叠叠乐，而特斯拉机器人正在身后给植物浇水， 这预示着其未来的业务核心是AI驱动的家庭服务机器人，而非传统汽车。 马斯克其实很早就为这个宏大的计划埋下了伏笔。早在2016年，他就畅想过未来的全自动驾驶汽车能为人们创造被动收入。最新版本的规划则更进一步，将重心完全转向了AI。 如果特斯拉为了短期销量陷入低端价格战，那将耗费大量精力在低利润的业务上，从而无暇顾及更具价值的未来布局。这无异于舍本逐末，为了眼前的蝇头小利，而放弃了成为一个未来时代巨头的机会。 所以，与其说特斯拉卖车不行了，不如说它根本就不想只卖车了。它正在下一盘更大的棋，而我们现在看到的销量下滑，正是其战略转型的必然结果。 在这里推介大家关注我们 美股投资网的 推特X账号 @TradesMax 每天分享最新的美股突发资讯、深度解读和交易机会 早在7月份马斯克和特朗普再次翻脸时，我们推特就全网公开提示，290美元捞底特斯拉！ Robotaxi：特斯拉的下一个万亿级蓝海 特斯拉的宏大蓝图，核心是将汽车转变为能持续创造现金流“机器人资产”。传统车企的商业模式是“造车-卖车”，一次性赚钱； 而特斯拉的目标是让每一辆车都成为一个24小时不间断工作的“员工”，通过提供自动驾驶出行服务来赚取持续的、高利润的收入。这才是其商业模式的根本性转变。 马斯克去年明确表示，如果一辆2.5万美元的平价车不具备全自动驾驶功能，那么它的生产将是“毫无意义的”。这意味着，特斯拉的下一款车将不再是需要驾驶员的传统汽车，而是完全无人驾驶的自动出租车——Robotaxi。 特斯拉的核心优势在于成本控制。与Waymo等竞争对手相比，特斯拉的全自动驾驶系统（FSD）是基于已经量产的车型开发的，这使得其整车制造成本显著低于对手。 一辆特斯拉FSD车型的售价仅在5万到6万美元之间，而Waymo的车辆预估售价高达20万美元，价格是特斯拉的三倍。这一巨大优势让特斯拉可以用更具竞争力的价格提供Robotaxi服务，从而快速抢占市场。 如果这个计划成功，其潜在的财务回报是惊人的。想象一下，如果特斯拉在全球部署100万辆Robotaxi，每辆车每年能创造超过4万美元的净收入，这将为公司带来高达400亿美元的年度现金流。 华尔街对此预期极高，摩根士丹利等机构甚至预测，到2040年全球无人出租车市场将达到万亿美元级别。如果特斯拉能占据其中30%到35%的市场份额，其Robotaxi业务的年收入有望突破5000亿美元，为公司增加数万亿美元的市值。 为了实现这一目标，特斯拉已经付诸行动。2025年9月11日，特斯拉获得了内华达州机动车管理局的批准，可以在公共道路上测试其自动驾驶技术。内华达州对自动驾驶友好，特斯拉此前在奥斯汀和加州湾区有试运营经验。 马斯克表示有信心在2025年底前覆盖美国一半人口 这表明，Robotaxi不再是遥远的未来，而是一个正在逐步实现的、将改变整个交通和出行行业的宏大计划。 Optimus或撑起特斯拉80%价值 如果说特斯拉的Robotaxi瞄准的是“颠覆出行”，那么Optimus人形机器人则是在下一盘更大的棋，它想把智能化的触手，从马路延伸到工厂、仓库、甚至我们的家里。 按照马斯克的设想，Optimus不仅仅是一个效率工具，它更是一场社会革命的种子。当机器人能扛起那些无聊、重复、高强度的体力活，人类就能从繁重劳动中解放出来，去从事更有创造性的工作。 马斯克已经公开说过，特斯拉未来 80% 的价值都可能来自 Optimus ，这句话的分量有多重？想想看，特斯拉现在靠卖电动车市值已经近万亿美元了，马斯克却说一个尚未量产的机器人，未来价值会是汽车业务的几倍。这背后，是他对机器人市场潜力的极度乐观。 根据公司规划，Optimus 3 原型机将在 2025 年底亮相，并于 2026 年启动量产。 每台机器人的目标成本大概在2-3万美元 ，这个价格与一辆中档车相当，意味着 Optimus 将成为面向大众市场的“智能工具”。 但真正的想象力，不在卖机器人本身，而在“卖服务”。 如果按照薪酬目标-十年交付100万台计算，硬件销售额可达250亿美元。 但这些机器人需要持续的软件升级、算力支持和行业定制。 假设每台机器人每年能带来1,000-2,000美元的服务收入，100万台就是10-20亿美元的经常性收入 。而且，随着机器人数量的指数级增长，这笔收入将成为特斯拉稳定且高利润的现金流。 华尔街对人形机器人的市场空间判断也非常乐观。摩根士丹利预计，到2050年全球机器人市场规模可能超过5万亿美元。 如果 Optimus 能够成功量产并推广，特斯拉将可能复刻苹果在智能手机领域的成功，打造一个通用硬件平台。届时，无数开发者将基于此平台开发各种应用，从工厂生产线到家庭服务，应用场景将无限延伸，盈利空间也将被彻底打开。 能源业务：被低估的“现金奶牛” 如果说 Robotaxi 和 Optimus 是特斯拉未来的“巨大想象力”，那么能源业务则是公司当下最稳健、最强劲的现金流发动机。它不像汽车业务那样受制于价格战和市场波动，而是一门与电网深度绑定、长期且稳定的生意。 2024年，特斯拉能源业务收入突破 100 亿美元，储能交付量翻倍至 31.4 GWh。这个规模相当于一个中型国家的年储能水平。随着特斯拉在美国、欧洲和中国的 Megapack 工厂持续扩产，其目标是在未来几年内，将储能规模推升到 100 GWh+。 这背后蕴含着巨大的商业潜力。如果按照平均每 35万美元每兆瓦时的价格计算，达到 100 GWh 的规模，意味着能源业务的年收入将高达 350 亿美元。 更重要的是，这个业务的毛利率正在持续提升。 目前，它的毛利率已从去年的 20% 跃升至 24.4%，高于汽车业务的 18.2%。 如果能稳定在 25% 以上，仅储能板块未来每年就能为特斯拉贡献近 90 亿美元的净利润。 为了进一步巩固领先地位，特斯拉在技术上持续投入。今年9月9日，特斯拉发布了新一代储能产品 Mega Pack Three 及全新的 Mega Block 系统。据分析师评估，新产品将安装速度提升了 23%，同时将成本降低了 40%，这可能颠覆整个储能行业。 此外，马斯克还宣布，特斯拉自主研发的变压器已投产，这标志着公司在储能业务上的垂直整合能力进一步提升，大大降低了对外部供应链的依赖，并成为未来增长的重要引擎。 总结 看到这里，你会发现特斯拉的估值逻辑远不止于卖车。它是由三条曲线叠加而成的： Robotaxi： 代表未来的出行革命，是潜在的巨大现金流机器。 Optimus： 可能重塑全球劳动力市场的“通用硬件”平台。 能源储能： 正在成为全球能源系统的基石，是当下最稳健的利润增长极。 这三根支柱构成了特斯拉市值的坚实基础。哪怕短期汽车销量承压，只要其中任何一条曲线能够持续兑现，特斯拉的估值故事就依然成立。马斯克和特斯拉讲述的，从来就不是一个关于“一辆车”的故事，而是一场关于出行、能源和劳动力的全局革命。销量决定今天的输赢，而这些平台业务，正在决定特斯拉明天的版图。 好了，你认为特斯拉的未来潜力如何，特斯拉能成功将其愿景变为现实吗？欢迎评论区留言一起讨论，打开官网StockWe.com订阅我们VIP会员获得更多有深度、有价值的内容和分析，临走前记得点赞、打开小铃铛通知，你的每一次互动，都是我们美股投资网持续输出优质美股内容的最大动力。 长按 订阅美股VIP ←左右滑动查看更多产品介绍图→ 精彩深度文章回顾 最全美股K线视频， 解读每一个形态背后的含义! 美股 英伟达8月财报前瞻预测，万字深度报告 NVDA 美股 揭秘价值千万的选股逻辑！ 看懂秒变高手，轻松抓住10倍、100倍机会！ 美股 2025年最强科技股上市，设计软件独角兽Figma深度分析！会是下一个CRCL吗？ 美股 英伟达 10万亿市值潜力！背后逻辑分析！ 美股 CRCL是否值得捞底？ HOOD要颠覆美股投资的方式！ 两只美股，准备入手，潜力巨大！ 美股6月必捞四只股，全新上市！CRCL...... 美股 英伟达后市分析，解读背后关键数据，被大家忽略的长期风险！ 英伟达5月财报预测，深度分析报告 NVDA 美股 解密一条公式，让你投资稳定盈利！ 自动驾驶将在今年大爆发！ 这四家美股公司必须关注！ TSLA LYFT 美股META财报预测，捞底两家公司！ 支撑美股大跌后反弹的底层逻辑！ 捞底前必看！ 每次经济衰退前，这8个信号都提前预警了美股大跌！ 美股4月2日将变盘！交易策略公开，长期看涨的动力因素有哪些？ 特斯拉反弹是否能持续？ 从暴跌背后看做空机构资本运作规律！ 【深度报告】英伟达2025年2月财报预测！业内人士爆料 美股 下一个PLTR HIMS APP如何找？ 他们都有什么共同点？ 美股 特斯拉1月财报预测，风险预警！ 2025年最有潜力10只美股【下集】 不为人知的AI公司！【深度调研】 2025年最有潜力10只美股【中集】 不为人知的AI公司！【深度调研】 2025年最有潜力10只美股【上集】 不为人知的AI公司！【深度调研】 下一个英伟达是AVGO？ 博通凭ASIC能打破英伟达AI芯片垄断地位！ 美股2025年五大主题和估值风险！ 美股核能股爆涨，哪家最值得投资？OKLO LEU NNE 美股英伟达5月财报预测，深度报告，坚定看涨 美股这只股，快被我做烂了！ 美股投资网是一家专门研究美股的金融科技公司，2008年成立于美国硅谷，由前纽约证券交易所分析师Ken创立，联合多位摩根斯坦利分析师，谷歌 Meta工程师利用AI和大数据，配合十多年美股实战经验和业内量化模型，建立了一个股市数据库 https://StockWe.com/ 每天处理千万级股票数据：捕捉期权大单，实时主力资金流向、机构持仓变化、川普突发新闻，精准买卖信号第一时间发到您手机APP！ 美股大数据多个核心功能终身免费使用，为什么免费？ 美股投资网的使命就是帮助全球投资者在美股市场做出更明智的决策、把握更多赚钱机会、实现真正以大数据驱动赋能投资，最终让普通人也能像专业机构一样高效投资、稳健获利。 联系方式 客服Telegram MaxMeigu 公众号 TradesMax 邮箱 buy@TradesMax.com 美股大数据 StockWe.com 美股投资网 TradesMax.com"}, {"title": "美国SEC推翻数十年旧规，让美国IPO再次伟大！阿里巴巴股价创4年新高！", "date": "2025-09-17", "ym": "2025-09", "time": "2025-09-17 20:37:36", "author": "StockWe.com", "desc": "美国资本市场大变天!", "url": "https://mp.weixin.qq.com/s/bQfzn-FsmCllcyAC685DTg", "path": "sources/news/wechat_mp/articles/美国SEC推翻数十年旧规-让美国IPO再次伟大-阿里巴巴股价创4年新高-a23a5a2d18.md", "len": 3131, "ticks": [], "body": "美联储今天宣布降息25个基点，将联邦基金利率目标区间下调至4.00%-4.25%，这是自2024年12月以来的首次降息。 这一决定本身符合市场普遍预期，但随后的声明、经济预测与主席鲍威尔的讲话却产生了明显矛盾，导致市场陷入剧烈波动。 美联储此次行动的核心矛盾在于： 鸽派行动，却有鹰派定调。 美联储的降息决定以及声明中对就业市场“放缓”、“下行风险上升”的悲观描述，都释放了偏鸽派的信号。然而，随后的经济预测却显示通胀“有所上升”、“依然略高”，且鲍威尔在新闻发布会上将此次降息定义为“风险管理”，而非基于明确的经济疲软信号。这种“行动鸽派，言论鹰派”的组合，让市场感到困惑。 通胀预期与降息行动的背离。 通常，降息旨在刺激经济增长或应对通胀下行风险。但美联储的最新预测却表明，商品价格上涨将持续推高通胀，鲍威尔甚至警告这种影响在今年剩余时间至2026年“将持续加剧”。在通胀有上行风险的背景下开启降息，无疑让投资者对美联储的政策逻辑产生了疑问。 这种矛盾最终反映在了市场的剧烈波动上。最初，降息的鸽派信号刺激了对经济敏感的小盘股和周期股上行，因为投资者预期借贷成本降低将利好这些公司。 然而，随着鲍威尔将降息定义为“风险管理”，并强调通胀上行风险时，市场迅速收回了乐观预期。最终，市场呈现出显著的分化： 道指在对经济前景更为乐观的金融股带领下收涨，这部分反映了对降息利好传统行业的预期。 而对利率变化更为敏感的科技股为主的纳指和标普500则最终收跌。这可能表明，市场担心美联储的鹰派言论将限制未来的降息空间，甚至担忧经济前景可能不像最初设想的那样乐观。 美股投资网BABA 机会 今天阿里巴巴BABA涨2.7%,价格166.59美元股价创4年新高 此番上涨，核心驱动力是市场对中国企业级AI应用需求的爆发式增长及其对云计算行业投资逻辑的深远影响的乐观预期。 高盛在最新发布的报告中，将阿里巴巴的目标价从163美元上调至179美元，维持“买入”评级。 一直看我们文章的粉丝们都知道，在中概股里面，我们美股投资网只看好 BABA 。9月3日我们在BABA 130美元的价格，加仓买入阿里,截至今天我们再次吃肉超28%! VIP截图曝光: 还有另外一只中概我们也十分看好 订阅美股VIP 这份乐观情绪主要基于以下几个关键因素： 企业级AI应用显著提速： 高盛数据显示， 2025年上半年中国企业级大模型的日均 Token 消耗量达到10.2万亿，较2024年下半年激增363%。 这一数据强有力地表明，AI已从概念验证阶段进入大规模商业应用阶段，正成为企业核心业务的一部分。 阿里巴巴的市场领导地位： 高盛援引Omdia报告指出， 阿里巴巴已成功渗透到2025年大多数部署了生成式AI的中国财富500强企业 ，并在这一关键细分市场中占据首位。这种通过 API 调用和 Token 使用量计费的商业模式，让拥有领先AI模型和代理能力的大型云服务商具备了显著的竞争优势。 AI基础设施投资被重新点燃： 在高盛看来，阿里巴巴公布超预期的云业务收入和资本支出后，市场对中国AI基础设施的投资叙事被重新点燃。该行预测， 中国云服务提供商的资本支出在2025年第三季度将同比增长39% ，为AI云收入的持续增长提供了坚实的硬件基础。 估值与增长前景上调： 高盛尤其看好阿里云的潜力， 将其估值从每股ADS 36美元提升至43美元，并上调了阿里云在2026财年第二至第四季度的增长预期。 报告强调，凭借其领先的模型能力、在中国公有云市场47%的份额以及多样化的芯片供应，阿里巴巴不仅在中国市场占据优势，也具备国际化扩张的广阔空间。 高盛分析师将当前的市场阶段与2022年末 ChatGPT 发布后美国市场的情况相类比，当时市场同样给予那些增加AI基础设施资本支出的公司以积极评价，显示出对AI驱动增长模式的强烈信心。 SEC推翻数十年旧规 周三，美国证券交易委员会（SEC）的一项新政，打破了持续数十年的监管惯例，允许上市公司在条款中加入强制仲裁协议，从而将股东纠纷从公开法庭转移到仲裁庭。 此举被SEC主席 Paul Atkins 称为“让 IPO 再次伟大”的关键一步，其核心目标是通过减轻企业的合规负担，重振美国资本市场的活力和吸引力。 监管转向：亲商立场与IPO复兴 这项新政的核心逻辑在于监管松绑以促进 IPO 市场的复兴。 Paul Atkins 明确表示，监管机构将不再仅仅因为公司禁止股东发起集体诉讼而阻止其上市。他指出，SEC旨在通过简化繁复的规则手册，并消除那些无法带来有意义投资保护的合规要求，来最大限度地减少监管不确定性，使得公开上市对更多公司而言成为一个更具吸引力的选项。 这一系列举措显然反映出特朗普Z府任命的监管者正在采取更为亲商的立场，逐步撤销前总统拜登任内所采纳的严格监管及执法议程。 Atkins 进一步透露，SEC未来将继续为新上市公司和中小企业提供更多支持，并扩大已上市公司在公开市场筹集额外资本的能力，这些议题的具体建议正在酝酿之中。 争议焦点：投资者保护与市场透明度 然而，这一政策转向立即引发了市场对投资者保护的强烈担忧。 民主党议员和投资者权益倡导组织警告称，此举将不当削弱股东权利，可能损害令美国资本市场长期以来吸引全球投资者的核心优势。 参议员 Elizabeth Warren 和 Jack Reed 在致SEC的信中直言，允许公司绕开集体诉讼将是一个“重大错误”，会将投资者和市场置于风险之中。 股东权益倡导者认为，这一变化可能削弱市场的透明度，并将权力天平向公司一方倾斜。他们担心，此举可能侵蚀那些历史上吸引全球资本涌入这一最大资本市场的制度优势。 对于普通投资者而言，集体诉讼长期以来被视为在公司出现不当行为时追索损失的有效工具。 仲裁之争：和解金高企与州法律限制 集体诉讼的财务影响是此次政策辩论的焦点之一。根据斯坦福法学院和基石研究的统计，2024年，美国上市公司在证券集体诉讼中的和解总金额高达 37亿美元。 而SEC民主党任命的委员 Caroline Crenshaw 指出，通过集体诉讼返还给受害投资者的金额，远高于SEC自身执法行动追回的款项，去年SEC仅追回了 3.45亿美元。 作为大多数美国上市公司注册地的特拉华州，明确禁止在联邦证券索赔中使用仲裁。然而，这一州级法律的限制也并非牢不可破。近年来，特拉华州在公司注册方面正面临来自得克萨斯州和内华达州等竞争对手的挑战。 如果其他州对强制仲裁条款采取更宽松的立场，可能会吸引一些公司将注册地迁出特拉华州，从而为SEC的新政在实践中提供更多应用空间。 新政策最终将如何影响这一格局，以及企业是否会大规模采用强制仲裁条款，仍有待市场进一步检验。这不仅是对监管理念的一次重大考验，也是对美国资本市场长期竞争力的深刻辩论。 订阅美股VIP ←左右滑动查看更多产品介绍图→ 美股投资网是一家专门研究美股的金融科技公司，2008年成立于美国硅谷，由前纽约证券交易所分析师Ken创立，联合多位摩根斯坦利分析师，谷歌 Meta工程师利用AI和大数据，配合十多年美股实战经验和业内量化模型，建立了一个股市数据库 https://StockWe.com/ 每天处理千万级股票数据：捕捉期权大单，实时主力资金流向、机构持仓变化、川普突发新闻，精准K线信号第一时间发到您手机APP！ 联系方式 客服Telegram MaxMeigu 公众号 TradesMax 邮箱 buy@TradesMax.com 美股大数据 StockWe.com 美股投资网 TradesMax.com"}, {"title": "400亿美金狂潮！美国科技巨头集体“押宝”英国，这张牌到底怎么打？", "date": "2025-09-16", "ym": "2025-09", "time": "2025-09-16 21:04:50", "author": "StockWe.com", "desc": "美联储降息的最大变数", "url": "https://mp.weixin.qq.com/s/7avO-Ftgs87adizW7OiQyw", "path": "sources/news/wechat_mp/articles/400亿美金狂潮-美国科技巨头集体-押宝-英国-这张牌到底怎么打-f5c145e846.md", "len": 2824, "ticks": [], "body": "周二美联储 9 月份政策会议之前，美股涨势暂歇。标普和纳指跌落纪录高位，纳指终结六连涨。截至收盘，标普500指数跌幅0.13%；道指跌幅0.27%；纳指跌幅0.07%。 本周经济数据较为稀疏，但周二零售销售数据的公布为市场提供了重要线索。 美国8月零售销售增长了0.6%，超过了预期的0.2%，这表明尽管面临持续的通胀压力和不稳定的劳动力市场，消费者支出依然强劲。 这一数据反映出美国消费者的韧性，显示尽管通胀高企，消费需求依然稳健。对于未来经济增长的预期，投资者自然会从中寻得一丝乐观情绪，但也未必能完全消除对经济放缓的担忧。 甲骨文（ORCL）股价周二上涨近3%，美股投资网分析认为，甲骨文将加入参与中.美初步协议的企业财团，以支持TikTok继续运营。 根据达成的协议，甲骨文将继续与TikTok保持现有的云服务合作。 甲骨文的服务器负责存储TikTok美国用户的数据，这是TikTok在2022年启动的“德克萨斯计划”（Project Texas）的一部分。该计划旨在确保TikTok的用户数据在美国本土存储，以应对美国Z府的监管要求。 美国财政部长贝森特周一在新闻发布会上表示，在美国之前对TikTok的审查措施出台之前，两大国已经在马德里举行的贸易谈判中就TikTok的协议框架达成了初步共识。预计他们将在周五举行会谈，以完成这一协议的最终细节。 英国成美股科技巨头新增长引擎？ 在周二特朗普总统到访英国之际，一场由华尔街科技巨头主导的资本盛宴正拉开帷幕。 微软、英伟达、谷歌、OpenAI和Salesforce（CRM）等一众美国科技巨头，集体宣布了总额超过400亿美元的巨额投资，旨在将英国打造成为其在欧洲乃至全球的人工智能基础设施新中心。 这其中， 微软计划到2028年向英国豪掷300亿美元，用于建设人工智能基础设施。这笔资金不仅将用于资本扩张，更包括高达151亿美元的业务运营费用。 微软与英国云计算公司Nscale的合作，计划打造英国“规模最大的超级计算机”，这台配备超过2.3万个先进图形处理器（GPU）的设备，无疑将大幅提升微软在英国市场的算力优势。 这不仅是微软海外市场扩张的信号，更可能预示着公司在云计算和人工智能领域的长期增长潜力。 值得注意的是，微软总裁布拉德·史密斯曾对英国的监管环境有所抱怨，但此次巨额投资的落地，无疑表明英国Z府在监管政策上的调整已成功赢得了科技巨头的信任。这是一个积极的信号，它表明全球主要经济体正在为吸引高科技投资而努力，为科技股的全球化发展创造了更好的外部环境。 除了微软，其他美股重量级玩家也纷纷加码： 英伟达宣布与合作伙伴共同投资110亿英镑（约合150亿美元） ，计划部署12万个Blackwell GPU芯片，这是其在欧洲有史以来最大规模的芯片部署。 谷歌母公司Alphabet宣布将向英国人工智能发展投资50亿英镑（约合68亿美元），并在伦敦附近新建数据中心。 OpenAI 的“Stargate UK”计划则与微软的战略紧密相连。虽然 OpenAI 独立进行投资，但其计划在英国部署高达 3.1 万个 GPU 的算力，这无疑将为微软在人工智能领域的长期战略布局带来巨大想象空间。在微软与 OpenAI 紧密的合作关系下，OpenAI 的投资实际上也为微软的云服务和 AI 业务增长提供了动力。 Salesforce 将其在英国的投资额提升至 60 亿美元，这反映了其在企业级软件服务领域的扩张雄心。 美股投资网分析认为，这些巨额投资不仅代表了对英国市场的信心，更重要的是，它们为相关科技巨头在全球化竞争中构建了强大的护城河。 在当前美股市场对人工智能概念追捧的热潮下，这些具体的投资行动为公司的长期增长叙事提供了实实在在的证据，或将进一步提振相关个股，并为纳指、标普500等主要指数注入新的上涨动力。 华尔街聚焦美联储降息 华尔街对美联储将在周三下午2:00（东部时间）宣布降息充满信心。 尽管通胀有所上升，分析师预计劳动力市场的放缓将说服政策制定者降低利率。交易员预计降息25个基点的概率为96%，而降息幅度较大的可能性为4%。 这次为期两天的联邦公开市场委员会（FOMC）会议，其重要性已远超单纯的货币政策决策。除了备受关注的利率设定和未来经济展望，美联储还需应对前所未有的政治压力。 政策与政治的交织 本次会议的一大变数是新任理事斯蒂芬·米兰的加入。作为特朗普总统的最新任命，米兰被广泛预期将投下反对票，力主更大幅度的降息。 他的立场与主流意见相左，也反映出白宫对美联储的持续施压。特朗普总统和财政部长斯科特·贝森特近期多次公开呼吁“大幅降息”，并批评美联储行动滞后。 这种政治干预使得美联储在履行其“物价稳定”和“充分就业”双重使命时，面临愈发复杂的局面。 纽约梅隆银行的策略师约翰·维利斯指出，美联储的两个目标正处于“紧张状态”，而政治化程度的加深让这家央行正面临“愈发复杂的局面”。尽管存在内部分歧，市场仍普遍押注多数票将支持25个基点降息，这凸显了美联储内部中间派的力量。 “点阵图”与鲍威尔的信号 在利率决定基本已成定局的情况下，市场的真正焦点将转向会议结束后发布的“点阵图”和美联储主鲍威尔的新闻发布会。 “点阵图”将勾勒出官员们对未来利率走向的预期。高盛经济学家戴维·梅里克尔预计， 点阵图可能暗示未来还将有两次降息，而非三次。 这与市场的激进预期形成对比，但仍预示着宽松周期的开启。 鲍威尔在新闻发布会上的措辞将成为解读美联储未来政策路径的关键。他在8月怀俄明州杰克逊霍尔的讲话中已释放出“鸽派”（倾向于宽松）信号，强调了劳动力市场的重要性。 市场普遍预计，他将延续这一基调，即便无法完全满足特朗普Z府“大幅降息”的要求，也会通过言辞暗示未来的政策调整，为市场提供进一步的指引。 总之，本次美联储会议的决定虽然没有太多悬念，但其背后的政治角力、内部意见分歧以及对未来经济走向的预测，使得这次会议成为一个至关重要的时刻。它不仅是对当前经济形势的回应，更是一次对美联储独立性及其在复杂环境中平衡双重使命能力的考验。 订阅美股VIP ←左右滑动查看更多产品介绍图→ 美股投资网是一家专门研究美股的金融科技公司，2008年成立于美国硅谷，由前纽约证券交易所分析师Ken创立，联合多位摩根斯坦利分析师，谷歌 Meta工程师利用AI和大数据，配合十多年美股实战经验和业内量化模型，建立了一 ": "https://mp.weixin.qq.com/s/gJLkvXBVKSfMF3Mnbkd-tg", "path": "sources/news/wechat_mp/articles/美股-咖啡-IPO-新玩家来了-Black-Rock-下一个星巴克-85ca9bf7db.md", "len": 4302, "ticks": ["BRCB"], "body": "美国咖啡市场，从来不缺少资本故事。 星巴克（SBUX）以全球化扩张树立行业标杆，Dutch Bros（BROS）凭借区域连锁的高增长赢得资本青睐，而无数中型品牌则在短暂的热潮后归于沉寂。 下周五，来自美国西部的 黑石咖啡（Black Rock Coffee Bar ）美股 代码号BRCB 即将登陆纳斯达克。 资本市场最关心的问题是： 它能否复制 Dutch Bros 的成长曲线，成为投资人新的翻倍机会？ 还是会像大多数中型连锁一样止步于区域化，难以突破天花板？ 在消费环境趋紧、竞争激烈的背景下，它的商业模式与增长逻辑，是否真的具有穿越周期的韧性？ 美股投资网团队成立于美国硅谷 ，投入超百万美元招聘哈佛、清华、北大的数据科学研究员，以及谷歌Meta工程师，从 2008年 开始就专注于打造可媲美高盛、摩根士丹利等华尔街投行级别的AI量化软件工具， 并免费开放给全球美股投资者使用 ，只需登录官网 StockWe.com 美国热线电话 626 378 3637 公司概况 Black Rock 2008 年起家于俄勒冈州比弗顿，如今总部设在亚利桑那州斯科茨代尔。 截至 2025 年 6 月 30 日，公司在全美 7 个州运营 158 家门店，且全部为自营门店。 与不少依赖加盟扩张的同业不同，Black Rock 通过自营模式确保了更高的品牌掌控力和运营一致性，但同时也承担更高的资本开支与资产负担，扩张节奏受限于自身资金实力。 门店以 drive-thru（得来速）和快取形态为主，约四分之三配备室内“lobby”（室内可以停留的区域） 以满足部分停留需求。整体定位直指通勤与社区场景，强调高频触达与效率平衡，而非“第三空间”的高成本叙事。 从产品矩阵看，咖啡仍是核心，但能量饮料 Fuel 系列正在成为第二增长曲线：其销售占比从 2024 年的约 22% 提升至 2025 年上半年的约 24%。 公司同时推进数字化触点——移动点单已占 2025 年二季度门店营收的约 15%，而 2024 年 6 月上线的会员计划在 2025 年 6 月底已积累超 180 万会员，会员订单占比 64%，频次与客单明显高于非会员客群。 经营模型 把 Black Rock 放回线下连锁的传统框架，它讲的是一套经典而有效的增长逻辑： 先把单店模型打磨到稳定，再通过密集开店摊薄总部与供应链成本，从而把门店层面的利润率逐步转化为公司层面的经营利润。 过去几年，公司在西北和西南市场以高密度开店形成规模效应，同时利用数字化触达与菜单创新稳住复购。这一“规模+复购”的双重驱动，使得同店增长和新店扩张形成良性循环。 管理层对外披露的目标，核心是让投资人看懂这套算式：一间新店开业后，大约 18 个月就能跑到“健康水平”。到那时： 单店年均销售额（AUV）约 110 万美元 ； 门店层面利润率维持在 22% 左右 ； 新店的资本投入约 60 万美元 。 换算下来，一家门店在稳定运营后，投资人能够在一年半左右收回成本，并实现 约 40% 的现金回报率 。 美股投资网分析认为， 这意味着 Black Rock 的扩张逻辑并非依赖讲故事，而是基于一套可复制的高回报开店模型。 财务表现 到数据层面，Black Rock 的改善是可量化的。2024 年公司总营收 1.609 亿美元，同比增长 20.8%；2025 年上半年营收 9,521.4 万美元，同比增 24.2%。 更重要的是质量指标：2025 年上半年同店销售增速 10.1%，AUV（门店年均销售）达 122.6 万美元；门店层面利润为 2,754.1 万美元，门店层面利润率提升至 29.0%，优于 2024 年同期的 28.2% 经营利润端同样在抬升。2024 年公司实现 603.3 万美元的经营利润，经营利润率 3.7%；2025 年上半年经营利润 551.8 万美元，经营利润率进一步至 5.8%。按非 GAAP 口径，2025 年上半年调整后 EBITDA 为 1,406.3 万美元，调整后 EBITDA 利润率 14.8%，较上年同期提升 70 个基点。 净利润仍为亏损，但亏损额已收窄至 194.5 万美元，显著好于 2024 年同期的 223.5 万美元亏损。 换句话说，门店“赚钱—总部摊薄—经营利润抬升”的传导链条，已经跑了起来。 成本结构也在顺势优化。2025 年上半年销售及管理费用（SG&A）为 1,474 万美元，同比增 17.3%，但占营收比从 16.4% 降至 15.5%；同一时期，人工成本占比从 21.5% 下降到 20.8%，租占比从 8.4% 下降至 8.0%。这不是“一次性”动作，而是规模扩张带来的自然摊薄与流程效率的小幅累积。 需要承认的是，财务端仍有“短板”需要时间消化 。折旧摊销与开店前费用会在开店加速期持续压制净利表，利息成本也不是小数。2025 年上半年净利息支出 615.7 万美元，同比上升，反映了公司在扩张与再融资过程中的财务负担——这也是管理层在 IPO 中优先处理的事项之一。 竞争格局与定位 美国外出咖啡市场进入成熟期，但得来速与快取场景依旧扩容，尤其在南部与西部。 Black Rock 面对的对手可分两层：全国性龙头如 星巴克（SBUX）与 Dutch Bros（BROS），以及区域连锁如 Scooter’s、7 Brew 等。与巨头相比，Black Rock 在规模与品牌势能上仍有差距。 但在西部与阳光地带的若干城市圈，它通过“区域深化+高密度开店”的打法，叠加更短等待时间、灵活的饮品组合与相对亲民的定价， 已经证明自己具备本地化的效率优势 。它选择的路线并非“全国性对抗”，而是先在确定性更高的区域建立稳固心智份额，再以点带面。 美股投资网分析认为， 这一定位也决定了资本市场的观察框架：它不需要短期内去碰 SBUX 的“第三空间”叙事，也没必要在全国范围复制 BROS 的速度，只要在已进入的市场继续提升密度、稳定同店、控制开店回本周期，它的估值锚会更靠近“优质区域连锁”的范畴，而不是“规模尚小但讲大故事”的那一类。 IPO状况 Black Rock Coffee Bar本次发行大约 1,470 万股，定价区间 16–18 美元，最多可以募资 2.65 亿美元，对应的 估值最高约 8.6 亿美元 。承销阵容豪华，包括摩根大通、杰富瑞和摩根士丹利等一线投行。 公司采用的是一种常见的 Up-C 架构。 简单说，就是上市主体是 C 公司，负责对外融资；真正经营门店的主体仍然是 LLC。 上市后会有三类股.票： A 类是公众投资人持有的，每股一票并享有分红； B 类和 C 类主要掌握在原股东手里，虽然没有分红权，但能配对 LLC 的持股并保证投票权，其中 C 类每股还有 10 票。 这样一来，原股东在经济权被稀释的同时，仍能牢牢控制公司。招股书披露，IPO 完成后公众股东只占 32.3% 的经济利益，表决权更是只有 7.4%，因此 Black Rock 会被纳斯达克认定为“受控公司”。 此外，公司还和原股东签了所谓的 税收利益分享协议（TRA），未来节省下来的税负要拿出 85% 分给原股东。对普通投资人来说，这意味着公司自由现金流的一部分会被长期分走。 从估值角度看，如果把 B、C 类股份全部换算成 A 类，发行后总股本大约 4,781.6 万股。按发行价 16–18 美元计算，公司隐含估值区间在 7.65–8.61 亿美元，中枢大约 8.1 亿美元。 投资人通常会用三条线来衡量：同店销售能否维持在双位数增长，门店层面利润率能否保持在 29% 左右，以及未来两三年能否兑现 20% 的年开店速度。这些指标决定它能拿到“成长型连锁”的估值，还是只能回到“保守现金流模型”。 值得注意的是，这次融资并不是单纯为了“加速开新店”。 根据披露，Black Rock 会先用钱偿还约 1.13 亿美元的循环贷款，同时支付发行费用，并补充日常运营资金。 换句话说，公司更想先减轻财务负担，降低利息开支，再为未来扩张打下更稳的财务基础。 风险点 1、地域与业态的“相关性风险”。得来速与快取业态受通勤流量与郊区化拓展影响显著，一旦本地交通格局、商业动线或人口迁移出现阶段性变化，单店表现会有波动。 2、成本线的刚性。工资、房租、原材料任何一项的超预期波动，都会压缩门店层面利润率，进而影响扩张现金回收。 3、财务与治理结构。Up-C+TRA 的现金分配机制、C 类十票的控制设计，都会让“治理溢价”更倚重对管理层的长期信任；如果经营波动叠加治理预期分歧，二级市场的波动幅度可能放大。 4、，竞争加剧。无论是 SBUX 的“第三空间”升级，还是 BROS 在中西部与南部的继续扩张，区域内的流量与地段竞争都在抬升门店拓展的边际成本。 Black Rock 眼下处在“由量到质”的拐点：同店与门店利润率在改善，经营利润抬升，净亏损收窄；资产负债表在 IPO 后有望减负，现金流质量随之改善。它的估值锚不会来自某个“新概念”，而是来自一套在美国咖啡连锁赛道已经被一再证明的增长范式——稳定的单店质量、可复制的开店节奏、与杠杆相匹配的现金流。 若 2025–2026 年三条线能保持同步，市场会愿意把它纳入“成长组”；反之，它也会回到“防御组”的现金流折现里。对投资者而言，这是一道不复杂、但需要耐心盯数据的题目。 扫描+美股VIP社群 ←左右滑动查看更多产品介绍图→ 美股投资网是一家专门研究美股的金融科技公司，2008年成立于美国硅谷，由前纽约证券交易所分析师Ken创立，联合多位摩根斯坦利分析师，谷歌 Meta工程师利用AI和大数据，配合十多年美股实战经验和业内量化模型，建立了一个股市数据库 https://StockWe.com/ 每天处理千万级股票数据：捕捉期权大单，实时主力资金流向、机构持仓变化、川普突发新闻，精准K线信号第一时间发到您手机APP！ 美股大数据多个核心功能终身免费使用，为什么免费？ 美股投资网的使命就是帮助全球投资者在美股市场做出更明智的决策、把握更多赚钱机会、实现真正以大数据驱动赋能投资，最终让普通人也能像专业机构一样高效投资、稳健获利。 联系方式 客服Telegram MaxMeigu 公众号 TradesMax 邮箱 buy@TradesMax.com 美股大数据 StockWe.com 美股投资网 TradesMax.com"}, {"title": "美股 万亿贷款市场颠覆者！区块链第一股Figure来了！", "date": "2025-09-07", "ym": "2025-09", "time": "2025-09-07 11:42:26", "author": "StockWe.com", "desc": "Figure 会是下一个“加密神话”吗？", "url": "https://mp.weixin.qq.com/s/BriZjv_o4I8ci4jIqN4OfQ", "path": "sources/news/wechat_mp/articles/美股-万亿贷款市场颠覆者-区块链第一股Figure来了-7fe329d9b9.md", "len": 3875, "ticks": [], "body": "在稳定币第一股 Circle（CRCL）以及合规交易所第一股 Bullish（BLSH）相继成功上市之后，华尔街的“加蜜金融三部曲”迎来第三幕。 Figure Technology Solutions，美股代号 FIGR，预计下周四登陆纳斯达克。 与前两家公司不同，Figure 并不依赖“币圈叙事”，而是选择把区块链嵌入美国最传统、体量最大的金融版图——房屋抵押贷款（HELOC）与资产证券化。 因此，这场 IPO 已超越公司本身的意义，更像是一道行业考题：区块链能否真正跳出虚拟资产的泡沫，进入传统金融的核心？ 美股投资网团队成立于美国硅谷 ，投入超百万美元招聘哈佛、清华、北大的数据科学研究员，以及谷歌Meta工程师，从 2008年 开始就专注于打造可媲美高盛、摩根士丹利等华尔街投行级别的AI量化软件工具， 并免费开放给全球美股投资者使用 ，只需登录官网 StockWe.com 美国热线电话 626 378 3637 公司概况与核心业务 Figure 成立于 2018 年， 由 SoFi 联合创始人 Mike Cagney 创办 。Cagney 在 SoFi 已经证明过自己能把互联网思维带入消费金融， 而在 Figure，他选择了更具颠覆性的路径：用区块链重塑贷款和资产流转流程。 Figure 总部位于旧金山，最早的切入口是房屋净值贷款（HELOC）。这是美国居民最常用的一类融资方式，但传统流程繁琐，平均需要 40 多天。 Figure 借助自研的 Provenance 区块链，将审批周期缩短到 10 天左右。 这种效率差距，成为它迅速脱颖而出的关键。截至 2025 年，公司已累计发放超过 160 亿美元的 HELOC。 不过，Figure 并没有止步于自营贷款。它逐步搭建起一个更完整的金融科技平台：向金融机构输出贷款发放系统（LOS），推出贷款撮合市场（Figure Marketplace），开发数字资产注册技术（DART），甚至涉足稳定币和 DeFi。公司自己也很清楚，它要讲的故事不是“区块链公司”，而是“新一代金融基础设施提供商”。 核心业务 Figure 的业务可以拆解为三个层次。 第一层是 贷款业务。HELOC 是 Figure 的基本盘，2025 年上半年贡献了约 75% 的收入。其优势在于效率差异，审批速度是传统机构的四分之一。但 HELOC 高度依赖房地产市场和利率环境，天然存在周期性风险。 第二层是 平台化服务。Figure 向银行和贷款机构提供 LOS 系统，让它们能批量发放贷款；同时搭建了 Figure Marketplace，撮合贷款供需。2023 年平台成交额 34 亿美元，2024 年增至 51 亿美元 ，2025 年上半年已达 25 亿美元，全年有望突破 64 亿美元。 这意味着 Figure 正在从“贷款方”转向“贷款市场”，通过服务和撮合赚取收入。 第三层是 资产端与证券化。Figure 开发了 DART 系统，让贷款资产可以在链上登记和流转。高盛、杰富瑞、德银、巴克莱等华尔街大行，已经成为其客户。这是 Figure 最大的背书之一。 2025 年，公司推出的区块链资产证券化产品，获得了穆迪和标普的 AAA 评级，这在金融史上尚属首次。与此同时，Figure 还推出了全球首个 SEC 批准的计息稳定币，进一步打开了“合规 DeFi”的想象空间。 财务表现 从财务数据来看，Figure 在 2025 年上半年的表现出现了实质性改善。 公司总营收达到 1.91 亿美元，相比 2024 年同期的 1.56 亿美元有显著增长。净利润也实现了由亏转盈：2025 年上半年录得 2,938 万美元净利，而 2024 年同期则亏损 1,286 万美元。 在收入结构方面，贷款出售收益与利息收入依旧是 Figure 的核心来源，合计占总营收的一半以上；此外，生态系统与技术费用也达到 4,375 万美元，显示出平台化业务的贡献正在上升。 在费用端，Figure 的总支出为 1.55 亿美元，其中管理和行政支出 3,524 万美元、技术和产品研发 3,343 万美元，而销售和营销费用为 3,193 万美元，这一比例相比营收显得可控，显示公司正在通过成本结构优化提升效率。 值得注意的是，Figure 在 2023 年还处于 亏损 5,244 万美元的状态，2024 年实现净利 1,992 万美元，到 2025 年上半年净利已扩大到近 3,000 万美元， 这说明盈利趋势逐步明朗。 不过，公司过去几年依然存在利润大幅波动的情况，尤其是 2021–2022 年间长期处于高亏损阶段，这种历史包袱提醒投资者，盈利模式仍需进一步验证。 整体来看，Figure 的财务拐点已经出现，营收持续增长、亏损逐步收窄并转向盈利，但盈利的稳定性仍有待观察。从收入构成上看，它依赖贷款出售和利息收入较多，虽然平台化和生态费用增长迅速，但占比还不够高，未来业务能否进一步去“重资产化”，将决定其盈利的持续性。 行业环境与竞争格局 Figure 所在的数字借贷市场正处于快速增长阶段。根据 Grand View Research，2024 年市场规模为 106 亿美元， 到 2030 年将达到 445 亿美元，年均复合增长率 27.7%。 消费者对贷款速度的要求越来越高，金融机构也在加速数字化转型。 在现实世界资产上链（RWA）领域，Figure 已经处于领先位置。公司披露其市场份额达到 75%，几乎形成了垄断。 这意味着它不仅仅是“贷款公司”，而是最早把区块链大规模应用于资产证券化的玩家。如果 Figure 能持续在合规稳定币、链上证券化等方向取得突破，它有可能在华尔街和区块链之间搭建起真正的桥梁。 与 Klarna、Affirm 等 BNPL 平台不同，Figure 专注的是抵押类贷款，这一定位让它与同行形成差异化。但竞争并不轻松。SoFi、Upstart、LendingClub 等上市公司在不同贷款细分领域已经积累多年经验；OppFi、Coinbase、Ledn 等新玩家也在尝试不同形式的数字借贷。而在传统金融领域，大型银行正在加速数字化，逐步缩小与金融科技公司的差距。 换句话说，Figure 的优势在于效率和技术，但要成为行业长跑的胜利者，它必须把先发优势转化为稳定的规模和生态，否则很容易被更有资源的机构追赶。 风险与挑战 第一个风险是收入过于集中。 目前 HELOC 占到收入的 75%，一旦美国房地产市场进入下行周期，公司营收将首当其冲。 第二个风险是现金流问题 。虽然 Figure 在 2025 年上半年实现了盈利，但过去 12 个月的自由现金流仍为负 4030 万美元，这意味着它在扩张和研发上的资金需求仍需依赖资本市场支持。 第三是监管不确定性。 尤其是稳定币和 DeFi 业务，在美国仍缺乏清晰监管框架。一旦政策收紧，不仅可能增加合规成本，还可能直接限制 Figure 的新业务扩展。 第四是竞争压力 。无论是 SoFi、Upstart 这样的金融科技公司，还是逐渐数字化的传统银行，都可能蚕食 Figure 的市场份额。 最后，公司还存在合作伙伴集中度高的问题。 2025 年上半年，前十大贷款发起合作伙伴贡献了 57% 的交易量，一旦关键合作关系动摇，将影响公司的业务稳定性。 IPO 与未来展望 Figure 此次 IPO 拟募资 5.26 亿美元 ，发行价区间定在 18–20 美元/股 ，对应估值约 41–43 亿美元 。上市后，公司将采用双层股权架构：A 类股每股一票，B 类股每股十票，创始团队将牢牢掌握控制 拉的销售。 电动车咨询平台Electrifying首席执行官吉尼·巴克利表示，该网站自年初以来一直跟踪消费者对特斯拉的态度，结果显示品牌形象正在日益两极化。 超过半数受访者明确表示，他们因马斯克的言行而不愿购买特斯拉。 这意味着，特斯拉已经不再仅仅是一个科技品牌，而逐渐被贴上了政治化标签。这在高度重视价值观与公共形象的欧洲市场，成为极大的负面因素。 降价后的副作用 特斯拉的另一大困境来自价格体系。 为了维持销量，特斯拉自2023年以来在多个市场频繁降价。然而这种策略带来的直接后果是二手残值的大幅下滑。 英国二手车数据机构Marketcheck的数据显示，7月二手特斯拉销量同比暴增270%，看似繁荣，但背后的原因是价格暴跌。Model Y二手价格已较去年同期下跌41%，成为市场中“跌价最快”的车型之一。 对于潜在购车者而言，这种“买新车就立刻贬值”的风险极大削弱了购买意愿。长此以往，新车销量自然难以维系。 总结 特斯拉在欧洲的挑战正在叠加：产品更新乏力、市场竞争激烈、二手车残值崩塌、以及马斯克个人争议引发的品牌受损。相比之下，比亚迪凭借高性价比车型和积极扩张策略迅速抢占市场，逐渐成为欧洲电动车市场的新主角。 扫描+美股VIP社群 ←左右滑动查看更多产品介绍图→ 美股投资网是一家专门研究美股的金融科技公司，2008年成立于美国硅谷，由前纽约证券交易所分析师Ken创立，联合多位摩根斯坦利分析师，谷歌 Meta工程师利用AI和大数据，配合十多年美股实战经验和业内量化模型，建立了一个股市数据库 https://StockWe.com/ 每天处理千万级股票数据：捕捉期权大单，实时主力资金流向、机构持仓变化、川普突发新闻，精准K线信号第一时间发到您手机APP！ 美股大数据多个核心功能终身免费使用，为什么免费？ 美股投资网的使命就是帮助全球投资者在美股市场做出更明智的决策、把握更多赚钱机会、实现真正以大数据驱动赋能投资，最终让普通人也能像专业机构一样高效投资、稳健获利。 联系方式 客服Telegram MaxMeigu 公众号 TradesMax 邮箱 buy@TradesMax.com 美股大数据 StockWe.com 美股投资网 TradesMax.com"}, {"title": "美股一路上涨，很多人会问：既然大家都赚钱了，那输家到底是谁？", "date": "2025-08-31", "ym": "2025-08", "time": "2025-08-31 21:08:42", "author": "StockWe.com", "desc": "美股是零和博弈吗？", "url": "https://mp.weixin.qq.com/s/uatV_0-8ljRY8kBfemMZaQ", "path": "sources/news/wechat_mp/articles/美股一路上涨-很多人会问-既然大家都赚钱了-那输家到底是谁-bca28ad402.md", "len": 2229, "ticks": [], "body": "很多人都有这样的疑问。表面上看，股市里买的人越来越多，指数一路走高，仿佛人人都能赚钱。但真相远比想象复杂。 首先要明确一个概念： 股市并不是一个严格的零和游戏 。所谓零和博弈，指的是一方的收益必然来自另一方的损失，比如扑克或期货合约。但股市不同，它背后的核心是经济增长。当人类社会的生产力不断提升，企业的盈利能力持续增强，整体经济规模每年都在扩张时，资本市场自然能分享这一红利。也就是说，从长期看，大家是有机会一起受益的，这就是股市“共赢”的基础逻辑。 可如果股市真的能长期上涨，人人都知道会涨，那为什么全世界的人不都买美股？美国人自己又为什么要去上班呢？答案很简单： 股价上涨的背后，并不是所有公司都具备同样的价值逻辑。 举个例子，股价上涨大致可以分为两类情况： 第一类，公司本身的盈利能力极强，每年业绩稳步递增，还持续分红 。这类公司股价上涨，本质是企业价值的真实提升。买入它的投资者，就像巴菲特一样进行长期价值投资，基本不存在明显的“输家”。这种上涨，背后是企业创造的财富在不断分配。 真实案例：苹果（Apple, AAPL） 苹果的股价在过去二十年上涨了数百倍。背后并不是单纯的资金游戏，而是 iPhone、iPad、Mac、可穿戴设备和服务业务不断创造出巨额现金流。公司不仅年年盈利增长，还持续回购股.票和分红。 这种上涨的受益者是所有长期持有的股东，几乎没有所谓的“输家”。 第二类，公司并没有特别突出的竞争力，但在市场炒作下被“多头资金”相中。 先是一波资金推动股价快速上涨，吸引大量投资者（无论是机构还是散户）蜂拥而入。当这些多头在高位逐步卖出、撤走支撑后，股价往往就会回落。最终，接盘的后来者成为了被“收割”的那一批。 真实案例：GameStop（GME，2021年“散户大战华尔街”） GameStop原本是一家前景平平的线下游戏零售商，基本面并不亮眼。但在2021年初，Reddit散户抱团推高股价，从不到20美元一路暴涨到400多美元。 在这波疯狂上涨中，早期进场的散户和部分对冲基金赚得盆满钵满，但后来跟风的投资者，大量是在高位接盘，最终股价回落，很多人亏损惨重。这就是典型的 “资金推动上涨→吸引追涨买入→主力出货→股价下跌” 的过程。 除了企业盈利成长和资金炒作之外，股价上涨还有哪些真实原因。 1. 行业趋势或结构性机会 有些美股上涨，是因为整个行业进入快速发展期，市场规模大幅扩张，而企业占据有利位置。 真实案例： 奈飞（Netflix, NFLX） 奈飞股价在2007-2020年一路上涨，并非短期炒作，而是因为流媒体行业爆发，公司抢占先机，用户量和收入持续增长。 本质：股价上涨反映了行业空间和市场份额增长，而非公司单一业绩增速。 2. 政策或宏观环境推动 有些上涨是政策、法规或宏观趋势带来的红利。 真实案例： 特斯拉（Tesla, TSLA） 美国和中国对新能源车的补贴政策、碳排放标准提高，使电动车需求大幅提升，推动股价上涨。 本质：政策利好改变了市场预期，即使企业短期利润不高，股价也会被推高。 3. 市场预期和未来成长空间 有些公司短期业绩一般，但市场预期其未来潜力巨大，股价提前反映未来增长。 真实案例： 亚马逊（Amazon, AMZN） 早期亚马逊连续亏损，但投资者看好电商和云计算长期潜力，股价持续上涨。 本质：股价上涨是对未来现金流预期的折现，而不是当前盈利。 4. 企业结构性变革或创新驱动 有些美股上涨，源于公司战略调整、产品创新或技术突破。 真实案例： 英伟达（Nvidia, NVDA） GPU业务最初只是游戏显卡，但随着AI和数据中心需求爆发，股价随技术创新和市场扩张大幅上涨。 本质：股价上涨来源于创新驱动的成长预期，而非传统的稳健盈利。 5. 并购、重组或资产价值释放 企业通过并购、出售资产或战略重组，可以释放潜在价值，从而推动股价。 案例： 迪士尼（Disney, DIS） 收购21世纪福克斯后，资产组合扩展，内容版权和流媒体业务得到增强，股价随战略落地上涨。 本质：股价上涨反映了资本运作和资产价值重估。 因此， 美股的持续上涨并不意味着人人都能赚钱。 真正长期获益的，往往是选择了优质企业并长期持有的投资者；而那些盲目追涨、追逐短期热门题材的资金，很可能就是输家。股市表面上热闹非凡，但赢家和输家的分化，始终真实存在。 扫描+美股VIP社群 ←左右滑动查看更多产品介绍图→ 美股投资网是一家专门研究美股的金融科技公司，2008年成立于美国硅谷，由前纽约证券交易所分析师Ken创立，联合多位摩根斯坦利分析师，谷歌 Meta工程师利用AI和大数据，配合十多年美股实战经验和业内量化模型，建立了一个股市数据库 https://StockWe.com/ 每天处理千万级股票数据：捕捉期权大单，实时主力资金流向、机构持仓变化、川普突发新闻，精准K线信号第一时间发到您手机APP！ 美股大数据多个核心功能终身免费使用，为什么免费？ 美股投资网的使命就是帮助全球投资者在美股市场做出更明智的决策、把握更多赚钱机会、实现真正以大数据驱动赋能投资，最终让普通人也能像专业机构一样高效投资、稳健获利。 联系方式 客服Telegram MaxMeigu 公众号 TradesMax 邮箱 buy@TradesMax.com 美股大数据 StockWe.com 美股投资网 TradesMax.com"}, {"title": "时间才是人生的最重要的货币，钱不是！", "date": "2025-08-30", "ym": "2025-08", "time": "2025-08-30 19:28:49", "author": "StockWe.com", "desc": "投资哲学", "url": "https://mp.weixin.qq.com/s/xeu8sze-_veGeSIzxlgpgg", "path": "sources/news/wechat_mp/articles/时间才是人生的最重要的货币-钱不是-ee1a89dbe6.md", "len": 494, "ticks": [], "body": "我有一个秘密要分享 —— 嘘…… 在你拥有了最初的 200-300 万美刀时、一套还清贷款的房子和一辆好车之后，你和 杰夫·贝索斯 的生活质量就没有区别了。你们在人世间的时间都是有限的，你的寿命甚至可能是杰夫的两倍，那你就比他更富有。汉堡还是那个汉堡，不论是亿万富翁吃，还是你吃。 钱不过是一张纸，或者是你手机应用里的一个数字。真正的生活是 ime": "2025-08-26 00:20:24", "author": "StockWe.com", "desc": "特朗普在其社交媒体上高调宣布解除现任美联储理事丽莎·库克（Lisa Cook）的职务，并称“立即生效”。此举", "url": "https://mp.weixin.qq.com/s/X8ftrUF_-Aj11JcnCe09Dw", "path": "sources/news/wechat_mp/articles/突发-历史首次-特朗普-开除-美联储理事-bba89014fa.md", "len": 1342, "ticks": [], "body": "特朗普在其社交媒体上高调宣布解除现任美联储理事丽莎·库克（Lisa Cook）的职务，并称“立即生效”。 此举迅速震动华尔街，美国股指期货应声下跌，而黄金、日元等避险资产则迅速走高。市场的即时反应不仅是对单一事件的恐慌， 更深层次地反映出投资者对美国金融体系核心—— 美联储独立性的担忧 。 在特朗普发布的信件中，他援引了联邦住房金融局（FHFA）局长比尔·普尔特于8月15日向美国司法部提交的一份刑事移交材料。该材料指控库克在2021年办理抵押贷款时存在欺诈行为，涉嫌在密歇根州和佐治亚州的两处房产贷款申请中，均虚报为“主要住所”以获取更优惠的贷款条款。特朗普称这一行为“不可想象”，并质疑库克的诚信与作为金融监管者的胜任力。 然而，这些指控尚未经过法庭证实，司法部也仅表示将对此展开调查。面对特朗普此前在社交媒体上发出的辞职呼吁，库克已公开回应，表示自己“没有任何打算因威胁而辞职”，并将通过合法程序澄清事实。 特朗普的这一举动之所以引发轩然大波，正是因为它直接挑战了美国政府体制中一项长期以来备受尊重的核心原则—— 美联储的独立性。 如果特朗普成功罢免库克，将创下美国历史先例—— 在任美联储理事被总统解职 。根据《联邦储备法》，总统只有在存在“正当理由”（for cause）的情况下才能罢免美联储理事，例如渎职、失职或犯罪行为，而不是因政策分歧。 并且特朗普已经在七人理事会中拥有 两名“自己人” ，加上不久前提名的新成员，如果库克真的被替换，他手中就将有四个席位，从而掌握多数。从而达到 “掌控美联储 ”的目的！届时，美联储的政策走向可能会被彻底重塑，其独立性也将遭受前所未有的挑战。 不少分析人士直言，短期市场也许能消化这次震荡，但长期来看，美联储一旦被认为受到政治操控，美元和美债的全球信用地位将遭遇根本性动摇。一旦货币政策决策沦为政治筹码，后果难以估量。 特朗普的这一动作，无疑是“掌控美联储”计划的重要一步。从历史看，美国总统与央行之间的摩擦并不少见，但从未有人真正跨出解职理事的这一步。今天，这道防火墙被撞开了一个口子。未来几个月，美联储是否还能保持“独立神话”，或许才是全球金融市场真正需要担心的问题。 ←左右滑动查看更多产品介绍图→ 扫描+高端VIP社群 美股投资网是一家专门研究美股的金融科技公司，2008年成立于美国硅谷，由前纽约证券交易所分析师Ken创立，联合多位摩根斯坦利分析师，谷歌 Meta工程师利用AI和大数据，配合十多年美股实战经验和业内量化模型，建立了一个股市数据库 https://StockWe.com/ 每天处理千万级股票数据：捕捉期权大单，实时主力资金流向、机构持仓变化、川普突发新闻，精准买卖信号第一时间发到您手机APP！ 美股大数据多个核心功能终身免费使用，为什么免费？ 美股投资网的使命就是帮助全球投资者在美股市场做出更明智的决策、把握更多赚钱机会、实现真正以大数据驱动赋能投资，最终让普通人也能像专业机构一样高效投资、稳健获利。 联系方式 客服Telegram MaxMeigu 公众号 TradesMax 邮箱 buy@TradesMax.com 美股大数据 StockWe.com 美股投资网 TradesMax.com"}, {"title": "美股 英伟达8月财报前瞻预测，万字深度报告 NVDA", "date": "2025-08-25", "ym": "2025-08", "time": "2025-08-25 20:06:57", "author": "前纽约证券Ken", "desc": "英伟达重磅深度！", "url": "https://mp.weixin.qq.com/s/9-O6ccJNCdoQnnzJG4z8SA", "path": "sources/news/wechat_mp/articles/美股-英伟达8月财报前瞻预测-万字深度报告-NVDA-99a4540a96.md", "len": 7782, "ticks": ["NVDA"], "body": "我们美股投资网是唯一敢在英伟达财报前，明确亮明自己观点的频道！从2024年2月19日至今，我们已经连续做了六次英伟达财报前瞻，其中 5次全部正确。 这一次我们也参考了大量的资料，力求用数据说话！ 我们这次对英伟达财报判断是：大概率超预期。 但重点在于，英伟达的股价已经提前消化了大量利好，想要在这个位置来一波大涨，难度比之前可要大得多。 换句话说，涨没问题，但不期望会暴涨。 在接近 180 美元的高位，还有什么催化剂能让股价更上一层楼？ 华尔街的巨头们，是真的在加码押注，还是已经开始悄然撤退？ “中国变量”，究竟是压在头上的不确定性，还是翻盘的隐藏机会？ 面对市场里越来越响的“泡沫论”，我们该如何区分情绪喧嚣与真实逻辑？ 在容错率几乎为零的当下，什么样的指引能点燃市场，什么样的措辞又会瞬间踩雷？ 今天，我们就会从这些维度，带你拨开数据的表面，看到背后真正的逻辑。本次分析，将是全网独一无二的深度解读。如果你想领先市场一步，千万不要错过任何一个细节。 美股投资网 团队成立于美国硅谷 ，投入超百万美元招聘哈佛、清华、北大的数据科学研究员，以及谷歌Meta工程师，从 2008年 开始就专注于打造可媲美高盛、摩根士丹利等华尔街投行级别的AI量化软件工具，并 免费开放给全球美股投资者使用 ，只需登录官网 StockWe.com 美国热线 626 378 3637 英伟达未来三大催化剂 英伟达如今的市值已经飙到 4.34 万亿美元（截止上周五），比日本一整年的GDP还要高。 英伟达之所以这么牛绝不仅仅因为GPU卖得好，那只是表层的故事。 真正让资本市场疯狂的是，它数次财报里透露出来的对未来AI时代垄断地位的巨大预期。 曾成功投资过脸书推特Robinhood和Coinbase的美国顶级的风险投资（a16z）表示过，英伟达的优势，并非只是GPU性能，还有其围绕芯片，在网络、内存、供应链及产业生态上建立的护城河。 问题是， 资本市场的逻辑残酷——没有永远的神，只有下一个催化剂。 英伟达要想撑住，甚至突破 4.34 万亿美元的市值，就必须不断拿出新的增长故事。 那么接下来的催化剂有什么？ 数据中心资本开支的大幅增长 要匹配英伟达当前的市值，数据中心业务必须保持高速成长 ，因为这是它最大的现金奶牛，也是所有AI叙事的底层支撑。如果这一块不继续高速增长，所有华丽的估值都只是一座空中楼阁。 接下来，就得看英伟达最核心的客户：四大云计算巨头。 亚马逊2025 财年资本开支预计 1000–1200 亿美元，并公布了单州 200 亿美元数据中心落地计划。 微软单季资本开支已突破 300 亿美元，全年接近 900 亿美元，预计26财年将超过1200亿美元。 谷歌2025 年资本开支已上调至850 亿美元（此前 750 亿），并暗示 2026 年还会进一步上行。 Meta 也将 2025 年指引提升至 660–720 亿美元，全部砸向 AI 基建。 合计来看，2025年四巨头资本开支总额约 3640亿美元，同比暴增57%，占到全球云资本开支增量的77%。 这不再是“要不要采购算力”的犹豫期，而是已经进入了“以更快的速度、更大的规模进行资本投入”的行动期。 除了云巨头，英伟达的 GPU 正在被新型云服务商和 AI 基建公司大举扫货。 被称为“算力军火商”的 CoreWeave，在 7 月 3 日率先部署全球首台 GB300 NVL72。 并在指引中直言：未来 6 个月资本开支将激增 357%，以持续接收更多 Blackwell 集群。 AI 基建新贵 NBIS 则计划在 2025 年底上线 GB300 Ultra NVL72 实例，并已开放预订。 为加速扩容，公司发行了 10 亿美元可转债，专门投入英国新建的数据中心，首期就要部署 4000 颗 NVIDIA GPU，目标在 2026 年前实现超 1GW 的供电能力。 要说谁的算力胃口最大，还得是 AI 实验室。 OpenAI：计划在 2025 年底让在线 GPU 规模突破 100 万张，为 GPT-5 及后续模型提供训练与推理支持。 虽然没有公开点名供应商，但从现有性能和生态绑定来看，主力依然大概率是英伟达的 GPU。 xAI（马斯克的 Grok）：五年内要做到 50 ExaFLOPS 的训练算力， 也就是每秒能跑 50 百亿次运算，折算下来差不多相当于 5000 万张 H100。 7 月 22 日，马斯克还在推特上晒出 Colossus 2 数据中心的照片，紫色线缆密密麻麻直连 GB200 服务器——这不是概念图，而是正在落地的第二套超算集群，仅这一波就要用掉 55 万颗 GB200/GB300。 从云巨头到新兴玩家，再到 AI 实验室，全球正爆发一场“算力军备竞赛”，而英伟达是唯一的军火商。 ODM服务器厂商需求爆发 资本开支说明了客户“准备砸钱”，但能真正证明市场热度的，是ODM厂商的交付节奏。因为只有当GPU被装进机架、推到客户机房，需求才算真正落地。 以富士康为例，今年第二季度其 AI 服务器业务同比大增 60%，比第一季度的 54% 进一步提速。更值得关注的是下半年的指引： 公司预计第三季度 AI 服务器收入将同比飙升 170%，机架出货量在一个季度内环比暴增三倍。 换句话说，客户下单的芯片，正像被装上了传送带，以闪电般的速度从工厂流向了客户的机房。 而富士康并不是特例，而是整个行业的缩影。 KGI 最新数据显示，2025 年（台.弯）前三大 ODM 厂商（富士康、纬创、广达）合计 GB200/GB300 AI 服务器出货量预计达到 27,000–28,000 机架。 其中，第四季度单季有望突破 1 万机架，而第三季度的交付速度为“环比增速超过 300%”。 放眼全球也是同样的节奏。 TrendForce 预测 2025 年全球 AI 服务器出货量将再增 24.3%； 并进一步判断，2022–2027 年期间，全球 AI 服务器出货量的年复合增长率将达到约 27%。无论是在台系 ODM 的生产线上，还是在全球云厂商的预算表里，唯一不变的是同一个方向：所有新增资源，几乎都在奔向 AI 算力。 软件与生态货币化 前两个催化剂已经证明 GPU “卖得动”，而能把曲线拉长的，是英伟达把硬件优势转成持续的软件与云服务收入。 最核心的护城河来自 CUDA 生态。 据美股投资网了解到，全球超过 600万开发者依赖 NVIDIA 的 CUDA平台构建 AI 和其他应用 ； 而 Business Insider 指出，CUDA 已成长为一个包含 900 多个库的庞大生态系统，是英伟达 AI 统治地位的核心壁垒 。这种“锁死式依赖”，让开发者和企业难以跳出生态。 在此之上，软件和云服务开始改写商业模式。AI Enterprise 与行业巨头深度结合： Verizon 将其纳入私有 5G 方案，Oracle 则在 OCI 平台原生集成了 160 多种 AI 工具。 客户不再只是买一台 GPU 就结束，而是像订阅 Netflix 一样，持续付费、持续使用。这种模式让英伟达在卖硬件之外，还能不断产生经常性现金流。 而在云端与落地环节，DGX Cloud 与 NIM 补上了最后一块拼图。前者被分析机构估算具备100亿美元级的年化收入潜力，展示了“算力即服务”的巨大空间；后者则通过推理微服务，让企业能像安装引擎一样，把 AI 应用快速投产。英伟达不再只是交付一块芯片，而是帮助客户把算力用起来，并持续收取服务费。一次性的买卖，转变为长期稳定的收益。 三大催化剂，形成了一条完整的逻辑链： 需求爆发 → 出货兑现 → 生态变现。 云厂商和实验室的资本开支，把 GPU 需求推到极限；ODM 的机架交付，让订单快速落地；软件与云服务的生态锁定，则把一次性买卖转化为长期现金流。 这就是英伟达的真正底牌：它不仅卖得动，还能持续赚；不仅有今天的爆发，还有未来的延伸。只要全球算力军备竞赛还在加速，英伟达的增长故事，就远远没有讲完。 它的同行博通，其股价的上涨则更多基于公司提供的明晰指引——AI收入将在FY25与FY26年同比增长60%。 这一预期也令高盛认为，博通、英伟达股价的上涨不仅不是“泡沫”，而是反映更清晰的中期基本面改善路径。 接下来的内容更加精彩，文章很长没看完，先点赞收藏，关键时刻能帮忙！ 华尔街集体看好！机构资金动向 在资本市场这一端，华尔街机构也在用自己的仓位，给英伟达的未来投下信任票。 上周，至少有九家华尔街大机构齐刷刷上调了英伟达的12个月目标价，把平均目标价推到了194美元的新高。 按上周三的收盘价来算，这意味着股价还有超过10%的上涨空间。其中，摩根士丹利、瑞银、Wedbush、KeyBanc等头部投行都在其中。 在这九家里，最激进的是 Cantor Fitzgerald，直接喊出 240 美元的目标价，对应潜在反弹空间高达 36.8%（截止上周三）。最保守的汇丰也提到 200 美元，一口气把目标价上调 60%。 数字很亮眼，但光说不练假把式。分析师们目标价喊得再响亮，关键还是要看华尔街真金白银的流向。二季度 13F 持仓显示： 摩根大通增持 4148 万股； 先锋增持 3946 万股； 高盛增持2137 万股，还加仓1705万份看涨期权 (CALL) 美国银行则增持超 1561万份 CALL； 巴克莱银行增持 1270 万股； 道富银行也加了 955 万股。 这只是冰山一角。根据13F全机构持仓报告，更清晰看到： 前十大重仓持有英伟达的机构数量，从 1769 家增至 2158 家，环比 +21.9% ；新开仓机构暴增 43% 至 346 家；同时，清仓机构数锐减三分之一，减仓机构数也下降 8.3%。意味着资金结构整体是“偏多”的。 不过，机构们也没完全无脑乐观。 二季度看涨期权的数量增加10.6%，但看跌期权的数量增加得更快，高达 38.7% 。PUT/CALL 比率从 1.32 升到了 1.65，涨幅接近 26%。这说明，机构虽然看多，但他们也在用期权做保护性对冲。 将分析视角聚焦到对冲基金，我们能更好地理解市场的短期情绪和潜在风险。和追求稳健的大机构不同，对冲基金目标就是“快、准、狠”，善用杠杆和衍生品搏取绝对收益，动作激进，也因此常被视为短期市场的“晴雨表”。 Q2 有 441 家对冲基金把英伟达放进了前十大重仓，比上季度多了 30%。 持有英伟达的对冲基金数量从 769 增加到 791，总持股规模也从 21.7 亿股增加到了 22.8 亿股。 他们在期权上的操作，与全体机构形成对比。 对冲基金在二季度Call 增加了 2%，而 Put 下降了7%。 这让 PUT/CALL 比率从 1.32 降到了 1.20。换句话说，对冲基金是在押注上涨，比传统机构激进一些。 结论到这里就很清晰了，长期看，英伟达已经是华尔街的必选筹码；短期看，它却是分歧最集中的战场。传统大机构边买边防守，对冲基金则油门踩到底押注上涨——这种错位，决定了英伟达股价未来既有坚实支撑，也会有更大波动。 风险回报比 三大催化剂和机构加仓，已经把英伟达的“多头逻辑”解释得很清楚。但问题是—— 股价站在高位，市场对它的容错率极低。 这个时候，风险回报比就成了投资者最该盯紧的关键。 英伟达这次财报，如果只是“不错”的数据，市场反应可能不大；但要想再拉出大的涨幅，必须拿出远超预期的新东西。反过来，下跌的触发点却简单得多。 看看前车之鉴：亚马逊二季度各项数据全面超预期，但因三季度指引不给力，股价盘后一度大跌 7%–8%；谷歌同样如此，Q2 营收同比大增 14%，依然 beat 预期，可因为把资本开支提高到 850 亿压缩了现金流，财报当晚股价跌超 2%。他们尚且如此，更何况容错率更低的英伟达。 与此同时，市场上关于“AI 泡沫”的声音再度升温。OpenAI CEO Sam Altman 坦言 AI 商业化的落地没想象中快；Meta 暂停 AI 部门招聘的消息，也让投资者心头一紧；MIT 的研究更直接，称当前 95% 的 AI 创业公司还在亏损。 三条信号叠加，让人很容易联想到 2000 年互联网泡沫破裂前的场景。 但是摩根大通报告却显示，计划未来五年，企业会削减10%后台人员，美国电信巨头AT&T借助AI减少30%的呼叫中心流量，T-Mobile预期到2027年可削减75%的客户服务接触量。 当前争议核心在于AI基础设施投资的可持续性。高盛预计，到2030年，全球财富500强企业可节省高达9350亿美元的成本，占其总成本的约14%，AI投资的净现值回报约为7800亿美元，相对于3500亿美元的累计投资仍显示正向回报。 中国市场的“变量” 最后我们来谈，英伟达一道绕不过去的考题——中国市场。 上周四，英伟达通知部分供应商暂停 H20（专门为中国市场定制的 AI 芯片）的生产。要息一出，很多人第一反应就是——英伟达在中国的生意完了？ 但你想想，黄仁勋会坐以待毙吗？他可是个精明的商人，绝对不会眼睁睁看着这块占公司 13% 营收的大蛋糕拱手让人。 据我们美股投资网得到的消息，英伟达正在加班加点研发一款新的 B30A 芯片，最快 9月就能送样品。 这颗芯片用的是最新的 Blackwell架构，性能大概是B300的一半，但对之前被吐槽太弱的H20来说，简直就是“降维打击”。 简单说，中国客户终于能在合规的框架下，用上真正“能打”的Blackwell芯片了。 这背后的好处太大了：销量能回升，价格能卖得更高，利润也会更好。 但关键就在于：能不能卖。 一方面，美国Z府必须点头。 川普已经释放信号，允许卖“缩水版”，但要返还中国收入的 15% 作为代价； 另一方面，中国市场也必须买账 ，得明确 B30A 符合进口审批。只有两边同时放行，B30A 才能成为英伟达的“中国 复活卡”。 市场对这一点极度敏感。本月初 AMD 虽然交出的财报并不差，但因在电话会上强调中国需求不确定，股价暴跌 9.5%。这给投资者提了个醒：哪怕整体业绩稳健，中国市场的负面信号依然可能压低股价。 因此，本次财报发布会上， 黄仁勋的措辞至关重要。如果他能释放出“中国芯片销售不确定性正在减弱”的信号，股价大概率会走强；反之，一旦言辞谨慎甚至偏保守，市场可能立刻用下跌来回应。 此外，就像我上次财报中讲到过的一样，黄仁勋其实特别聪明，他很清楚市场想听什么。以前英伟达动不动就给出季度 15%、20% 的增长指引，结果预期拉太高，没达到财报后股价就大跌。 拿 2024 年第四季度来说，公司收入是 393 亿美元，对 2 策调整的时机已经到来”，随后美联储在9月开启了降息周期。 市场普遍预期，只要鲍威尔在本次讲话中不明确排除9月降息的可能性，都会被解读为“鸽派”信号。 这种情绪也体现在投资者的行动上。 据美股投资网了解到，有交易员直接投入1000万美元购买看涨期权，豪赌鲍威尔将释放鸽派信号。 这些期权主要集中在SOFR（担保隔夜融资利率）期权上，表明市场对美联储降息的预期非常强烈。如果美联储如市场预期那样降息，这些期权可能带来 高达1亿美元的利润。 同时，摩根大通的美债客户调查也显示，债市投资者正从看空转向中性，表明对周五讲话前的下行风险并不那么担忧。 3、来自Z府层面的强大政治压力 除了经济数据和美联储内部的政策考量，来自Z府层面的政治压力也是市场敢于押注降息的重要原因。特朗普及其盟友正在积极推动美联储降息，并希望现任主席鲍威尔能在明年任期届满前提前离职。 美国总统特朗普的坚定盟友、联邦住房金融署署长比尔·普尔特周三宣布，向美国司法部提交美联储理事 Lisa Cook（丽莎·库克） 涉嫌贷款抵押欺诈的刑事移送函。 普尔特强调，抵押贷款欺诈是一项严重罪行，最高可判处30年监禁，同时呼吁库克引咎辞职。 特朗普总统迅速作出回应，他引用了该封信作为依据，并强烈呼吁：“Cook必须立即辞职！！！” 如果库克辞职，毫无疑问将为特朗普在美联储董事会安插支持降息的人选创造机会。 特朗普也已多次公开表示，他只会任命“支持降息”的人士担任下一任美联储主席。 美股投资网分析认为，市场的信心，很大程度上建立在对未来政策走向的预期上。当Z府高层持续向美联储施压，要求其降息以支持经济时，市场会将其解读为： 政策转向的可能性增加： 这种公开的施压，让投资者相信美联储未来的货币政策可能不再仅仅由经济数据决定，而是会更多地考虑政治因素。这会增加降息的确定性，从而提振市场情绪。 降息幅度和速度或将加快： 尤其在美联储理事被调查的事件中，市场看到了特朗普阵营通过人事变动来影响美联储决策的可能。如果亲降息的官员得以进入美联储决策层，那么未来降息的幅度和速度都有可能超出市场此前的预期，这对于美股而言是一个强烈的利好信号。 为“Buy the Dip”提供信心： 当市场出现下跌时，投资者需要一个强有力的理由来支持他们逢低买入。而“政治施压导致未来降息”的预期，正好提供了这样一个理由。它让投资者相信，即使短期有波动，但长期来看，政策面的支持将为美股提供坚实的底部。 ←左右滑动查看更多产品介绍图→ 扫描+高端VIP社群 美股投资网是一家专门研究美股的金融科技公司，2008年成立于美国硅谷，由前纽约证券交易所分析师Ken创立，联合多位摩根斯坦利分析师，谷歌 Meta工程师利用AI和大数据，配合十多年美股实战经验和业内量化模型，建立了一个股市数据库 https://StockWe.com/ 每天处理千万级股票数据：捕捉期权大单，实时主力资金流向、机构持仓变化、川普突发新闻，精准买卖信号第一时间发到您手机APP！ 美股大数据多个核心功能终身免费使用，为什么免费？ 美股投资网的使命就是帮助全球投资者在美股市场做出更明智的决策、把握更多赚钱机会、实现真正以大数据驱动赋能投资，最终让普通人也能像专业机构一样高效投资、稳健获利。 联系方式 客服Telegram MaxMeigu 公众号 TradesMax 邮箱 buy@TradesMax.com 美股大数据 StockWe.com 美股投资网 TradesMax.com"}, {"title": "美股 最神秘对冲基金6小时横扫印度股市8000万！105页报告揭秘它操盘具体手法，普通人也能学！", "date": "2025-08-18", "ym": "2025-08", "time": "2025-08-18 20:30:26", "author": "前纽约证券Ken", "desc": "超重磅深度", "url": "https://mp.weixin.qq.com/s/BE7O1xaJmjGOCtwQEXVkLg", "path": "sources/news/wechat_mp/articles/美股-最神秘对冲基金6小时横扫印度股市8000万-105页报告揭秘它操盘具体手法-普通人也能学-ab26a8e14d.md", "len": 6809, "ticks": [], "body": "两周前7月27日我们公开发视频，深度分析了医保巨头UNH暴跌的真相、是否被错杀、公司的财务状况、未来反转的机会。我们还对标NFLX和CRWD这些明星公司是怎么经历低谷期后“反转爆发”的走势逻辑。 我们明确提示捞底UNH！ 上周四盘后，巴菲特领导的伯克希尔哈撒韦公布了二季度持仓报告，正式披露他们以约16亿美元建仓了503.9万股UNH。这个消息一出，UNH上周五开盘直接暴涨超13%！ 巴菲特老爷子一直强调“买好公司，在好价格买入，并长期持有”。这次他出手UNH的平均建仓成本在317美元左右。 而我们美股投资网在3个月前的建仓价格是260美元，比“股神”低了近60美元。 而今天，我们将揭秘一家神秘的对冲基金， 简街资本（Jane Street） ，这家公司几乎从不公开露面，既不上市，也不接受采访，甚至连员工在领英上都不敢透露公司名字。 然而，过去两年，它悄然从印度市场“收割”了高达 40多亿美元 的巨额财富。更震撼的是，它曾在短短 6小时内净赚超8000万美元 。 而就在上个月，印度监管机构发布了一份长达105页的报告，披露了大量细节，揭开这家神秘对冲基金操纵市场的真实手法。 接下来，我将带你深入一步步解析这份报告，看看简街究竟如何运用那些堪称“天才”的策略——通过股.票与期权的巧妙组合，将市场的剧烈波动化为可观利润。 看完这期深度文章，你不仅能了解他们的思路，还能学到许多实用的套利技巧，比如 Delta 对冲 和 Gamma 剥头皮（Gamma Scalping） 。听起来是不是很高深？但在我们美股投资网，一直都是把这些超出大众认知的硬核干货，用最通俗的方式讲给你！ 这里是 美股投资网 ，由 前纽约证券交易所分析师Ken创立 ，我们团队成立于美国硅谷，投入超百万美元招聘 哈佛、清华、北大 的数据科学研究员，以及 谷歌Meta工程师 ，从 2008年 开始就专注于打造可媲美高盛、摩根士丹利等华尔街投行级别的AI量化软件工具， 并免费开放给全球美股投资者使用 ，只需登录 官网 StockWe.com 美国热线电话 626 378 3637 简街资本介绍 成立于 1999 年的简街，更像是一家“披着金融外衣的科技公司”。自创立之初，简街就没有沿用传统金融业的思维模式，而是将技术与算法视为核心驱动力，把交易的竞争优势建立在数据处理能力和高速计算之上。 简街内部有一个超级庞大的OCaml编程代码库，这是一种非常硬核、很少有机构会用的语言。但正是因为它，简街才能实现更快、更稳定的交易指令。在硬件方面，他们甚至自己开发并部署了FPGA（可编程芯片）系统，把交易速度压榨到了毫秒以下。 这意味着什么？当别人还在用鼠标操作、等待交易确认时，简街的程序已经完成了下单、成交、套利、撤单，整个过程一气呵成。 在简街的世界里，交易不再是简单的“低买高卖”，而是代码之间的极限竞速，是程序和市场微观结构的“智力游戏”。正是凭借这种技术上的绝对优势，简街才能在全球200多个市场、45个国家快速部署套利模型，打造出一个堪称“量化核武器”的金融系统。 日内指数操纵策略 日内指数操纵策略的核心，其实是通过在一天内分两个阶段精确操控股.票和期货市场的价格，诱导指数走势，从而在期权市场中精准获利。 听起来很复杂，但我们拿2024年1月17日他们对印度银行股指数（BANKNIFTY ）的一次操作来举例，很快你就明白了。 第一步：制造“虚假繁荣” 当日开盘时，印度银行股指数（BANKNIFTY ）直接大跳水，从前一天的48,125点，低开到了46,573点。 这指数仅由12只成分股组成，相比美国标普500指数（包含500家公司），印度银行股指数成分股数量少、权重高度集中，要操纵起来简直太容易了！ 就在市场一片恐慌时，简街出手了。从上午9:15到9:22，他们集中买入这印度银行股指数的12只成分股，合计投入超过437亿印度卢比，约合5.26亿美元。 这几张图展示了他们在股.票和期货市场“压倒性买入”的力度——短短几分钟内， 买盘占比 高达市场成交的15%-25%， 直接将指数从低点“硬拉”。 这里要注意的是简街的买单中， 有大量订单都是以高于或等于最新成交价的价格挂出的。 这是一种明显的‘进攻性’买入，他们的 目的是通过持续地用高价扫货 ，像用强心剂一样强行拉升价格，制造一种市场非常强势的假象，进而带动整个市场情绪反转。 美股投资网分析认为，这种现象正是由这指数成分股数量少、市值不高且流动性有限所造成的。像简街这样资金体量足够大的机构，完全有能力在关键节点上有效撬动整个指数的走势。 最终，这波扫货成功地把印度银行股指数从开盘的低点46573.95点，直接推高到了47212.75点，涨幅超过600点。 第二步：在“高位”布局反向头寸 随着简街强行拉升指数，整个期权市场的定价体系也迅速“失衡”。 一方面，看涨期权的隐含波动率被市场情绪放大，价格飙升；另一方面，看跌期权则因市场预期转乐观，被系统性低估。这种非对称的定价错位，正是简街下一步反向套利的理想环境。 就在日内这个高位，简街出手了——一边重仓买入价格被低估的Put期权，赌市场回落；一边大量卖出价格虚高的Call期权，提前锁定高溢价收益。 值得注意的是，这一天是 期权到期的日子（expiry day），因为这时候期权对指数的变动最敏感：只要指数动一点，期权价格就会成倍跳动，小成本、放大利润，非常适合“短时间误导市场”来套利。 根据印度证券交易委员会（SEBI）披露的数据， 简街在印度银行股指数上布下3211亿卢比的看跌期权头寸，规模是其现金/期货多头的7.3倍——典型的“以小撬大”反向套利。 其实，简街用的这套操作是从两种经典的做市商策略中演化出来的——Delta对冲（Delta Hedge） 和 Gamma剥头皮（Gamma Scalping）。 Delta对冲，是为了控制期权持仓的方向性风险。 举个例子：你买了一张看涨期权，赌的是市场会上涨。问题是，万一行情突然掉头，你的期权就可能大幅亏损。为了规避这种风险，交易员会同时买入或卖出一部分对应的股.票或期货头寸，不断微调，让组合的方向性风险（Delta）接近 0——就像在高速公路上不断修正方向盘，始终沿着正确轨迹行驶。 而 Gamma剥头皮则是更主动的进攻型玩法。 你不必预测市场方向，只要行情来回震荡，就可以低买高卖、频繁调仓，把波动变成利润。 这要求对市场节奏的精准捕捉和对冲比例的高速调整能力 ——而简街，正是靠这一点，把技术优势变成了利润优势。 但让这两种策略在印度市场特别有效的原因，1.战术本身厉害2.期权市场的极端放大效应 。 根据SEBI披露的数据， 在某些交易日里，印度银行股指数的期权成交额是股.票市场的353倍。 这意味着绝大多数交易者根本没直接接触指数成分股本身，而是在围绕这些衍生品“下注方向”。于是只要推动指数有一点点短期波动，就能在期权市场掀起巨浪——而这片巨浪，正是简街真正收割利润的主战场。 第三步：反手“收割”完成闭环 当市场被彻底带节奏之后，简街开始有节奏的“收网”。从当日11:49开始，直到收盘前，简街开始持续出货，系统性地平掉此前阶段建立的大量多头仓位，成为当天印度银行股指数成分股和相关期货合约的最大净卖方。 这波砸盘之狠，让他们 在短短几个小时内净卖出高达537.2亿卢比的仓位 ，直接把指数压回到接近早盘低点。 而这个收盘价，恰好“完美匹配”他们在期权市场早已布局好的看跌仓位。 最终，尽管简街在股.票和期货市场上小幅亏损了6.16亿印度卢比，但他们通过看跌期权的反向套利操作，一举斩获了高达73亿卢比的利润。换算下来，这场仅持续6小时的交易，为他们净赚超过8000万美元。套利闭环精密、高效，堪称一次 教科书级别的“结构性剥头皮”。 其实，这种操作简街不止干过一次。根据SEBI的统计在另外 14 个期权到期日里，简街用同样套路，在期权市场净赚 391.4 亿印度卢比（约 4.7 亿美元），同时在股.票与期货端仅亏损 199.7 亿印度卢比（约 2.4 亿美元）。换句话说，简街用“小亏”撬动“巨额利润”，而且屡试不爽。 接下来的内容更加精彩，文章很长没看完，先点赞收藏，关键时刻能帮忙！ 延长收盘价操纵策略 延长收盘价操纵策略的核心是在交易日快结束的时候，他们会通过非常激进的交易手法，去影响最后的收盘价。目的只有一个，就是让这个收盘价对他们的期权结算最有利，从而把利润做到最大。 2024年7月10日，对银行股的“看跌”收割案例 以2024年7月10日的印度银行股指数为例， 当天也是该指数期权的结算日 。简街在这一天的大部分时间里都表现得很“低调”，几乎没有表现出明确的方向性意图。 然而，下午14:30:00 至下午15:30:00（收盘前最后一小时）内： 现货市场抛售BANKNIFTY的成分股，金额约为16.3亿卢比； 股.票期货市场卖出了190亿卢比，其中单只成分股期货合约卖出额高达 40亿卢比。 此外还抛售了73.5亿卢比的BANKNIFTY指数期货。 加总下来 ，短短45分他们总共卖出约 280亿卢比（≈ 3.37 亿美元） ， 且股.票期货市场的成交量占到了全市场 35% 以上 ——说明当时简街几乎是压倒性的主导力量。 跟上一个案例类似，他们的卖单下单位置极具“攻击性”。以HDFCBANK为例， 简街在其现金和期货市场中，有92%-93%的交易，都是挂在等于或低于最近成交价（LTP）的位置。 这是明显的压盘动作，目的是强行拉低指数的收盘价。 而真正的杀招，其实埋在期权市场里。 从14:30开始，简街在期权端同步操作：一边大量买入看跌期权（Put），一边反手卖出看涨期权（Call），迅速建立起一个庞大的负Delta敞口——也就是标准的“做空结构”。 短短一小时内，这个负Delta仓位就从2722.5亿卢比拉升到4415.3亿卢比，几乎加仓了七成。 简而言之，他们砸盘是有明确目标的——就是要让收盘价落在对Put最有利的结算点位上，锁死利润最大化。 最终， 这套组合拳为简街带来了高达 56亿卢比（约6750万美元） 的盈利，而这还只是SEBI点名记录的三次‘延长收盘价操纵’中的其中一次。” 2025年5月15日，对NIFTY指数的“看涨”拉升案例 类似的战术也出现在了 2025年5月15日，NIFTY指数（Nifty 50）的期权到期日，只不过这次简街的目标是做多。 当天前半段，简街依旧“按兵不动”。直到下午13:26，突然发力，全面扫货、强行拉升指数。 他们在股.票期货市场一口气买入了 491亿卢比， 仅是 HDFCBANK 一个品种的买入力度就占了当日全市场交易额的 22.69%。 同时， 他们又加码买入了 250亿卢比的 NIFTY 指数期货，占全天总成交的 近25% 。 两笔合起来，短短两小时，他们就在股.票和期货端砸进了超过 700亿卢比的买单。 而这场操作的“灵魂”，依旧在期权市场。他们同步加码 Call、反手做空 Put，净 Delta 敞口从开盘的 负1712.5亿卢比，一路冲高到收盘的 正3829.7亿卢比。 单日方向性波动高达 5542.2亿卢比 ，简直像用巨型杠杆把整个市场抬了起来。 这还不是一次性的偶然成功。尽管简街在2025年2月曾收到印度NSE（国家证交所）发出的警告信，但他们依旧在后续的两次NIFTY期权到期日重复了类似操作，完全不害怕监管“喊话”。 美股投资网分析认为，相比前面介绍的“三阶段建仓-砸盘”策略，这种“尾盘控价”打法要更简单直接，也更高效——只要能控制最后一小时的指数走向，就足以改写整个期权市场的结算结果。 要知道， 哪怕标的指数只在收盘时小幅变动1%，在高杠杆期权上都可能带来 10 倍、20 倍甚至百倍的利润。 这就是延长收盘价操纵的精髓： 低成本撬动高收益。 简街并不在意最终涨了还是跌了，他们只关心——收盘价是否落在自己的“利润区间”内。只要做到这一点，就能在期权市场“满载而归”。 简街案例启示 我们总以为市场是理性的，只要抓住基本面、看准趋势，就能赚钱。但简街的操作让人彻底清醒：很多看似“自然”的涨跌，其实是被系统性制造出来的幻象。他们靠的不是什么天才预判，而是提前设好局，通过精准控制股.票和期货价格，引导整个市场情绪，为自己的期权头寸创造“最有利的剧本”。当你看到指数突然暴涨时，他们早已在暗处布好仓位，等待你的跟风来为他们买单。 更重要的是，这种策略能反复奏效，不是因为市场无知，而是因为市场结构允许。比如在印度市场，期权成交量远远超过股.票，12只成分股构成的银行股指数非常容易被操纵。这也告诉我们，当市场结构不稳、价格由极少数力量主导时，你看到的波动，往往不再是机会，而是一种陷阱。而期权这种高杠杆工具，本质上放大了这类陷阱的伤害——它让聪明的钱赚得更快，也让看不清局势的人赔得更狠。 所以普通投资者真正该学到的，不是如何复制简街的手法——我们没有他们的速度、系统和资金。 但我们能做的是，少一点盲目判断，多一点结构认知。 学会在市场中保持怀疑和冷静，尤其是当“反转”“暴涨”“直线跳水”这些情绪信号频繁出现时，先别动手，别头脑一热就追高，先问一句：“谁在背后制造这一切？暴涨背后是否有利好支撑？”只有这样，你才不会成为他们剧本里那个按下买入键的“关键角色”。 打开官网StockWe.com订阅我们VIP会员获得更多有深度、有价值的内容和分析。 ←左右滑动查看更多产品介绍图→ 精彩深度文章回顾 最全美股K线视频， 解读每一个形态背后的含义! 美股8月重磅IPO！Bullish与MIAX能否成为下一个CRCL？ 美股 揭秘价值千万的选股逻辑！ 看懂秒变高手，轻松抓住10倍、100倍机会！ 美股 2025年最强科技股上市，设计软件独角兽Figma深度分析！会是下一个CRCL吗？ 美股 英伟达 10万亿市值潜力！背后逻辑分析！ 美股 CRCL是否值得捞底？ HOOD要颠覆美股投资的方式！ 两只美股，准备入手，潜力巨大！ 美股6月必捞四只股，全新上市！CRCL...... 美股 英伟达后市分析，解读背后关键数据，被大家忽略的长期风险！ 英伟达5月财报预测，深度分析报告 NVDA 美股 解密一条公式，让你投资稳定盈利！ 自动驾驶将在今年大爆发！ 这四家美股公司必须关注！ TSLA LYFT 美股META财报预测，捞底两家公司！ 支撑美股大跌后反弹的底层逻辑！ 捞底前必看！ 每次经济衰退前，这8个信号都提前预警了美股大跌！ 特朗普搞崩英伟达，盘后暴跌6%！是否迎来捞底机会？ 美股4月2日将变盘！交易策略公开，长期看涨的动力因素有哪些？ 特斯拉反弹是否能持续？ 从暴跌背后看做空机构资本运作规律！ 【深度报告】英伟达2025年2月财报预测！业内人士爆料 美股 下一个PLTR HIMS APP如何找？ 他们都有什么共同点？ 美股 特斯拉1月财报预测，风险预警！ 2025年最有潜力10只美股【下集】 不为人知的AI公司！ 异常，导致交易数据和订单簿不稳定。 技术团队及时采取“回滚”措施，将平台恢复至故障前状态，但这一操作导致部分交易数据作废或重做，这对于交易所来说是“零容忍”的红线，提醒管理层必须加强系统上线、变更到应急的全链路管控。 MIAX 更像是“防守里带锋芒”的公司，凭借交易费、数据和清算业务提供稳定现金流，技术外销和多平台份额提升带来中速增长。若数字资产业务的监管环境和机构需求改善，它可能迎来陡峭增长。这不是短期的涨停，而是通过打基础实现长远复利效果。 风险同样存在。市场份额竞争激烈，CBOE 和纳斯达克的做市生态和清算网络粘性强，MIAX 需要不断提高性能、优化规则和成本来撬动存量市场。系统故障的零容忍是交易所的铁律，Sapphire 故障再次提醒它必须加强全链路内控。数字资产业务的节奏取决于政策窗口的开启，这需要耐心等待。 综合来看，MIAX 的估值逻辑不在于炒作概念，而在于把可复制的基础设施模式做厚、做深。IPO 募资先降杠杆，再推进迈阿密场内和海外复制，叠加交易量和机构需求回升，这是它最现实的上行路径。对投资者来说，这不是一笔短线投机，而是押注一家业务稳健、现金流扎实，并且在数字资产领域还有额外增长潜力的公司。 打开官网 StockWe.com 订阅我们VIP 获得更多有深度、有价值的内容和分析。 加蜜货币交易所Bullish 第二家是币圈重量级 IPO——Bullish。成立于 2021 年。 由前纽约证券交易所总裁 Tom Farley 掌舵。 这位曾推动多项美股制度改革的老将，熟悉每一条规则与权力网络，在加蜜世界更像一位手握全局航图的航海者——清楚监管浅滩与资本顺流，懂得何时扬帆、何时减速，精准把握驶向华尔街的时机。 6 月 17 日，特朗普签署《天才法案》，不到两个月，Bullish 就递交了上市申请。这几乎不可能是巧合，而是政策敏感度与执行力的最佳体现。 Bullish背后有着豪华资本阵容—— 由区块链公司Block.one孵化，彼得·蒂尔领投（创始人基金、蒂尔资本）、野村证券及“加蜜牛市旗手”迈克·诺沃格拉茨悉数押注。 前纽交所高管与华尔街资本的组合，本身就为其IPO增添想象空间。 本周一，Bullish 向监管机构递交最新文件，计 划发行约 2,030 万股，定价区间 28 至 31 美元，对应目标估值约 40 亿美元，募资最高可达 6.293亿美元。 贝莱德（BlackRock）与“木头姐”凯西·伍德旗下的 ARK 投资已确认参投 ，为市场信心再添一把火。 有了 Farley 的监管视野，加上华尔街资本的长期支持，Bullish 从创立之初就没有走加蜜行业常见的“轻资产、轻监管”试错路线，而是以“双主线”战略切入，定位在行业的“基础设施层”——这才有了它今天的两盘棋。 第一盘棋：全球合规交易基础设施 大多数加蜜平台只负责撮合交易，而Bullish一开始就选择造一套“全功能交易所发动机”，将清算、保证金管理、流动性服务、风险控制，甚至即将上线的期权交易全部纳入一个体系。这种设计不仅让系统更稳，也让机构客户更容易进场。 截至 2025 年一季度，Bullish 支持的交易对已经超过 115 个，涵盖Bitcoin（BTC）、以太坊（ETH）等主流币种，也在切入各种 Altcoin（除Bitcoin以外的加蜜货币）衍生品市场。它与全球二十多家流动性提供方和量化做市团队签署合作，引入分层费率机制，先把大宗交易的深度和稳定性做扎实。 第二盘棋：信息与数据生态 Bullish先后收购加蜜行业头部新闻网站CoinDesk和权威数据服务商CCData，直接握住三个关键入口— —新闻媒体、数据平台和可交易的加蜜指数 。三者相互联动：媒体制造热点与关注度，数据提供权威分析，指数则能直接转化为可交易产品。当交易量被带动起来，又会反过来丰富数据和新闻内容，形成一个“自带流量、闭环变现”的循环。 正是因为拥有“交易平台+信息生态”的双轮驱动，Bullish的定位与Coinbase、CCData完全不同。Coinbase更像一个面向大众的交易入口，Binance是全球流动性集散地，而Bullish想做的，是加蜜世界的“纳斯达克”——将交易、清算、数据与舆论全部掌握在手，构建贯穿市场上下游的全栈基础设施。 谈到竞争。Bullish 要面对的战场并不轻松——一边是美股牌照齐全、品牌稳固的老牌交易平台，如 Coinbase、Robinhood、Webull；另一边是去中心化交易所（DeFi），以超低手续费、极速撮合和“资产自托管”持续吸引加蜜原生用户。 它的突围点不在于单纯抢交易入口，而是用全栈生态留住机构和活跃用户：既和 Coinbase 争夺合规机构市场，又用深度和流动性优势，对抗 DeFi 的价格竞争。 同一赛道上，Circle（CRCL 人事变动等。投资者在权衡宏观政策与企业基本面的同时，仍在加大对核心科技龙头的布局，推动指数在高位延续强势。 美股多空博弈进入关键时期 美股市场进入多空力量胶着的关键时期。美国经济释放出疲软信号，投资者正权衡人工智能热潮与经济基本面走弱之间的张力。 华尔街分析师Jan-Patrick Barnert指出，多头开始质疑，AI题材的热度是否足以单独支撑市场，尤其在关税压力、通胀侵蚀及劳动力市场降温的背景下。 高盛合伙人Richard Privorotsky强调， 关税实质上是一种税收 ，而通胀已经削弱实际收入，经济正处于周期末端，就业市场维持“不裁员，也不招人”的低动态状态。 在市场宽度收窄、科技股权重攀至历史高位的环境下，投资者对冲风险的难度明显上升。 据高盛数据，今年其周期股与防御性股.票的对比指标已两度触及历史高点，显示市场仍在为经济增长定价，但一旦出现持续回撤，平衡可能被迅速打破。 短期波动背后：情绪脆弱与资金流博弈 7月美股的反弹，很大程度依赖于市场对AI前景的乐观情绪。 大型科技股继续主导基准指数表现，但交易的拥挤化令市场广度趋窄、潜在风险积聚。与此同时，关税与通胀的叠加效应给美国经济增长带来挑战。 Yardeni Research创始人Ed Yardeni认为，部分投资者寄望美联储在经济减弱时降息，以压低债券收益率并提振增长。 然而，在高估值与集中持仓的条件下，做空主流指数的风险显著， 一旦AI热度盖过疲弱的经济数据，空头可能遭遇挤压。 这也是为何部分交易员回归经典的周期股与防御股配比策略应对经济放缓。 高盛交易员警告，该组合在当前宏观背景下可能出现14%-21%的回撤空间。 系统性交易资金流同样左右市场节奏。 CTA策略已高度扩张，需要更多上涨动能与波动率收缩才能加仓，而欧洲股指的下行触发点比标普500更接近。野村策略师Charlie McElligott分析称，本轮波动可能引发部分波动率控制基金的压力，但幅度有限；而财报季尾声的企业回购，则在短期内提供了一定支撑。 当前的下行压力依旧受限，本周未出现连续抛售。但若有超过一天的下跌，现货市场可能进一步平仓，并打击空头波动率供应。市场参与者正密切观察即将公布的经济数据，以判断这轮波动只是短期调整，还是经济步入更深层放缓的信号。 美股财报季进入“零容忍”模式 今年二季度财报季，美股投资者对业绩的反应可谓前所未有地严苛。 Evercore ISI数据显示，标普500指数成分股中已有超过三分之二披露财报，那些每股收益（EPS）与销售额双双不及预期的公司，财报发布当日股价平均跌幅高达7.4%——远高于过去五年3.2的常规水平。 值得注意的是，即便只在一项指标上未达标，即便另一项超出预期，股价跌幅也超过历史均值。这意味着，财报发布后股价能够上涨的公司，几乎都是“双达标”的完美答卷。 在标普500自4月低点反弹30%、逼近历史新高的背景下，这种“零容忍”反应显然并非偶然，而是市场心理的必然产物——估值已处高位，投资者对任何瑕疵的容忍度降至冰点。 典型案例：好坏消息都可能引爆抛压 近期，一些重量级个股的走势清晰体现了这种情绪变化： 诺和诺德（NVO.US）：销售额不及预期，单日暴跌逾20%。 超微电脑（SMCI.US）：同样因销售额失望，股价重挫近20%。 AMD（AMD.US）：数据中心营收与预期持平，但仍下跌超过8%。 美股投资网分析认为，这种现象的本质在于——当前市场不仅仅在交易业绩本身，更在交易“隐性预期” 。当估值、股价、情绪都被推到高位时，即使交出的成绩单不差，也可能因不够惊艳而遭到资金无情调仓。 Annex财富管理首席经济学家雅各布森的判断印证了这一点：“投资者似乎已没有耐心容忍任何一项指标不达标的公司。” 美股今年在6月份和7月创历史新高时，公司内部人士却对自家股票日趋谨慎。 周五，据媒体报道，数据显示，7月仅有不到三分之一的标普500公司出现内部人士增持，创下2018年以来最低水平。内部人士买卖比例降至长期平均水平的近一半，为四年来第二低点。 这一异常表现与市场的乐观情绪形成鲜明对比，凸显了最了解公司内情的高管们对当前估值的担忧。 Roundhill Investments首席执行官Dave Mazza表示： 企业高管现在的行为很像机构投资者：谨慎、保守，对估值敏感。最了解公司的人正在告诉你，大部分利好消息已经被市场消化。 内部人士抛售创多年新低，估值担忧驱动谨慎情绪 7月份标普500公司中仅有不到三分之一出现内部人士增持，这一比例创下2018年以来的最低纪录。与此同时，内部人士的买卖比例大幅下滑，目前仅为长期平均水平的约一半。 接下来，所有目光将聚焦英伟达 随着财报季逐渐进入尾声，市场的注意力已经提前转向 8月27日——英伟达财报 公布之日。 这家AI芯片龙头自4月低点以来股价飙升超85%，其业绩仍被普遍看好，但在如此强势的累计涨幅之后， 即便交出亮眼成绩，也可能因“利好兑现”而引发短期波动。 美银证券分析师维韦克·阿里亚在本周报告中指出，维持英伟达“买入”评级、目标价220美元，但警告财报前后可能出现震荡。 美股投资网分析认为，这一轮的“零容忍”模式背后有三个核心逻辑： 估值压力：标普500和纳指均在高位运行，市场预期已经非常满。任何低于预期的业绩都会迅速触发风险规避。 资金偏好集中化：今年以来资金高度集中在少数科技龙头，市场宽度收窄，使得单一权重股的情绪影响被放大。 交易节奏快化：量化资金和算法交易放大了财报日的波动，一旦预期落空，卖压会被迅速放大。 ←左右滑动查看更多产品介绍图→ 美股投资网是一家专门研究美股的金融科技公司，2008年成立于美国硅谷，由前纽约证券交易所分析师Ken创立，联合多位摩根斯坦利分析师，谷歌 Meta工程师利用AI和大数据，配合十多年美股实战经验和业内量化模型，建立了一个股市数据库 https://StockWe.com/ 每天处理千万级股票数据：捕捉期权大单，实时主力资金流向、机构持仓变化、川普突发新闻，精准买卖信号第一时间发到您手机APP！ 美股大数据多个核心功能终身免费使用，为什么免费？ 美股投资网的使命就是帮助全球投资者在美股市场做出更明智的决策、把握更多赚钱机会、实现真正以大数据驱动赋能投资，最终让普通人也能像专业机构一样高效投资、稳健获利。 联系方式 客服Telegram MaxMeigu 公众号 TradesMax 邮箱 buy@TradesMax.com 美股大数据 StockWe.com 美股投资网 TradesMax.com"}, {"title": "突发！知情人士称马斯克或将解散 Dojo项目，放弃自研芯片", "date": "2025-08-07", "ym": "2025-08", "time": "2025-08-07 21:06:58", "author": "StockWe.com", "desc": "特斯拉的新利空！", "url": "https://mp.weixin.qq.com/s/0jcXvpx8EoVYvG8RSi7Gzg", "path": "sources/news/wechat_mp/articles/突发-知情人士称马斯克或将解散-Dojo项目-放弃自研芯片-0ba4abb75e.md", "len": 1470, "ticks": [], "body": "据知情人士透露， 特斯拉正在解散其内部的Dojo超级计算机团队， 这标志着这家电动汽车巨头在自主研发无人驾驶芯片的道路上迎来重大转折。 Dojo负责人Peter Bannon也将离职。 这 一决定意 味着，特斯拉将放弃其耗资数十亿美元、旨在通过自研芯片增强AI计算能力的核心战略，转而更依赖外部合作伙伴。 Dojo的曲折之路 Dojo项目曾被寄予厚望，被视为特斯拉在人工智能竞赛中的关键武器。这款由特斯拉自主设计的超级计算机，旨在利用其庞大的车队数据，快速训练自动驾驶和完全自动驾驶（FSD）软件背后的机器学习模型，同时还为人形机器人“擎天柱”（Optimus）的研发提供算力支持。 投行摩根士丹利甚至在2023年大胆预测，Dojo如果取得成功，可能为特斯拉增加高达5000亿美元的估值，使其成为无可匹敌的竞争优势。 不过。马斯克在近期财报电话会议上的表态，已经为这一转变埋下伏笔。他当时暗示，未来的内部芯片开发可能与合作伙伴的技术实现“融合”。去年，马斯克更是坦言， 公司在Dojo和英伟达之间同时押注，但“Dojo更像是一次豪赌”。 随着Dojo团队的解散，这一“赌注”最终被宣告结束。 特斯拉未来的计算能力将更加依赖英伟达和AMD等外部技术伙伴，而芯片制造则将交由三星电子负责。 就在上周， 特斯拉宣布与三星签署了价值165亿美元的协议 ，进一步印证了这一战略调整。 特斯拉AI团队面临严峻考验 Dojo团队的解散，也引发了一系列的人才流动。 据透露，约有20名Dojo团队成员已经跳槽到新创立的DensityAI公司。 这家由Dojo前负责人Ganesh Venkataramanan等人创立的公司，正在研发用于驱动AI数据中心的芯片、硬件和软件，其应用领域涵盖机器人、AI代理和汽车等多个方面。值得注意的是，前特斯拉投资者关系副总裁Martin Viecha也已加入该公司担任顾问。 这一系列的人才流失，仅仅是特斯拉今年以来所面临挑战的一部分。面对日益激烈的市场竞争、销售下滑以及马斯克政治立场引发的争议，特斯拉近期遭遇了关键人才的集中出走。包括擎天柱项目工程主管Milan Kovac和软件工程副总裁David Lau等核心人物相继离职，马斯克多年的亲信Omea
