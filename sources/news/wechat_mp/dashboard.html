<html lang="zh-CN">
<head>
<meta charset="utf-8">

<title>美股投资网 · 公众号文章库</title>
<style>
  :root{
    --bg:#0f1419; --panel:#1a2029; --panel2:#222b36; --line:#2c3744;
    --ink:#e6edf3; --muted:#8b98a5; --accent:#4ca3ff; --accent2:#ffb454;
    --green:#3fb950; --red:#f85149;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
    line-height:1.6;font-size:14px}
  .wrap{max-width:1180px;margin:0 auto;padding:24px 20px 80px}
  header h1{margin:0 0 4px;font-size:22px}
  header .sub{color:var(--muted);font-size:13px}
  .cards{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:20px 0}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px 16px}
  .card .k{color:var(--muted);font-size:12px;margin-bottom:4px}
  .card .v{font-size:22px;font-weight:700}
  .card .v small{font-size:12px;font-weight:400;color:var(--muted)}
  section{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:16px 18px;margin:16px 0}
  section h2{margin:0 0 14px;font-size:15px;color:var(--accent)}
  /* monthly chart */
  .chart{display:flex;align-items:flex-end;gap:4px;height:160px;overflow-x:auto;padding-bottom:4px}
  .bar{flex:1 0 26px;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%}
  .bar .col{width:100%;background:linear-gradient(180deg,var(--accent),#2b6cb0);border-radius:4px 4px 0 0;min-height:2px;transition:.2s}
  .bar .col:hover{background:var(--accent2)}
  .bar .n{font-size:11px;color:var(--muted);margin-bottom:3px}
  .bar .lab{font-size:10px;color:var(--muted);margin-top:5px;writing-mode:vertical-rl;white-space:nowrap}
  /* ticker chips */
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{background:var(--panel2);border:1px solid var(--line);border-radius:20px;padding:4px 12px;cursor:pointer;font-size:13px;user-select:none}
  .chip:hover{border-color:var(--accent)}
  .chip.active{background:var(--accent);color:#06121f;border-color:var(--accent);font-weight:600}
  .chip b{color:var(--accent2);margin-left:5px;font-weight:700}
  .chip.active b{color:#06121f}
  /* controls */
  .controls{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:6px}
  input[type=search],select{background:var(--panel2);border:1px solid var(--line);color:var(--ink);
    border-radius:8px;padding:8px 12px;font-size:14px;font-family:inherit}
  input[type=search]{flex:1;min-width:220px}
  .hint{color:var(--muted);font-size:12px}
  /* list */
  .item{border:1px solid var(--line);border-radius:10px;margin:10px 0;overflow:hidden;background:var(--panel2)}
  .item .head{padding:12px 14px;cursor:pointer;display:flex;gap:12px;align-items:flex-start}
  .item .head:hover{background:#27313d}
  .item .meta{flex:0 0 96px;color:var(--muted);font-size:12px}
  .item .meta .len{display:block;margin-top:3px}
  .item .ti{flex:1;font-weight:600}
  .item .ti .d{display:block;color:var(--muted);font-weight:400;font-size:12.5px;margin-top:4px}
  .item .ti .tk{display:inline-block;background:#13202e;color:var(--accent);border:1px solid var(--line);
    border-radius:4px;padding:0 6px;font-size:11px;margin:4px 4px 0 0;font-weight:600}
  .item .body{display:none;padding:0 16px 16px;border-top:1px solid var(--line);white-space:pre-wrap;
    color:#cdd9e5;font-size:13.5px;max-height:520px;overflow:auto}
  .item.open .body{display:block}
  .item .links{margin:10px 0 0;font-size:12.5px}
  .item .links a{color:var(--accent);text-decoration:none;margin-right:16px}
  .item .links a:hover{text-decoration:underline}
  .empty{color:var(--muted);text-align:center;padding:40px}
  mark{background:var(--accent2);color:#06121f;border-radius:2px}
  .note{color:var(--muted);font-size:12px;margin-top:6px}
  a.clean{color:var(--accent);text-decoration:none}
</style>
</head>

<div class="wrap">
  <header>

    <div class="hint" id="count"></div>
    <div id="list"></div>
  </section>
</div>

本质上是为了维护 IPO 定价稳定性，并减少短期套利行为对承销体系的冲击。 散户为了保住打新资格，想卖也只能通过券商指定渠道，把筹码定向回售给承销商或场外机构，不能挂到公开市场上。 这个规则在暴涨时把散户筹码彻底锁死，制造了无货可买的假象；但它在暴跌时却成了致命的“催化剂”——由于散户筹码无法在公开市场上正常换手和提供流动性，导致市场一旦变盘，公开交易区直接出现了买盘断层，形成高空无支撑的“流动性黑洞”。 第三阶段：三大指数的“快车道”让主动资金抢跑 如果说前两个阶段是“缺货”，那么第三阶段就是“明牌套现预期”。 纳斯达克今年 5 月的新规明确：市值排前 40 的巨型 IPO，纳入纳指 100 的等待期从 3 个月缩短到了 15 个交易日。这意味着 SPCX 最快 7 月 1 日前后就能被正式纳入。 更关键的是，考虑到自由流通盘只有 4%，纳斯达克允许把 SPCX 的权重临时乘以 3 倍。法国巴黎银行测算，这个 3 倍乘数会强制追踪纳指 100 的被动基金，在纳入后的第一个月内，无条件买入 80 亿到 300 亿美元的正股。 同时，MSCI 和富时罗素也全部开启了快车道跟进。这些指数基金的买入是完全不看价格的——不管股价多高，到了日子都得按权重硬买。 这就给市场上的主动型资金提供了一个清晰的抢跑机会：既然两周后有几百亿被动资金必须高位接盘，那现在最好的策略就是提前买入、拉高股价，到时候再倒手卖给指数基金。这种确定的套利预期，直接把二级市场的买盘推向了疯狂。 然而，当全市场的聪明钱都聚在一起玩这场“抢跑游戏”时，博弈在盘中提前见顶了。一旦主动资金发现股价已经超额透支了指数基金的接盘能力，抢跑就会瞬间变成提前砸盘踩踏。 第四阶段：衍生品引发“伽马挤压”，全球资金共振 当主动资金把股价拉高之后，衍生品市场的工具相继推出，给现货市场加上了更强的杠杆。 首先是杠杆 ETF 的推动。上市第二天，很多发行商就推出了 2 倍做多 SPCX 的单 股.票 ETF。由于这些杠杆工具在每天结算时需要调整仓位，股价每上涨一定幅度，基金做市商为了对冲风险，就必须在二级市场买入更多 SPCX 正股，形成了第一轮被动买盘。 而更核心的定价权转移，来自于 SPCX 期权产品的正式挂牌交易。 根据美股大数据 StockWe.com 的统计，SPCX 期权在上市首日共录得约 180 万张合约的成交量，名义权利金成交额接近 28 亿美元，直接刷新了美股新股期权上市首日的历史纪录。 当天多头占据了绝对主导，看涨看跌比高达 1.7 比 1，市场资金甚至在大举扫货 7 月到期、行权价在 300 美元和 325 美元的远期虚值看涨期权。 这种极端的期权结构，直接触发了典型的“伽马挤压（Gamma Squeeze）”。简单来说，当散户和游资疯狂买入这些看涨期权时，卖出期权的券商做市商就成了对手盘。做市商为了规避自己亏钱的风险，就必须在现货市场上买入对应比例的正股来做对冲。 随着股价一路上涨，这些原本离得很远的行权价变得越来越近，期权变成真金白银的概率在暴增。这就逼着做市商没有退路，必须在现货市场以更快的速度、更高的价格，像滚雪球一样不断追加买入正股 来维持平衡。 上涨的原因，已经变成了衍生品风险管理衍生出的机械化买盘。 正如衍生品分析机构 SpotGamma 所言，这是“十年来 Gamma 敏感度最高的市场环境之一”。 当二级市场仅剩的 4% 自由流通盘，撞上做市商庞大且机械化的对冲买盘，就形成了一个“买Call → 被迫买正股 → 股价上涨 → 再倒逼加仓”的自我放大循环。至此，SpaceX的博弈已经彻底告别了前期的单一驱动，进入了由衍生品主导定价的新阶段。 但水能载舟，亦能覆舟。这种由机械化对冲堆砌起来的虚假繁荣，最怕的就是现货价格掉头。 一旦股价跌破关键行权价，这个循环就会瞬间反转为“反向 Gamma 挤压”——做市商需要用同样疯狂的速度在二级市场砍掉正股头寸对冲，杠杆的大刀，最终狠狠地砍在了多头自己身上。 这也是为什么在美股投资网监测到日内多头动能枯竭、跌破 200 美元关键位时，我们必须坚决果断清仓的原因。在这场华尔街精密的制度游戏里，你看懂第几层？欢迎在评论区留下你的看法。 如果你觉得本文对你有帮助，老规矩先点赞再收藏，关键时刻能帮忙 美国热线 626 378 3637 现在估值贵吗？ 厘清了短期的资金面交易逻辑，我们来冷静地算一笔账： 现阶段的 SPCX，到底贵不贵？ 按照本周二 202 美元的收盘价格计算，总股本约为130亿股（由 1.75 万亿美元 IPO 估值除以 135 美元发行价倒推），当前 SPCX 的市值已经来到了极其震撼的 2.66万亿美元。短短几个交易日，它较发行价狂飙了50% 。 贵吗？非常贵。 如果按照 2025 年约 187 亿美元收入计算， SPCX 当前市销率高达142 倍 。 如果按照 2026 年预估约 380 亿美元收入计算，P/S 依然高达70倍。 显然，这个水平已经不是普通成长股模型可以解释的。市场现在定价的不是 SpaceX 今天的收入，而是在提前买入未来十年的三条超级曲线： 商业航天与重型火箭的绝对垄断 Starlink 全球通信网络的持续扩张 AI 带来的算力基础设施想象力 短期来看，2.66 万亿的价格确实严重透支了上市初期的制度性溢价。然而，传统财务模型的行业偏见，往往会在顶级科技巨头面前失效。历史经验一再证明，超级企业往往能用超出想象的爆发式成长，把看似荒谬的高估值迅速证明合理化。 亚马逊就是最典型的案例。 2009 年市值仅 500 亿美元，P/E 超过 50 倍，大批机构炮轰贝索斯在讲故事。但到了 2025 年，亚马逊过去十二个月的营收达到了恐怖的 7420 亿美元，市值膨胀至 2.6 万亿。它不仅把电商做大，更砸出了当年谁也没算进定价模型里的第二曲线——AWS 云计算。 特斯拉也是同样的逻辑。 2020 年市值突破 6000 亿美元时，全年收入仅 315 亿，市盈率超过 1000 倍，被华尔街痛斥为超级泡沫。但随后三年其收入狂飙至 967 亿美元，市值当前突破 1.5 万亿美元。马斯克不仅靠电动车销量兑现了增长，更通过超级工厂的高效复制、软件服务和 FSD 预期，彻底抬高了估值中枢。 可以复制当年的特斯拉成功吗？ 今天看 SPCX，关键不是一句“P/S 太高”就能否定它。 真正的问题是： SpaceX 有没有可能像当年的特斯拉一样，用持续增长和第二曲线，把今天看起来夸张的估值，逐步消化掉？ 我们可以从 3 个维度去看。 竞争环境完全不同。 当年的特斯拉饱受传统百年车企的围剿，频繁陷入产能地狱与价格战内耗。而如今的 SpaceX 在商业航天回收与低轨卫星领域享有绝对的垄断溢价（吞噬了全球发射 90% 以上的市场份额），领先了行业整整一代，完全不需要经历特斯拉式的惨烈内耗。 第二增长曲线更有想象力。 正如亚马逊孵化出 AWS，SpaceX 也正在从“外太空基建”转型为全球最稀缺的“AI算力水坝”。它利用星链网络与太空能源的独特闭环，与科技巨头达成了总计超过 260 亿美元年化收入 的天价 GPU 租赁与边缘算力托管合同，在地面电力遭遇瓶颈的时代，直接成为了不可替代的太空算力房东。 生态版图的终极天花板 它的想象空间比特斯拉更宏大。Starlink 是全球通信的神经网络，算力中心是 FSD 训练和 xAI 的底层燃料。当它与特斯拉 Robotaxi、Optimus 机器人深度连接时，它就成了“天空带宽 + 地面智能终端 + AI算力”的超级基础设施底座。 但它最大的约束也非常明显： 起点太高。 特斯拉当年是从几十亿、几百亿美元市值一路成长起来，才有了后来的巨大涨幅。而 SPCX 二级市场一开盘，就已经站在了 1.75 万亿美元的位置。 如果你说 SPCX 能不能成为未来十年最重要的科技资产之一？那是必然的。 如果你说它能不能像特斯拉一样，走出“信仰溢价 + 第二曲线 + 超级平台重估”的路径？极大可能！ 但如果你说它还能在现价基础上再涨 100 倍，那就不现实了。因为 2.66 万亿美元再涨 100 倍，就是 266万亿美元市值，这已经远远超出现实资本市场能够承载的范围。 所以我的结论很明确： SPCX 可以复制特斯拉的，不是“绝对百倍涨幅”，而是“超级平台重估”的路径。 短期看，它非常贵，甚至已经透支了低流通盘、指数抢跑和市场情绪带来的溢价。 SPCX短期最大风险 既然SPCX有如此强劲的资金推动和长期想象力，那它短期最大的风险到底是什么？ 美股投资网认为， 短期上涨结构本身，有明显的阶段性和脆弱性。 我们前面拆解过，推动SPCX暴涨的力量，主要来自几个核心节点——极低的自由流通盘、机构被动补仓、散户限售约束、指数明牌抢跑、衍生品正反馈。这些力量在上涨时确实形成了自我强化的循环，但关键在于：它们绝大多数都不是永久性的长线买盘，而是有明确时间期限的阶段性力量。 这种由交易规则和衍生品对冲共同支撑起来的高股价，藏着三个结构性问题： 第一 、 指数配置是明牌，利好终会兑现。 7月1日前后，一旦追踪纳斯达克100的被动基金完成刚性配置，前期最确定的强买动能就释放完了。 在此之前，主动资金可以抢跑套利；但配置窗口一关，市场就要面对一个现实问题： 后续还有没有足够的增量资金，愿意在当前高位继续接？ SPCX只有4%左右的极低流通盘，真实成交深度严重不足。这种结构在上涨时没有卖盘压制，小资金就能把价格推高；可一旦风向掉头，同样因为没有足够的承接深度，小抛压也会把价格砸得更狠。上涨时它是加速器，回撤时它就是流动性黑洞。 第二，市场迟早会从\"炒预 06-17 21:08:57", "author": "StockWe.com", "desc": "SpaceX获利了结", "url": "https://mp.weixin.qq.com/s/flNQk86DEVPC-C7-M770GA", "path": "sources/news/wechat_mp/articles/我清了-SpaceX-美股-彻底晕了-美联储新主席首秀-四大-意外-直接把多头打懵-4b29d704a6.md", "len": 4155, "ticks": [], "body": "美东时间周三，美股经历了一场典型的“过山车”行情。 早盘，得益于 5 月零售销售数据超预期增长 0.9% 的利好，道指一度拉升近 300 点。然而，新任美联储主席凯文·沃什的议息会议“首秀”，以其 绝对的通胀鹰派姿态 ，直接给多头浇了一盆冷水，引发全球资产剧烈重新定价。 联邦基金利率如预期般连续第四次维持在 3.5%-3.75% 不变，投票结果为12比0全票通过，以下是四大颠覆性转变： 前瞻指引的制度性退出 长期以来，市场运行高度依赖美联储提供的政策路径暗示。然而，本次会议声明全文 仅 130 字 ，较 4 月份的 341 字大幅缩减，成为 2007 年以来的最短文本。 声明不仅删除了所有暗示降息的温和措辞，更取消了此前公布票委具体投票情况的惯例。 沃什在发布会上直言：“你们可能已经注意到了今天政策声明中的不同。它更简短、更简洁，省略了一些旧有措辞。 所谓的‘前瞻性指引’不再包含在内，我们一致认为它不适合当前的政策组合。” 这一举动等于直接切断了市场对“远期政策路径”的押注通道。机构宏观策略以往核心依赖的“措辞边际变化”失效。 布鲁金斯学会高级研究员 David Wessel 评价称，沃什成功地不再利用声明来提供前瞻指引；BMO 美国利率策略主管 Ian Lyngen 则指出，这份声明给人的明确印象是——美联储换了一位新主席。市场正在重新回到格林斯潘时代那种极简、聚焦行动而非解释的沟通风格。 点阵图锚效应瓦解 自 2012 年引入以来，点阵图一直是全球资产定价的重要参考坐标。 本次点阵图显示， 18 位提交预测的官员中，有 9 人预计 2026 年年底前至少加息一次 （其中 3 人预测加息 25 基点，5 人预测加息 50 基点，1 人预测加息 100 基点）；8 人预计利率维持不变，仅 1 人预计降息。2026 年底联邦基金利率中值预测从 3 月的 3.4% 上调至 3.8%。 然而，作为主席的沃什本人并未提交任何利率预测点，成为 19 人委员会中唯一缺席的主席点。他解释称：“我没有提出任何我自己的预测，这与我长期以来的看法一致。” 当被问及半数委员预测年内加息时，沃什称：“我注意到所有提交都是用铅笔写的，那种带大橡皮擦的铅笔……对我来说，这对政策实施没有帮助。” 这一举动瓦解了市场基于“主席立场”进行方向性押注的传统路径。Fifth Third Bank 首席美国经济学家 Bill Adams 指出，由于主席的缺席，本次点阵图的参考意义显著降低，这也是沃什推动美联储远离前瞻指引的明确信号。 官方数据可靠性受质疑 沃什对官方经济数据质量的直接批评，构成了当日的另一关键信号。 他指出， 央行官员依赖的传统调查方法存在严重滞后 ，无法真实反映美国经济：“我们收到的一些数据可能只是‘历史的回响’。我们需要降低这些误差范围。我们真正感兴趣的是现在正在发生的事情，而不是历史的回响。” 相反，他明确表示对新型分析方法、民间实时数据以及金融市场本身的价格走势持开放态度。这一表态对两类传统宏观策略构成直接冲击： 宏观量化基金： 过去依赖预判Z府官方数据修订方向来获取超额收益（Alpha），而沃什明确表示将降低此类滞后指标的决策权重； 趋势跟踪策略： 在缺乏明确前瞻指引和措辞暗示的条件下，传统的交易信号系统面临失效。 整体定价逻辑正在从“滞后数据 + 可预测政策反应”向“实时市场价格 → 央行动态判断 → 动态政策反应”的反身性驱动重构。 6.7万亿美元工具的路径再评估 为全面重塑货币政策框架，沃什宣布设立五个专项工作组，分别聚焦美联储沟通机制、资产负债表、数据源使用、生产率与就业（重点评估 AI 的影响）以及通胀框架，预计年底前提出改进建议。 其中，“资产负债表工作组”引发市场最高关注。该小组将审查美联储当前高达 6.7 万亿美元的资产规模（该规模在 2022 年曾达 8.9 万亿美元峰值），并研究未来应更多依赖利率工具还是资产负债表工具。 鉴于沃什此前曾公开主张将资产负债表规模缩减至更接近 2008 年前的水平，这意味着 货币政策正式进入“利率 + 流动性结构”的双系统时代 。市场不仅需要判断利率走向，还必须评估流动性被回收的路径与速度。 华尔街瞬时数据与利率衍生品定价 受美联储鹰派基调影响，货币市场对加息的定价出现戏剧性逆转。年内维持利率不变的概率从前一日的 40% 骤降至 15.7%。 根据 CME 数据，9 月加息概率已达 56.2% ；市场已完全消化 10 月前加息一次的预期；12 月前加息 25 基点的概率接近 38%，加息 50 基点的概率亦升至约 33%。 摩根大通资产管理全球固定收益主管 Bob Michele 表示：“半数委员会成员预期今年加息，这对市场而言无异于一记当头棒喝，他们显然正在为重新加息做准备。” 在现货市场，跨资产系统出现连锁反应： 美债与美元： 2 年期美债收益率应声攀升 15 个基点（15BP），美元指数强势拉升近百点。 商品市场： 现货黄金受紧缩预期增强及美元走强打压，暴跌逾 150 美元。 美股： 三大股指均收跌逾 1%，恐慌指数 VIX 上涨 12.31% 重新升破 18。 结构分化： 必需消费品和公用事业等防御性板块大幅回落；大型科技股集体下挫，META 跌超 5%，微软、亚马逊跌超 3%。然而，费城半导体指数逆市收涨 1.38%。 历史数据表明，市场对美联储权力交接的适应成本向来不低。 巴克莱统计了自1930年代以来历任美联储主席上任后标普500指数三个月的表现，平均回撤幅度为12%。 其中，格林斯潘上任后三个月内标普500下跌33%，沃尔克时期下跌10%，鲍威尔时期下跌7%，耶伦时期下跌4%。 尽管样本周期、经济环境和政策起点各不相同，但规律高度一致——每一次美联储最高决策者的更替，都伴随着市场对政策框架的重新定价与适应。 沃什的首秀，不过是这一历史规律的又一次验证。 SpaceX的两套定价逻辑 早盘，SpaceX宣布以600亿美元估值，通过全股.票（增发股份）方式收购AI编程工具Cursor的开发商Anysphere。 因为SpaceX估值存在泡沫，我决定设止损，跌破200美元就清了大部分SPCX仓位，剩下当时申购的135美元成本的仓位，VIP截图曝光 Cursor年化B2B营收约26亿美元。市场初始买单逻辑建立在\"航天重资产基础设施+AI高边际毛利软件\"的战略叙事之上，股价一度冲高6%。 随着沃什鹰派基调的释放，机构资金迅速切换了定价框架： 远期现金流的现值被压缩 SpaceX属于重资产、长周期行业，大量预期利润分布在未来数年。这类公司的估值对利率高度敏感——利率上行意味着折现率上升，远期利润折算到今天的价值就会缩水。 而Anysphere同样是一家靠未来预期定价的公司，Cursor商业化尚未完全跑通，盈利兑现还在远处。在一个无风险利率可能重新上行的环境里，溢价收购一家同样依赖远期现金流的资产，市场认为这笔交易在财务上缺乏吸引力。 增发收购对现有股东权益形成稀释 全股.票支付的实质，是SpaceX以自身股权作为货币进行对价支付。增发大量新股后，原有股东的持股比例被摊薄，而收购进来的Anysphere短期内尚难以产生足够现金流来弥补这一摊薄。 在流动性可能边际收紧的预期下，市场对这类“用高估值股.票换不确定资产”的交易结构变得尤为谨慎，此前牛市中被容忍的稀释成本，如今被重新审视。 风险偏好收缩，“叙事溢价”被剥离 “航天+AI”这类题材，在市场风险偏好较高时往往能获得额外溢价。但当美联储不再提供清晰的远期政策路径，机构资金的第一反应是从“战略故事”退回到基本面算账。 华尔街的估值偏好从“远期想象空间”暂时转向“当期确定性”的审视。 SpaceX尾盘的快速杀跌，正是市场重新评估这笔收购的财务合理性之后的结果。 周三，SpaceX收跌4.95%，报191.82美元，自上市以来首次单日收跌。同样一笔收购，早盘被当作战略扩张来定价，午后被当作财务稀释来定价——中间的切换，只隔了一场沃什的发布会。 总结：当“可交易的未来”被收回 本次 FOMC 会议的深远影响已超越单一的利率决议范畴。沃什通过废止前瞻指引、缺席点阵图、重构数据权重以及审查资产负债表四大举措，系统性地拆解了美联储运行多年的宏观沟通范式。 这不仅是政策立场的转向，更是美联储将市场赖以生存的“可预测性”进行了收回。 在旧有范式下，全球宏观策略高度依赖美联储给出的确定性路径进行套利与方向性押注。而沃什的变革意味着这一策略闭环的失效。 华尔街的定价逻辑被迫 从“解读央行意图”回归到“独立研判市场现实”——后者的多变性显然对资产定价能力提出了更严苛的要求。 这种规则的重写已经引发了跨资产系统的连锁反应。从利率衍生品对加息概率的骤然修正，到短期美债收益率的快速攀升，再到权益市场内部的结构性分化，都是市场在失去政策锚定后，自发寻找新均衡的早期信号。 当远期政策路径不再透明，资产定价的波动率常态化抬升，就不再是风险警示，而是市场必须面对的新现实。 扫码+ 美股A 到指数基金到时间买入时，再原价交货。 整个过程几乎是确定性的套利。 很多投资者把目光全部集中在7月7日。认为纳入纳指那天一定最热闹。 实际上恰恰相反。 因为该买的人，早在三周前就已经买完了。 所以最热闹的那一天，反而是净流量最安静的一天。 根据美股投资网经验，华尔街最喜欢做的事情，从来不是追热点。而是提前埋伏热点。 真正赚钱的时间，往往发生在新闻出来之前。 更有意思的是，这套机制会自己形成闭环 九月份，指数调仓预计会带来接近380亿美元的机械买盘。 十二月份，这个数字进一步扩大到900亿美元左右。 而资金来源，很可能恰恰来自之前的解禁。 整个循环大概是这样： 解禁->流通盘扩大->指数权重提升->被动资金被迫增配->机械买盘增加 。 新的资金再去吸收下一轮解禁。 于是卖压又变成下一次买盘的来源。 机制套机制。循环套循环。 形成一个几乎自我强化的闭环。 这也是为什么很多超级大市值公司，最后都会越来越被动资金化。 因为指数基金根本不需要思考。它们只负责执行。 七月份，可能是最微妙的一段时间 从表面看，七月份是一个真空期。 没有大规模调仓。 没有指数纳入。 也没有解禁。 看起来风平浪静。 但实际上，这可能是整个半年最敏感的阶段。 因为175.50美元的考核窗口就在七月底。 如果股价能够连续满足条件，八月份内部人的额外解禁额度就会自动增加10%。 于是问题来了。 谁最希望触发？ 谁最不希望触发？ 谁会提前布局？ 谁又会在关键时刻出手？ 市场上的各种力量，很可能都会在这个阶段开始暗中较劲。 表面平静。 水下激流。 有时候，没有流量事件的时间窗口，反而最容易发生故事。 八月，全年最大的压力测试来了 真正的大考，出现在八月。 Q2财报公布之后，将迎来第一轮大规模解禁。 最高释放比例达到30%。 对应额度接近1850亿美元。 美股投资网获悉， 这是全年最大的净卖压窗口。按照模型估算，净卖压大约280亿美元。 当然，这并不意味着1850亿美元会全部卖出。 历史经验显示，真正的抛售比例通常只有20%到30%。 但即便如此，这仍然是全年最大的供给冲击。 市场最终能否承受住这一轮压力，将决定SPCX后面的走势。 如果八月能够顺利消化。 那么后面的大部分挑战，都只是重复之前的剧本。 九月有人接 十月十一月再挖一个坑。 九月份，预计有380亿美元左右的指数调仓资金进场。 相当于有人出来接一部分筹码。 市场得到喘息机会。 但真正的第二轮考验在十月和十一月。 Q3解禁叠加连续解禁窗口。 预计净卖压达到260亿美元。 这可能形成全年第二个低谷。 扛不住的人，会选择提前离场。 而能够熬过去的人，则有机会迎来最后的大戏。 十二月，可能是空头最不想看到的时间 全年最大的机械买盘，预计出现在十二月。 规模接近900亿美元。 这也是图三中蓝色柱子最高的位置。 很多人以为随着流通盘扩大，做空会越来越容易。 但图四显示的结果恰恰相反。 新股上市初期，市场几乎借不到券。 真正能够建立方向性空头仓位，要等到6月15日至16日之后。 三周以后，借券供给才逐渐增加。 但一个反直觉的现象出现了。 可借券占流通盘的比例，在七月初达到大约21%的峰值之后，就开始一路下降。 因为流通盘扩大的速度，比借贷池扩大的速度更快。 也就是说，随着时间推移，空头并不会越来越舒服。 反而会越来越难。 到了十二月，不仅借券比例下降，还要面对全年最大规模的机械买盘。 这对于空头而言，并不是一个友好的环境。 美股大数据 StockWe.com 最后总结一下 六月，是机制性净买入阶段。 结构偏暖，属于顺风局。 七月，是看似平静、实则暗流涌动的真空期。 175.50美元的考核窗口，可能成为市场博弈最激烈的地方。 八月，是全年最大的压力测试。 1850亿美元解禁额度，是决定中期趋势的关键节点。 九月，380亿美元指数调仓资金部分接盘。 市场重新获得平衡。 十月至十一月，第二轮解禁冲击到来。 真正的分歧将进一步扩大。 而十二月，则可能迎来全年最大的机械买盘。 900亿美元左右的被动资金，将成为空头最大的噩梦。 如果把整个过程放在一起看，你会发现，SPCX未来半年的走势，其实不像一场自由市场的混战。 更像是一部提前写好剧本的大戏。 所有参与者都知道下一幕会发生什么。区别只在于。 谁能提前看到剧本。 谁又会成为剧本的一部分。 更多精彩文章 SpaceX上市，我发现了几个非常有意思的洞察 太空是否真的适合建AI数据中心? SpaceX 【深度】SpaceX对比当年亚马逊、h特斯拉的估值，到底 SPCX 贵不贵？ 史上最全深度分析：SpaceX面临五大风险，马斯克如何应对华尔街的压力？ 欢迎加入 VIP 社群，更深入了解 SpaceX趋势 VIP订阅链接（用美国的浏览器打开）： https://StockWe.com/vip 线：极小流通盘 + 闪电纳入指数，锁定被动大资金 SpaceX 干了一件绝大多数公司做不到的事： 它正好赶上了纳斯达克 100 指数的快速通道规则（Fast Entry）。 以前新股想进纳指 100，先老老实实等 3 个月观察期； 但 SpaceX 只要上市 15 个交易日就能被正式纳入。 更绝的是筹码结构。SpaceX 这次计划募资约 750 亿美元，但上市初期真正拿出来卖的股份，只有 4% 到 5%。 这两条规则叠加，效果就是： 上市头两周，市场上能买到的股.票很少 。在马斯克的巨大光环下，资金一抢，股价很容易被快速推高。 到了第15个交易日，SpaceX被快速纳入纳斯达克100指数。这时，全球追踪该指数的 超过12万亿美元 被动基金、养老金、ETF，按照规则，必须在指定时间买入SpaceX股.票来完成配置。 说白了：有一大笔钱不是自己想买，而是被规则逼着买——不管股价已经被炒到多高，到点就得进场。 这笔钱给股价提供了强力托底。 “ 第二道防线：高比例配售散户，维持热度和溢价 传统的大型军工或航天IPO，发行份额基本被华尔街投行和主权基金包了。但马斯克这次不一样—— SpaceX明确拿出了30%的发行份额 ，差不多225亿美元，直接配售给普通散户。 为了配合这个动作，富达（Fidelity）甚至把打新的资产门槛降到了最低2000美元，让更多人能参与进来。 为什么要这么做？ 因为机构资金决定的是股价的下限，它们负责托底；而散户的热情、高换手率和讨论度，往往能把股价的上限推得更高。 将近三分之一的筹码直接分散在散户手里，能让这只超级巨无霸保持极高的交易活跃度。 同时，为了彻底平息市场对大股东借机套现的担心，SpaceX 这一次在招股书里采用了 全新股发行（All-Primary Offering） 的财务结构。 什么意思？ 这意味着这次发行的 5.56 亿股，全部都是公司自己新印出来的股.票，而不是老股东转让手里的存量股。 在这个结构下，所有的早期机构、现有大股东，在 IPO 当天不能出售任何一股他们现有的股份。最终募集上来的 750 亿美元，一分钱都不会流进私人腰包， 全额 100% 进入公司账户 ，用来搞星舰研发和星链全球扩张。 与此同时， 马斯克本人和部分重要的现有大股东还联合签署了长达 366 天的锁仓协议。 马斯克明确承诺：上市后整整一年零一天内，自己绝对一股不卖。 这套从“全新股发行”到“一整年锁仓”的连环组合拳，确实给市场吃下了一颗强有力的定心丸。 “ 第三防线：太空 AI 数据中心，打开估值天花板 如果 SpaceX 只讲火箭发射和星链宽带，资本市场是很难给出如此高的溢价。为了打开估值的想象空间，马斯克在招股书里抛出了一个极具吸引力的宏大叙事——“空间 AI 数据中心”（Orbital Data Centers） 招股书显示， SpaceX 将这一部分潜在市场规模锚定在 28.5 万亿美元 ，而其中 AI 领域占 26.5 万亿美元。 马斯克的逻辑是这样的：地面上的算力中心现在遇到两个大问题——电不够用，土地也紧张。而太空里有的是太阳能，不用排队等电网。SpaceX计划未来向太空部署高达100吉瓦（GW）的算力，从理论上解决地面的能源瓶颈。 说实话，这个故事在短期内听起来有点像科幻。 但资本市场有一个特点： 它愿意为那种“有可能改变人类基础设施”的长期叙事买单。 尤其现在AI是全世界最热的方向，SpaceX把这两个概念一结合，就完成了一次定位升级——从一家“航天硬件公司”，变成了“全球唯一的太空AI基础设施玩家”。 这也是为什么1.75万亿估值能站住的一个重要理由。我明知道这个故事短期内很难变现，但我依然愿意买入，是因为在美股市场上，谁能讲出一个被市场接受的未来，谁就能获得更高的估值溢价。 “ 第四道防线：用制度的绝对集中，捍卫战略稳定性 在解决了筹码与资金的流向后，马斯克在章程中设立的治理结构，则构筑了最后一道合规防线。 SpaceX的股权结构设计得很清楚： 马斯克持有的Class B股.票，拥有超过82.4%的投票权。也就是说，不管公众股东怎么想，所有重大决策最终都是马斯克一个人说了算。 但有超级投票权还不够。SpaceX还在公司章程里加了两条值得注意的条款： 1.强制仲裁。 如果散户因为亏损或者合规问题想告SpaceX，不能像普通股.票那样发起集体诉讼，而是必须走非公开、不可上诉的私人仲裁程序。换句话说，你想闹也闹不到哪儿去。 2.高门槛派生诉讼。 如果你想对董事会提起诉讼，你得先持有公司3%的股份。按1.75万亿估值算，3%就是525亿美元。 全美国没有任何一家公共退休基金能在单只股.票上砸这么多钱。这条规定基本等于把小股东通过法律手段制衡董事会的路堵死了。 在传统机构眼里，这种治理结构有点“不讲武德”。但对于真正相信马斯克的人来说，这恰恰是SpaceX最大的优势。 为什么？ 因为马斯克的终极目标是火星和星舰。这些东西投入大、周期长、风险高，短期内看不到回报。如果按照普通上市公司的玩法，管理层天天被季度财报绑架，被华尔街的做空机构用各种诉讼骚扰，哪还有心思搞星辰大海？ 所以，这两条法律条款本质上是一堵防火墙。它确保SpaceX不会被短期的股价波动和投机者干扰，能把所有资金和精力全部砸在星舰和火星探索上。 所以买入SpaceX，本质上不是买一家普通公司，而是选择把信任交给马斯克本人。而这套制度，就是确保他不会被任何人打扰、一门心思往前冲的最强保障。 总结一下，马斯克布下的这四道防线，用一句话概括就是： 用指数规则锁定大资金，用高额散户配售维持溢价，用太空 AI 讲好故事，用绝对集权捍卫战略。 如果你觉得本文对你有价值，先点赞再收藏，关键时刻能帮忙 美国热线 626 378 3637 SpaceX 上市 6 大风险 价格与抛压结构。 到了第 15 个交易日，指数基金必须雷打不动地进场被迫买入 SpaceX。但咱们必须保持绝对的清醒：这笔被动资金托底的，可不是 135 美元的初始发行价，而是前两周已经被市场情绪和散户热度彻底炒高之后的“高位价格”。 同时，这个由规则创造的巨额流动性窗口，也恰好为早期入局的风投，提供了一个在极高位顺利退出的机会。 但更隐蔽、也更沉重的盘面压力，其实来自它的解禁节奏。很多人一看到马斯克承诺锁仓 366 天，就以为这一年内市场很安全、完全没有抛压。 但如果你仔细看招股书的底层条款，除了马斯克等少数核心大股东，占据 SpaceX 整体价值接近一半的其余股份，其解禁速度比任何人想象的都要快。华尔街这次帮 SpaceX 设计了一套非常罕见的“阶梯式绩效解禁机制”： 第一个坎： 首季财报公布后，大概也就是今年的 8 月或者 9 月，内部人士和早期股东就可以立刻合法减持他们手里 20% 的股.票。 第二个坎（对赌触发）： 如果到时候股价比 135 美元的发行价上涨了 30% 或者更多，系统就会立刻提前解锁，允许他们再多卖出 10%！ 后面的滚动释放：剩下的股份，还会按照固定日期和第二份财报公布之后，像挤牙膏一样一波一波释放。 这套机制的本质，根本不是像传统 IPO 那样死死锁住 6 个月不让动，而是通过“财报节点+股价表现”在极早期一闸一闸地精准放水减压。 这种设计确实聪明，能防止半年锁定期满那天股价被一次性砸崩，但它对咱们散户的副作用也很直接： 它让这只巨无霸在上市前两周被动冲高后，很快就将在 8、9 月份迎来第一波内部的大笔套现潮。 咱们一定要知道，SpaceX 在 2025 年末轮私募融资的时候，估值才 2800 亿美元，早期投资者的持仓成本可能只有 20 多美元，手里握着高达 5 到 6 倍的浮盈。他们选择在第一份财报后合规套现、落袋为安，是绝对正常的商业行为。 比特币持仓对财报的扰动。 招股书显示，SpaceX账上持有18,712枚比特币，价值约十几亿美元。比特币价格波动会直接反映在公司的季度净利润里。 这意味着，有时候财报显示的“盈利暴增”或“巨亏”，可能只是比特币涨跌造成的，跟航天主业没关系。我们看财报时，要分清哪些是真实业务赚的钱，哪些是数字资产带来的账面波动。 27% 的上市募资要优先还债。 2026年2月，SpaceX与xAI完成了合并。这一步把AI概念装进来了，但同时也把xAI和X原有的债务一并带进了SpaceX的报表。 为了降低利息成本，SpaceX在上市前借了一笔200亿美元的过桥贷款，提前还掉了xAI和X之前发行的175亿美元高息债券（原利率约12.5%）。过桥贷款利率约4.58%，这个操作让年利息支出从约18亿美元降到了约9亿美元。 但关键条款是： 过桥贷款要求SpaceX在上市后六个月内，必须用IPO募集的资金优先偿还这200亿美元。 按750亿美元募资算，约27%的钱还没进公司账户，就要直接划给银行还债。真正能用来搞星舰和星链的资金，没那么多。 星链的现金流正在被 AI 业务对冲。 2025年，星链营收114亿美元，占SpaceX总营收的61%，利润率高达54%。这是公司目前唯一稳定赚钱的业务。 但另一边，xAI和AI业务在2025年亏损约60亿美元，2026年一季度又亏了25亿美元。星链赚的钱，很大一部分被AI部门花掉了。 更值得注意的是，星链的单用户月均收入（ARPU）在持续下降： 2023年：99美元 2024年：91美元 2025年：81美元 2026年一季度：66美元 为什么降？ 因为欧美农村的高收入市场快填满了（星链超85%的用户在农村）。接下来要去低收入国家和大众市场抢用户，只能靠降价、送设备。用户数还会涨，但每用户赚的钱会越来越少。 这里不得不说一个小插曲， SpaceX将算力对外出租给谷歌和Anthropic，折射出xAI自身的技术困境。 据消息人士透露，xAI在Colossus 1数据中心训练Grok模型时混杂部署了H100、H200及GB200等多种架构的GPU，导致训练Grok难以有效推进，xAI不得不将模型训练任务迁移至Colossus 2数据中心。 正是这一设计规划上的失误，为SpaceX的商业化布局提供了契机。Colossus 1被闲置下来，可以出租给科技巨头对外变现。这也为SpaceXIPO将算力租赁收入作为核心增长亮点。 谷歌将从今年10月起至2029年6月，每月向SpaceX支付9.2亿美元，以获取约11万块英伟达GPU及相关算力资源。Anthropic已于5月宣布以每月12.5亿美元的价格租用SpaceX数据中心的大部分算力。 两笔协议合并计算，SpaceX每月可从算力租赁业务中获得约21.7亿美元收入，年化规模约260亿美元；若两份合同均执行至到期日，合计合同总价值超过700亿美元。 估值太贵 如果按市场最乐观的 2 万亿美元远期上限来测算，它的静态市销率（P/S）已经直接飙到了 恐怖的 107 倍！ 哪怕我们退一步，按 1.75 万亿的上市初始估值来算，静态 P/S 也高达 94 倍左右。 看到这个数字，你可能觉得高得离谱了吧，但我们不妨回顾一下马斯克在特 斯拉上的估值打法， 当年特斯拉股价飙升时，静态市销率（P/S）也曾被暴炒到 25 到 30 倍。当时全华尔街都在用传统车企不到 1 倍的 P/S 疯狂唱空马斯克。但随后，特斯拉用连续几个季度的交付爆发和高毛利的 FSD 自动驾驶软件预期，强行改变了市场的定价模型，完成了从“汽车股”到“科技巨头”的重估。 如今马斯克在SpaceX上玩的是一次升级版。107倍的P/S，意味着市场分歧比当年的特斯拉还大。 英伟达拿到 30 倍 P/S，是因为它拥有超过 100% 的爆发式增速；而 SpaceX 底去年营收增速其实是 33%。用 33% 的常态增长，去匹配 107 倍的 P/S 估值，这确实意味着当前的价格已经极度透支了未来的预期。 偏谨慎的机构认为：星链业务合理价值大概6000-7000亿美元。剩下的1万亿，基本在赌“太空AI数据中心”这个远期故事，短期内根本无法兑现利润。 偏乐观的投资者认为：SpaceX拥有物理级的护城河——发射成本只有对手的1/3甚至1/5，手里还握着星盾的巨额防务合同。买它不是买当下的静态利润，而是买未来对太空轨道的垄断地位。 用更直白的方式拆解： 1.75万亿 ≈ 6500亿（星链基本盘）+ 3000亿（火箭垄断+星盾防务）+ 8000亿（远期AI想象空间）。 但高盛分析师预计，到2030年，SpaceX总营收将达到4740亿美元，其中AI部门营收将增长近100倍，达到近3220亿美元。Evercore则预测2030年SpaceX总营收将达到4860亿美元，AI部门营收为3310亿美元。 如果按照30倍P/S，SpaceX市值将达到14万亿美元，是1.75万亿的8倍。 精彩文章回顾： 107倍市销率！SpaceX比当年亚马逊特斯拉还疯狂？历史告诉我们答案 长期环保合规的天花板。 地面上的汽车和飞机都要受碳排放限制，但火箭发射至今基本没人管。SpaceX就是靠这个“政策真空”做到了两天发一枚火箭。但这个窗口不会永远敞开。 两个具体问题： 一是轨道越来越挤。 目前近地轨道约15000颗活跃卫星，星链占10000多颗。2025年一年，星链为了避免碰撞，紧急变轨了30万次。同时，星链为了技术升级，每年主动淘汰大批老卫星，然后发新卫星补网。这些都在推高日常运营成本。 二是环保压力在积累。 猎鹰9号每次发射会向平流层排出约5吨黑碳，温室效应是地面的540倍。2025年全球卫星再入烧毁的总重量超过2000吨，大部分来自星链，烧出来的金属氧化物颗粒正在加速臭氧层损耗。美国NOAA已经采集到了证据，环保组织正在向FAA和EPA施压。未来几年，很可能出台针对火箭排放和再入金属的新规。 不过，这个风险对SpaceX可能反而是个机会。因为马斯克早就做了准备：新一代星舰改用液氧甲烷燃料，几乎不产生黑碳，顺便解决了环保问题。 如果未来出台严苛的行业标准，SpaceX的发射成本已经是全球最低，技术也提前达标，可以轻松跨过门槛。而那些规模小、技术落后的竞争对手，很可能被高昂的合规成本挡在门外。 换句话说，环保法规不仅不会让SpaceX减速，反而可能帮它清理掉一批对手。 不过大家要明白上面这六条，没有哪一条是“明天就会崩盘”的那种。但它们合在一起，提醒我们一件事： SpaceX的高估值里，有一部分是实实在在的业务（星链、发射垄断、防务合同），还有很大一部分是对未来的乐观预期。作为散户，买之前心里有数就行。我把这些风险列出 com"}, {"title": "仅剩最后1天，这辈子再也买不了美股了！", "date": "2026-06-09", "ym": "2026-06", "time": "2026-06-09 21:12:50", "author": "StockWe.com", "desc": "再见！美股", "url": "https://mp.weixin.qq.com/s/ZCHKsTxy7B3JXvUp6IMjwg", "path": "sources/news/wechat_mp/articles/仅剩最后1天-这辈子再也买不了美股了-7a27c17be0.md", "len": 3176, "ticks": [], "body": "一句话概括今天的盘面： 在关键通胀数据公布前夜，受SpaceX大型IPO引发的资金分流预期，以及苹果、博通等微观利空因素共振，科技权重股遭遇集体获利回吐，导致大盘午盘后全线震荡走低。 早盘技术性修复，午盘获利回吐 周二开盘阶段，市场多头情绪一度有所修复。 一方面，中国最新公布的5月进出口数据表现强劲，从侧面印证了全球对半导体硬件的产业链需求。芯片的出口和进口数据都不错，说明AI硬件建设还在继续。 另一方面，AI基建股应用数字APLD宣布与某云巨头签署了一份长达15年的超算租赁协议，合同年化价值相当可观。这个利好消息刺激其股价盘中大涨近11%。 在这些正面信息的支撑下，前几日回调较深的存储芯片龙头美光（MU）盘中一度拉升近5%，带动纳指和半导体板块集体冲高。 然而，这一轮由硬件端带动的反弹并没有获得持续的资金确认。 午盘过后，市场避险情绪开始升温。资金倾向于在周三关键数据公布前降低仓位，谁也不想在CPI出来之前赌方向。iShares半导体ETF（SOXX）最终收跌3.3%，纳斯达克100指数收跌1%。 这种日内反转说明了一个问题： 在目前的高估值和重大宏观事件面前，机构投资者的持股意愿明显减弱。大家更想做的是“逢高锁利”，而不是继续加仓。 SpaceX历史级IPO带来流动性挤压 今天科技股整体承压，另一个不能忽视的因素是SpaceX即将在周四正式IPO。 这是近年来美股市场上规模最大的首次公开募股。SpaceX的目标估值定在1.75万亿到1.77万亿美元之间，计 划在市场上筹资大约750亿美元。 面对这种一辈子可能只有一次的史诗级打新机会，机构和散户的认购意愿被彻底点燃。 华尔街传奇长线投资大亨、今年83岁的巴伦资本创始人罗恩·巴伦（Ron Baron）就在本月的客户电话会上明确表示，他已经向承销团直接下达了高达 10亿美元 的IPO认购单。 要知道，巴伦资本从2017年开始就通过27次内部员工回购分批建仓SpaceX，把20亿美元的本金硬生生拿到了如今的150亿美元。连这种超级权重股东都在现场掏出10亿美元现金准备继续加仓，可见市场情绪的狂热。 这就产生了一个问题：机构和散户兜里的钱从哪里来？ 为了在周四前凑足庞大的认购现金，大批存量资金选择在周二紧急减持现有持仓，而首当其冲的就是过去几个月累积了大量浮盈的AI动量股。大家必须先卖股变现，把流动性准备好。 更让多头主力感到压力的是指数被动调仓的预期。按照纳斯达克市场的最新纳入规则， SpaceX在上市15个交易日后极大概率将被强行塞进纳斯达克100指数。届时，像QQQ这种千亿美元规模的被动型基金以及MSCI相关指数，将被迫在市场上买入预计220亿到270亿美元的SpaceX股.票。 为了给这个万亿市值的庞然大物腾出权重空间，被动资金必须提前减持其他现有的纳指成分股。这种完全可以被预见的“割肉调仓”预期，在一级和二级市场之间形成了巨大的流动性虹吸效应，直接放大了今天科技股的整体抛压。 明天，我们将带上一篇接近7000字的深度巨作，全方位拆解这场即将引爆市场的SpaceX IPO。我敢保证，这样的深度和干货，你在其他地方绝对看不到。 市场再次重新审视AI的投入产出比 除了流动性分配的原因，科技板块自身的一些最新动态，也让市场开始重新审视AI的短期变现路径。 苹果：WWDC主打“AI Siri 2.0”，但iOS 27硬件高门槛彻底掐灭超级周期 在刚开幕的年度开发者大会（WWDC）上，苹果虽然推出了深度重构的AI助理（Siri 2.0）和iOS 27系统，但华尔街对其大失所望。 核心矛盾在于其AI硬件限制极其严苛——最新的AI搜寻与复杂上下文处理功能 仅支持iPhone 15 Pro及以上的高端机型，且iOS 27正式宣布停止支持拥有庞大存量用户的iPhone 11系列和第二代iPhone SE 。 华尔街原本寄望于全面下沉的AI应用能引爆全球存量接近10亿部老款iPhone的“无差别超级换机潮”，但这种人为筑起的硬件高墙让分析师集体看衰2026财年 的“数字助理工作站芯片”），和过去几年市场炒的 AI PC，根本不是一回事。 以前大家说的 AI PC，其实还是普通电脑，只是在 CPU 旁边多了一个专门跑 AI 小任务的小芯片（NPU）。它能做的就是一些轻量功能，比如视频美颜、背景虚化、语音转文字。 简单来说，就是在电脑里加了几个 AI 小插件，但电脑本身还是那台普通电脑，并没有真正变成能跑大型 AI 模型的工作站。 但 RTX Spark 不一样。它不是给电脑多加几个 AI 功能，而是要把 PC 变成一台真正的本地 AI 工作站。 128GB 统一内存、1 Petaflop AI 算力，再加上 Blackwell GPU、Arm CPU 和 CUDA 生态，目的很明确：让个人电脑可以在本地运行AI模型和 AI 智能体。 这就是这次叙事最大的变化。 过去两年，AI 的主战场几乎都在云端。你输入问题，数据传到服务器，模型算完，再把结果返回给你。你的电脑只是入口，真正的大脑在数据中心。 但如果 PC 本身有足够强的算力，逻辑就变了。 它可以直接读取你的文件，理解你的工作流，调用本地应用，甚至跨软件执行任务，同时减少敏感数据上传云端。 这才是 AI PC 真正的价值。 第一个受益者，当然是英伟达。 因为英伟达要做的，不只是多卖一块显卡，而是把自己在数据中心已经验证过的 AI 平台，搬到个人电脑和企业终端。 过去英伟达控制的是云端 AI 算力。如果 RTX Spark 跑通，它未来还想控制本地 AI 算力入口。这就是英伟达 最核心的逻辑。 第二个受益者是高通。 很多人会忽略高通，但其实在英伟达真正下场之前，Windows on Arm 这条线，高通是最早推动的玩家。 高通的 Snapdragon X电脑芯片 系列，已经先把 Arm 架构带进 Windows PC，也推动了第一波 AI PC。它的优势是什么？低功耗、长续航、轻薄本体验好，适合普通消费者和办公人群。所以高通当然受益 AI PC。 但现在问题来了：英伟达下场以后，高通的故事就没那么独家了。因为高通主要讲的是：让 Windows PC 更省电、更轻薄、更适合端侧 AI。但英伟达讲的是：我不只是 CPU，我还有 Blackwell GPU、CUDA 生态、本地大模型和 AI 智能体。 所以高通不是不受益，而是它更偏向普通 AI PC 普及。英伟达更偏向高端 AI 工作站和企业生产力。 第三个受益者，是 ARM。 这次高通和英伟达都选择 Arm 架构，说明一件事：Windows PC 长期被 x86 主导的格局，开始松动了。 过去几十年，PC 市场基本是 英特尔和 AMD 的天下。但苹果 M 芯片系列已经证明，Arm 不是只能做手机芯片，也可以做高性能电脑。 现在高通先推 Windows on Arm，英伟达再把 Arm CPU 带进 RTX Spark。这对 ARM 来说，意义很大。因为它的故事不再只是手机授权，而是有机会进入更高价值的 PC、AI 终端和企业设备市场。如果 Windows AI PC 真正跑起来，ARM 就会躺着收授权费。 在5月20日，我们的美股大数据是 StockWe AI 模型就选出ARM作为AI首选股，当时242 美元提醒买入，截止本周三获利70%。 第四个受益者，是 MSFT。 微软这次不是简单提供一个 Windows 系统。它真正要做的是，让 AI智能体能安全地在电脑里工作。因为企业最担心的不是 AI 不够聪明，而是 AI 会不会乱读文件、乱动系统、乱调用数据。 AI 如果要进入你的电脑，调用你的文件、邮件、表格、浏览器和企业系统，就必须有权限管理、安全隔离和数据保护。这就是微软的价值。 未来 AI智能体 如果变成数字员工，那 Windows 就是管理这些数字员工的操作系统。谁控制操作系统，谁就控制 AI智能体的入口。谁控制入口，谁就有长期收税权。 第五个，是电脑公司和企业硬件公司。 但这里不能简单说“AI PC 利好所有电脑公司”。真正要看的是：谁只卖电脑，谁还能卖服务器、存储、网络和整套企业 AI 方案。 我认为最值得放前面的，是DELL。 因为 Dell 不只是卖电脑，它和英伟达绑定得更深。Dell 现在推的不是简单 AI PC，而是 Dell AI Factory with NVIDIA。 什么意思？企业如果想部署 AI，不一定自己从零开始买 GPU、配服务器、搭网络、做存储。Dell 可以把英伟达的 GPU、服务器、存储、网络、工作站和服务，打包成一整套企业 AI 工厂方案。 所以 Dell 的优势是前后都吃。 前端有商用 PC 和工作站，能吃 AI PC 换机。 后端有 AI 服务器、存储和企业服务，能吃 AI 工厂建设。 这就是为什么DELL 比普通 PC 厂商更值得重视。它不是只吃一台电脑的钱，而是吃企业 AI 落地的一整套钱。 第二个是 HPQ。 HPQ 的逻辑更纯粹，就是 AI PC 换机。这里有一个非常关键的数据：惠普第二季度 AI PC 已经占到 PC 总出货量的 44%，上一季度才刚刚超过 35%。这说明 AI PC 不是 PPT 概念，而是已经进入真实出货结构。 但 HPQ 的问题也很明显。它主要吃的是终端换机、高端商用 PC 升级和 ASP 提升。如果企业开始大规模换 AI PC，HPQ 会直接受益。但它不像 Dell 那样，后面还有 AI 服务器、存储、网络和 AI Factory 这条更长的链路。 所以 HPQ 更像是最纯粹的 AI PC 换机标的。 第三个，是 HPE。 HPE 不做个人电脑，所以它不是 AI PC 的直接受益者。但企业真正用上 AI 以后，不是买几台 AI 电脑就结束了。每个员工都用 智能体，每台电脑都跑 AI，后面一定需要服务器、存储、网络和混合云来支撑。 这就是 HPE 的机会。 最新季度，HPE 收入达到 107 亿美元，同比增长 40%；AI 系统订单达到 18 亿美元，累计订单达到 164 亿美元，手里还有 59 亿美元 AI 订单等着交付。这说明企业是真的在买设备，准备把 AI 跑进自己的系统里。 而且 HPE 也和英伟达合作，推出基于 Blackwell 和 Rubin 的 AI 服务器和整套企业 AI 方案。 所以 HPE 的逻辑很简单： 它不吃 AI PC 本身，吃的是 AI PC 和智能体进入企业以后，后端基础设施升级的钱。 在美股投资网的《潜力爆发股》服务中，我们在5月13日就选出了 HPE作为潜力股，当时股价31美元，本周二股价暴涨20%，目前累计盈利已达80%。 这服务非常受欢迎，非常非常多人订阅我们的服务。 这里我还必须要提存储，我之前在文章里反复强调过一句话： AI时代存储是基建。 这次的观点依然成立。 为什么？因为AI智能体要真正好用，不能只有算力，还必须有足够大的内存和存储。没有内存，智能体就像一个脑子很聪明、但记忆力很差的人。它跑不动大模型，吃不下长上下文，也无法长期理解你的文件和工作流。 所以在这一轮AI PC换机潮里，内存厂商的利润弹性，可能会比整机厂更早体现。因为整机厂还要等终端销量放量，但上游内存和高带宽存储的价格，往往会提前反映供需紧张。 这也是为什么，我们美股投资网从年初就一直强调并加仓 MU。 年初公开文章在 284 美元时提示买入， VIP 又在 386 美元加仓。本周二 MU 强势突破 1000 美元，同样接近 4 倍的涨幅。 文章回顾： 美股 2026年最强10只股【中集】不为人知的潜力公司 MU...... 同时，台积电也会继续受益。 RTX Spark 采用的是先进制程，这种高性能芯片对应的单价和毛利率，远高于传统成熟制程。 只要端侧 AI 设备开始放量，先进制程需求就不只是来自数据中心，也会逐步扩散到高端 PC 和本地 AI 工作站。 所以，第一条线讲到这里，其实已经说得很明白了： RTX Spark不是在PC上缝缝补补，而是从底层架构上，把PC从一个被动使用的显示终端，变成了一个主动执行任务的本地AI工作站。 这背后，算力在转移，生态在迁移，整条产业链的利润分配也在重组。 而这一切，才刚刚开始。 如果你觉得本文对你有帮助，老规矩先点赞再收藏，关键时刻能帮忙 美国热线 626 378 3637 AI智能体：AI从“大脑”走向“员工” 讲到这里，很多人可能会有一个误解：既然本地 AI PC 变强了，是不是云端算力就不重要了？ 恰恰相反。 本地 AI PC 不是云端 AI 的终结，而是 AI 需求扩散的开始。过去 AI 主要集中在云端，入口很少。未来不一样。 电脑会变成入口，企业软件会变成入口，数据平台会变成入口，客服系统、ERP、设计软件、工业软件，都会变成 AI 的入口。而这些入口最终要跑的，就是 智能体。 所以第二条线，就是 AI智能体。 但智能体不是聊天机器人。聊天机器人只是回答问题，智能体 是能调用工具、读取数据、执行任务的“数字员工”。 企业真正需要的，不是一个更会聊天的 AI，而是一个能安全干活的 AI。它要能读数据、调软件、跑流程，还要知道哪些文件能看，哪些系统不能碰。 这就是为什么英伟达要推智能体相关工具。 本质上，它不是只想让 AI 更聪明，而是要让智能体真正进入企业系统，变成可以被管理、被授权、被监督的企业级基础设施。 重点来了： 如果智能体真的进入企业，软件公司不是被消灭，而是会被重新调用。 因为智能体要干活，离不开三样东西： 数据、权限、流程。 谁掌握这些入口，谁就是智能体时代的受益者。 所以这条线，第一看企业软件和应用层入口。 NOW最直接：客服流程、审批流程、员工服务，都是智能体最容易先接管的场景。NOW和英伟达合作推进企业自治 智能体，重点就是让智能体在有权限、有规则、有治理的环境里工作。 对于NOW，我们早在 5 月 14 日，我们美股投资网的 AI 量化模型就在 88.3 美元 附近选出了 NOW，并已通知 VIP 社群建仓。截止本周一最高涨到138美元，涨幅55%。 SAP 掌握企业财务、采购、库存、供应链。智能体 如果要真正进入企业经营，绕不开 ERP。 CRM 受益于销售、客服、营销自动化；这里还要单独提一个 DOCN。它不是应用软件，而是开发者云。 未来智能体爆发后，不只是大企业会用，很多中小企业、创业团队，也会做客服、电商运营、营销自动化、数据分析这类垂直智能体。 这些团队不一定需要复杂的大型 AI 云，更需要便宜、简单、容易部署的平台。这就是 DOCN 的机会。 早在今年 3 月 21 日，我们在美股投资网的深度长文 《 2026 年 AI 智能体爆发年，极度利好两家美股公司！ 》 中，就把 DOCN 的投资逻辑讲得非常清楚。 当时股价仅 82.48 美元，而本周一已经冲到 175.6 美元，又是一笔翻倍的涨幅。 第二，看数据平台。 Snowflake Inc. (SNOW) 的逻辑不是“蹭 AI”，而是企业 AI 要落地，必须先有干净、统一、可治理的数据。没有数据，智能体 就是空转。 SNOW最近上调全年产品收入预期，还和 AWS 签了 5 年 60 亿美元合作协议，说明企业 AI workload 已经开始真实拉动数据云消耗。 大家应该还记得，我们之前在深度长文 《 被美股市场错杀 SaaS 公司，是否因 AI 智能体迎来大反转 》 就重点提醒关注 SNOW 。 当时股价只有 139.74 美元，截至目前涨幅已经达到 84%。这就是美股投资网给你的价值！ PLTR 则更适合Z府、大企业和高安全场景。智能体 要做复杂决策，必须接入真实业务数据和安全系统，这正是 Palantir 的位置。 第三，看专业工具。 CDNS 和 SNPS 是芯片设计软件。AI 芯片迭代越快，设计、验证、仿真的需求越高，电子设计自动化工具反而会被调用得更频繁。 CRWD 是安全。智能体 进入企业以后，本质上多了一批“数字员工”。这些数字员工有身份、有权限、会调用 API、会访问数据，企业必须监控它们、限制它们、保护它们。 西门子和达索系统是工业软件。智能体 进入制造业，是辅助设计、仿真、排产、维护，这些都离不开专业工业软件。 但这还不是全部。 如果智能体真的大规模跑起来，受益的不只是软件公司，底层基础设施也会继续吃紧。 因为智能体本质上会带来更多推理需求。每一个智能体都要调用模型、读取数据、执行任务、返回结果。企业部署的智能体越多，背后的算力、存储、网络连接和云基础设施需求就越大。 这就是为什么 MRVL 和 NBIS 也要放进这条线里看。 先看 MRVL MRVL 不是软件公司，它卡的是数据中心互联。 未来智能体越多，数据中心内部服务器之间、机架之间、GPU 之间的数据传输压力就越大。AI 工厂不是只有 GPU，网络能不能撑住，数据能不能低延迟流动，直接决定系统效率。 这就是黄仁勋公开力挺 MRVL 的核心原因。更关键的是，MRVL 自己预计定制芯片业务到 2029 财年有望超过 100 亿美元，这不是一句口号，而是真实的市场空间。 再说我们的2026年 必買 股NBIS。 文章回顾: 美股 2026年最强10只股【下集】不为人知的潜力公司NBIS...... NBIS 不是普通云服务商，而是 AI 云基础设施平台。未来企业要跑智能体，不一定都自己买 GPU、建机房或管理运维，很多公司会直接租用 NBIS 的 AI 云算力。 而且，英伟达已经和 NBIS 战略合作，要建设下一代超大规模 AI 云，并计划到 2030 年部署超过 5GW 的算力系统。也就是说，NBIS 不只是蹭 NVIDIA 热度，而是真正承接企业训练、推理和智能体部署的需求。 我们美股投资网今年3 月底，就在 VIP 社群提示买入 NBIS，当时价格只有96 美元,到本周一已经快翻 3 倍。我们仍然会坚定持有。 好了，由于时间关系，今天就先给大家讲到这里。 但我可以提前说一句：黄仁勋这次台北演讲里，真正值得深挖的，不止今天这两条线。 还有第三条线，我认为更狠。它可能不是短期炒作，而是未来十年 AI 产业重新分配利润的一条主线。 如果这期文章 转发超过 2000 ，我会继续把第三条线单独做一期，给大家讲清楚。 如果你不想等机会涨起来以后才看到，也欢迎加入我们美股投资网 VIP 社群。像 SNOW、DOCN、NOW、MRVL、NBIS 这些机会，我们不是等新闻爆了才说，而是在逻辑刚冒头的时候，就已经开始提前推演。 如果你还没有关注我们美股投 00人，与4月215000人大致持平，远低于历史警戒水平；4月JOLTS裁员率小幅降至1.1%，处于历史低位区间。 根据美股大数据 StockWe.com 板块追踪，今天80%的美股板块都下跌，唯独是传统保险板块逆势上涨 就在两天前，美股投资网就发文警告过， 华尔街非常关注的一种市场内部指标——S&P 500指数与成分股之间的隐含相关性（Implied Correlation）。 先看图中两条线： 蓝线 = S&P 500指数（SPX） 黑线 = 1个月50 Delta期权隐含相关性（Implied Correlation） 目前最值得关注的是： 标普500指数已经接近历史高位，但隐含相关性跌到了5.88，创下极低水平。 这意味着什么？ 简单来说： 如果相关性是100%，说明500只股票都一起涨一起跌。 如果相关性是0%，说明每只股票都在走自己的行情。 而现在5.88这个数字意味着： 市场已经极度分化。 表面上看指数很强，但实际上推动指数上涨的股票越来越少。 例如： 英伟达涨10% 微软涨5% Meta涨8% 但与此同时： 很多中小盘股不涨 很多传统行业股票横盘 大量股票甚至下跌 由于权重股太大，指数仍然被拉上去。 这就是所谓的：Narrow Market Breadth（狭窄市场宽度） 或者叫： Few Stocks Carrying the Market（少数股票扛着整个市场） 为什么相关性会这么低？ 通常有三个原因： 第一种情况：AI牛市 现在最符合这一点。资金疯狂追逐： NVIDIA Microsoft Meta Platforms Broadcom 而其他行业： 银行 医疗 消费 工业 涨幅远远落后。于是股票之间走势差异越来越大，相关性持续下降。 第二种情况：市场处于后期牛市 历史上很多牛市顶部附近都会出现：指数创新高,但上涨股票数量越来越少。 例如： 1999年互联网泡沫后期 2021年科技股泡沫后期 指数看起来很强。实际上内部开始出现裂痕。 相关性往往降至极低水平。 第三种情况：主动选股重新战胜指数 过去几年： 买指数就行。 现在开始变成： 选对股票的人大赚。 选错股票的人不赚钱。 因此股票表现差异扩大。 相关性下降。 图上最重要的一句话是： \"Implied correlation seldom stay this low\" 翻译： 隐含相关性很少长期维持在如此低的位置。 这也是高盛、摩根士丹利等机构经常研究的现象。 历史经验显示： 当相关性跌到极端低位后，未来通常会发生两种事情之一： 情况1（更常见） 市场广度改善 更多股票开始补涨。 指数继续上涨。 相关性回升。 这是最理想的\"健康牛市\"剧本。 情况2（风险较大） AI龙头开始回调，指数失去支撑，市场整体下跌，相关性快速回升。 因为跌的时候大家一起跌。相关性自然会上升。 对于当前市场（2026年）来说，这张图传递出的核心信息是： 美股并非全面牛市，而是AI龙头驱动的结构性牛市。 指数创新高是真的。 但并不是所有股票都在创新高。 市场正在变得越来越依赖少数超级权重股。 如果未来资金从AI龙头扩散到工业、金融、能源、小盘股，那么这轮牛市有望继续走得更远。 如果AI龙头增长放缓或者估值遭遇压缩，那么如此低的相关性可能会成为市场脆弱性的信号。 对于投资者而言，这种环境下最重要的并不是判断大盘，而是判断谁是真正能够持续获得AI资本开支红利的公司。因为当前市场已经进入了“选股比择时更重要”的阶段。 根据美股大数据 StockWe.com， 迈威尔 MRVL 科技盘后涨超5%，Flex涨超4%，因迈威尔科技、Flex将被纳入标普500指数。 想知道美股投资网接下来怎么布局 SpaceX是否值得买？欢迎加入 VIP 社群 美股AI量化分析工具 StockWe.com 产品功能展示 VIP订阅链接（用美国的浏览器打开）： https://StockWe.com/vip 美股投资网是一家专门研究美股的金融科技公司，2008年成立于美国硅谷，由前纽约证券交易所分析师Ken创立，联合多位摩根斯坦利分析师，谷歌 Meta工程师利用AI和大数据，配合十多年美股实战经验和业内量化模型，建立了一个股市数据库 https://StockWe.com/ 每天处理千万级股票数据：捕捉期权大单，实时主力资金流向、机构持仓变化、川普突发新闻，精准K线信号第一时间发到您手机APP！ 联系方式 客服Telegram MaxMeigu 公众号 TradesMax 邮箱 buy@TradesMax.com Email: buy@TradesMax.com 美股大数据 StockWe.com 美股投资网 TradesMax.com"}, {"title": "SpaceX上市倒计时7天！你最该看清的三个价值陷阱！", "date": "2026-06-04", "ym": "2026-06", "time": "2026-06-04 21:10:57", "author": "StockWe.com", "desc": "必看", "url": "https://mp.weixin.qq.com/s/Bpgr4WhKzpax8AoLmE012A", "path": "sources/news/wechat_mp/articles/SpaceX上市倒计时7天-你最该看清的三个价值陷阱-4ed140ef0c.md", "len": 3550, "ticks": [], "body": "按照目前 IPO 时间表，SpaceX下周四（6月11日）正式定价，6月12日挂牌上市，美股代号SPCX。 留给散户“上车”的时间，只剩最后几天。 但很多人不知道： 真正的陷阱，恰恰就在这几天集中爆发! 高盛给的不是营收预测，是估值框架 先看数字。 高盛预测，SpaceX今年营收约380亿美元，2030年达到4740亿美元。去年营收约187亿美元，等于未来几年要增长约25倍。 很多人第一反应：火箭发射市场没这么大，Starlink用户也撑不起这个体量。但重点不在火箭，也不在Starlink。 高盛预测里最关键的一句话是： 到2030年，AI业务收入可能占SpaceX总销售额的三分之二。 这才是核心。 高盛不是在预测SpaceX多接了多少发射订单，也不是Starlink多卖了多少宽带套餐。 而是在预测：SpaceX未来最大的收入来源，可能来自AI相关业务。 这等于把SpaceX的估值框架彻底换了。 火箭业务 → 工程壁垒估值。技术稀缺，但全球商业发射市场天花板有限。 Starlink → 通信网络估值。市场空间更大，但通信行业资本开支重，利润率不会无限高。 AI基础设施 → 算力平台估值。如果SpaceX真能成为AI推理时代的底层网络，它面对的不是几百亿美元，而是万亿美元级别的市场。 所以今天看SpaceX，不能只看“马斯克又要上市一家公司”。真正的问题是：未来AI推理需求大规模爆发，SpaceX有没有可能成为全球算力基础设施的入口？ 3600亿美元资本开支如何看待 高盛预测里还有一个更重要的数字： 到2028年，SpaceX的资本支出可能达到约3600亿美元，其中约80%将用于人工智能。 这个逻辑有点像早期亚马逊做AWS。当年市场一直把亚马逊当电商公司，嫌它资本开支重、利润薄。后来才发现，真正改变亚马逊估值的不是零售，而是AWS。 SpaceX现在的潜在逻辑也类似：火箭和Starlink是护城河，AI基础设施才可能是未来估值重估的引擎。 但区别也很关键：AWS后来已经被证明有极高的利润率和现金流，而SpaceX的AI基础设施故事，目前还停留在预测阶段。 所以我们真正看的不是4740亿收入有多性感，而是两个问题： 3600亿资本开支，能不能换来真实客户和高质量收入？ 这些收入最后能不能变成自由现金流？ 高盛同时预计，SpaceX今年和明年的现金消耗总额可能达到1200亿美元，到2030年还可能再烧掉2300亿美元。2026-2030年累计现金消耗约3500亿美元。 这就是分歧点。 乐观的人说这是抢占下一代AI入口； 谨慎的人说这是一个超级烧钱故事，必须用真金白银的利润来证明。 所以SpaceX不是没有风险。越伟大的故事，越要看它能不能穿透收入表、利润表、现金流量表。 最危险的地方：买不到真股权 上面讲了基本面，但说实话，这些对普通散户不一定是最紧急的问题。因为大部分散户根本买不到SpaceX真正的股权。 真正要警惕的，不是SpaceX、OpenAI这些公司本身，而是围绕它们形成的上市前股权交易灰色市场。 这个市场为什么热？ 因为大家都知道，超级独角兽最肥的一段收益往往发生在上市前。等公司真正IPO，早期投资人可能已经吃掉了最大一段涨幅。 所以市场上出现各种话术：上市前额度、原始股份额、内部通道、稀缺份额。听起来很诱人。 但关键问题是：普通投资者绝大多数时候买不到真正的原始股。 你买到的，很可能是SPV（Special Purpose Vehicle）——一个“投资壳”。 举个例子：你想买SpaceX，但SpaceX不直接卖给你。中介设一个壳公司，把很多人的钱集中起来，再由这个壳去“买”SpaceX的相关权益。 如果只有一层壳、费用清楚、底层股份真实、公司认可转让，那还算正常。但问题是，现在很多热门项目不是一层壳，而是两层、三层，甚至更多层。 你以为自己买的是SpaceX。 实际上可能是：你买了A壳，A壳买了B壳，B壳买了C壳，C壳才可能对应某个原始股东的权益。 到最后，你持有的不是SpaceX股.票，而是一串合同权利。 这就是最要命的地方： 它卖给你的故事是“顶级资产”，交付给你的却是“复杂结构”。 SPV的两个核心问题：费用和权利 第一，每一层都要收费。 最常见的是2%管理费 + 20%业绩报酬。一层2+20，两层就是两次，三层就是三次。 你承担所有风险，中间人先锁定收费权。 举个例子：你拿出200万美元，买入三层嵌套SPV。两年后底层资产涨到1000万美元（翻了五倍）。层层费用扣下来： 第一层提取160万业绩报酬+20万管理费 → 剩820万 第二层提取160万+16.4万 → 剩643.6万 第三层提取约128万+12.9万 → 最终到你手里约503万 近500万美元被中间人抽走，还没算税。你承担公司不上市、估值下跌、流动性锁死的风险，但赚钱时中间人先切走最大一块。 这就是结构吃收益。 第二，公司可能根本不认账。 OpenAI、Anthropic、SpaceX这类公司，对股份转让都有严格限制。未经批准的私下转让，可能直接无效。 Anthropic甚至公开公布过“未获授权买卖其股份的SPV中介名单”，明确禁止SPV收购自家股份。SpaceX在筹备IPO过程中，也在清理股权名册里的部分SPV投资者。 你付了钱，拿到了SPV文件，不代表你真的拥有被公司认可的股权。 你以为自己间接持有了SpaceX，但公司股权名册上可能根本没有你。如果底层转让未经批准，上市后你的份额就是一张废纸。到时候你找中介，中介会说“我也是从上层买的”——然后消失。 这不是涨跌风险，这是权利不确定。 另一种“提前下注”的方式 就在这两天，Coinbase也蹭上了SpaceX的热度，推出了Pre-IPO永续期货——允许交易者在SpaceX正式IPO之前，就开始下注其上市后的股价。 这个产品7×24小时交易，用USDC结算，待SpaceX真正上市后会自动转成普通永续合约。但有两点你要知道： 它跟SpaceX公司没有任何关系，未经官方背书。 美国投资者不能玩——因为产品是通过百慕大金融管理局许可的Coinbase Bermuda提供的。 币安上个月已经抢先推出了类似产品，SpaceX合约价格一度炒高，最近回落到179美元左右（IPO定价135美元）。 这本质上是一种合规的提前投机工具，但它和买真正的股权是两码事——你赌的只是价格，不享有股东权利，也不承担SPV那种“公司不认账”的风险。 低门槛“原始股”最会收割FOMO 最后说一个真实案例：Linqto。 它曾宣称最低1000美元就能买入SpaceX、Anthropic等非上市公司股份，不收管理费和收益分成。门槛低、标的性感、费用便宜——对散户吸引力极强。 但后来Linqto陷入多起诉讼，受到SEC、司法部和FINRA调查。指控包括： 实际卖的是SPV权益，而不是真实股权。 宣传没有隐性收费，但可能通过暗中加价赚差价。 利用网红和社交媒体制造稀缺感，刺激FOMO——“额度有限，马上关闭，错过不再有”。 这就是灰色市场的典型打法： 先给你最强关键词——SpaceX、OpenAI、Anthropic 再给你最强情绪——额度有限、马上关闭。 把复杂的法律结构、费用结构、转让限制，全藏在几十页合同后面。 成熟的投资机会，应该是你越问越清楚。 如果你问“底层资产是什么”“有几层结构”“公司是否批准转让”，对方越含糊、越催你“先打钱再说”，那就要极度警惕。 爆款文章回顾： 【首次公开】我美股核心仓位 MRVL 、MU，一年翻300% ！ 想知道美股投资网接下来怎么布局 欢迎加入 VIP 社群 美股AI量化分析工具 StockWe.com 产品功能展示 VIP订阅链接（用美国的浏览器打开）： https://StockWe.com/vip 美股投资网是一家专门研究美股的金融科技公司，2008年成立于美国硅谷，由前纽约证券交易所分析师Ken创立，联合多位摩根斯坦利分析师，谷歌 Meta工程师利用AI和大数据，配合十多年美股实战经验和业内量化模型，建立了一个股市数据库 https://StockWe.com/ 每天处理千万级股票数据：捕捉期权大单，实时主力资金流向、机构持仓变化、川普突发新闻，精准K线信号第一时间发到您手机APP！ 联系方式 客服Telegram MaxMeigu 公众号 TradesMax 邮箱 buy@TradesMax.com Email: buy@TradesMax.com 美股大数据 StockWe.com 美股投资网 TradesMax.com"}, {"title": "黄仁勋重磅演讲，资本市场疯狂投票！AI PC 时代谁最受益？", "date": "2026-06-01", "ym": "2026-06", "time": "2026-06-01 20:55:10", "author": "StockWe.com", "desc": "黄仁勋演讲引爆美股四大赛道！", "url": "https://mp.weixin.qq.com/s/o3csfM0Ce66rWOypuCeb-g", "path": "sources/news/wechat_mp/articles/黄仁勋重磅演讲-资本市场疯狂投票-AI-PC-时代谁最受益-c4cf0f7cfc.md", "len": 3945, "ticks": [], "body": "今天，英伟达 正式进军 AI PC。 表面上是发布了一颗名叫“RTX Spark”的新芯片，但本质上只做了一件事：从 PC 的“显卡供应商”，升级为“大脑供应商”。 过去一台 Windows 电脑的核心架构非常固定：Intel 或 AMD 做 CPU，英伟达 做 GPU。NVIDIA 再强，扮演的也只是加速角色——打游戏、剪视频、跑渲染，始终是配角。 但这次完全不同。 RTX Spark 不是传统意义上的独立显卡，而是一颗把 Arm CPU、Blackwell GPU 和统一内存 整合在一起的超级芯片。 它的目标不是提升跑分，而是让 PC 能够本地运行 AI Agent——让 AI 不再每一次都依赖云端，直接在笔记本、台式机里完成推理和执行。 换句话说，英伟达 不是在给 PC 补一个零件，而是在重新定义“什么叫 AI PC”。 市场的反应足够说明一切。 英伟达：涨超6%，市值单日增加3190亿美元，创下自2月以来的最佳交易日表现； 微软：盘中涨超3%，收盘涨约2.3%，富国银行将目标价从625美元上调至650美元； ARM：盘中大涨超18%，股价创下421.69美元的历史新高. 这里我们就不得不说，我们的美股大数据是 StockWe AI 模型是在 242 美元附近选出 ARM，截止今日直接获利74%。 Arm 为什么大涨？ 原因很直接：RTX Spark 坚定走 Arm 路线。英伟达、微软、联发科三家合力推动 Windows on Arm，而过去高通推了那么多年都推不动，缺的就是三样东西：GPU 性能心智、AI 开发者生态、高端硬件品牌溢价。 而这三样，英伟达 全有。如果它能将 Windows on Arm 从“轻办公、长续航”的定位，真正升级为“高性能 AI 工作站”，那么整个 PC 竞争格局就会发生根本性变化——x86 的垄断会被撕开一道口子，而 Arm 就是那把刀。 所以市场不是在单纯炒概念，而是在为 Arm 在 AI 时代的核心底层架构地位重新定价。 黄仁勋的演讲点燃了四个赛道 今天大涨的远不止这三家。你会发现，黄仁勋的一场演讲，同时点燃了算力、架构、云服务和企业软件四个赛道。 在 2026 年美股投资网必买股名单中，NBIS 今日大涨超 18%！ 文章回顾： 美股 2026年最强10只股【下集】不为人知的潜力公司 NBIS...... 它上涨的直接原因，是 黄仁勋在 Computex 演讲中公开点名了 Nebius。 原话是：“We worked with Nebius, and they are growing incredibly fast.” 现场画面同时打出两家公司的 logo。这个级别的公开背书，直接点燃了资金对这家“中立 AI 云服务商”的热情。 我们美股投资网今年3 月底，就在 VIP 社群提示买入 NBIS，当时价格只有96 美元,到今天已经快翻 3 倍。我们仍然会坚定持有。 ServiceNow（NOW） 大涨 10% 左右，完全体现了它作为 AI 生态的直接受益者。 催化剂来自黄仁勋的另一句关键发言：“AI 更可能促进软件需求，而不是摧毁它。” 这句话直接对冲了困扰软件板块一整年的核心焦虑——市场原本担心 AI 智能体会替代一切企业软件，但黄仁勋的表态让整个板块的估值模型被重新修复。 ServiceNow 恰好踩中了两个当前最热的概念：Agentic AI 和企业 AI 部署的治理层。当 AI Agent 从理论走向真实的企业工作流，授权、安全、流程管控就会变成刚需——这正是 ServiceNow 的 Now Platform 在布局的方向。 早在 5 月 14 日，我们美股投资网的 AI 量化模型就在 88.3 美元 附近选出了 NOW，并已通知 VIP 社群建仓。截止今日，股价已上涨约 54%。 Snowflake（SNOW） 同样大涨 10% 左右。 但它的逻辑和 NOW 略有不同：SNOW 同样受益于黄仁勋“AI 不会摧毁软件”的表态，但它的主引擎是 5 月 27 日发布的创纪录财报——产品营收同比增长 33.9%，全年指引上修，同时宣布与 AWS 扩大 60 亿美元合作。 财报本身让股价在 5 月 28 日单日暴涨 36%，黄仁勋的演讲则在 6 月 1 日扮演了“锦上添花”的角色，推动股价再涨 1 强劲的市场需求，能完全掌控定价权，大白话就是，谈回调还早。 MU期权异动千万大单 再来看美股期权异动数据，华尔街机构对未来的押注，更加真金白银的下单。 这两张图里，最关键的信息不是“有人买了很多MU期权”，而是市场正在押注美光 MU 进入“极端波动 + 长周期AI超级行情”。但更深层地看，机构之间出现了明显分歧：一部分人在疯狂追涨，另一部分人在高位卖波动率、做对冲、甚至提前布局回撤。 美股投资网按“专业期权交易员”的角度，给你拆解。 上图中出现了大量超远虚值CALL、超高IV（隐含波动率90%~170%）、大额LEAPS（2027）、大量卖方交易，以及极度夸张的行权价（700 / 1000 / 1300）。这已经不是普通散户行为。这是“事件驱动型 + AI主题型 + Gamma驱动型”资金。 本质上类似 NVDA 2023年、SMCI 2024年、ARM 2025年那种疯狂阶段。 最值得注意的是 MU 700 CALL Jan 2027。权利金分别达到 24.6M、17.48M、8.8M，行权价700，到期日2027/01/15。这是极其疯狂的单子。因为MU现在已经在928美元附近，所以700 CALL其实已经是深度价内CALL（Deep ITM）。这意味着这些单子并不是“买彩票式”的极端投机，而更像是机构利用深度价内CALL进行高杠杆替代持股（Stock Replacement）。 但关键点来了。下图显示，这些CALL很多是“卖方看跌”。也就是说，大量机构其实是在卖出这些超高IV CALL。什么意思？机构认为IV太贵了，市场已经过热，他们愿意做CALL卖方赚时间价值。这是非常重要的信号。 真正危险的地方是，IV已经进入“核爆级”。你看这些IV：88%、95%、105%、112%、173%。这不是正常状态。正常大型科技股40%-60%已经很高。现在MU已经进入“事件驱动赌场模式”。这意味着，期权价格里已经提前计入巨大涨幅。也就是说，即使MU继续涨，很多CALL也未必赚钱，因为你买的是“昂贵预期”。这是很多人不懂的。 为什么机构敢卖CALL？因为他们知道MU不可能无限直线暴涨。举例来说，MU 1000 CALL 权利金240，意味着到期前MU必须远远超过1240美元，买方才真正大赚。这其实是买彩票。卖方则在赌MU不会进入“NVDA级终极泡沫”。所以很多大机构在卖波动率、收Theta、利用AI狂热赚钱。这就是典型的 Volatility Harvest（波动率收割）。 但为什么还有人疯狂买？因为市场正在形成一种新逻辑：AI时代，HBM = 新石油。而MU是HBM核心受益者。市场现在押注HBM持续缺货、AI服务器爆发、ASIC大规模增长、推理需求爆炸、AI PC / AI手机启动，以及存储行业周期反转。所以资金认为MU可能从传统周期股，升级成AI基础设施核心资产。这才是大资金真正押注的东西。 图中PUT也非常大：650 PUT、800 PUT、880 PUT，而且很多还是“买方看跌”。这说明有机构在做保护。说明市场虽然极度看多，但也非常害怕财报后暴跌、HBM降价、供给释放、AI资本开支放缓。所以现在MU进入“大多头 + 大空头”同时极端博弈阶段。这往往意味着未来波动会巨大。 我的结论是： 第一，市场长期极度看好MU，这一点毫无疑问。否则不会出现2027年700~1300 CALL。这说明机构认为AI存储周期远未结束。 第二，但短期已经严重过热，IV已经高到危险。大量CALL卖方出现，说明聪明资金开始卖情绪。 第三，MU正在进入“AI核心资产化”，这是最关键的变化。以前MU是传统周期股，现在市场开始把它类比NVDA，估值体系正在改变。 第四，最大风险是预期过高。现在MU最危险的不是业绩差，而是“业绩很好，但不够疯狂”，因为期权市场已经在定价超级爆炸增长。 如果我是机构，专业资金现在更可能卖超远虚值CALL赚IV崩塌、做Call Spread而不是裸买CALL、做Diagonal利用高IV套利，以及财报后做Vol Crush（隐波崩塌），而不是直接高位追CALL。因为现在时间价值太贵了。 美股大数据 StockWe.com 最终一句话总结：这两张图真正说明的是，MU已经从“存储公司”，被华尔街资金当成“AI时代最核心基础设施资产之一”。但与此同时，期权市场已经开始出现“疯狂、泡沫化、赌场化”特征。短期极度危险，长期机构仍然非常看多AI存储超级周期。 如果以上内容看不懂，没关系，我们有专门的期权入门到精通的课程和视频， https://Stockwe.com/col/videos 前纽约证券交易所资深分析师Ken亲自授课 客服微信，说明来意 （不要催，最近太多人加，看到都会回复） 美股投资网自己的实盘更新，3个月盈利 87% VIP订阅链 ，维持买入评级。 汇丰银行（HSBC）在最新报告中给出了更为长远的视角。 汇丰指出，新兴主题如新云需求、非超大规模企业的AI基础设施采用、AI服务器CPU、光学/网络机遇以及更广泛的市场规模扩张，可能成为未来估值倍数扩张的更关键驱动力。基于此，汇丰将目标价从295美元大幅上调至325美元，继续看好Blackwell与Rubin的持续增长动能，并认为2028财年的盈利仍有上行空间。 把这些跨机构的预期拼在一起，结论很清晰： 主导短线股价反应的，已经不是卖方模型里的官方共识，而是 买方心里那条更高、更隐性的“必须超额完成线”。 所以本季英伟达的关键，不是能不能超过公司指引，而是能不能跨过市场私下重新划出的三道红线： Q1营收最好站上800亿美元，否则即使超过官方指引，也可能被解读为“只是不够惊艳”； 毛利率需要稳在75%以上，因为这直接决定B300、Blackwell后续爬坡是否会带来成本压力和产品切换摩擦； Q2营收指引需要明显高于870亿美元，最好向890亿美元靠拢，市场才会相信AI资本开支的需求斜率没有放缓。 一句话总结：市场已经不满足于“超预期”，它要的是“超预期到让所有人闭嘴”。 市场真正忽视的五个核心变量 说完市场最关注的财务门槛，接下来才是这篇文章真正想讲的重点：那些没有被充分定价、却正在影响英伟达未来三年增长曲线的核心变量。 这五个变量，表面上看是不同业务线，实际上指向同一个趋势：英伟达正在从一家“卖 GPU 的芯片公司”，升级为 AI 数据中心的系统级基础设施供应商。 变量一：网络业务不再是配角 过去很多人看英伟达，只看 GPU：H100、H200、B200、GB200，核心问题就是芯片卖了多少、毛利率有多高、云厂商还抢不抢货。 但站在 2026 年看，英伟达最重要的变化，恰恰不是 GPU 本身，而是它正在从“卖芯片”变成“卖整套 AI 基础设施”。 原因很简单：AI 集群越做越大，瓶颈就不再只是单颗 GPU 的算力，而是几万张、几十万张 GPU 之间能不能高效协同。GPU 再强，如果卡与卡之间的数据传输跟不上，训练效率、推理吞吐和能耗比都会被拖下来。所以，网络已经不是配件，而是 AI 数据中心的骨架。 英伟达现在卖的也不是普通交换机，而是一整套网络架构：GPU、NVLink、InfiniBand、Spectrum-X、网卡、交换机、光互联和整柜系统。云厂商要建超大规模 AI 集群，买的不是一块卡，而是一整套能直接扩展的 AI 工厂。 数据已经说明问题。 UBS 预计，英伟达第一财季数据中心收入约 747.8 亿美元，其中网络收入约 131.8 亿美元；到 2026 年全年，网络收入预计达到 611.5 亿美元，2027 年进一步升至 879.5 亿美元。 这个规模已经说明，网络业务不再是 GPU 的附属品，而是英伟达第二条增长曲线。 美股投资网分析认为，这件事的真正意义在于：英伟达把竞争从“单颗芯片性能”拉高到了“系统级交付能力”。 AMD 可以追 GPU，云厂商也可以做 ASIC，但当客户真正要建十万卡级别的 AI 集群时，问题就不只是芯片够不够快，而是网络、互联、功耗、散热、软件调度和整柜交付能不能一起跑起来。 这才是英伟达最难被复制的地方。 变量二：英伟达把 CPU 纳入 AI 工厂版图 过去两年，AI 投资几乎都围绕 GPU 展开。因为训练大模型最缺的是并行算力，GPU 是核心。但接下来，随着 AI 从聊天机器人走向 Agentic AI，情况会发生变化。 Agentic AI 不只是回答问题，而是能自己拆任务、调用工具、执行流程。比如它不是简单回答“帮我分析一家公司”，而是会自己找资料、读文件、做表格、写结论、再检查逻辑。这个过程会产生更多步骤，也会消耗更多 token。 这时候，数据中心需要的不只是 GPU 算力，还需要更强的 CPU 来做调度。 可以简单理解： GPU 负责“干重活”，CPU 负责“安排谁先干、怎么干、数据怎么流转”。 AI Agent 越复杂，后台流程越长，CPU 的重要性就越高。 这也是为什么高盛在英伟达财报前瞻里特别提到，投资人要关注 Agentic AI 对服务器 CPU 需求的拉动。部分机构认为，未来 AI 数据中心里，CPU 配置会明显提高，不再是过去那种几乎只看 GPU 的结构。 这本是 Intel 和 AMD 最熟悉的战场。但英伟达不想只当 GPU 供应商。 瑞银和高盛都提到，英伟达的 Vera CPU-only racks 预计在 2026 年下半年开始出货。英伟达正在把 CPU 也放进自己的 AI 数据中心方案里，而不是把这部分市场完全留给传统 CPU 厂商。 英伟达切入 CPU 的真正意义，不是去和 Intel、AMD 比单颗性能，而是用“CPU+GPU+网络”的组合，让客户省掉自己拼凑的麻烦。 对云厂商来说，建 AI 集群最头疼的不是买某一颗芯片，而是让 CPU、GPU、网络、散热、软件全部稳定配合。英伟达的 Vera CPU 可能不是跑分最高的，但它一定是最懂旁边那张 GPU 的 CPU。 Arm 也值得一起看。Agentic AI 推高 CPU 需求后，Arm 架构的能效优势会更明显。软银和 Arm 的机会在于 CPU 价值重估；英伟达的机会在于，把 Arm 架构 CPU 放进自己的 GPU 生态里，形成更完整的方案。 对投资者来说，这个变量很直接：AI 不只等于 GPU。下一阶段，CPU、网络、推理架构都会变得更重要。 瑞银已经把英伟达 2027 年收入预期上调到约 6065 亿美元，其中就包括了 Vera CPU 等新增机会。 市场如果只盯着 GPU 出货量，就会低估这条线的弹性。 如果你觉得本文对你有帮助，老规矩先点赞再收藏，关键时刻能帮忙 美国热线 626 378 3637 变量三：供应链短期是风险 每次英伟达财报前，总有人拿供应链说事：HBM 缺货、CoWoS 封装不够、液冷出问题、机架又要推迟…… 这些担心不是没道理。瑞银在报告里也承认，Rubin 机架因为液冷调试，量产可能要推迟到 9 月或 10 月。 但这只讲了一半的故事。 很多人只看供应链的“风险”，却忘了问另一个问题：为什么同样缺货，别人缺得起，英伟达缺不起？ 答案藏在三组数字里。 第一组：950 亿美元 + 210 亿美元。 这是大摩报告披露的数据。 英伟达目前手握 950 亿美元的采购承诺，外加 210 亿美元的库存。 什么叫采购承诺？就是提前锁定了未来 18 个月的晶圆、HBM、封装基板等关键产能，价格也基本谈好了。 这意味着什么？当竞争对手因为内存涨价被迫上调成本、压缩毛利率时，英伟达可以稳在原地。它不是不怕通胀，而是早在通胀到来之前，就把避风港买好了。 第二组：72.7%。 这是大摩对英伟达 FY28 毛利率的预期，比之前的 75% 以上有所下调。原因是 Rubin 新平台爬坡，初期成本确实会高一些。市场容易抓住这个数字，说“你看，毛利率守不住了”。 但换个角度想：在零部件全面涨价的 2026 年，还能把毛利率维持在 73% 附近，除了英伟达，还有几家芯片公司能做到？ 第三组：延迟 ≠ 丢订单。 UBS 提到 Rubin 机架推迟一两个月，但同时也说：Blackwell 需求仍然极强，ODM 可以把 Blackwell 生产延长到年底，填补空档。 这句话很关键。它说明英伟达现在的问题不是“没人买”，而是“交得不够快”。只要需求端没有断，所谓延迟，只是把收入确认往后挪了一个季度，而不是把订单送给别人。 把这些数字串起来，结论就清晰了： 供应链对英伟达是双刃剑。 短期看，它确实会压住出货节奏，让每个季度的数字不能无限超预期。但长期看，它把行业的竞争门槛抬到了天花板。 变量四：海外订单不是红利 这部分一定要讲清楚：它不是已经落袋的红利，而是被政策和采购意愿同时压住的潜在弹性。不是利好，也不是利空，是还没翻开的牌。 中东的逻辑与CN不太一样。 沙特和阿联酋不属于第三级全面禁运国家，门槛本身就比 CN 低一层。拜登Z府时期，中东国家每年大约只能采购约1700个AI芯片，限制极严。 特朗普上台后调整了政策基调，中东的准入权限有所放宽。沙特和阿联酋可以通过\"验证最终用户\"认证，突破原先的国家配额，进行大规模部署。美国政策的目标很明确：用芯片准入权，把中东的石油美元拉进美国AI基建体系。 但放宽不等于放行。出口沙特和阿联酋的先进AI芯片同样受BIS审批约束，需要逐案审核终端用户、最终用途和合规保障。这决定了中东订单短期内仍然会有审批流程的拖累。 从中长期看，如果沙特和阿联酋的大型AI项目落地加速，或者相关VEU认证批量通过，英伟达可能迎来一批延后订单的释放。中东不是即时红利，但它在变量清单里的排序，比中.国更靠前。 变量五：巨额回购，正在成为估值支撑 前面几个变量，讲的是英伟达怎么继续赚钱。最后一个变量，讲的是它赚到钱之后，怎么影响股东回报。 瑞银预计， 英伟达今年自由现金流约 1900 亿美元，明年约 3200 亿美元。 这不是简单的账面利润，而是公司扣掉必要资本开支后，真正可以自由支配的现金。 更关键的是，瑞银认为英伟达未来 12 个月可能推出接近 1500 亿美元的新回购计划，季度回购规模可能提升到约 350 亿美元，同时市场也在关注公司是否会提高股息。 这件事的意义不在于“回购一定托住股价”。回购不是股价的绝对底，市场大跌时照样会跌。它真正说明的是： 英伟达已经不只是高增长 AI 芯片股，它正在变成一只同时具备高增长、高自由现金流和高资本回报能力的核心资产。 对投资者来说，回购会带来一个直接影响：流通股本减少后，在净利润不变的情况下，每股收益会被动增厚。也就是说，未来看英伟达估值，不能只看静态 PE，还要看 EPS 增长、自由现金流和回购减少股本后的增厚效果。 竞争对手与金主们 微软、谷歌、亚马逊、Meta，这四家2026年的AI资本开支加起来，已经飙到了6500亿到7250亿美元——这是什么概念？相当于它们正在用接近一个国家级的举债体量，在全球债券市场上跟美国财政部抢钱。 谷歌光今年一季度就发了311亿美元的高息债券，亚马逊长期负债从656亿暴增到1191亿，单季融资现金流超过527亿美元。债券交易员们私下开玩笑说，这些云巨头现在借钱的样子，活像个“主权评级借款人”。 这背后传递的信号非常明确：它们的AI基建投入，已经不是一个“可选项”，而是一个“必须项”。哪怕借钱也要修、哪怕抬高国债利率也要修。这股债务驱动的资金洪流，就是英伟达短期业绩不会断崖式下跌的终极担保——需求端根本不可能熄火。 但问题是，钱虽然多，却不一定会全部流进英伟达的口袋。 AMD正在证明一件事：作为“第二供应商”，它在英伟达的阴影里找到了自己的生存空间。 今年一季度AMD交出了一份相当有威慑力的财报，关键不在GPU卖了多少，而在它的EPYC服务器CPU——也就是大厂建AI集群时用来做“头节点”管理的配套芯片——份额正在加速上攻。 AMD已经把到2030年的服务器CPU年复合增长指引从18%直接翻倍上调到了35%以上。 这意味着，随着AI推理工作量爆发，大厂们在抢GPU的同时，也在疯狂补仓配套的CPU。英伟达虽然在算力卡上无敌，但在CPU这块，它还得看AMD的脸色。 更直接的压力来自Cerebras。这家公司的WSE-3芯片把4万亿晶体管堆在一块晶圆上，自带44GB片上SRAM，完全绕开了让英伟达头疼的HBM内存供应链瓶颈。 OpenAI今年1月跟它签了100亿美元算力合同，4月又加码到200亿美元。为了锁定产能，OpenAI甚至接受了Cerebras提供的10亿美元贷款加股权认股权证这种复杂的金融安排。AWS也在今年3月首次在核心机房部署了Cerebras系统。 把这些拼在一起，你会看到一个清晰的图景：微软、谷歌、亚马逊这些超级买家，虽然一边在借钱疯狂砸向AI基建，但另一边也在搭建一个“去英伟达化”的对冲组合——AMD的CPU和GPU、Cerebras的晶圆级系统、再加上各自自研的ASIC芯片，形成一个多点备份的采购矩阵。它们不是要彻底放弃英伟达，而是不想被英伟达一家锁死。 所以英伟达的处境其实是这样的： 需求端被云巨头的“债务型资本开支”焊死了一个大底，短期内不可能崩；但竞争端，AMD在吃配套CPU的红利，Cerebras在吃无HBM瓶颈的推理专用红利，再加上各大厂自研ASIC的分流， 英伟达的份额天花板正在被一点点压低。 这才是当下AI芯片战争最真实的博弈状态。 别把“好公司”当成“好交易” 对于英伟达即将于5月20日发布的财报，美股投资网在短期战术层面持谨慎态度——更准确地说，短线偏空或震荡。 需要先澄清一点：这并非因为我们看空英伟达的基本面。英伟达仍然是AI产业链中最核心的公司之一，长期逻辑并未动摇，我们也会坚定持有。 但问题在于，好公司不等于好交易。 尤其在财报前夕，市场预期已被推至高位，期权价格昂贵，短线交易的赔率并不舒适。我们短期谨慎，主要基于以下四个原因。 预期已经过高。 市场当前关心的，已经不是英伟达能否超越官方指引，而是能否超越那个被机构暗中抬高的“隐形门槛”。它需要证明的不是“自己很好”，而是“比所有人想象的还要好”。这个门槛在短期内并不容易跨越。 历史交易规律指向非对称的下行风险。 过去五次财报，英伟达每次营收与利润均超预期，但其中有四次股价反而下跌。这并非基本面恶化，而是财报前投机性多头仓位过度拥挤。当数字落地后，无论是否超预期，获利了结都成为最自然的选择。 期权市场正处于高溢价陷阱。 当前隐含波动率已升至61%，市场定价的财报后双向跳空幅度约为8%至10%。此时买入看涨或看跌期权，权利金成本极高。即便方向判断正确，若实际涨幅未大幅超出预期，财报后的波动率崩塌（IV Crush）也会迅速吞噬合约的时间价值。 直接买入跨式或宽跨式策略，赔率并不有利。相对更安全的结构是卖出宽跨式组合或采用垂直价差——赚取的是高波动环境下的时间价值衰减，而非押注单边方向。 供应链的硬性约束压制了“无限超预期”的可能性。 英伟达当前面临的并非需求不足，而是产能受限。CoWoS-L先进封装的良率爬坡（尤其是多芯片拼接时的热翘曲问题），以及HBM内存2026年产能已被云巨头提前锁定，均是短期内无法通过资金解决的物理瓶颈。 这意味着，即便需求持续旺盛，英伟达在未来几个季度也很难给出颠覆性超预期的出货指引。 从技术面看，股价上方240美元附近是历史高点连线 body": "风险不是突然出现的，只是大多数人只有在下跌那一刻，才愿意承认它存在。 上周六我们发文 《警惕！美股回调的风险逐渐增大！》 ，从五层压力维度系统分析了美股面临的回调风险。 文章明确指出，“即便AI产业逻辑没有改变，股价也未必还能持续上涨，因为资金成本已经发生了变化”，并特别指出高估值成长股、半导体及高Beta AI板块将率先承压。 今日周一（5月18日），市场如期回调：美股三大指数盘中集体跳水，科技股、AI光电板块及存储芯片板块遭遇大面积抛售。 AI光电板块方面，Lumentum（LITE）大跌9.34%；康宁（GLW）大跌8.11%。存储芯片板块，闪迪（SNDK）跌8%；Nebius Group（NBIS）盘中跌超11%，受内部人士减持消息拖累，盘中低点触及190.08美元。 不过，我们上周四在VIP社群中明确提示以88美元建仓的SaaS软件股NOW， 文章也公开分享给大家我们入了 NOW 【突发】SpaceX将于6月12日上市，美股代号 SPCX 今日逆势大涨超10%，验证了我们美股投资网在波动市中结构性选股逻辑的价值。 从88到104，VIP社群获利 18% 而高盛近期发文，也恰好从资金面和情绪面验证了我们此前的判断： 资金流向：对冲基金与资管本周同步净卖出，宏观产品做空力度创近两个月新高。 科技股虽是近期涨幅最猛的板块，却成为本周唯一被“去杠杆”（的方向——说明聪明钱已在AI和半导体暴涨后开始落袋为安。 与此同时，资金出现大反转：非消费周期股迎来17周来首次净买入，金融板块创下今年最大净买入量（因敞口已跌至5年低位）。 期权信号：市场呈现极度罕见的“现货涨+波动率涨”组合，QQQ现货与波动率的3周滚动相关性创下过去5年最高。 偏度跌至2024年7月以来最低，意味着前期被看涨期权买盘主导的情绪已出现拐点。上周四和周五，客户开始疯狂对冲并锁定多头利润，部分资金提前买入看跌期权价差，押注本周英伟达财报成为典型的“Sell the news”事件。 宏观策略：高盛经济学家已将降息预期推迟至2026年12月和2027年3月，粘性通胀+高油价+降息延后，使得“Higher for longer”（利率长期维持高位）再次成为美股最大拦路虎。 无脑买科技股的时代暂停，高盛给出的核心对冲策略是：做空无盈利/非长期趋势的科技股，同时配对做多前期滞涨的超大规模云厂商。 从我们的前瞻预警，到VIP社群逆势捕捉NOW的大涨，再到高盛数据对资金流向的交叉验证——这一轮美股的分化与回调，脉络已经再清晰不过。 最近加我们的人实在太多 请务必注明“来意 + VIP”，这样我们能优先处理 现在该减仓，还是清仓？ 如果你手里的股已经获利很高，比如已经赚了 80% 甚至 120%，当然可以考虑锁定一部分利润。但这里有一个很多投资者容易忽略的问题：税务成本。 对于美国税务居民来说，如果此时卖出，通常会按短期资本利得计税；而持有超过一年后再卖出，才可能适用长期资本利得税率。两者税率差距可能不小，具体差多少取决于个人收入水平与税务身份，不是每个人都一样。 以下是我们美股投资网近期部分已持有至翻倍的案例 所以，卖出前要先算一笔账： 现在卖出，确实能提前锁定利润，但因为持股少于1年，你也同时触发了短期的税务成本，比长期持股多付10%的税。 除非你判断这只股后面可能出现足够大的回调，大于10%，且回调幅度能够覆盖这部分税务差异和交易成本，否则仅仅因为担心短期波动就卖掉，未必划算。 还有一点很多人容易忽略：不是说你今天卖了、明天再买回来，就能把这段持有时间接上。卖出的那一刻，这笔盈利就已经实现了，该按短期还是长期计税，由你卖出时的持有时间决定。重新买回来，是一笔全新的持仓，持有时间也会从零开始计算。 不想卖，又怕利润回吐怎么办？ 如果不想卖，又担心账面利润缩水， 那可以考虑 Covered call（备兑看涨期权）。 但是前提是你至少持有 100 股正股，因为一张 call option 对应 100 股正股。卖出 covered call，本质上是你在持有股.票的同时，卖出一份未来以某个价格把股交出去的权利，并从中收取一笔权利金。 covered call 的目的通常不是赌暴富，而是给持仓增加一层现金流。尤其当你认为股价短期可能震荡、上涨空间有限，但又不想直接卖掉正股时，它可以帮助你赚取一些额外收入，缓冲一部分回撤。 卖哪种 covered call 更合适？ covered call 也有技巧，关键在于选择什么行权价： 卖价内 call（in the money call）：权利金更高，但股.票被行权卖出的概率也更大，更接近“变相减仓”。 卖价外 call（out of the money call）：权利金相对低一些，但给股.票保留了更多上涨空间，更像是在持仓基础上做“收入增强”。 对于大多数还想继续持有正股的投资者来说，更常见的做法是卖 out of the money covered call：行权价设在当前股价上方。如果股.票没涨到那个价格，期权大概率归零，权利金就留下；如果股价涨破行权价，你可能被迫在那个价格卖出股.票，也就等于提前设定了一个愿意获利了结的位置。 三个问题，帮你做决定 所以，真正成熟的处理方式，不是一句“清仓”或“死拿”，而是先问自己三个问题： 这只股还剩多少上涨空间？ 如果回调，我能接受多大幅度？ 如果现在卖出，税务成本和重新买回的机会成本是否值得？ 如果你的答案是 “上涨逻辑还在，但短期涨太快，怕利润回吐”，那么 covered call 可以作为一种折中工具。 如果你的答案是 “基本面变了，趋势坏了，或者仓位已经大到影响睡眠”，那么减仓本身就有意义，不一定要为了税而硬扛。 税很重要，但风险控制永远不能只围着税转。当然，具体怎么卖、卖哪个行权价，可以结合你的持仓成本和对回调幅度的判断来定。 VIP订阅链接（用美国的浏览器打开）： https://StockWe.com/vip 美股投资网是一家专门研究美股的金融科技公司，2008年成立于美国硅谷，由前纽约证券交易所分析师Ken创立，联合多位摩根斯坦利分析师，谷歌 Meta工程师利用AI和大数据，配合十多年美股实战经验和业内量化模型，建立了一个股市数据库 https://StockWe.com/ 每天处理千万级股票数据：捕捉期权大单，实时主力资金流向、机构持仓变化、川普突发新闻，精准K线信号第一时间发到您手机APP！ 联系方式 客服Telegram MaxMeigu 公众号 TradesMax 邮箱 buy@TradesMax.com Email: buy@TradesMax.com 美股大数据 StockWe.com 美股投资网 TradesMax.com"}, {"title": "警惕！美股回调的风险逐渐增大！【美股投资网独家分析】", "date": "2026-05-16", "ym": "2026-05", "time": "2026-05-16 18:08:13", "author": "前纽交所Ken", "desc": "风暴前的宁静！", "url": "https://mp.weixin.qq.com/s/u14rDUqEUieyMAdyovEjaA", "path": "sources/news/wechat_mp/articles/警惕-美股回调的风险逐渐增大-美股投资网独家分析-dd95076250.md", "len": 2295, "ticks": [], "body": "先说关键数据，本周出炉的美国批发通胀数据创2022年以来最差表现，将市场对美联储政策路径的预期彻底逆转。 美国30年期国债收益率本周收报5.12%，创2007年7月以来最高收盘水平，单周涨幅接近20个基点； 根据CME Group基于联邦基金期货的数据，市场目前预计美联储年内加息的概率约为50%。一年期、一年后美国通胀互换——衡量一年后未来12个月通胀预期的衍生品——周五升至2025年2月以来最高水平。 美股投资网团队周末研究后认为，接下来会对美股对美股会形成五层压力： 一：估值体系被重新定价（最致命） 美股尤其科技股，本质是“未来现金流”的折现游戏。利率越高：未来利润折现后的价值越低。所以为什么：NVDA、AMD、AVGO、ARM、PLTR 以及大量SaaS、高PS AI概念股，对长端利率极其敏感。 此前市场能够接受“50倍PE没问题，因为未来增长足够快”这样的逻辑，但如果30年美债已经能够提供5.1%的无风险收益，资金就会开始重新思考：“为什么还要承担AI泡沫的风险？”于是，高估值成长股首先面临的，就是PE压缩。这也是为什么最近很多AI公司即便业绩很好，股价却不再明显上涨，因为市场已经开始从“看增长”，逐渐切换到“看估值还能不能撑得住”。 二：美元流动性也开始被抽走 美国国债收益率暴涨，会吸引全球资本重新回流美元资产，因为5%的美国国债，已经开始变成“高收益 + 无风险 + 美元资产”的组合。这会直接抽走新兴市场、高风险资产、小盘股、加密货币以及高Beta AI板块的资金。 历史上，每次长债收益率快速飙升，市场往往都会进入Risk-Off阶段，也就是风险资产去杠杆周期。最明显的特征通常是：小盘股先跌、半导体先跌、软件股先跌、高杠杆公司先跌，最后才轮到指数层面承压。 三：企业融资成本正在开始恶化 而这一点市场目前可能还没有完全Price In。30年期利率站上5%，意味着企业发债成本显著提升。尤其是商业地产、高负债企业、中小银行、公用事业、REITs，以及高资本开支的AI基础设施公司，压力都会非常大。 事实上，AI行业本身就是一个极度烧钱的行业。数据中心、GPU采购、电力、网络、液冷以及基础设施建设，都需要巨额资本投入。很多AI概念股真正的自由现金流其实并不强。当融资成本持续上升，市场就会重新审视一个核心问题：AI增长到底能不能真正转化为利润？这也是近期市场风格开始从“只看AI故事”，转向“看AI盈利兑现”的原因。 四：原油突破100美元最危险 这是目前最被低估的风险。如果油价重新突破100美元并持续维持高位，就意味着第二轮通胀可能重新回归。市场最害怕的从来都不是单纯的经济衰退，而是“滞胀”——也就是通胀重新抬头、利率维持高位、经济却开始放缓。这会形成“Higher for Longer 2.0”。 对于科技股而言，这将形成典型的“双杀”：一边是高利率压制估值，另一边是经济放缓压制盈利。这也是2000年之后多轮科技泡沫破裂的重要背景之一。 五：AI主线开始第一次遭遇“宏观压制” 2023到2025年的这轮AI行情，本质上是“盈利增长压过宏观利率”。但如果未来美国10年期国债收益率继续冲向5%，30年期进一步冲向5.3%-5.5%，市场很可能会进入一个“宏观大于AI”的阶段。 这意味着，即便AI产业逻辑没有改变，股价也未必还能持续上涨，因为资金成本已经发生了变化。这其实是所有超级牛市中期都会经历的阶段。无论是互联网泡沫、2021年的SaaS泡沫，还是新能源泡沫，都曾经历过“产业逻辑没错，但利率杀估值”的过程。 接下来市场最关键的观察点包括：美国10年期国债收益率是否站稳5%，30年期是否进一步冲向5.5%，原油能否持续站稳100美元之上，核心通胀是否重新反弹，以及美联储是否重新开始讨论加息。 如果这些条件持续强化，美股可能会从过去的“AI慢牛”，逐渐进入“高波动震荡牛”阶段。短期，也就是下周可能会出现一波小的回调，虽然指数未必会大崩，但高估值成长股的波动会明显加剧，AI板块内部会开始大分化，真正具备盈利能力和现金流的公司会胜出，而纯概念驱动的AI股票则可能逐渐被市场出清。 因此，未来市场真正可能走强的方向，反而可能是那些现金流强劲的AI公司，以及电力基础设施、能源、防御型价值股、短久期资产和高股息现金流资产，而不再只是那些“只讲故事”的AI概念股。 大量粉丝还没有养成阅读后点赞的习惯，希望大家在阅读后顺便点赞和转发，以示鼓励！我们一个团队长期坚持原创 17 年真的很不容易。坚持是一种信仰，是对于美股的一种热爱。 ←左右滑动查看更多产品介绍图→ 扫码加万人 VIP 社群，先人一步，把握机会！ VIP订阅链接（用美国的浏览器打开）： https://StockWe.com/vip 美股投资网是一家专门研究美股的金融科技公司，2008年成立于美国硅谷，由前纽约证券交易所分析师Ken创立，联合多位摩根斯坦利分析师，谷歌 Meta工程师利用AI和大数据，配合十多年美股实战经验和业内量化模型，建立了一个股市数据库 https://StockWe.com/ 每天处理千万级股票数据：捕捉期权大单，实时主力资金流向、机构持仓变化、川普突发新闻，精准K线信号第一时间发到您手机APP！ 联系方式 客服Telegram MaxMeigu 公众号 TradesMax 邮箱 buy@TradesMax.com Email: buy@TradesMax.com 美股大数据 StockWe.com 美股投资网 TradesMax.com"}, {"title": "【突发】SpaceX将于6月12日上市，美股代号 SPCX", "date": "2026-05-15", "ym": "2026-05", "time": "2026-05-15 18:04:41", "author": "StockWe.com", "desc": "", "url": "https://mp.weixin.qq.com/s/I4GAjlIGBushfdkaXGcQiQ", "path": "sources/news/wechat_mp/articles/突发-SpaceX将于6月12日上市-美股代号-SPCX-9900032a32.md", "len": 3388, "ticks": ["SPCX"], "body": "据路透社周五援引知情人士消息称，马斯克旗下火箭与卫星制造公司 SpaceX 正计划最早于 6 月 11 日完成其备受瞩目的首次公开募股（IPO）定价，并已选择纳斯达克作为上市交易所。SpaceX股票代码为 SPCX，你准备好资金了吗？准备卖特斯拉换SpaceX吗？ 知情人士表示，SpaceX 已加快 IPO 进程，目前计划最早于下周三公开招股说明书（prospectus），并目标于 6 月 4 日启动路演（roadshow），最快于 6 月 12 日 用层投资。但 GENB 的加入直接修正了这一结论——这并非“全面退出”，而是一次精准的“去弱留强、技术升级”的赛道大换仓。 抛弃旧叙事 (RXRX)：Recursion 主要是利用自动化高通量显微镜和计算机视觉来进行“表型药物发现”。这项技术虽然曾经是前沿，但在生成式大模型（Generative AI）真正爆发的今天，其天花板和颠覆性开始受到质疑。英伟达选择果断离场。 押注生成式新贵 (GENB)：Generate Biomedicines 代表了完全不同的维度——生成式生物学 (Generative Biology)。GENB 的平台更像是“蛋白质界的 ChatGPT”，它能够根据医学指令，直接从底层生成并设计出自然界不存在的全新蛋白质大分子。作为 GENB 近期 IPO 的核心财团支持者（与诺华、三星等共同入局），英伟达买入这 83 万股，是真正将筹码压在了“生成式 AI 重塑万物”的核心逻辑上。 二、 1,042 万美元背后的战略协同：算力与生态的深度绑定 英伟达投资 GENB，显然不是单纯为了这 1000 万美元的短期二级市场财务回报，而是有着极强的业务护城河目的： BioNeMo 平台的顶级“样板间”：英伟达一直在大力推广其针对生命科学领域的生成式 AI 基础大模型平台（NVIDIA BioNeMo）。GENB 要训练其极其庞大的蛋白质生成模型，必须依赖巨量的 GPU 集群。这笔战略投资相当于左手出资扶持，右手锁定了顶级的算力订单与技术绑定。 获取垂直闭环数据反哺：通用大模型在生命科学领域的最大瓶颈是缺乏高质量的“干湿实验闭环”数据。GENB 拥有业界顶尖的自动化高通量湿实验室（Wet Lab），其产生的高价值结构生物学数据，能够反哺英伟达，帮助其进一步优化底层的生物计算算法。 ←左右滑动查看更多产品介绍图→ 扫码加万人 VIP 社群，先人一步，把握机会！ VIP订阅链接（用美国的浏览器打开）： https://StockWe.com/vip 美股投资网是一家专门研究美股的金融科技公司，2008年成立于美国硅谷，由前纽约证券交易所分析师Ken创立，联合多位摩根斯坦利分析师，谷歌 Meta工程师利用AI和大数据，配合十多年美股实战经验和业内量化模型，建立了一个股市数据库 https://StockWe.com/ 每天处理千万级股票数据：捕捉期权大单，实时主力资金流向、机构持仓变化、川普突发新闻，精准K线信号第一时间发到您手机APP！ 联系方式 客服Telegram MaxMeigu 公众号 TradesMax 邮箱 buy@TradesMax.com Email: buy@TradesMax.com 美股大数据 StockWe.com 美股投资网 TradesMax.com"}, {"title": "下一个万亿巨头即将诞生，变成科技八巨头，代号是......", "date": "2026-05-11", "ym": "2026-05", "time": "2026-05-11 21:07:43", "author": "StockWe.com", "desc": "干货！", "url": "https://mp.weixin.qq.com/s/c2_awniMvmugGydEzC-y3w", "path": "sources/news/wechat_mp/articles/下一个万亿巨头即将诞生-变成科技八巨头-代号是-b2cdd0ac20.md", "len": 2502, "ticks": [], "body": "美东周一，美股科技和半导体板块整体表现非常不错，存储芯片板块尤其亮眼。 年初至今已经让无数人拍断大腿的“必買股”——美光（MU），今天再次大涨超过8%，股价一举创下历史新高！截至今日，美光市值已经冲到了全球第 11。 还记得年初我们刚开始重点推介的时候，美光股价才284.79美元。现在回头看，已经接近翻三倍。 我们VIP社群后续在386美元附近也继续入场。 对于存储这个赛道，我们的态度从未动摇：坚定看涨。 美股2026年必买10只股【中集】不为人知的潜力公司 另外，今天我们的AI智能选股，一开盘就选出了光通信公司AAOI，当时价格162.2美元，随后一路狂飙，收盘加上盘后涨近27%。 我自己账号年初至今的收益已经超过60%了。 不是炫耀，而是想说，这些选股的逻辑我们自己也在真金白银地验证。 立刻扫码，跟上我们的致富脚步！ 为何坚定看涨存储？ 美股投资网认为，美光正在成为下一个“万亿俱乐部”的成员，甚至可能重塑“科技八巨头”的格局。 估值错配 即便美光已经涨得如此凶猛，市场上依然充满了质疑的声音。很多人习惯性地把它看作一家“周期公司”，认为现在的暴利只是内存供需暂时失衡的结果，不可持续。 但如果我们摊开财务报表，把美光和全球其他半导体巨头放在一起对比，你会发现一个惊人的事实：市场可能犯了一个巨大的错误。 目前， 美光的市盈率（PE）仅为6.4倍左右。 这意味着市场给它的定价，仿佛暗示它即将陷入衰退。 然而，它的利润增长率却超过了71%。计算一下它的PEG，只有0.09。在价值投资的世界里，PEG低于1通常就被认为是低估，而0.09？这简直是在白送未来的增长。 作为对比，一些被捧上天的公司， 比如ARM，其PEG高达4.75 ，投资者为了它一分钱的增长，付出了极其昂贵的代价。 为什么会出现这种错配？ 因为市场的思维还停留在过去。那些护城河深、周期性弱的EDA公司（如Synopsys、Cadence）或设备商（如ASML），它们享受着高估值。 而英伟达之所以能维持近19倍的PE而不显贵，是因为市场完成了一次关键的认知跃迁——它不再是一家卖显卡的周期公司，而是AI时代不可替代的“基础设施平台”。 现在的核心逻辑是：美光正在经历一场“英伟达式”的认知重塑。随着HBM成为AI芯片不可或缺的“燃料”，存储已经从过去的“电脑配件”升级为“算力基石”。只要这个属性不变，它的估值中枢就必须上移。市场还在用旧地图寻找新大陆，这就是我们最大的机会。 拥挤的头部 高盛的最新数据显示，标普500指数中市值最大的前十家公司，其总市值占比已高达40%，创下了现代历史的纪录。这让很多经历过2000年互联网泡沫的散户感到不安。 但是，如果我们再看另一组数据——获利占比，就会发现当下的繁荣有着坚实的利润支撑。目前，这十大巨头的预估获利占比也已攀升至33%。这说明它们赚走了全市场三分之一以上的利润，那么它们占据40%的市值，在商业上是完全合理的。 在这种环境下，资金会产生强烈的“拥挤效应”。投资者不再追求广泛的分散，而是疯狂地寻找下一个具备“不可替代性”的核心标的。 这就是为什么我们需要将目光投向美光。当AI军备竞赛进入白热化阶段，除了GPU，最紧缺的资源就是存储。 Anthropic大爆发 再来看Anthropic这家公司，它的成长速度已经不能用“指数级”来形容了。2026年第一季度，其年化收入和使用量竟然实现了80倍的增长，内部称之为“成功的灾难”。 根据预测，到2028年中，它的收入就可能超越谷歌。 这种爆炸式的需求，背后需要的是天量的算力投入，而每一分算力的提升，都离不开高性能存储的支持。 OpenAI链、谷歌AI链，无论谁胜谁负，无论是英伟达的GPU集群还是谷歌的TPU集群，它们都绕不开一个共同的关键环节——企业级高性能存储。 美光，正是这个环节中美国本土唯一的巨头，是这场AI基建狂潮中绕不开的“卖铲人”。 正反馈循环下的超级红利 传统的内存周期逻辑是线性的： 需求增长 → 产能扩张 → 供应过剩 → 价格暴跌 但在AI时代，这个链条被彻底重构了。 金融服务公司DA Davidson的分析师提出了一个“正反馈循环”的概念：每一次额外的算力部署，都会解锁前所未有的应用场景，从而创造出在基础设施建成之前根本无法预测的增量需求。这不是简单的周期，而是一个自我强化的超级周期。 事实也证明了这一点。美光最新的财报显示，其云计算相关收入同比增长超过160%，并且公司管理层坦言， 他们只能满足关键客户50%到三分之二的需求。这是行业里25年来最严重的供需脱节。 更令人振奋的是，美光正在加速布局。公司预计本财年资本支出将超过250亿美元，加速推进下一代HBM产品，并计划在美国爱达荷州和纽约州建设新的晶圆厂。这一切都在告诉我们：需求是真实的，而且是长期的。 回到最初的问题：美光会被纳入“科技八巨头”吗？ 美股投资网认为，这只是时间问题。当市场最终承认，存储不再是可有可无的配角，而是驱动整个AI世界运转的引擎时，美光的万亿市值将不再是梦想。而我们，有幸在故事刚刚开始的时候，就已经身处其中。 我们团队来自前纽约证券交易所分析师，清华和港大博士，高盛和摩根斯坦利研究员，谷歌和Meta工程师，打造全球首个AI智能体 StockWe AI 美股投资网是一家专门研究美股的金融科技公司，2008年成立于美国硅谷，由前纽约证券交易所分析师Ken创立，联合多位摩根斯坦利分析师，谷歌 Meta工程师利用AI和大数据，配合十多年美股实战经验和业内量化模型，建立了一个股市数据库 https://StockWe.com/ 每天处理千万级股票数据：捕捉期权大单，实时主力资金流向、机构持仓变化、川普突发新闻，精准K线信号第一时间发到您手机APP！ 联系方式 客服Telegram MaxMeigu 公众号 TradesMax 邮箱 buy@TradesMax.com Email: buy@TradesMax.com 美股大数据 StockWe.com 美股投资网 TradesMax.com"}, {"title": "只有 1% 的人知道的美股券商神级功能", "date": "2026-05-10", "ym": "2026-05", "time": "2026-05-10 22:46:49", "author": "StockWe.com", "desc": "", "url": "https://mp.weixin.qq.com/s/RCYRbHtiAhqLM0QhrvhAfQ", "path": "sources/news/wechat_mp/articles/只有-1-的人知道的美股券商神级功能-9b2f3c6986.md", "len": 1853, "ticks": [], "body": "大多数人用美股券商，只会：看K线、下单、止盈止损。但真正懂交易系统的人，会用券商里一个几乎没人碰的功能： 「条件触发订单（Conditional Orders）」 这个功能表面看只是“附加条件”，实际上，它更像一个隐藏版自动交易系统。 很多人根本不知道： 你其实可以让券商服务器，替你盯盘、判断、等待、过滤噪音，甚至半自动执行交易逻辑。 它不是简单的“到价买入”。 而是： “只有当市场环境也符合我的要求时，才允许订单进入市场。” 这个思路非常关键， 因为真正决定交易质量的，很多时候不是“买哪只股”，而是“在什么环境下买”。 美股投资网 StockWe.com 为美股小白详细指导 举个例子，你想买 NVDA。 普通人：直接挂单。 稍微进阶一点的人： 设置限价单。 真正懂系统的人，会先让系统判断： QQQ 是否突破关键位 成交量是否放大 是否已经过了开盘最混乱的时间 大盘是否同步确认风险偏好 只有全部满足，订单才真正发送到交易所。这已经不是普通下单了。这是“低代码交易系统”。 最关键的是： 这一切不需要你会编程。 很多主流美股券商其实都支持类似逻辑： 价格条件、时间条件、成交量条件、百分比波动条件、组合 AND/OR 条件……只是 99% 的人从来没点进去看过。 而真正厉害的地方在于： 你开始让“纪律自动执行”。 很多人以为交易最大的问题是： 不会选股。 其实更大的问题是： 情绪化执行。 追涨； 提前进场； 看到拉升忍不住； 半夜盯盘乱改单； 而条件订单，本质上是在交易前，提前把你的规则“写死”。 比如： “如果 SPY 大跌超过 1.5%，即使个股没坏，也先撤退。” 这其实已经是在把“系统性风险”纳入交易框架。 你会发现： 专业交易员和普通投资者最大的差别，并不是谁更聪明。而是谁更依赖系统。 还有一个很多人没意识到的点： 条件订单在触发之前， 很多时候根本不会进入交易所订单簿。 也就是说： 你的意图不会提前暴露。 这对于做突破交易、流动性较差股、甚至大额订单，都很有意义。 当然这个功能不是圣杯，规则写太复杂，最后可能永远不触发。 很多人会把条件越加越多： QQQ 突破； SPY 不跌； VIX 下行； 量能放大； 时间大于 10 点； 美债收益率还不能涨…… 最后系统比基金经理还谨慎，一年只交易两次。所以真正成熟的用法， 不是把世界所有变量塞进去。 而是： 只筛掉最容易犯错的环境。 因为自动化最该替代的，从来不是思考。而是冲动。 这也是为什么很多老交易员最后会发现： 真正强大的， 不是预测市场。 而是提前设计好： “自己在什么情况下出手”。 目前支持类似高级条件订单功能的美国主流券商，包括： Interactive Brokers（IBKR）盈投 Charles Schwab（Thinkorswim） Fidelity Investments E*TRADE TradeStation Webull（部分支持） Tastytrade（偏期权策略） 但不同券商差别很大，有的只是简单“条件单”。 有的则已经接近： 半自动量化交易系统。 其中真正把这套东西做得最像“程序化交易平台”的，很多老交易员还是会提到 IBKR 和 Thinkorswim。 因为它们已经不仅仅是券商。 更像： 给散户开放的一套交易基础设施。 当你开始用条件逻辑交易时， 你会第一次意识到： 原来券商不只是下单软件。 它其实是一个隐藏的交易操作系统。 如果你还有什么不懂，请加我们提问，美股投资网团队很乐意解答。 我们团队来自前纽约证券交易所分析师，清华和港大博士，高盛和摩根斯坦利研究员，谷歌和Meta工程师，打造全球首个AI智能体 StockWe AI 美股投资网是一家专门研究美股的金融科技公司，2008年成立于美国硅谷，由前纽约证券交易所分析师Ken创立，联合多位摩根斯坦利分析师，谷歌 Meta工程师利用AI和大数据，配合十多年美股实战经验和业内量化模型，建立了一个股市数据库 https://StockWe.com/ 每天处理千万级股票数据：捕捉期权大单，实 来预算提前锁定在 TEAM 身上。这就是 TEAM 被市场重新定价的根本原因。 Snowflake （SNOW） 那从 DOCN 这条线接着往下走，下一个最值得盯的是谁？ SNOW，5月27日发财报。 DOCN 证明的是：AI 应用一旦跑起来，就会消耗开发者云资源。 SNOW 要证明的是：企业 AI 一旦落地，就会消耗企业数据云资源。 区别在于，DOCN 卡住的是开发者，SNOW 卡住的是企业数据。后者的护城河更深，因为数据、权限、治理和业务规则一旦沉淀进去，迁移成本极高。所以 SNOW 的核心问题，不是“有没有 AI”，而是：AI 能不能重新拉动它的数据消耗量。 最新信号是，SNOW 已经不只是“数据仓库加 AI 功能”。4 月，公司继续更新 Snowflake Intelligence 和 Cortex Code，目标很明确：把自己推成企业 AI Agent 的控制层。 也就是说，SNOW 想卡住的不是一个查询工具，而是 AI 调用数据、理解数据、连接系统、执行任务的入口。这个位置很关键。 企业 AI 不是只调用大模型就能干活。它必须接入企业自己的客户数据、交易数据、权限系统和业务规则。 没有这些数据，AI 只能回答问题；接入这些数据，AI 才能真正进入企业流程。而这正是 Snowflake 的位置。 上一季，SNOW 的底盘已经很稳：产品收入增长 30%，RPO 增长 42%，NRR 维持在 125%，百万美元级客户达到 733 个。 但我更关心的不是这些旧数字，而是下一份财报能不能证明：AI 正在把 SNOW 从“稳健增长的数据云”，重新推回“加速增长的 AI 数据云”。 接下来财报重点看三件事： 产品收入能不能明显超过指引上限。 RPO 增速能不能继续维持高位。 管理层会不会明确说，AI 工作负载正在推动用量加速。 如果这三点同时验证，SNOW 的逻辑就会很像 DOCN DOCN：AI 应用落地 → 云资源消耗增加 → AI Customer ARR 爆发 → 市场重新定价。 SNOW：企业 AI 落地 → 数据云消耗增加 → 产品收入和 RPO 走强 → 市场重新定价。 唯一隐患就是，我们担心它的竞争对手 DataBricks不断抢占SNOW的市场份额。 Salesforce (CRM) 再从TEAM这条线反推，我们看 CRM（5月27日发财报） 。 TEAM 的王牌是 Rovo，CRM 的王牌是 Agentforce。 两者本质上是同一条逻辑：AI 不是绕开原来的企业软件，而是被塞进原来的企业工作流，反过来让这些系统变得更不可或缺。 从商业化速度看，Agentforce 已经是企业 AI Agent 里跑得最快的一批。 推出 15 个月，累计完成超过 2.9 万笔交易，ARR 达到 8 亿美元，同比增长 169%。 这已经不是试点项目，而是真金白银签进了合同。 更关键的是，最近几个信号说明：Agentforce 正在从“AI 功能”，变成“企业流程入口”。 第一，Salesforce 直接改了收入口径，把收入拆成 Agentforce Apps 和 Data 360, Platform & Other。这不是普通会计调整，而是战略表态：Agentforce 已经被抬到核心应用层级。 第二，Agentforce 正在从前台走向后台。Salesforce 推出 Agentforce Operations，把 AI Agent 从销售、客服，推进到供应链、采购、财务、合规、IT 等流程。这说明它不只是客服机器人，而是在扩张 Salesforce 的工作流边界。 第三，CRM 在补跨系统执行能力。它和 Google Cloud 扩大合作，让 AI Agent 可以在 Salesforce、Slack、Google Workspace、BigQuery 之间跑端到端工作流。企业流程本来就是割裂的，Agentforce 如果能跨系统干活，价值就从“AI 工具”升级成“流程入口”。 第四，垂直行业客户已经开始落地。Moderna 用 Agentforce Life Sciences 打通商业运营，Engine 用 Agentforce 和 Slack 搭建数字指挥中心，其中 Eva Agent 可以自主处理 50% 的客服案例，平均支持时间下降 15%。 这四个信号放在一起，指向同一个结论：Agentforce 不是悬浮在外面的 AI 插件，而是在进入 Salesforce 的核心客户工作流。 所以 CRM 对标 TEAM 的逻辑很清楚： TEAM 是 Rovo 使用量上升 → 客户更深绑定 Atlassian → ARR 扩张 → RPO 变强 → 市场重估。 CRM 是 Agentforce 使用量上升 → 客户更深绑定 Salesforce → Agentforce 和 Data 360 扩张 → cRPO 变强 → 市场重估。 所以 CRM 要看的不是普通收入 beat，而是下一份财报里，Agentforce 采用率能不能继续加速，Data 360 能不能一起扩张，cRPO 和指引能不能因为 AI Agent 需求变强。 如果这些被验证，市场交易的就不是“Salesforce 也有 AI”， 而是：Agentforce 正在把 Salesforce 从传统 CRM，重新推成企业 AI Agent 工作流平台。 看到这里，你就能感受到我们是真的下了功夫了！如果你觉得本文章对你有帮助，老规矩先点赞再收藏，关键时刻能帮忙 美国热线 626 378 3637 第二条线，看云通信。 这条线的核心很简单：AI Agent 越多，通信调用量越大。 AI 客服要打电话，AI 销售要发短信，AI 系统要做身份验证，企业通知、语音、邮件、客服 API，背后消耗的都是通信基础设施。 所以 BAND 和 TWLO 这次被市场重新定价，不是因为“通信行业复苏”，而是因为市场看懂了一个新逻辑： AI Agent 不是在减少通信需求，而是在创造更多通信需求。 Bandwidth Inc. (BAND) 先看最典型的 BAND 。 BAND财报后股价暴涨近50%。不是市场突然看懂了它在 AI 时代的位置：它不是普通通信 API 公司，而是 AI Voice 背后的底层通信基础设施。 BAND 和很多云通信公司的区别在于，它拥有自己的全球通信网络，不只是租别人的线路再包装。这个差别在 AI 时代非常重要。 因为 AI 客服、AI 销售、AI 语音代理要真正跑起来，对延迟、稳定性和合规要求极高。人类打电话，听不清可以再问一遍；AI 代理一旦延迟、抖动、掉线，整个流程就会中断。 所以 AI Voice 进入生产环境之后，企业需要的不是便宜通信线路，而是低延迟、高可靠、可控的通信网络。而这正是 BAND 的壁垒。 更关键的是，BAND 被 Salesforce Agentforce 选为 Contact Center 的关键基础设施伙伴，提供底层语音和消息能力。这个信号很重要，因为它意味着 BAND 直接嵌进了全球最大 CRM 平台的 AI 客服工作流里。 每一通由 Agentforce 触发的 AI 客服电话，每一次自动化客户互动，都可能消耗 BAND 的网络能力。同时，BAND 还在金融、保险这些高监管行业拿下百万美元级大单。说明这不是小客户试水，而是大企业正在把传统通信系统迁移到 BAND 上，为 AI Voice 和 AI 客服铺路。 所以 BAND 的暴涨逻辑很清楚： AI Voice 进入生产环境 → 企业需要低延迟、高可靠通信网络 → BAND 自有网络壁垒被重估 → Salesforce Agentforce 带来生态背书 → 大企业迁移推动收入和指引上修 一句话：BAND 从普通通信 API 公司，被重新定价成 AI 语音时代的底层通信基础设施。 Twilio (TWLO) TWLO 验证的是同一条云通信逻辑，但站位不同。 BAND 卡的是底层网络，TWLO 卡的是 API 和应用层。 TWLO 真正点火的是语音和 AI 增值产品。CEO 说得很直接：语音需求正在成为 AI 原生企业进入 Twilio 平台的入口。数据也验证了这一点：语音收入同比增长 20%，创下 19 个季度以来最高增速；品牌来电、对话智能这类 AI 增值产品，同比增长超过 100%。 这说明企业不只是把 TWLO 当通信管道，而是在采购它的 AI 客户互动能力。 再看客户质量，多产品客户数同比增长 29%，净收入留存率 114%。客户在整合，用量在增加，收入自然重新加速。 Zoom (ZM) 那么这条线往下推，我会看 ZM（5月21日发财报） 。 BAND 和 TWLO 证明的是：AI Agent 一旦开始替企业“说话”，底层通信接口就会被消耗。 但再往后看一层，这些对话发生在哪里？大量企业会议、电话、客服和客户沟通，正在 Zoom 的平台上发生。 所以 ZM 不是纯粹的通信 API 公司，它卡的是更上层的场景入口：企业实时沟通和客户互动。 过去市场给 Zoom 的标签很简单：视频会议公司。疫情红利结束后，增长放缓，估值被压，市场觉得它缺乏想象力。但现在 Zoom 正在把自己从会议工具，升级成 AI 驱动的沟通工作流平台。 关键就在 AI Companion 和 Virtual Agent。 Zoom 财报里有一个被低估的信号：AI Companion 月活用户同比增长超过 3 倍。 这说明它不是一个没人用的 AI 小功能，而是正在成为企业员工开会、聊天、打电话、处理信息的 AI 入口。 产 er”的旧印象里，但实际上，汽车已经成为它最核心的增长引擎。这意味着 HIMX 正在逐渐脱离消费电子周期，进入一个完全不同的行业逻辑。 因为汽车芯片与消费电子芯片最大的区别，在于生命周期极长。手机芯片可能 6 到 12 个月就被淘汰，但汽车平台通常会持续 5 到 7 年。一旦进入车厂供应链，收入稳定性、ASP 稳定性以及客户粘性都会大幅提升，而且汽车行业验证门槛极高，供应商很难被轻易替换。 尤其是在下一代智能座舱趋势下，OLED TCON、Local Dimming、Pillar-to-Pillar Display 等技术，已经成为未来车载显示的重要方向。汽车厂商不会轻易更换这些核心供应商，这也让 HIMX 开始形成一种“半导体中的半护城河”。 而新能源汽车的发展，对 HIMX 更是极度有利。 过去一辆车可能只有一个仪表盘，但现在的智能电动车，开始出现中控屏、副驾娱乐屏、HUD、后排娱乐系统、电子后视镜，甚至 Pillar-to-Pillar 超长贯穿屏。屏幕数量正在爆炸式增长，这意味着显示驱动芯片的价值量也在持续提升，而 HIMX 正好卡在这个产业趋势的核心位置。 三、真正被市场忽略的关键：Local Dimming 很多投资者只盯着 OLED，但实际上，汽车行业有一个非常现实的问题：OLED 太贵。 于是行业开始出现一种折中方案，那就是“Mini-LED LCD + Local Dimming”。它可以在显示效果上接近 OLED，但成本却远低于 OLED，对于中国新能源车厂、中低价位车型以及大尺寸车载屏幕来说，吸引力极强。 而 HIMX 的 Local Dimming IC，本质上就是在帮助 LCD“伪装成 OLED”。这可能是一个远比市场想象更大的机会。 美股投资网认为，因为汽车行业最看重的，从来不是绝对最先进的技术，而是成本与性能之间的平衡。谁能够在较低成本下提供接近高端 OLED 的视觉效果，谁就更容易获得大规模采用。 从这个角度来看，HIMX 并不是单纯在卖显示芯片，它实际上是在智能汽车时代里，提供一种高性价比的显示解决方案。 四、真正的超级想象力：CPO（Co-Packaged Optics） 而真正让 HIMX 出现“AI 估值重构”可能性的，其实是 CPO。 这一部分，才是 HIMX 最大的 AI Pivot。 因为这意味着，它开始切入 AI 数据中心基础设施领域。 如今 AI 最大的瓶颈之一，已经不再只是 GPU 算力本身，而是数据传输。随着 GPU 集群规模越来越大，GPU 与 GPU 之间的数据交换量开始暴增，传统铜线互连正在遇到功耗、发热、带宽以及传输距离等物理瓶颈。 整个行业正在从 Copper Interconnect，逐步转向 Optical Interconnect。这也是为什么最近 CPO、Silicon Photonics、Optical IO 等方向突然成为全球资本市场最热门的 AI 基础设施主题之一。 而 HIMX 的 WLO（Wafer Level Optics）技术，本质上就是把光学能力直接封装进芯片。 如果未来它能够真正进入 1.6T 或 3.2T 的 AI 网络模块供应链，那么 HIMX 的估值逻辑将发生根本性变化。 因为到那时，它将不再只是一个显示芯片公司，而会被市场重新定义为 AI Networking Infrastructure 公司。 而这两种公司的估值体系，是完全不同的。 五、为什么市场现在还没有 fully price in？ 原因很简单。 目前 HIMX 在 CPO 方向上，还处于“技术验证完成”的阶段，而不是“订单爆发”的阶段。 市场现在仍然在等待几个关键节点，包括 hyperscaler 客户订单、大规模量产，以及真正的 revenue ramp。 因此，现在的 CPO 对 HIMX 来说，更像是一个“免费期权”。 也就是说，当前市场给 HIMX 的估值，主要还是按照传统汽车与显示芯片公司的逻辑去定价。但如果到了 2026 年下半年，CPO 开始真正贡献收入，那么它的估值体系很可能会从传统半导体的 6-8 倍 PE，切换到 AI Infra 半导体的估值框架。 而这，才是真正多头资金在下注的核心。 六、WiseEye 为什么也值得关注？ 除了汽车与 CPO，HIMX 还有一个被低估的隐藏方向，那就是 WiseEye Edge AI。 核心关键词只有一个：超低功耗。 现在 AI 行业正在出现一个越来越明显的趋势——并不是所有 AI 都会运行在云端。越来越多 AI 功能，会开始在本地设备端直接运行。 例如智能门锁、笔记本感知系统、安防设备、工业 IoT，以及各种电池供电设备，都需要“低功耗、本地化、实时 AI”。 而这正是 HIMX WiseEye 平台的切入点  。 当时AMD的价格 278 美元,INTC价格 67美元！ 恭喜所有上车的粉丝们，这一波上涨让你们轻松获利超 40%！ 过去的AI算力赛道，就像挖土一样，GPU是挖掘机；而如今，推理就是“跑物流”，CPU就成了指挥交通的“大脑”。 算力的配比正在从1:8向1:1的方向回归 ，没有CPU，AI系统根本无法运行。这种结构性的供需错配让英特尔重新找回了定价权。 数据显示，英特尔Q1数据中心营收飙升35%至38亿美元，毛利率强势回升至41%，而且Gaudi3加速卡和Xeon 6处理器订单爆满，直接推动了其数据中心市场份额在Q1回升了15%。 四大王牌，重铸技术护城河 需求是风口，技术就是翅膀。英特尔敢喊出“王者归来”，底气就在于手里捏着四张能重新定义AI算力的黑科技王牌： High-NA EUV与埃米级制程： 英特尔是 全球首家 全面导入High-NA（高数值孔径）EUV光刻机并实现量产的厂商，18A和14A制程突破了物理极限，让英特尔在2026年回归“制程领导者”地位。 玻璃基板： 英特尔的玻璃基板封装技术，能够显著降低AI算力集群的热损耗，成为微软Maia AI加速器等项目的核心技术。 PowerVia背面供电： 英特尔在18A制程中率先商用该技术，提升了芯片主频6%以上，为自动驾驶等客户提供了极致稳定的算力。 硅光子集成互连（Optical I/O）： 英特尔通过硅光子技术，实现了 将光通信集成到封装内部 ，极大提升了数据传输速度并降低了功耗。 英伟达入股，强强联合 2025年9月，英伟达豪掷50亿美元入股英特尔（每股23.28美元，持股约4%），英伟达CEO黄仁勋直言：“我们是恋人，不是对手。” 这标志着两者从长达三十年的技术竞争，正式转变为深度绑定的“战略盟友”。英伟达的GPU再强，在数据中心里也离不开英特尔x86 CPU的调度。英伟达用真金白银入股，甚至定制基于Intel x86架构的数据中心与PC芯片，就是为了绑定这条供应链。 美国Z府的89亿注资加上英伟达的50亿入股，形成了“政商双核”驱动，彻底重塑了市场对英特尔的估值逻辑。 资本迁徙，寻找洼地 在高利率环境下，英伟达等巨头的股价已经透支了未来几年的完美预期（例如Blackwell芯片延期的隐忧），资本它们是急需寻找新的避风港。 此时的英特尔，完美符合“困境反转”的所有特征： 国家队托底（下限极高） AI新叙事（上限打开） 估值极具性价比（市盈率仅18倍，前瞻每股收益4.2美元） 华尔街疯狂将目标价上调至95-111美元， 并非因为英特尔完美无缺（其代工业务仍在亏损），而是因为它是目前市场上极少数能提供“确定性”的科技蓝筹。这是一场资金从“高估值梦想股”向“低估值现实股”的集体大逃亡。 还有哪些公司值得关注？ 英特尔的史诗级归来，向华尔街验证了一个硬道理： “跟白宫混有肉吃”。 如图所示，这是碾压标普的「白宫概念股」名单。我们可以看到自特朗普第二任期以来的累计报酬率已高达惊人的75%，将同期涨幅约20%的标普500指数远远甩在身后。 这个组合的选股逻辑极度直白且具备强烈的赚钱效应： 资金高度集中于与美国Z府利益深度绑定，或拥有高层绝对政治背书的企业。 帮美国造东西的（高端制造与资源） 美国现在拼命想把工厂搬回去。除了英特尔，还有挖锂矿和稀土的 LAC、 MP，造电动车的 GM。只要是能帮美国实现“自给自足”的公司，Z府都会给补贴、开绿灯。 帮美国搞算力的（AI芯片双雄） 除了英特尔，搞AI芯片的英伟达和 AMD 也是白宫的重点。美国Z府买超级电脑、搞军事AI都离不开它们，甚至用政策帮它们挡住国外的竞争对手。 特朗普的“自己人”（政商核心圈） 这一类最好懂，就是跟特朗普关系最铁的。比如马斯克的 TSLA，还有做大数据监控的 PLTR。特朗普的政策怎么推，这些公司就怎么赚，属于自带“VIP通道”。 帮美国搞国防的（军工复合体） 特朗普要搞“金色穹顶”导弹防御系统，还要扩充军备。那谁最赚钱？肯定是造飞机大炮的 BA（波音）、 LMT（洛克希德马丁）。Z府要扩军，它们的订单就源源不断。 Z府松绑的行业（crypto 与核能） 特朗普上台后，对 crypto 和核能不再打压，反而大力支持。所以最大的 crypto 交易所 COIN，以及给AI数据中心供电的核能公司 CEG，都迎来了最大的政策红利期。 你认为下一只谁是被特朗普点名起飞的股 欢迎评论区留言！ 扫码加万人VIP社群 用美国的浏览器打开 https://StockWe.com/vip 订阅 美股投资网是一家专门研究美股的金融科技公司，2008年成立于美国硅谷，由前纽约证券交易所分析师Ken创立，联合多位摩根斯坦利分析师，谷歌 Meta工程师利用AI和大数据，配合十多年美股实战经验和业内量化模型，建立了一个股市数据库  股价直接爆拉超过 24%，截止目前，我们已经再次抓住接近翻倍的涨幅。 它为什么能在市场整体走弱时逆势上涨？ 核心就在于 订单验证。KOPN 刚刚拿下了一份价值 320万美元 的 FPV，也就是第一人称视角无人机光学模块合同。这标志着公司成功切入了高增长的无人机和低空经济赛道。 在当前的市场环境下，资金已经不太愿意为单纯的故事买单，而是更愿意看到真实合同、真实订单和真实需求。KOPN 的大涨，本质上就是市场在为“视觉显示 + 无人机应用 + 订单落地”的确定性逻辑重新定价。 第二只是 AMKR（ 全球第二大半导体外包封装测试服务商 ） 我们在 4月13日 以 58.6美元 买入，并且果断重仓 30%。 当时我们的买入逻辑很清楚：无论上游软件应用如何波动，底层硬件的结构性升级都是不可逆的。尤其是英伟达和 AMD 这类高性能芯片，对先进封装，也就是 Advanced Packaging 的依赖只会越来越强。 你可以怀疑 AI 的短期热度，也可以担心训练端资本开支的节奏，但你很难绕过一个现实：芯片性能继续提升，已经不能只靠单纯制程升级，先进封装正在成为突破性能瓶颈的关键环节。 而 AMKR 最新财报也验证了这一点。公司 AI 数据中心相关的先进封装业务创下历史新高。这说明即便训练端开支出现摇摆，推理端和先进制造端的需求依然稳健。 随后 AMKR 股价一路走高，今天盘中已经触及71.59美元。相比我们 58.6美元 的买入价，短短半个月内已经实现了 22% 的收益。 如果你也想这么轻松抓住X倍行情 认准官方一手消息 现在就扫码加VIP社群 从“规模扩张”到“回报率验证” 美股投资网认为，OpenAI目标的落空，标志着AI投资进入了一个新的阶段： ROI，也就是投资回报率验证期。 过去一年，机构投资者在算力建设上几乎是不计成本的。只要云厂商愿意花钱，只要AI公司愿意签合同，市场就愿意给整条硬件链条更高估值。但现在，市场开始问一个更现实的问题：这些投入最后到底能不能变成收入？能不能变成利润？能不能支撑现在的估值？ 高盛主经纪商数据显示， 对冲基金在过去两周以2024年以来最快的速度减持科技股。 这不是简单的获利了结，而是一次行业配置层面的再平衡。 市场不再满足于看到模型能力提升，而是要看到真实的现金流回馈。这意味着AI投资的主轴正在发生重构：从集中式的训练竞赛，转向分布式、回报率优先的推理与应用。 如果一家公司无法证明AI投入能带来相应的收入增长，那么它的估值中枢就可能面临系统性下移。 关键催化剂 市场现在的状态是：一个不确定的坏消息，叠加高估值和拥挤仓位，导致资金对负面信息极其敏感。接下来微软、谷歌、Meta、亚马逊等巨头的财报电话会，将是真正决定AI叙事能否延续的关键变量。 如果这些超大规模云厂商继续确认上调资本支出指引，那么今天的抛售更可能是一次由仓位拥挤触发的过度反应，基本面并没有实质恶化。 但如果它们开始表现出犹豫，或者开始反复强调ROI审视周期，那就意味着整个AI硬件板块的估值中枢可能要被系统性下修。 另外，OpenAI自身的上市进程也值得关注。美股投资网了解到， OpenAI的 CFO Sarah Friar已向董事会表示，公司尚未准备好满足上市所需的信息披露标准。 这意味着OpenAI内部财务压力可能比外界看到的更大，也意味着公司在资本支出决策上，可能比市场预期更快转向保守。 美股投资网观点 今天这件事，不是AI叙事的终结，而是AI估值逻辑的切换。 过去，市场交易的是FOMO：怕错过AI浪潮。 现在，市场开始进入FAFO：冲进去之后，才开始认真算账。 接下来，资金不会再无差别买入所有AI公司，而是会重新区分三类资产：谁只是讲故事，谁真的有订单，谁最终能把AI变成利润。 这才是接下来AI行情真正的分水岭。 浏览器打开，别用国内的浏览器 别用薇信打开，要用就用美国的浏览器 https://StockWe.com/vip 订阅 美股投资网是一家专门研究美股的金融科技公司，2008年成立于美国硅谷，由前纽约证券交易所分析师Ken创立，联合多位摩根斯坦利分析师，谷歌 Meta工程师利用AI和大数据，配合十多年美股实战经验和业内量化模型，建立了一个股市数据库 https://StockWe.com/ 每天处理千万级股票数据：捕捉期权大单，实时主力资金流向、机构持仓变化、川普突发新闻，精准K线信号第一时间发到您手机APP！ 联系方式 客服Telegram MaxMeigu 公众号 TradesMax 邮箱 buy@TradesMax.com Email: buy@TradesMax.com 美股大数据 StockWe.com"}, {"title": "英伟达十个月盘整终结，市值破五万亿！OpenAI与高通联手，苹果要小心了！", "date": "2026-04-27", "ym": "2026-04", "time": "2026-04-27 20:53:55", "author": "StockWe.com", "desc": "POET暴跌50%！什么错误让它付出了如此惨重的代价？", "url": "https://mp.weixin.qq.com/s/gNlUIjUEqULh0KlrHDqHlw", "path": "sources/news/wechat_mp/articles/英伟达十个月盘整终结-市值破五万亿-OpenAI与高通联手-苹果要小心了-c834cc25f1.md", "len": 2008, "ticks": ["POET"], "body": "周一，美股表面呈现出一片祥和景象：标普 500 指数微涨 0.12% 收于 7,173.91 点，纳指再次刷新历史纪录收于 24,887.10 点。尽管标普 500 有望创下 2020 年以来的最佳单月表现，但盘面下方的关键信号却指向了潜在的风险点。一个核心的异动在于 VIX 恐慌指数 的同步上涨。 通常情况下，指数走高伴随着波动率回落，但目前 VIX 已攀升至 19 附近，较月初 13.38 的低点大幅抬升。 这种同步走势说明市场内部分歧正在加剧，投资者在推高股价的同时，正密集购入对冲工具。 更严峻的数据来自 市场广度 ，目前该指标已恶化至有史以来第二差的水平。这意味着指数的上涨完全由极少数权重股拉动，而绝大多数股票处于下跌或滞涨状态。这种“指数新高、广度恶化、VIX 上升”的技术面组合，在历史上往往是高波动期降临的前兆。 在这场头部的狂欢中，英伟达收高4%，创历史新高，成为全球首家市值突破 5 万亿美元 的公司。从技术面看，这标志着英伟达突破了长达 10 个月的盘整区间，但也进一步验证了市场资金向单一龙头的极端集中。 高通冲高回落背后的原因 半导体板块今日的另一个重磅焦点是高通（QCOM），受郭明錤爆料 OpenAI 正联手高通及联发科开发定制化 AI 芯片的影响，高通盘前一度暴涨 12% ，但在开盘冲高后涨幅一路收窄，最终仅收涨 0.95% 。 这种典型的“冲高回落”走势精准地反映了市场的矛盾心态。OpenAI 的逻辑并非做一款功能手机，而是打造以 AI Agent 为核心的“AI 原生手机”，试图通过软硬一体化彻底重构移动操作系统。 对于高通而言，这不仅是安卓阵营的防御战，更是其掌握核心算力供应、从单一供应商向“基础设施提供商”转型的关键节点。 这种深度定制的底层逻辑在于对 极低推理功耗 的极致追求。目前的通用旗舰芯片难以支持大模型全天候在线而不发烫，只有通过硅层级的定制（Silicon Integration），让 AI Agent 像后台进程一样全天候运行，才能真正实现软硬一体。 值得注意的是， 4 月 27 日（今日）正是 OpenAI 与微软独家合作协议正式宣告结束的日子 。OpenAI 转向亚马逊、谷歌和高通开放，标志着其独立生态的正式启航。 尽管苹果今日收跌 1.5% 反映了市场对竞争的担忧，但高通最终不到 1% 的涨幅说明，投资者在为 2028 年的“想象空间”买单之后，迅速开始定价 OpenAI 硬件基因缺失以及长达两年的变数风险。 POET 暴跌 45% 与巨头的狂欢形成鲜明对比的是 半导体设计公司POET今日遭遇了 47% 的断崖式下跌。 表面看是客户 Celestial AI 取消了订单，但关键在于：POET 在对外披露中触碰了行业最敏感的红线——违反保密协议（NDA）。 在 AI 光通信这种涉及顶级战略规划的行业，保密是供应商的准入底线。当 Marvell 收购 Celestial AI 后，大厂严苛的执行纪律瞬间取代了创业公司间的灵活性。大厂是流程化的，一旦供应商在访谈或公告中涉及订单发货等敏感信息，系统会直接将其踢出局，没有任何商量余地。 对于市场来说，POET 的大跌并非单纯因为订单流失，而是因为这种“越界行为”直接产生了毁灭性的污点效应， 使其未来进入博通、英伟达等顶级大厂供应链的可能性几乎归零。 尽管其 4 激光方案已在技术上实现突破，但在良率极具不确定性且供应链高度依赖三菱电机的背景下，信用的丧失导致其技术溢价被迅速压缩。 这一事件释放了强烈的产业链信号：AI 光模块正从技术探索阶段步入规模化、工业化的交付阶段。像博通、Coherent、Lumentum 这种成熟厂商，其真正的壁垒不仅是技术，更是长期建立的合规体系与信任背书。 用一句话概括 POET 的教训：在硬科技赛道，技术和良率可以慢慢提，但信任一旦失去，就再也回不来了。 扫码+万人VIP社群，更深度的美国市场分析 美股量化交易工具使用 浏览器打开，别用国内的浏览器 别用薇信打开，要用就 MBS 会大涨？因为AI智能体工作的时候，CPU和内存之间得疯狂搬数据，带宽一堵住大家全卡死。 Rambus手里握着的DDR5和HBM内存接口IP，就是专门疏通这条管道的技术。被市场重新定价、重新认识，是迟早的事。 迈威尔科技（MRVL）作为算力互联的龙头，今天再次强势上涨，股价来到了 173 美元，而我们VIP社群在 81美元 时以 30%仓位重仓潜伏，截至今天，收益已成功翻倍！ 此外，3月31日我们美股投资网的Top Stock组合中买入的KOPN，今天已上涨至3.44美元，而我们的买入价仅为2美元，稳稳获利72%！ CPU从配角走向舞台中央 过去两年，AI的叙事逻辑简单粗暴：谁GPU多，谁就是王。英伟达市值突破5万亿美元，全市场的资本开支都在抢H100、B200。 但进入2026年，风向彻底变了。产业已经从“训练大模型”进入“执行智能体”的阶段：模型不再被动生成文字，而是主动规划任务、调用数据库、验证结果、反复决策。所有这些“协调工作”——任务调度、状态管理、I/O搬运——全都在CPU上跑。 什么概念？摩根士丹利刚刚算了一笔账： 到2030年，代理AI将为数据中心CPU市场额外带来325亿至600亿美元的增量，将整个CPU市场的规模推至825亿至1100亿美元。 这是真金白银的资本开支转向。 业界有话语权的机构SemiAnalysis首席分析师Dylan Patel表示：“过去半年，整个云端市场的CPU都跑空了。到处都没有容量。”亚马逊今年部署的CPU服务器数量，同比暴增3倍。微软呢？把自己实验室的CPU都卖给了Anthropic和OpenAI，连GitHub稳定性都出了问题。 TrendForce的数据也印证了这一点：当前AI数据中心CPU与GPU的配比约为1:4到1:8， 但随着AI智能体普及，这个比例将缩小到1:1到1:2。 Evercore ISI分析师Mark Lipacis甚至预测，未来可能出现1个GPU搭配2到10个CPU的情况，CPU增速将全面超过GPU。 CPU的缺货还不是概念——供应链已经在真实涨价。 根据美股大数据StockWe.com数据， AMD和英特尔2026年服务器CPU产能已基本售罄，两者分别计划涨价10%至15%。AMD更激进，准备在Q2和Q3分两阶段累计提价16%至17%。 现在扫码加VIP，马上解锁下一个爆发性CPU赢家！ AMD：双线作战的硬核玩家 AMD这次涨的逻辑很清晰，三个点： 首先，服务器CPU被Agentic AI重估。智能体时代，任务调度等底层控制流全靠CPU，而这正是AMD EPYC处理器的强项。富国银行预测，AMD数据中心GPU业务明年有望突破400亿美元，而服务器CPU也在同步提价，双轮驱动效应明显。 第二，GPU本身也在加速追。MI400系列预计25年下半年规模放量，这块芯片搭载432GB HBM4内存，带宽逼近19.6TB/s。而且今年2月AMD和Meta签了一个五年期、600亿美金级别的供货协议，涵盖了6吉瓦的算力容量和定制化CPU需求。此前和OpenAI的数十万颗AI芯片供应协议也不是PPT，下半年就出货。 第三、供应链上最大的护城河——AMD和台积电在3nm和N2制程上深度绑定，台积电当前的N3产能中AI相关需求占了接近六成。在地缘政治风险底下，这种绑定本身就是稀缺资源。 华尔街给AMD的估值已经看得非常高了。Stifel分析师Ruben Roy在4月20日把目标价从280美元直接拉到320美元，理由是“AI驱动的计算需求在加速计算的通用架构两端同步超出预期”。 富国银行给的更激进，345美元的目标价。目前37位覆盖AMD的分析师中有37位给出买入，共识目标价291.52美元。5月5日的Q1财报会，将是AMD第一阶段逻辑能否兑现的关键检验点。 英特尔：最极致的预期反转 如果说AMD是强者恒强，那英特尔就是“困境反转”的教科书。 周四盘后的暴涨，源于Q1财报的全面碾压：营收135.8亿美元，远超预期的124.2亿；调整后每股收益0.29美元，而华尔街的预期仅为0.01美元，整整差了28倍！ 驱动这一切的核心，是数据中心CPU需求的井喷。 数据中心与AI部门（DCAI）营收暴增22%，运营利润率高达31%。CEO陈立武在电话会上明确表示： “CPU正在重新成为AI时代不可或缺的基础。” 而且英特尔这把不只是CPU需求回升，还有大单层面的结构突破。 4月初，英特尔宣布加入马斯克在德州的Terafab项目，为其设计定制芯片，服务于xAI、SpaceX和特斯拉。这个单子的想象空间，可能比目前市场定价的还要大。 供应端也在主动收紧可控性。今年4月，英特尔花140亿美元回购了此前卖给Apollo的49%爱尔兰工厂股权，全面收回先进制造产能的控制权。而对Q2，公司给了极
