面的突破。 马斯克本人一直高度看好无人驾驶和AI驱动的出行方式，并多次表示Robotaxi是推动特斯拉估值重估的核心战略方向。他强调，奥斯汀的Robotaxi部署将从小规模起步，并逐步扩大，但目前仍不清楚该服务未来的具体落地形式，如运营App、首批用户选择、定价机制等均未公布。 高盛分析师德莱尼（Mark Delaney）带领的团队周一向客户发布了一份报告，称自动驾驶汽车如今已经正式进入共享出行和货运的商业化阶段，而且这种技术将在2030年代持续向实体经济大规模渗透。 除了Robotaxi推进的利好，特斯拉反弹的另一重要推手来自政治层面。 上周，马斯克与特朗普之间的“口水战”一度导致特斯拉股价受挫。然而在本周一，特朗普在白宫出席公开活动时，被问及是否愿意与马斯克会面时公开表示： “我没问题，我想他也想见我。” 这一表态被市场解读为关系缓和信号。 特朗普还透露，他不会出售自己在3月购买的特斯拉Model S电动车 ——这辆车是在马斯克“组团”将特斯拉车队带入白宫供其试驾之后购入的。 当被记者追问是否知晓马斯克“在用药”时，特朗普则表示：“我不知道，我希望不是。” ←左右滑动查看更多产品介绍图→ 浏览器打开官网订阅VIP https://StockWe.com/vip 美股投资网是一家专门研究美股的金融科技公司，2008年成立于美国硅谷，由前纽约证券交易所分析师Ken创立，联合多位摩根斯坦利分析师，谷歌 Meta工程师利用AI和大数据，配合十多年美股实战经验和业内量化模型，建立了一个股市数据库 https://StockWe.com/ 每天处理千万级股票数据：捕捉期权大单，实时主力资金流向、机构持仓变化、川普突发新闻，精准买卖信号第一时间发到您手机APP！ 联系方式 客服Telegram meiguM 公众号 TradesMax 邮箱 buy@TradesMax.com 美股投资网 TradesMax.com 美股大数据 StockWe.com"}, {"title": "特斯拉股价要到800？对冲基金“集体认输”狂买美股！苹果为什么跳水？", "date": "2025-06-09", "ym": "2025-06", "time": "2025-06-09 21:11:06", "author": "StockWe.com", "desc": "特斯拉摆脱颓势？", "url": "https://mp.weixin.qq.com/s/BXdbNSrRhwXgn6xp4VgwsQ", "path": "sources/news/wechat_mp/articles/特斯拉股价要到800-对冲基金-集体认输-狂买美股-苹果为什么跳水-82a46928ec.md", "len": 4428, "ticks": [], "body": "美股盘前，据美股投资网了解到， 特朗普签署三项旨在加速无人机发展的行政命令。 ACHR涨超10%和JOBY涨超13%，EVTL上涨15.24%，而BLDE也录得11.58%的涨幅。 与此同时，美中贸易关系方面传来积极进展。当地时间6月9日下午，美中高级别贸易谈判在伦敦正式启动，并计划于周二继续进行。这是继上周特朗普与中国高层通话之后的进一步举措。 特朗普当天在白宫表示：“我们与中国的谈判进展顺利。” 美国财政部长贝森特则简短评价称：“会议进展良好。” 受贸易谈判利好消息推动，芯片股与热门中概股集体走强。盘中，费城半导体指数一度上涨近3%，中概股指数涨幅超过2%。英伟达一度涨超2.3%，AMD涨近5%，为纳指提供强劲支撑。 截至收盘，道指微跌1.11点；纳指涨幅为0.31%；标普500涨幅为0.09%。 苹果股价为何跳水？ 苹果在今日的全球开发者大会（WWDC 2025）上公布了全产品线的软件系统更新，包括iOS 26、iPadOS 26等，并首次实现了命名与视觉上的统一，引入了全新的“Liquid Glass”视觉设计。 然而，市场对此次发布会的反应却显得冷淡，苹果股价在盘中跳水，收盘下跌1.21%。 股价跳水的主要原因在于此次活动未能达到投资者对苹果在AI领域取得重大突破的期待 。 尽管发布了众多软件升级、调整和新服务，这些内容在往年可能足以令股东和用户感到兴奋，但市场普遍认为，此次WWDC更值得关注的是其“不宣布的内容”。 具体而言，苹果推迟了对Siri语音助手的重启，并且尚未与包括谷歌、百度和阿里巴巴在内的潜在AI合作伙伴达成交易。 这与此前市场对于苹果将在AI领域有“戏剧性突破”的预期相去甚远。 分析公司IDC的分析师Francisco Jeronimo也指出，今年的WWDC将是一个“低调的活动，没有戏剧性的AI突破”，用户应期待“渐进式改进”。 苹果目前仍面临巨大压力，需要兑现其在去年会议上宣布的“苹果智能”愿景，而许多承诺的高度个性化AI功能尚未触达用户。尽管许多投资者相信苹果最终会找到解决方案，但该公司在AI军备竞赛中显然落后于微软、Meta和谷歌等大型科技同行，这些公司已在此领域投入数十亿美元。 此外，苹果还面临更多AI竞争，因为其潜在AI合作伙伴OpenAI已开始采取措施与苹果在设备业务上竞争，上个月甚至与苹果前设计主管乔尼·艾夫合作开发新的AI“伴侣”。 大摩重申800美元目标价 特斯拉今天表现亮眼，收盘涨4.55%。华尔街巨头摩根士丹利（大摩）再度发布看涨研报，重申对特斯拉的长期乐观预期，并维持800美元的长期牛市目标价，强调其“长期牛市逻辑”依然畅通。 大摩认为，尽管马斯克与特朗普之间的公开分歧可能短期内对特斯拉股价构成不利影响，但 马斯克手中掌握着诸多“底牌”。 特斯拉不仅涉足电动汽车，更深入布局AI驱动的自动驾驶网络、人形机器人（Optimus）、AI与制造业融合、军工与无人机、电池能源以及储能等多个前沿科技领域。这些领域不仅是美国“制造业回流”政策的核心，也是未来美国经济增长和就业创造的关键所在，并且短期内难以找到规模上能与特斯拉匹敌的替代标的。 当前市场对特斯拉的估值存在显著分歧，许多传统投资者仍将其视作一家“高估的车企”，并为其核心汽车业务给出每股50–100美元的估值区间。然而摩根士丹利指出，这种评估视角与早期仅将亚马逊视为零售平台、或将苹果简单理解为硬件公司无异。 研报重申特斯拉800美元的长期目标价，并强调这基于其在AI与智能自动化领域的超前布局，而非依赖传统制造利润模型。 FSD（完全自动驾驶系统）和Robotaxi网络的商用化，结合Optimus AI人形机器人业务的规模化进展，将成为未来数十年拉动估值的核心动能。 大摩此次特别强调Optimus人形机器人业务的战略地位。全球劳动力市场目前约有40亿人，按人均1万美元薪酬计算，构成一个40万亿美元的巨大市场。摩根士丹利测算，如果一台人形机器人能以每小时5美元的成本执行相当于两位25美元/小时人类工人的任务，其净现值约为20万美元。 在此假设下，若机器人替代美国1%的劳动力岗位，即可创造约3,000亿美元的经济价值，理论上能推动特斯拉股价上行100美元。 这种“AI+机器人+算力”融合效应，将对全球制造业和服务业形成根本性重构，也为特斯拉打开新的万亿美元级市值空间。 AI基础设施方面，特斯拉已开发出Dojo超级计算系统，并搭载自主研发的AI芯片，拥有自成体系的模型训练与推理平台。马斯克旗下的AI公司xAI近期推出Grok系列大模型，未来或将与特斯拉的FSD、Dojo等实现软硬一体的深度融合。这意味着，无论是在视觉计算速度、场景反应能力，还是多任务交互推理方面，FSD与Optimus都可能因Grok的接入迎来“智能跃迁”。 值得注意的是，这一融合将使特斯拉在AI应用时代中扮演“系统平台+硬件终端+算力基础设施”三重角色，成为连接算法、硬件与垂直落地的核心枢纽。摩根士丹利明确指出，随着全球AI模型向低成本、高能效范式转型（如DeepSeek等企业所展示的趋势），特斯拉凭借全栈能力可能成为“AI消费品终端的苹果”。 我们美股投资网早在几天前就深度分析过，抄底特斯拉的机遇 对冲基金进入“认输式追涨”阶段 最新来自高盛的交易数据显示，在经历了4月的大幅抛售和空头押注之后， 对冲基金已集体切换至激进做多模式 ，美股连续第五周获得净买入支撑。其中，多头建仓规模大幅领先于空头平仓，比例接近3:1，呈现出典型的“FOMO式入场”特征。 而我们美股投资网一个月前就已经预判到，基金经理们眼看着美股持续上涨，为了不让自己今年投资组合太难看，FOMO 错失恐慌情绪会促使他们纷纷入场买入美股，从而在下半年进一步推高大盘创历史新高。 文章回顾： 机构疯狂卖出，散户却加仓，美股会崩吗？英伟达后市分 析 对冲基金多空杠杆结构的最新演变也进一步佐证这一点。数据显示，美国基本面多空策略基金的总杠杆率虽在几周前攀升至215%的历史峰值，当前略回落至210.6%，录得自4月初以来的最大单周跌幅（-2.5%），但整体杠杆水平依旧处于过去三年中的第97百分位，高位运行态势未改。 与此同时，净杠杆率连续第四周攀升，达到51.2%，逼近三年区间的38百分位，而多空比值反弹至1.642，较两个月前的低点提升1.5个百分点，虽仍处于低位（第8百分位），但已显示出方向性逆转的早期迹象。 宏观产品与个股齐头并进，ETF空头仓位微调 从资金流分类来看，对冲基金的加仓呈现“认输式一致性”：宏观产品（指数及ETF）合计占净买入总额的23%，其中既包括大规模的空头回补，也包含积极的多头新建仓操作。值得注意的是，在连续三周削减后，美国上市ETF的空头仓位本周小幅回升0.2%，虽然与上月相比仍下降15.7%。空头重新集中的方向主要是大盘股、工业与企业债券相关ETF，而科技ETF的空头回补成为部分对冲力量。 个股方面，多头仍是主力驱动：过去一周个股净买入量已连续第五周高于宏观产品，占比达77%。其中，多头交易活跃度以2.2倍压制空头抛压，显示出机构在个股层面的做多信心远高于系统性押注。 从板块结构来看，美股11个主要板块中有8个实现净买入。其中，信息技术、医疗保健、工业和能源贡献了主要净流入；而通信服务、基础材料与公用事业则遭遇一定程度的资金撤离。 工业板块获主力加持，生物科技持续受捧 在当前板块轮动加速的背景下，工业股成为对冲基金增配的最大赢家。数据显示，过去一周工业板块的净买入金额创下自去年10月以来新高，多头仓位规模相较空头达到了3.7:1的强势比例。更重要的是，该板块名义多头买入力度为近四年来最高，且几乎波及全部子行业。 具体而言，地面运输、航空航天与国防、专业服务与分销类公司最受欢迎，显示出机构投资者对美国制造和物流相关环节的信心增强。尽管近期资金显著加码，但当前工业板块在整体持仓中的占比依旧不高，提示后续仍可能存在“赶底式补仓”的持续空间。 医疗保健领域则延续了连续第六周的净流入走势，背后完全由多头推动。尤其是生物技术、制药以及医疗服务商成为重点配置方向。数据显示，美国生物技术板块的多空比已跃升至3.83，相较年初的2.90有显著提升，达到过去五年中的第86百分位，表明市场情绪已进入较为极端的乐观阶段。 VIX破17的技术性信号 波动率市场亦向机构做多行为“背书”。本周VIX恐慌指数收于17以下，为2月以来最低水平，进一步反映出市场对未来风险的预期快速下降。高盛策略师Paul Leyzerovich指出，美股连续上涨导致隐含波动率继续受抑，VIX本周下跌1.7%，而期货市场的VIX曲线则进一步变陡。 商品期货交易委员会（CFTC）数据显示，自4月下旬至5月末，机构投资者在VIX期货市场持续减持，总持仓量五周累计下降1430万美元敞口，其中以新建空头为主力。这一趋势表明，市场对未来剧烈波动的预期明显降温。 聪明资金仍存分歧，“错位交易”频现 尽管整体风险偏好上行，但在高盛交易台的数据中，分歧与错位信号仍值得关注。纯多头策略基金在本周合计净卖出30亿美元，而对冲基金总体维持中性仓位，凸显其相较传统机构更积极的情绪转向。 高盛指出，本周市场中出现大量“错位交易”现象，对冲基金VIP股.票篮子与最空头股.票篮子的表现差异高达8%。其中最大幅度的卖出集中在工业和非必需消费品板块，而买入更多集中在财报强劲的生物技术龙头、通信服务和超大盘科技企业。 高盛科技股交易主管Peter Callahan强调，虽然纳斯达克指数近两周累计上涨超2%，并已从年内低点反弹近30%，逼近历史高点，但有些不安的信号正在累积：表现最强的居然是最被做空的一篮子股票，其次是TMT领域过去一年表现最差的股票（本周上涨7%）。这意味着，投资者正试图在快速上涨中“对齐节奏”，但同时不得不压缩已有多头敞口，以控制风险暴露。 ←左右滑动查看更多产品介绍图→ 浏览器打开官网订阅VIP https://StockWe.com/vip 美股投资网是一家专门研究美股的金融科技公司，2008年成立于美国硅谷，由前纽约证券交易所分析师Ken创立，联合多位摩根斯坦利分析师，谷歌 Meta工程师利用AI和大数据，配合十多年美股实战经验和业内量化模型，建立了一个股市数据库 https://StockWe.com/ 每天处理千万级股票数据：捕捉期权大单，实时主力资金流向、机构持仓变化、川普突发新闻，精准买卖信号第一时间发到您手机APP！ 联系方式 客服Telegram meiguM 公众号 TradesMax 邮箱 buy@TradesMax.com 美股投资网 TradesMax.com 美股大数据 StockWe.com"}, {"title": "00后广州神童成为硅谷AI创业新星！没有任何产品却能估值数亿！", "date": "2025-06-09", "ym": "2025-06", "time": "2025-06-09 21:11:06", "author": "StockWe.com", "desc": "在硅谷和华尔街风起云涌的AI创业热潮中，洪乐潼（Carina Letong Hong）是一位格外引人注目的年", "url": "https://mp.weixin.qq.com/s/VB6Z0QGe7O1ttagGe2oF5g", "path": "sources/news/wechat_mp/articles/00后广州神童成为硅谷AI创业新星-没有任何产品却能估值数亿-57b14735db.md", "len": 2319, "ticks": [], "body": "在硅谷和华尔街风起云涌的AI创业热潮中，洪乐潼（Carina Letong Hong）是一位格外引人注目的年轻女性创业者。00后出生的她已经获取了斯坦福数学博士， 而 她创立的Axiom公司目前尚无成品，也未正式拥有客户，却已获得数亿美元的估值，成为AI+数学创业领域的一匹“黑马”。 这种惊人的市场认可，背后是她一条极具传奇色彩的学术与创业之路。 从奥数小将到MIT双学位 洪乐潼出生于中国广州，父母虽未接受高等教育，却悉心培养她对知识的渴望。她的数学天赋早在青少年时期便崭露头角，加入免费的奥林匹克数学项目，面对来自全球数学家的难题，她曾说：“我在知识的世界里环球旅行。”高中时期，她是数学奥林匹克省队的唯一四名女生之一，站在竞赛顶尖的门槛上。 怀揣对数学的热爱与渴望，洪乐潼14、15岁时便开始在笔记本边缘写下“MIT”，自我激励。 三年内，她完成了麻省理工学院（MIT）数学与物理双学士学位，期间发表9篇学术论文，涵盖数论、组合学、代数几何等纯数学前沿领域 ，这在本科生中极为罕见。她曾多次获得包括美国数学协会颁发的Alice T. Schafer奖和Frank & Brennie Morgan本科生研究奖等重量级奖项。 除了学术，洪乐潼还积极参与校园领导力活动，曾任MIT本科数学协会主席，以及国际学生协会和第一代低收入学生联合会的执行成员。她以“务实且苛求自我”的精神，克服了初入MIT时的孤独和陌生，逐步建立起属于自己的学术和社交网络。 罗德学者与跨学科的科学探索 2022年，洪乐潼获得了极具竞争力的罗德奖学金，成为少数中国获奖者之一，赴牛津大学深造神经科学。她认为，数学是理解生物医学的重要工具，数学和生物医学这两条“轴线”构成了她对科学世界的宏观认知模型。除了科学，她还跨界攻读法律学，试图从人文社科角度拓展视野，认为“法律是连接现实世界的三维向量之一”，这使她的学术背景极具厚度和多元性。 随后她进入斯坦福大学数学博士项目，同时攻读法学院学位，深入研究弹出堆栈排序算法、数论等领域，并参与了人工智能与数学交叉的前沿课题。她的研究不仅严谨精深，更带有明显的应用导向和未来感。她自己说：“我希望破解数学与AI互动的技术瓶颈，探索应用科学家如何与‘AI数学家’共事。” 用AI解决数学难题，赋能量化金融 洪乐潼创立了Axiom，一家定位于“数学AI”的创业公司，核心目标是打造能解决实际数学问题的人工智能系统。 Axiom通过训练模型掌握形式化数学证明（formal proofs）的语言与逻辑，力求像数学家一样构建和验证定理的真实性，确保推理严谨无误。 专注于开发基于形式化数学证明的AI模型，其技术路线强调“严格证明”。这意味着模型不只是简单给出答案，而是通过严谨逻辑推导得出结论，有望弥补主流AI在数学证明环节的缺失。 在基础数学问题上，此前大模型会受限于对数字token处理不当、上下文语境干扰等得出错误结论；在复杂数学证明方面，面对2024年国际数学奥林匹克竞赛（IMO）基于证明的题目，顶级AI模型平均分最高不足5%，存在逻辑错误、缺乏创造力、评分失败等问题，还常出现用未经证明假设、关键步骤敷衍、反复用同一错误策略等情况，即便谷歌的AI在其中达到银牌甚至金牌水平，也无法解决组合数学问题；谷歌和OpenAI的模型还可能存在“背题”现象，在面对条件改变的相似数学题时，容易沿用旧解法得出错误答案。 Axiom的潜在客户主要是对冲基金和量化交易机构。 借助Axiom，金融机构可无需耗费大量人力搭建庞大技术团队，直接利用AI解决投资和股市中的复杂数学难题。 这种“数学即服务”的模式，契合了当前金融市场对高效智能化技术的强烈需求。 尽管公司尚无产品和用户，但Axiom已在投资界引发极大关注， 目标融资5000万美元，估值达3至5亿美元， 投资方包括知名AI基金B Capital。与那些凭借创始人背景实现高估值的初创企业类似， Axiom背后的核心资本信心源自洪乐潼这位“学术界的超级新星”，以及她对数学与AI结合的前瞻思考。 结语 洪乐潼身上有一种稀有的学术和创业融合气质，她既是深耕数学理论的学者，又是志在用科技变革金融行业的创业者。从广州的奥数赛场，到MIT和牛津的数学殿堂，再到硅谷新兴的AI创业舞台， 她的故事诠释了什么叫“用数学打开世界的大门”，也展示了新一代华人学者如何用跨学科视角和创新思维，书写属于自己的传奇。 未来，随着Axiom的成长，洪乐潼或将真正推动AI在严密数学推理领域的突破，助力金融科技迈上新台阶。她的名字，值得被持续关注。 美股大数据AI量化团队重磅更新 ，免费给全球投资者提供 美股盘前，盘中和盘后出现异常波动最大的个股，只需登录官网注册免费账户立即使用，让你先人一步发现交易机会！ 浏览器打开官网 https://S 普公开决裂并隔空“对线”后，根据一位消息人士的说法，马斯克的攻击特别是“弹劾”威胁令特朗普深感不安。 据称特朗普这段时间频繁致电亲信及各路消息人士，试图摸清马斯克的真实意图，还一度用“严重的瘾君子”来形容这位昔日盟友。 另外两位消息人士透露，在6月5日两人爆发激烈口头冲突后，特朗普曾要求核心幕僚不要对事态做出进一步刺激性回应。 他还特别提醒副总统J.D.万斯在公开评论马斯克时务必保持克制。 万斯6日在一档播客节目中说，马斯克“犯了大错”，但他个人仍希望这位科技企业家最终能够重新回到团队中来。 报道指出，虽然马斯克和特朗普的公开分裂上周才集中爆发，但裂痕其实早在数月前就已经显现。马斯克“快速行动、打破常规”的风格与白宫政策目标相冲突， 他还与白宫办公厅主任苏珊·威尔斯等关键官员发生冲突，甚至与内阁成员贝森特大打出手。 马斯克今年一月前往华盛顿，那时的他还是特朗普最有力的盟友，甚至住进了林肯卧室，还担任白宫高级顾问。但蜜月期很短。他的强硬风格、政治经验不足以及与MAGA基层理念的冲突，逐渐削弱了他与高层乃至总统特朗普本人的关系。 第一次显著矛盾发生在二月，当时马斯克发出电邮要求所有联邦雇员汇报上一周的五项工作成果。 白宫内阁成员和机构负责人对此事毫不知情，非常震惊。更糟的是，该邮件还发到了部分联邦地区法官和机密人员手中，令人怀疑马斯克是否真的理解联邦Z府的运作机制。 报道称，马斯克团队推动削减联邦拨款、解雇文官、关闭美国国际开发署，引发全国抗议，示威者举着“没人选马斯克”的标语走上街头。 4月1日，一场政治投票揭示马斯克的失败。他重金支持特朗普盟友在威斯康星州最高法院选举中惨败，令共和党人警觉： 马斯克从“政治资产”变成了“政治负债”。 与此同时，马斯克开始对特朗普的经济政策失望。4月2日，特朗普宣布新的全球关税政策， 马斯克在X平台上公开表达不满，称其贸易顾问纳瓦罗是“白痴”。 马斯克据称还私下请求特朗普取消关税，但特朗普未采纳，直到债市大跌几天后才松口。 随后，马斯克与财政部长贝森特发生冲突，甚至演变为肢体冲突。 据特朗普长期顾问班农透露，4月中旬，两人因国税局代理局长人选问题爆发争执。特朗普最终支持了贝森特。 走出椭圆形办公室后，两人一路争吵。 贝森特批评马斯克未能兑现其“发现一万亿美元浪费开支”的承诺，称其“是个彻头彻尾的骗子”。 随后情绪激动的马斯克随即“像橄榄球运动员一样”用肩膀撞向贝森特的胸口，贝森特当即反击。 这场肢体冲突直至双方扭打至美国国家安全顾问办公室门前，才被工作人员制止，马斯克随后被带离白宫西翼。 其实今年4月马斯克和贝森特在特朗普和白宫其他官员听到的情况下，就国税局代理局长人选问题爆发激烈的争吵。 但其中一位目击者说：“他们没有在椭圆形办公室里动手，但总统看到了，然后他们到了走廊上接着吵。” 另一名目击者称，“那可真是个大场面，声音特别大，非常吵。” 当时被问及这场争吵时，白宫新闻秘书莱维特说：“特朗普组建了一支对影响我们国家的问题充满热情的团队，这不是什么秘密。”“分歧是任何健康政策制定过程中的正常组成部分，”她说，“最终，每个人都知道他们是为特朗普服务的。” 直到四月下旬，马斯克宣布将减少在华盛顿的时间，专注经营特斯拉。 他离开后，反对者找到了打击马斯克的机会，目标是马斯克举荐的NASA局长提名人贾里德·艾萨克曼。 就在马斯克担任特别Z府雇员的最后一天，美国总统人事办公室主任戈尔拿出艾萨克曼对民主党人的政治捐款记录，递给特朗普。特朗普随即撤销了提名。 美股投资网认为，这一打击背后也许并非巧合。 戈尔与马斯克在过渡期就不合，曾在内阁提名上频频对立。知情人士称， 戈尔对身边人表明了“要报复马斯克”的态度。 就在马斯克与特朗普闹掰之际，班农多次对马斯克发难。班农5日一度呼吁特朗普调查马斯克的移民身份，“立即”将这名南非出生的亿万富翁驱逐出境，并接管他旗下的SpaceX公司。 “他们（指特朗普Z府）应该对他（指马斯克）的移民身份展开正式调查，因为我坚信他是非法移民，应该立即被驱逐出境。”班农主张，特朗普Z府还应同时调查马斯克的“吸毒行为”，以及他受邀参加五角大楼简报会一事，并在调查期间暂停他的安全许可权限。 马斯克则回击称班农“蠢出天际”（peak retard）。 美股投资网分析认为，其实两人的冲突不仅是个人矛盾，更反映出其联盟的脆弱性。在关税、移民限制、高校政策等问题的冲击下，特朗普联盟内部分歧日益明显，一些原先支持他的群体开始对其政策产生质疑。 更值得关注的是，美国严重的财政赤字问题，正在成为特朗普面临的一项新政治挑战，共和党内部的传统保守派和民粹派之间难以就此调和，可能削弱党内团结，甚至动摇现有的政治联盟结构。 ←左右滑动查看更多产品介绍图→ 浏览器打开官网订阅VIP https://StockWe  ，如果不够严谨，也可能引发严重的监管风险和法律后果，并直接导致股价在短期内因为不确定性而承压。 2022年收购推特事件 再来看2022年到2023年，马斯克收购推特（现X平台）引发的“分心论”担忧。当时，马斯克为了筹集资金出售了大量特斯拉股票，这本身就给特斯拉股价带来了不小的压力。更让市场担心的是，收购完成后，马斯克将大量精力投入推特的改造中，并在平台上发表了诸多争议性的言论，进一步加剧了市场的不安。投资者担心马斯克可能因此“分心”，无法继续专注于特斯拉的核心业务。这个担忧导致特斯拉股价经历了持续的下跌， 从2021年股价的高点（约414美元，按拆股调整）跌至2023年初的低点，约为101美元，跌幅超过75%。 虽然这段时间的股价下跌受到情绪化的推动，但特斯拉的基本面并没有发生根本性变化，最终股价也开始逐步回升。 那么，我们来看当前的情况，马斯克与特朗普的公开对峙是否会改变特斯拉的基本面？ 截至本周，特斯拉的股价已经因为这场政治风波大幅下跌14%。 但是，这种股价波动是否意味着特斯拉的长期价值发生了改变呢？ 特斯拉的核心技术是否依然领先？电动汽车和自动驾驶领域的技术优势仍在吗？产能扩张是否按计划进行？特斯拉的财务数据是否健康？ 这些问题才是我们真正需要关注的内容。短期内，股价的波动和市场的情绪变化可能会被一些个人言论和政治风波所放大， 但这些并不等同于特斯拉的基本面发生了根本性变化。 如果你觉得本文章对你有帮助，老规矩先点赞再收藏，关键时刻能帮忙 2018年Meta信息泄漏事件 我们再来看2018年3月Meta爆发的“剑桥分析丑闻”事件，Meta（当时的Facebook）在2018年3月承认，剑桥分析公司在2016年美国总统大选前违规获得了 5000万Facebook用户的信息 ，并成功地帮助特朗普赢得了美国总统大选。后来，Meta经调查发现，最多有 8700万用户的信息 被剑桥分析公司不当分享。此事件迅速在全球范围内引发了前所未有的监管压力，Meta因此多次遭到美国国会、欧洲议会及全球多国监管机构的严厉质询与审查。扎克伯格更是亲自出席国会听证会，回应数据泄露与隐私问题，面临巨大的舆论压力。 “剑桥分析”丑闻曝光后， Meta在短短数日内跌幅超过15%，市值一度蒸发超过1000亿美元 。Meta因其违规行为被美国联邦贸易委员会（FTC）处以创纪录的 50亿美元 罚款。同时，为了平息公众愤怒、避免未来更严厉的监管并力图恢复公众信任，Meta被迫对其数据政策进行了大幅调整，强化了隐私保护措施，并投入了巨额资源来挽回企业形象。 虽然Meta面临了这些巨大的挑战，但从长远来看，股价在短期的剧烈波动之后逐步回升。Meta的市场地位并未因此事件彻底动摇。Facebook的核心业务依然强劲，随着平台的用户基数增长和广告业务的发展，Meta逐渐恢复了部分市场信心，股价也随之一路走高。 通过这些案例，无论是特斯拉自身，还是Meta这样的科技巨头，我们能够洞察到一些共性规律： 首席执行官的个人行为和言论（特别是涉及公司发展、外部政治活动），以及企业的立场和营销策略，确实可能在短期内对股价造成显著的情绪性波动，乃至触发监管审查、消费者信任危机或投资者信心危机。 这些波动往往是由市场情绪和不确定性推动的，而非公司的基本面发生了实质性变化。只要企业的核心技术优势、产品竞争力及长期战略方向未发生根本性动摇，市场对其内在价值的评估终将回归理性，股价通常也能展现出显著的韧性和修复能力。 因此，作为投资者，我们需要具备强大的“过滤”能力，不被短期的市场情绪所迷惑。 我们应该像侦探一样，分析公司的财报、行业动态、产品更新等信息，而不是单纯依赖社交媒体和个人言论的“噪音”。 通过这种客观的分析，我们能更清晰地看清特斯拉的真实价值。 在如今的社交媒体时代，CEO的个人言行，尤其是像马斯克这样自带巨大影响力的公众人物，其影响力已远超传统范畴。他的一句话，一旦发表什么言辞激烈的看法，就会迅速扩散，进入不同群体的视野，并被解读放大，甚至引发激烈的反应。这对公司的品牌形象和股价无疑会产生直接的冲击。比如，马斯克的言论可能会让那些支持他、认同他个人价值观的“铁杆粉丝”更加坚定对特斯拉的支持，但也有一部分人可能会因此感到不适，甚至产生抵触情绪。这种两极化的市场反应，最终会体现在特斯拉的销量和股价上。 面对这种由CEO个人特质和影响力所带来的、超越传统基本面分析的复杂挑战，投资者需要更深入的应对框架。我们可以从以下几个关键维度来思考和构建策略： 第一，政治风险的量化与对冲： 面对像马斯克与特朗普这种高调的公开对峙，作为美股投资者，我们常常会感到困惑：这到底是市场上的“噪音”，还是预示着实质性的风险？这不仅仅是吃瓜看戏那么简单，它直接关系到我们的投资决策和资金安全。尤其是对于特斯拉这类与Z府政策（如新能源补贴、环保法规，以及SpaceX的太空项目合同）高度关联的公司而言，CEO的个人政治立场引发的政策不确定性，无疑是一项难以量化的挑战。传统的财务模型很难直接给“马斯克和特朗普闹掰了”标个价。 不过，我们并非束手无策。在应对这类“政治风险”时，我们可以在估值模型中进行敏感性分析和情景分析。比如，假设Z府补贴减少10%或20%，对特斯拉的利润会有多大影响？或者，若SpaceX真的失去部分Z府合同，其营收和盈利能力会如何变化？ 通过构建最佳、中等、最差等多种情景，并赋予它们发生的概率，投资者可以大致评估风险的范围。在折现率（WACC）的设定上，也可以适当提高，以反映更高的政治不确定性。 对冲策略方面，直接对冲“政治风险”本身非常困难，但投资者可以通过行业分散化来降低对单一高政治风险公司的依赖。同时，关注期权市场，通过购买看跌期权等方式，为可能出现的股价大幅下跌提供一定的保护，或在市场波动性加剧时寻找交易机会。 第二，CEO行为背后的“反常规”战略考量： 除了风险管理和投资策略，我们还可以从更深层次的战略角度，思考马斯克此类公开冲突背后的深层原因： （1）马斯克向来以特立独行著称。他是否认为这种公开冲突是其个人品牌乃至特斯拉品牌价值观的一部分，以此吸引特定群体或巩固“反建制”形象？或者，他是否在权衡短期市场波动与他所追求的更大社会/政治影响力？ （2）情绪宣泄还是战略反击？特朗普威胁取消电动汽车相关政策，直接触及了特斯拉的补贴和市场推广利益。马斯克的炮轰，除了个人恩怨，是否也是一种利用舆论力量向政治施压，以维护其商业版图利益的“战略反击”？ （3）对Z府合同的潜在影响：特朗普威胁中止Z府合同，这对SpaceX这样的核心业务至关重要。马斯克选择在此刻爆料，是否意味着他已评估过风险，或者认为这种反击能起到震慑作用？投资者应如何评估这种高风险的博弈？ 第三，长期主义与短期波动的平衡： 这再次提醒我们，在投资决策中，如何平衡短期情绪与长期价值至关重要。这次马斯克与特朗普的公开对峙，短期内确实可能给特斯拉的股价带来不小的压力，我们称之为 负面情绪的“外溢效应” 。在市场消化这些非基本面消息的过程中，股价出现一定幅度的回调甚至持续下跌，是完全正常的。然而，对于那些真正理解特斯拉长期价值、对其技术创新和市场扩张能力抱有坚定信心的投资者来说，我们反而认为， 如果这次因外部“噪音”导致的股价能出现一波持续的、深度的回调，这恰恰为我们提供了一个难得的、甚至是绝佳的入场时机。 250的价格不错 好了，你认为特斯拉股价会继续跌吗？你会选择在什么位置加仓？你坚定看好特斯拉吗？欢迎评论区一起留言讨论。 ←左右滑动查看更多产品介绍图→ 精彩深度文章回顾 美股6月必捞四只股，全新上市！CRCL...... 美股 英伟达后市分析，解读背后关键数据，被大家忽略的长期风险！ 英伟达5月财报预测，深度分析报告 NVDA 美股 解密一条公式，让你投资稳定盈利！ 自动驾驶将在今年大爆发！ 这四家美股公司必须关注！ TSLA LYFT 美股 PLTR和AMD财报预测 深度分析 美股META财报预测，捞底两家公司！ 支撑美股大跌后反弹的底层逻辑！ 捞底前必看！ 每次经济衰退前，这8个信号都提前预警了美股大跌！ 特朗普搞崩英伟达，盘后暴跌6%！是否迎来捞底机会？ 美股4月2日将变盘！交易策略公开，长期看涨的动力因素有哪些？ 特斯拉反弹是否能持续？ 从暴跌背后看做空机构资本运作规律！ 【深度报告】英伟达2025年2月财报预测！业内人士爆料 美股 下一个PLTR HIMS APP如何找？ 他们都有什么共同点？ 美股 特斯拉1月财报预测，风险预警！ 2025年最有潜力10只美股【下集】 不为人知的AI公司！【深度调研】 2025年最有潜力10只美股【中集】 不为人知的AI公司！【深度调研】 2025年最有潜力10只美股【上集】 不为人知的AI公司！【深度调研】 下一个英伟达是AVGO？ 博通凭ASIC能打破英伟达AI芯片垄断地位！ 美股2025年五大主题和估值风险！ 美股 英伟达11月财报预测，太多利空消息了！5000字报告 美股 和8年前相比，特朗普政策将有何不同？ 美股核能股爆涨，哪家最值得投资？OKLO LEU NNE 深度分析特斯拉Robotaxi发布会，是否会翻车？ 我们不看好！ 美股英伟达5月财报预测，深度报告，坚定看涨 美股这只股，快被我做烂了！ 除了英伟达，这4家AI相关的软硬件公司 需要关注 美股投资网 是一家专门研究美股的金融科技公司，成立于美国硅谷，由前纽约证券交易所分析师Ken创立，联合多位摩根斯坦利分析师，谷歌 Meta工程师利用AI和大数据，配合十多年美股实战经验和业内量化模型，建立了一个股市数据库 https://StockWe.co 朗普Z府，作为全球首富，他还通过政治捐款对美国的政策产生了深远影响。 根据彭博亿万富翁指数，马斯克的净资产目前约为3680亿美元，这使得他在美国政治中具有极大的话语权。 马斯克过去的政治捐款主要支持共和党和特朗普，但随着2026年中期选举的临近，他的立场可能对共和党的选举前景产生重要影响。如果马斯克决定撤回对共和党的财政支持，可能会直接影响到一些关键选区的选举结果，甚至改变党内的权力格局。 ←左右滑动查看更多产品介绍图→ 浏览器打开官网订阅VIP https://StockWe.com/vip 美股投资网是一家专门研究美股的金融科技公司，2008年成立于美国硅谷，由前纽约证券交易所分析师Ken创立，联合多位摩根斯坦利分析师，谷歌 Meta工程师利用AI和大数据，配合十多年美股实战经验和业内量化模型，建立了一个股市数据库 https://StockWe.com/ 每天处理千万级股票数据：捕捉期权大单，实时主力资金流向、机构持仓变化、川普突发新闻，精准买卖信号第一时间发到您手机APP！ 联系方式 客服Telegram meiguM 公众号 TradesMax 邮箱 buy@TradesMax.com 美股投资网 TradesMax.com 美股大数据 StockWe.com"}, {"title": "美股6月必选四只股，全新上市！CRCL LLY.....", "date": "2025-06-04", "ym": "2025-06", "time": "2025-06-04 18:08:21", "author": "前纽约证券Ken", "desc": "6000字深度美股分析", "url": "https://mp.weixin.qq.com/s/wf4D6q5-sN3AerNLQneDOQ", "path": "sources/news/wechat_mp/articles/美股6月必选四只股-全新上市-CRCL-LLY-46c357ef89.md", "len": 6882, "ticks": ["CRCL", "LLY"], "body": "今天， 美股投资网给大家推介四只我们认为接下来会大涨的美股 ，这四家公司涵盖了不同的行业领域，其中还有两家本周上市。那么，这两家新上市的公司是谁？它们又凭什么在激烈的IPO竞争中脱颖而出，吸引市场的高度关注？ 接下来，我将结合大量的客观数据分析，为大家全面解读这四家公司背后的核心投资逻辑。我们将从公司财务健康状况，增长前景、核心竞争优势和估值等多个维度去分析。 科技巨头谷歌 第一只股是谷歌。当前市场普遍认为，谷歌在AI竞争中受到了ChatGPT的冲击，尤其是在生成式AI的发展下，谷歌的搜索流量和用户参与度受到冲击，市场份额从90%下降到60-70%。投资者情绪因此悲观。 但这忽视了谷歌正在进行的深层次变革——它正在完成AI技术、基础设施和商业模式的系统闭环，而这一闭环将决定它未来10年的行业主导地位。 举个通俗的例子：当我启动谷歌的AI模式告诉它：“帮我查一下今天去我朋友小张家有多远？” 谷歌马上调用了我的Gmail谷歌邮箱，搜索朋友小张此前发来的邮件，精准提取里面的地址信息。 接着，AI会调用谷歌地图根据我当前位置和小张家的地址，立即帮我规划出一条最优路线。然后我又说：“我想中途顺路买个汉堡。” 谷歌的AI系统会智能分析途中出现汉堡店的位置，计算出一条最顺路、最高效的行程路线，帮我优化整个出行计划。当我确认后，谷歌AI手机会拨通餐厅的电话，AI语音直接帮我和店员下外卖订单，我到时候经过去取就可以了，一气呵成。 这种从信息获取、路径规划，到订餐、导航的全流程，无需我手动操作，一切都在AI和谷歌生态系统的支撑下自动完成。这样的闭环体验，几乎没有其他公司能做到。这就是谷歌全家桶的万亿商业价值。 这种“底层重构”区别于其他AI厂商的外接或插件式策略。OpenAI虽有模型，缺乏平台和终端入口；Meta虽有流量，但芯片自研不足；微软虽整合能力强，却无法完全自主芯片和生态。而谷歌是行业唯一拥有“模型+芯片+算力基础设施+全球终端入口”四位一体能力的企业，这构成了其真正的护城河。 谷歌这条护城河的核心，是其自主研发的TPU芯片。早在十年前，谷歌就开始绕开Nvidia，打造自有算力体系。当前TPU已发展至第七代，使Gemini模型训练和推理成本远低于行业均值，避开了所谓的“AI税”。结合谷歌全球顶级数据中心的调度优化，这让其AI服务具备了极强的成本优势和稳定性。开发者社区反馈，Gemini API曾降至GPT-4五分之一的价格，性能依旧可靠。 这套技术优势如何转化成商业价值？答案是Google Cloud Platform（GCP）。虽然GCP整体市场份额不及AWS和Azure，但在AI云服务上，特别是金融、医疗等对数据安全和隐私要求极高的行业，GCP的Vertex AI平台和TPU算力组合已赢得明显优势。其毛利水平也高于传统云业务，显示出强劲的成长潜力。 但市场给谷歌的估值呢？只有将近19倍PE，几乎就是按传统广告企业去定价的。 问题就在这里：大部分人还在用“广告业务是否被AI蚕食”来评估谷歌，却没意识到AI服务正在补位广告，甚至可能反超它的增速。 上个月Google I/O大会就是体现了这种矛盾：首日因无爆款引发股价下跌，次日AI Mode全量开放后立刻反弹5%。 市场逐渐意识到，这不是单一AI产品发布，而是谷歌AI能力全链路完成后的系统级发力。Gemini驱动的智能能力正深度植入YouTube、Docs、Gmail及Android，构建了新一代的产品生态和平台优势。 如果未来6个月内，Gemini相关收入开始进入财报，哪怕只占个位数，市场的估值锚点都会变。那时候，它将不再是一家“被动转型”的广告公司，而是掌握AI全链路的系统级厂商。这种估值切换，会来的比大多数人以为的更早。 制药巨头礼来 第二只股是制药巨头礼来LLY，这家公司在过去两年成为GLP-1类减重药物的核心玩家。 旗下的 Zepbound 和 Mounjaro 在全球市场快速放量，广受医生和患者认可。但礼来的真正价值，并不止于赶上了“减肥药”这波风口，更在于它背后那套长期可复利的硬实力：领先的研发体系、多元化产品管线，以及对终端渠道和供应链的强掌控力。 礼来在GLP-1市场的地位，已发生根本性改变。2025年一季度，它在美国GLP-1药物市场的份额上升至53.3%，首次超过丹麦的诺和诺德，成为真正意义上的行业龙头。在这样一个仍处于爆发阶段、增长天花板远未清晰的赛道中，这种市占率意味着主导定价权、渠道话语权，以及未来几年持续扩张的先手优势。 推动礼来领跑的，是它清晰的产品梯队战略。 Zepbound 和 Mounjaro 已经实现大规模商业化，而它的下一代产品—— 口服GLP-1药物 Orforglipron 正在推进三期临床 ， 从目前的试验数据来看，它的减重效果与注射型药物相当，但服用方式更为方便。换句话说，如果它能够顺利上市，将不再是从现有蛋糕中切下一块，而是让蛋糕本身膨胀数倍，从几百万注射用户扩展到全球数以亿计的潜在口服人群。 在产品之外，也在悄然革新医药行业的商业模式。以 Zepbound 为例，礼来不仅优化剂量规格，推出更便捷的 7.5mg 和 10mg 单剂量包装，更在渠道端主动出击，通过旗下自营平台 LillyDirect 实现独家发售，这看似只是销售路径的调整，实则背后代表了礼来对“患者关系”和“渠道定价权”的重新定义。 一方面，自建直销平台可以提升用户体验、提高治疗依从性；另一方面，它跳过了传统分销体系，将利润链条进一步向自身集中。 这种既掌控产品，又掌控终端的能力，是其他传统药企仍在学习中的能力，也是礼来已经领先半个身位的底层优势。 所有这些背后，离不开礼来的底层研发能力。 今年一季度，公司营收127亿美元，同比增长45%，其中核心产品营收同比暴增119%。研发投入达27亿美元，覆盖糖尿病、肿瘤、免疫、神经科学等多个方向。它从来不是靠一款药打天下，而是靠多线成长构筑抗风险能力和长期弹性。 除了产品和研发之外，它的全球运营能力也很强。很多人忽略了一点，礼来正在积极扩大其在美国本土的产能布局。在全球地缘风险和可能的医药供应链本地化趋势下，拥有本土制造能力将带来更高的响应效率和更低的政策风险。相比之下，像诺和诺德这样总部位于欧洲的公司，在本土化产能建设上明显慢了一拍。 再看估值，虽然 礼来的Forward EBITDA估值达到25.8倍 ，看上去不便宜，但从它利润率的走势看，这个定价并不虚高。过去几个季度，其EBIT利润率一路从30%上升到近49%，展现出极强的盈利弹性。GLP-1产品带动营收高增，渠道整合提升毛利，核心产品爆发的同时，新一代口服药也即将接棒。在这样一套“高增长 + 高利润 + 管线接力”的组合下，礼来显然值得一个溢价估值。 当然，短期也有挑战，比如今年一季度，它也面临了约6%的价格下压压力，来自医保、商业保险以及渠道端的谈判，但从财报和市场反馈看，它的盈利弹性、运营杠杆、以及产品粘性都可以消化这部分压力。更何况，在GLP-1全球渗透率还偏低、患者需求仍被严重低估的当下，礼来的增长还远没到尽头。 然后我们看一下美股大数据StockWe.com的期权异动实时订单流，按照权利金大小排序， 我们可以看到5月27日前三笔无一例外地都是买入看涨期权（CALL），资金金额分别达到997万美元、327万美元和244万美元，合计超过1500万美元。 这种规模、这种方向一致的建仓行为，显然不是散户投机，更像是信息优势明显的机构资金在提前布局。 这类交易通常意味着市场正预期某个潜在的催化事件——比如关键临床试验数据的发布、核心产品的放量超预期，或者监管审批的推进。 对于LLY来说，最可能的催化事件是6月20日至23日，即将在芝加哥举行的美国糖尿病协会（ADA）第85届科学会议上，展示其在糖尿病和肥胖症领域的最新研究成果，这一事件可能成为推动股价的关键催化剂。 LLY 股价在710美元附近形成底部，美股投资网参考入手价格730美元。 稳定币发行商CRCL 第三只股是即将在6月5日上市的稳定币发行商Circle，美股代号CRCL，这里必须先搞懂什么是稳定币（Stablecoin）。这个话题大家将会越来越被广泛讨论！ 川普上台后美国现在拥抱比特B，是不是在“重演”当年布雷顿森林体系，美元挂钩黄金的故事？只是这次黄金变成了bitcoin？是延续美元霸权的新手段？ 我们来具体分析。尽管bitcoin在作为价值储藏资产方面表现出色，但它的价格波动性过大，难以作为日常交易的稳定工具。在这一背景下，稳定币应运而生，特别是像USDC这样与美元1:1锚定的数字资产。USDC不仅保持了美元的稳定性，还利用区块链技术提升了全球支付和结算的效率。 作为完全由美元支持的数字资产，USDC每一枚都由现金或短期美债作为储备，并且定期接受第三方审计，确保其透明性和合规性。 截至目前，USDC的市场流通量已突破600亿美元 ，按照市值计算，是全球第二大稳定币发行商，老大是Tether (USDT) ，但CRCL因其监管合规性和透明度而闻名，使其成为机构投资者的首选。 CRCL此次选择通过传统IPO方式筹资6.24亿美元，标志着其财务模型和市场趋势的验证。承销商包括顶级投行摩根大通，高盛，花旗，德意志银行等。 随着美国的监管环境逐步明朗，CRCL作为合规的稳定币发行商，已经得到了监管支持。如果“GENIUS稳定币法案”通过，CRCL将成为稳定币市场中首批获得合法身份的公司之一，进一步巩固其市场地位。 CRCL 还通过与500多个合作伙伴共同建立区块链支付解决方案 ，推动USDC在去中心化金融（DeFi）领域的广泛应用。“木头姐”凯西·伍德旗下ARK Investment Management表示有意在本次IPO中认购最多1.5亿美元的股份。招股书还显示，CRCL在2024年的营收为16.8亿美元，净利润为1.56亿美元; 自由现金流为2.87亿美元。需要注意的是，CRCL与Coinbase的合作协议中，USDC储备收入的50%会分配给Coinbase，这使得CRCL的利润空间受到了一定压缩。此外，CRCL在基础设施建设、产品开发和上市准备等方面的投资，也导致了成本的上升。 不过CRCL的营销开支仅占总支出的1%，其高效运营使得公司实现了13倍的收入杠杆，证明了其增长并非依赖大规模的市场推广，而是依靠市场的真实需求和在稳定币领域的核心地位。 CRCL也面临一定的风险。尤其是在美联储调整利率时，储备资产的利差可能会受到影响，从而影响盈利表现。同时，各国对稳定币的监管标准不同，也可能影响CRCL的全球扩展。 Circle现有股东正利用此次IPO大规模套现。根据招股书信息，Circle现有股东出售的股份占总发行量的60%，远高于典型科技IPO。根据公司招股书，Circle CEO Jeremy Allaire将出售其8%的股份，多家知名风投公司也计划减持约10%的股票。 我们美股投资网预计， CRCL 发行价27-28美元，开盘前一定会被机构炒起来，很可能出现先跌后涨的情况，比较股东要出货。 如果能提前认购最好，因为能更低价格获得，在Robinhood可以打新申购 开户链接 http://share.robinhood.com/jiaweiz13 我昨天已经提交申请了 不行的话只能等开盘后再入，应该会有一波炒作上涨，因为它本身就是币圈类的投机公司。 慢性病网络管理平台OMDA 第四支同样也是一只新股Omada，美股代号OMDA， 是一家专注于慢性病管理的数字健康平台，正通过创新的虚拟护理服务逐步占领市场。 与传统的健康类App不同， OMDA 提供的是一整套线上慢病管理解决方案，涵盖了饮食、运动、睡眠干预、血糖监测、心理支持等方面，所有服务均由专业健康教练、医生和护士团队全程跟踪。 OMDA 的独特之处在于其“持续干预+长期依从”模式。 这一模式确保了用户不仅仅是被动接受健康方案，而是在执行过程中得到技术、数据和专业人员的全面支持，帮助他们更好地坚持健康管理并取得长效结果。 正是这种深度陪伴式的服务，使得 OMDA 成为企业客户体系中不可或缺的一部分，帮助企业有效降低医保成本并改善员工健康。 OMDA 的服务粘性强，这使得客户更难替换掉这一平台。 OMDA 的商业模式清晰且稳定。它并不依赖通过烧钱补贴吸引 计划推进——服务器、数据中心机柜、能源配套等都处于“资金已投但硬件未到位”的状态。 这对整个下游生态，特别是大型AI训练平台和云计算厂商而言，造成了供应链节奏的错位和资源配置的临时失衡。短期来看，这可能拖延一部分训练任务的上线节奏；长期来看，也进一步强化了市场对Blackwell架构提前替代H20的重要性认知。 公司进一步披露， H20对Q2的营收影响将达到80亿美元 。如果排除这个变量，英伟达原本有能力在Q2做到540亿美元以上的营收规模。也就是说，在Blackwell强势放量的推动下，公司营收增长完全有能力对冲掉政策带来的短期扰动。 Blackwell放量速度远超市场预期 而Blackwell产品本身，也确实跑在了所有人预期前面。英伟达披露：Blackwell芯片已在Q1实现批量出货，并在数据中心业务中占比高达70%。这远远快于外界此前的判断。 根据财报节奏推算，Q1 Blackwell营收约为100亿美元，Q2预计将突破300亿美元，实现环比翻倍。这种出货速度，几乎是按“季”推进产品迭代，在半导体行业中非常罕见。 而支撑这一切的，是客户端的真实需求。CFO在电话会中特别指出， 微软已经部署了“数万个”Blackwell GPU，并计划在未来扩展至“数十万颗”。 按机柜计算，意味着数千台AI训练服务器正在上线，构建的是新一代AI基础设施的中枢系统。这正是Q2业绩保持韧性的核心支撑。 英伟达财报背后隐藏的转折 除了Blackwell产品节奏，黄仁勋和CFO在电话会中特别强调了一个趋势： 推理（Inference）需求正在迅速增长，甚至比训练还猛。 微软、谷歌等客户的日均token调用量已经达到了数万亿级别，远超传统chatbot时代的负载水平。而且，多模态、Agentic AI等新形态模型的快速涌现，正在带来对实时推理、大规模低延迟计算的新一轮拉动。 推理需求的爆发，本质上是在倒逼整个AI基础架构加速进化。它不仅解释了Blackwell放量的节奏，也解释了为何英伟达要在设计层面大幅优化推理性能。对投资人来说，这也是一个方向信号：AI产业正在从“模型训练时代”迈向“推理落地时代”，而英伟达刚好处于这一变化的核心。 最后我们必须提到的是地缘政治对英伟达战略布局的影响。在这次财报中，黄仁勋罕见地以非常直接的语气谈到了中国市场的“结构性缺失”。他明确指出，中国约500亿美元的AI芯片市场已经对美国公司关闭，Hopper在中国的部署全面终止，公司也无法再通过“降配”来适配监管。 与此同时，他一边强调“美国永远是英伟达最大市场”，一边呼应特朗普“制造业回流”的政策，展现出极强的“端水”能力——这既是政治表态，也是策略保留。 在中国市场受限的背景下，公司更多在强调：要把全球的AI模型开发者、AI生态系统牢牢留在英伟达平台上。这也就是为什么黄仁勋专门点名表扬了DeepSeek（深度求索）和Qwen（通义千问）这些中国模型团队。未来AI的核心竞争，不再是单颗芯片性能，而是谁能留住最多的开发者。 总结一下，这次财报虽然没有绝对的惊喜，但几个市场最关心的风险点基本被打消了：营收增速依旧稳健，Blackwell芯片提前放量，Q1创纪录的回购展示出管理层的信心，推理端需求正在迅速上升，而毛利率在剔除一次性项目后仍处于高位。叠加H20相关的出口限制带来的“预期下修”效应，这份财报在低预期背景下，成功完成了市场信心的重建。 在当前美股面临宏观不确定性上升、科技股估值频繁波动的环境下，英伟达不仅交出了一份结构健康、节奏合理的成绩单，更通过Blackwell的加速推进和对AI基础设施的深度参与，重新强化了其“全球AI算力核心资产”的地位。这对市场对2025年下半年、甚至2026财年的增长路径，是一次积极的再确认。 电话会增量信息 接下来，我们说说这次财报电话会中，相对来说有一些信息增量的几个点。 首先是关于新订单和全球扩张节奏的问题。 黄仁勋在会上轻描淡写地提了一句：“我们的供应链在接下来的几年都会非常忙碌”， 还补充说“我下周要去欧洲”。 虽然没有明说目的地和对象是谁，但这句话背后其实信号很明确。 结合过去几个月的发展节奏，英伟达目前在全球的重点增长区域，正在从传统的北美科技巨头，扩展到中东、日本等市场。 在中东，沙特、阿联酋等国家正在通过国家基金和战略级项目推动AI基础设施建设，英伟达作为算力核心供应商已开始深度参与；在日本，Z府明确提出打造本土AI大模型产业链，软银等企业也在联合部署相关算力集群；而现在黄仁勋要亲赴欧洲，很可能意味着，欧洲市场也即将进入AI基础设施释放期。 这可能来自几个方向：一是欧盟层面的数字主权计划和绿色数据中心投资；二是由德法等国主导的国家级AI平台；三是本地大型云计算与电信企业与英伟达之间的合作深化。虽然欧洲在AI算力投入方面起步相对较慢，但其在绿色能源、隐私法规、边缘计算等方面的优势，恰好与英伟达最新一代Blackwell芯片所追求的“高效能+广部署”目标高度契合。 所以，这次“供应链会很忙”“即将访问欧洲”的表态，实际上是在为全球AI算力布局打开下一个阶段的窗口。 第二点，是关于Q2业绩指引为何明显高于市场预期的解释。 黄仁勋在会议中表示，GTC大会之后，公司收到了许多“正向惊喜”，尤其是推理型AI和“智能体”AI应用的需求在过去两个月内出现了爆发式增长。 虽然这类表述听起来并不新鲜，但结合本季度Blackwell芯片出货速度的表现，这句话其实揭示出一个核心趋势：推理负载正在成为算力需求的主战场，也是Blackwell加速放量背后的真正动因。这种结构性转变，不仅拉动了出货，也意味着英伟达未来的产品设计、客户结构，可能会进一步围绕推理场景进行调整。 第三个重点问题，是关于中国市场，也就是很多人关心的：现在的H20芯片还能不能继续卖到中国？未来有没有替代方案？ 黄仁勋在这部分的回答很巧妙。他没有直接给出答案，只是说了一句：“总统有他的计划，我相信他。”一方面，这是在表达对现有政策的不满——因为正是H20出口限制，导致英伟达在中国市场几乎停摆；另一方面，他也在传达一种微妙的信号——如果未来政策方向有所变化，比如美国换届、规则调整，英伟达会第一时间重新评估并寻找突破口。 他说：“我们现在没有什么新的计划可以公布，但我们会继续评估限制对我们的影响，也会寻找合适的处理办法。”这段话的意思已经很清楚：英伟达不想彻底放弃中国市场，只是在等一个合适的机会。 这次H20芯片的影响还没有完全过去，公司一边在推进Blackwell的海外部署，一边也保留了随时重返中国的可能性。这种“两手准备”的策略，其实也符合英伟达一贯的做法——在复杂的政策环境下，先保住主市场，然后伺机而动。 这几条内容看似没有“重磅发布”，但都释放出一些值得关注的细节信号。一方面，英伟达对欧洲市场的动作可能正在加速；另一方面，推理AI的增长逻辑正在成为实际出货的主线；最后，中国市场虽然暂时封闭，但并没有被完全放弃，未来仍可能是一个被重新点燃的变量。 这些信号不会在一两天内被市场完全定价，但对于真正关注基本面变化的投资者来说，它们构成了接下来几个月观察英伟达动向的重要坐标。 好了，本次英伟达财报你有上车吗？你会继续加仓，还是开始考虑兑现？你的目标看到哪里？欢迎评论区留言一起留言讨论，我们下期再见。 ←左右滑动查看更多产品介绍图→ 精彩深度文章回顾 英伟达5月财报预测，深度分析报告 NVDA 美股 解密一条公式，让你投资稳定盈利！ 自动驾驶将在今年大爆发！ 这四家美股公司必须关注！ TSLA LYFT 美股 PLTR和AMD财报预测 深度分析 美股META财报预测，捞底两家公司！ 支撑美股大跌后反弹的底层逻辑！ 捞底前必看！ 每次经济衰退前，这8个信号都提前预警了美股大跌！ 特朗普搞崩英伟达，盘后暴跌6%！是否迎来捞底机会？ 美股4月2日将变盘！交易策略公开，长期看涨的动力因素有哪些？ 特斯拉反弹是否能持续？ 从暴跌背后看做空机构资本运作规律！ 【深度报告】英伟达2025年2月财报预测！业内人士爆料 美股 下一个PLTR HIMS APP如何找？ 他们都有什么共同点？ 美股 特斯拉1月财报预测，风险预警！ 2025年最有潜力10只美股【下集】 不为人知的AI公司！【深度调研】 2025年最有潜力10只美股【中集】 不为人知的AI公司！【深度调研】 2025年最有潜力10只美股【上集】 不为人知的AI公司！【深度调研】 下一个英伟达是AVGO？ 博通凭ASIC能打破英伟达AI芯片垄断地位！ 美股2025年五大主题和估值风险！ 美股 英伟达11月财报预测，太多利空消息了！5000字报告 美股 和8年前相比，特朗普政策将有何不同？ 美股核能股爆涨，哪家最值得投资？OKLO LEU NNE 深度分析特斯拉Robotaxi发布会，是否会翻车？ 我们不看好！ 美股英伟达5月财报预测，深度报告，坚定看涨 美股这只股，快被我做烂了！ 除了英伟达，这4家AI相关的软硬件公司 需要关注 美股投资网 是一家专门研究美股的金融科技公司，成立于美国硅谷，由前纽约证券交易所分析师Ken创立，联合多位摩根斯坦利分析师，谷歌 Meta工程师利用AI和大数据，配合十多年美股实战经验和业内量化模型，建立了一个股市数据库 https://StockWe.com/ 以追踪华尔街机构期权异动，暗池主力大单和每天突发新闻 ，挖掘潜力大牛股，发送美股实时行情、投资策略、交易技巧、公司研究报告、量化交易。 联系方式 客服Telegram meiguM 公众号 TradesMax 邮箱 buy@TradesMax.com 美股投资网 TradesMax.com 美股大数据 StockWe.com"}, {"title": "特朗普关税“死而复生”！为什么英伟达冲高回落？", "date": "2025-05-29", "ym": "2025-05", "time": "2025-05-29 20:50:54", "author": "StockWe.com", "desc": "白宫与美联储分歧再现", "url": "https://mp.weixin.qq.com/s/BDKzImkFIj05_S8GnJxuAw", "path": "sources/news/wechat_mp/articles/特朗普关税-死而复生-为什么英伟达冲高回落-020799e2a4.md", "len": 3231, "ticks": [], "body": "美东时间周四，美股三大指数全天高开低走，最终小幅收涨。此前一日英伟达强劲的财报一度提振市场乐观情绪，但交易员很快又被接踵而至的宏观现实所拉回：疲软的经济数据、混乱的关税局势以及不确定的货币政策路径，令投资者重新评估风险。 当天最重要的新闻是， 美国联邦上诉法院批准了特朗普Z府的请求，暂时中止此前一家下级法院禁止执行美Z府多个关税行政令的裁决。 特朗普Z府表示，如果有必要，它最早可能会在周五要求最高法院暂停国际贸易法院最初的裁决。 此前一天，美国国际贸易法院裁定，特朗普Z府无权对几乎所有国家实施全面关税，并宣布那些已引发全球贸易战且威胁颠覆世界经济的关税无效，这提振了市场乐观情绪。 这场法律斗争给世界经济注入了更多的不确定性，也可能会削弱特朗普的影响力，因为他的团队正在与多个贸易伙伴进行谈判。 关税的不确定性也正对企业运营带来实质性影响。部分公司在下调盈利预期时明确指出，贸易政策的反复变化正在影响成本结构与消费者行为，这也使投资者更倾向于保持观望。 此外，特朗普当天在白宫会见了美联储主席鲍威尔，两人讨论了经济情况，但没有讨论利率前景。鲍威尔告诉特朗普，央行将完全基于仔细、客观和非政治的分析来决定其控制的短期利率。白宫新闻秘书莱维特随后表示，特朗普告诉美联储主席，不降低利率是一个错误。 截至收盘，道指涨幅为0.28%；纳指涨幅为0.39%；标普500涨幅为0.40%。 英伟达股价今日早盘10:00最高冲到143.49美元，后出现小幅回落，最终收于139.19美元，涨幅为3.25%。 美股投资网分析冲高后的回落主要受两方面因素影响： 一是技术性回调与获利了结压力。 鉴于英伟达近期股价涨幅显著，部分短线资金在高位选择止盈，导致股价出现高位震荡。 二是受到消息面的影响。 根据英伟达周三提交的10-Q文件披露，公司CEO黄仁勋计划出售最多600万股英伟达股.票。 按周三收盘价134.81美元计算，该笔交易预计涉及金额约为8.09亿美元，远超其此前的出售规模。尽管该出售属于预设的10b5-1交易计划，但市场可能仍将其解读为管理层对当前估值的谨慎态度，从而引发一定的市场情绪波动。 再次押对财报！ 全球领先的企业级客户关系管理软件提供商 Salesforce（CRM）在周三公布了2025财年第一季度财报，营收与利润均高于市场预期，全年指引也有所上调。然而，资本市场对此并不买账，股价今日下跌6.46%。 美股投资网认为，股价下行的核心原因并非财报本身，而在于市场对公司未来增长前景的结构性担忧。 尽管全年展望略有提升，但主要受益于汇率变动带来的有利影响，核心业务动能并未明显增强。分析师指出，增长指引依然偏弱，反映出当前复杂的宏观环境所带来的压力。 同时，市场也在关注 Salesforce 在新业务方向上的投入回报效率。尽管管理层对旗下 Agentforce 产品表达出较高期待，并称客户反馈积极，但多家机构认为，该产品仍处于早期阶段，短期内对财务的实际贡献有限。 德意志银行维持“买入”评级与400美元目标价，认为客户兴趣是长期积极信号；而摩根士丹利与花旗集团态度相对审慎，认为相关业务仍需进一步验证，当前尚不足以支撑估值的持续上行。花旗更指出，本次财报“仅达到了低门槛”。 截至周四收盘，Salesforce年内股价累计跌幅已接近22%。在宏观不确定性仍然突出的背景下，公司能否维持长期增长预期，将成为市场后续关注的重点。 就在周二（5月27日），也就是CRM财报发布的前一天，我们在VIP社区提示：根据美股大数据StockWe.com统计的数据，当天有机构交易员买入单笔1072万美元的看跌期权，6月20日到期，我们提醒大家可以考虑跟随机构一同布局。 我们关注这类交易的原因很简单：在财报发布前出现方向明确、金额巨大的期权建仓，往往意味着机构已有判断，甚至掌握了关键信息。识别这些信号，顺势而为，是当前环境下控制风险、获取收益的重要手段。 今天CRM股价大跌，我们所跟踪 影响的企业包括铿腾电子（CDNS）、新思科技（SNPS）以及西门子EDA业务。此次行动的目的在于进一步遏制中国在高端人工智能芯片领域的发展势头，确保美国在半导体与AI技术方面的领先地位。 根据美国商务部工业与安全局（BIS）发出的信函，这些公司现有的出口许可证将被暂停或审查，涵盖所有可能被视为战略性技术的EDA工具。 值得注意的是，尽管EDA软件在全球半导体供应链中所占营收比例不高，但其在芯片设计与验证流程中扮演着不可替代的关键角色。特别是在设计下一代AI芯片和高性能计算芯片方面，EDA工具是不可或缺的基础设施。 此前，美国Z府已于2022年开始限制向中国出口高端EDA软件，如用于GAAFET（环栅晶体管）等先进制程的设计工具。然而，合规范围内的销售活动一直持续至今，此次措施将进一步收紧出口口径。 截至收盘，基准股指全线收跌。道指跌幅为0.58%；纳指跌幅为0.51%；标普500指数跌幅为0.56%。 精准预测英伟达财报 全网唯一一家敢对英伟达财报预测的媒体！ 在英伟达多重复杂宏观因素的前提下，我们美股投资网通过大量分析，勇于给大家预判。在我们美股投资网昨天公众号发布的5000字深度文章 《英伟达5月财报预测，深度分析报告》 中，我们非常明确地表明了我们的观点： 坚定看涨。 今天盘后，英伟达正式公布了截至4月27日的2026财年第一财季财报。尽管持续承受美国出口管制等多重外部压力，英伟达的整体表现再超市场预期，用硬实力回应一切质疑。消息一出，美股盘后英伟达股价应声上涨5%！ 这就是专业！这就是精准！ 英伟达财务表现 本季度，英伟达实现营收441亿美元，同比大增69%，远高于去年同期的260亿美元，也高于市场预期的431亿美元。净利润为188亿美元，较去年同期的149亿美元增长26%；调整后每股收益达到0.96美元，超过分析师普遍预期的0.93美元。毛利率为61%，若剔除与中国相关的库存计提，实际毛利率高达71.3%。 数据中心业务依旧是增长主力，收入达391亿美元，同比增长73%，虽然略低于市场预期的393亿美元，但依然占据公司总营收的88%。其中，近一半营收来自大型云服务商，网络产品贡献了50亿美元收入，主要用于AI芯片的大规模互联与部署。游戏业务同样表现不俗，营收38亿美元，同比增长42%，得益于AI应用加速和Switch 2游戏主机芯片出货的双重推动。 汽车与机器人相关业务营收增长72%，达到5.67亿美元，显示出自动驾驶芯片与相关软件的广泛渗透。专业可视化板块营收同比增长19%，至5.09亿美元，产品涵盖3D设计芯片和桌面级AI设备如DGX Spark与DGX Station。 不过，本季度也暴露出出口政策对公司业务的直接冲击。美国Z府要求英伟达为此前已获批出口至中国的H20芯片重新申请许可，导致大量库存积压。 公司因此计提了高达45亿美元的费用，并表示若无此限制，本季度可额外实现25亿美元的销售收入 。 黄仁勋在电话会议中直言，H20芯片的禁令直接终结了公司在中国的Hopper数据中心业务。他指出，中国500亿美元的AI芯片市场如今几乎已对美国企业彻底关闭。 即便如此，全球范围内的AI芯片需求依然爆发式增长，成为英伟达业务的核心支撑。 黄仁勋强调：“全球对英伟达AI基础设施的需求异常强劲。”公司CFO Colette Kress透露，微软已经部署了“数万颗”Blackwell GPU，并计划在与OpenAI的合作推动下，扩展至“数十万颗”GB200产品。这些芯片广泛用于构建和运行如ChatGPT等大型AI模型，继续引领AI产业硬件端的革命。 除了持续扩张的主营业务，英伟达也加大了股东回报力度。 本季度公司共回购了价值141亿美元的股.票，并发放了2.44亿美元的股息，进一步巩固市场信心。 在业绩展望方面， 公司预计第二财季营收为450亿美元，上下浮动2%，略低于市场预期的459亿美元。 英伟达明确表示该指引已计入H20芯片出口限制所带来的影响，预计会因此减少高达80亿美元的营收。同时，Q2运营支出预计将升至57亿美元，远高于上一季度的36亿美元和去年同期的39亿美元。 面对围绕关税、出口管制、国际政策等外部不确定性，黄仁勋在财报会议上提出了他认为的四大行业“意外”：推理AI的迅猛发展正在催生前所未有的算力需求；特朗普取消AI扩散政策将利好美国科技企业；企业级AI中，Agentic AI的应用优于传统通用AI，表现更加高效实用；全球各地正在积极推动本地AI芯片工厂建设，AI基础设施的全球化正在加速。 总体来看，本季度英伟达在营收、利润、AI产品出货、客户结构和全球市场布局方面均表现出极强的韧性和竞争力。尽管面临监管和地缘政治挑战，但凭借其技术优势和领先的产业地位，英伟达依然牢牢站在AI芯片产业链的最前沿。 ←左右滑动查 卷入政治，这有助于恢复品牌的中立性，特别是在对ESG标准尤为敏感的欧洲市场，或能缓解外部形象带来的销售压力。 从市场结构来看，这轮反弹也带有明显的技术性修复特征。此前的连续调整已经清洗了部分空头，马斯克的表态则为技术反弹注入了“基本面信仰”的支持。市场情绪的快速修复，说明投资者愿意给他一次“回归执行”的机会。 简而言之，这次上涨传递出的市场共识是： 1 运营效率预期提升：马斯克亲自下场，被视为推动FSD（完全自动驾驶）、Optimus机器人等关键项目落地的积极信号。 2 品牌修复正在进行中：减少政治争议，有助于缓和消费者和市场的负面情绪，尤其是在海外市场。 3 投资者信心回暖：马斯克聚焦业务的表态缓解了过去对其分心过多的担忧，也让“马斯克折扣”有了重新评估的可能。 当然，市场也在等待更多实质进展。马斯克能否将这些表态真正转化为更高的交付能力、更强的财报表现、更少的品牌波动，仍是决定特斯拉股价能否进一步走高的关键。 ←左右滑动查看更多产品介绍图→ 浏览器打开官网订阅VIP https://StockWe.com/vip 美股投资网 是一家专门研究美股的金融科技公司，2008年成立于美国硅谷，由前纽约证券交易所分析师Ken创立，联合多位摩根斯坦利分析师，谷歌 Meta工程师利用AI和大数据，配合十多年美股实战经验和业内量化模型，建立了一个股市数据库 https://StockWe.com/ 以追踪华尔街机构期权异动，暗池主力大单和每天突发新闻 ，挖掘潜力大牛股，发送美股实时行情、投资策略、交易技巧、公司研究报告、量化交易。 联系方式 客服Telegram meiguM 公众号 TradesMax 邮箱 buy@TradesMax.com 美股投资网 TradesMax.com 美股大数据 StockWe.com"}, {"title": "英伟达5月财报预测，深度分析报告 NVDA", "date": "2025-05-27", "ym": "2025-05", "time": "2025-05-27 18:08:01", "author": "StockWe.com", "desc": "英伟达财报深度前瞻", "url": "https://mp.weixin.qq.com/s/Db8m5WW1RQOpEw9vD0b0Og", "path": "sources/news/wechat_mp/articles/英伟达5月财报预测-深度分析报告-NVDA-6b25eb046f.md", "len": 6116, "ticks": ["NVDA"], "body": "本期文章将对英伟达第一季度财报进行预测和前瞻性分析。我们系统性梳理了英伟达当前的产品节奏、供需动向、全球客户结构演化，以及其在 AI 芯片、云平台与边缘网络中的关键绑定机制。 从每一份市场调研，到每一个数据节点，试图回答一系列市场正在密切关注的问题，进一步理解这家企业在长期周期中的演进逻辑。 财测层面，430亿美元的指引是否反映了真实预期，背后是否隐藏着一次“刻意为之”的预期管理游戏？ 产品切换期内，Hopper与Blackwell架构重叠放量，是释放产能红利，还是隐藏成本结构调整带来的压力？ CoreWeave、Nebius 这些新兴AI算力公司大批量扫货英伟达GPU，会不会成为订单结构的关键转折点？ 英伟达定下的 Rubin 路线图和 Fusion 标准，只是发布会上的技术故事还是它迈向AI平台主导地位的真正信号？ 我们希望通过对财报、产品节奏、上下游生态、供应链、地缘格局与资本预期六大维度的交叉分析，更清晰地理解英伟达如何在AI新时代中谋求其长期的结构性主导地位。 我们先亮明观点——看涨此次财报。 大家好，我们是美股投资网， 2008年成立于美国硅谷 ，由前纽约证券交易所资深分析师Ken创立，旗下 AI量化美股分析工具- 美股大数据 StockWe.com 每天处理千万级股.票数据：捕捉期权大单，实时主力资金流向、机构持仓变化、川普突发新闻，精准买卖信号第一时间发到您手机APP！ 英伟达Q1会不会超预期？ 根据美股大数据的期权异动大单追踪， 英伟达财报后股价涨跌幅可能高达7.4%。 这一数字低于过去八个季度英伟达股价在财报公布后次日11.3%的平均波动幅度。 我们同时也会分析，财报前英伟达暗池大单买卖总价值分布。 查看数据网址 StockWe.com 我们先从英伟达自己给出的业绩指引说起。在上一季度财报中，英伟达给出了Q1的营收指引——430亿美元，波动区间上下2%。 同时，按照美国通用会计准则（GAAP）计算的毛利率预计为70.6%，非GAAP口径为71%。 运营支出预计为52亿美元（GAAP）和36亿美元（非GAAP），其他收入预计为4亿美元。 这组指引在结构上呈现出 较为稳健 的增长节奏， 是那种典型的大型科技公司在高位时，习惯性的“风险可控”式表态。 但真正值得推敲的地方在于，这份预期并没有把英伟达现阶段的增长潜力“讲满”。 我们可以先看最关键的一项——营收增长的绝对值和环比速度。上季度营收是393亿美元，这一季指引430亿美元，环比增长只有37亿，增幅大概是9.4%。 这个数字放在别的公司可能还不错， 但对英伟达这种动辄季度增长15%、20%的表现来说，就显得偏保守了。 再来看毛利率。非GAAP口径从上季度的73%小幅回落到71%，GAAP口径也是类似的趋势。这说明公司没有在利润率上做出更强的引导，也没向市场传递出“效率还能继续拉升”的信号。 另外，支出这块也值得注意。虽然英伟达的收入同比还在增长60%以上，但运营支出基本没什么变动，这在某种程度上反映了管理层对当前阶段的投入是有所保留的，并没有明显扩大开支。 但问题就出在这个“刚刚好”上。英伟达过去七个季度，公司每一次都超出市场预期，其中不乏大幅“击穿预期”的季度。所以你说，一家惯于交出亮眼成绩单的公司，突然给出一个温和得近乎保守的增长指引，不免让人多想。 我们美股投资网分析认为，这更像是一种有意为之的预期管理（expectation management）。通过设定较低的起点，为后续的“超预期”创造空间。 这种手法在美股市场并不陌生，尤其在科技板块更是常见套路：保守指引、轻松 beat、情绪放大、估值上修。最终实现的是情绪和股价的双重助推，让公司和机构都能从中受益。 事实上，类似的误判过去已经发生过。比如在去年6月至9月，英伟达股价曾出现超过20%的回调，当时市场担心的是——同比增速开始放缓。 但这其实落入了一个常见的“百分比陷阱”：只看到了增长率的变化，却忽略了公司营收体量本身的巨大跃升。 英伟达的收入已经从270亿美元增长到610亿美元，如今全年指引更是接近1300亿美元。对这样一个已经站在高位的公司来说，继续稳定增长，比从小基数翻倍要更难、更有含金量。 因此，我们并不认为这是英伟达在主动设限。更合理的解读是：公司与市场之间，在默契地完成一场“搭台”式博弈——为情绪准备缓冲区，为估值预留上行空间。对英伟达而言，这是在当前阶段最稳健、也最可控的表达方式。 换句话说，英伟达这次的财测，可能并非在直接回应“业绩能否增长”的问题，而更像是在控制市场“如何感知”它的增长节奏。而要看清这种节奏，就不能只盯着财测数字本身，更要回到它的产品进展、产能节奏和客户需求的实际情况。 英伟达产品周期切换期的真实节奏 英伟达当前正处于一个非常特殊的产品周期：两个旗舰架构——Hopper 和 Blackwell 正在实现前后接力。在上一季度财报电话会上，管理层已经确认：Hopper 的出货仍在环比增长。这说明它的需求依然真实存在，并不是在清库存。同时，Blackwell 系列的交付正在加速，首席财务官Colette Kress曾指出，单批次部署量动辄就达到10万片GPU，这是实打实的规模上量，而不是测试订单。 对比来看，2024年全年 Hopper 架构的出货量约为130万片；而仅亚马逊、微软、谷歌和甲骨文四大科技公司，就已为 Blackwell 芯片在 2025 年预订了超过360万片，显示出下一代架构的订单需求已显著超越当前产能。 其中，甲骨文最新宣布将采购40万块英伟达GB200芯片，用于建设一座战略级 AI 数据中心，总投资规模高达400亿美元，成为目前已披露的最大单笔采购计划之一。 这说明Blackwell 的实际需求远远高于英伟达当前产能。也就是说，现在英伟达财报中反映的不是“市场愿意买多少”，而是“我现在能生产多少”。一旦产能爬坡结束，营收释放将会是跳跃式的，而不是线性增长。 还有一点容易被忽视的是，Blackwell 并不是简单的架构升级。它从 NVLink 8 进化到 NVLink 72，带来的不只是通信带宽，而是整机架构、供电系统、散热机制和平台协同的全方位革新。初期确实存在良率爬坡、系统磨合等挑战，但随着产能稳定，这种结构性成本会被快速摊薄，未来毛利率将有明显提升空间。 目前，英伟达预计 GAAP 毛利率将出现小幅下调，这一调整在当前阶段是可以理解的。 一方面，Hopper 与 Blackwell 架构处于并行交付阶段，导致短期制造成本出现重叠； 另一方面，公司也需为潜在政策不确定性（如出口审查与对华关税）预留一定利润缓冲。值得注意的是，随着特朗普宣布将相关关税措施延后90天执行，这部分毛利率压力在本季度之后有望逐步缓解。 再者，英伟达的高端产品线也在持续向上爬坡。其下一代旗舰系统 DGX GB300 预计将在今年9月开始交付， 据业内消息，一座机柜（Rack）定价高达400万美元，较上一代产品提升约30%。 这不仅将带动 ASP（平均售价）显著抬升，也为后续毛利率回升提供实质性支撑。 换句话说，当前的利润下调，更像是阶段性的节奏调整，而非结构性恶化。 英伟达客户结构演变 除了产品节奏，更值得关注的，是英伟达客户结构的变化。这一变化，正在重新定义它的增长路径与市场定位。 第一层，是传统的超级云客户。它们仍是英伟达收入的压舱石，也是在宏观不确定性下，最具稳定性的需求来源。 2025财年，Meta 将AI相关资本支出上调至640亿至720亿美元，微软预计将投入800亿美元，同比提升52%，谷歌也预计达到750亿美元，主要流向AI数据中心建设。这些持续的高投入，是支撑分析师对英伟达短期财测保持乐观的核心逻辑。 第二层，是快速崛起的 Neocloud 客户。 这些平台不自研模型，而是专注于构建基于英伟达GPU的标准化算力网络，将AI能力以“服务”形式提供给中小模型公司、AI创业团队和垂直场景用户。 以CoreWeave为例，2025年Q1营收达9.8亿美元，同比增长超420%；在手未交订单高达259亿美元，其中70%的营收来自英伟达芯片租赁。Nebius、Lambda、Crusoe等也在同步扩容。这类客户正在弥补过去出货高度集中于几家巨头的结构性风险，同时显著提升了算力供给的分发效率。 第三层客户，是国家级合作方——不是企业采购，而是以国家主导的基础设施级别采购行为。这些订单的特殊之处在于，它们不仅具备超大规模、超长周期，更代表着英伟达正在深度参与到全球算力主权体系的建设中。 比如沙特Z府支持的Humain项目，规划在五年内建设一座500兆瓦级AI数据中心，目标部署50万至100万颗GPU，整体投资超过1000亿美元。这将是当前全球最大规模的AI基础设施计划之一。而这批芯片的技术核心，正是来自英伟达。 与此同时，美国已与阿联酋达成初步协议：自2024年起至2027年，每年向其出口50万颗英伟达先进AI芯片，三年总量超过100万颗。其中五分之一将交由阿布扎比的AI龙头企业 G42 使用，其余部分用于支持OpenAI及其他美企在当地建立的数据中心。 这类合作的本质，已不再是“客户下单”，而是英伟达作为平台级能力，参与到国家主权层面的AI能力建设中。它提供的不是某种产品，而是一整套技术秩序、算力标准与生态体系。 从稳定订单，到灵活分发，再到国家绑定——英伟达的客户结构已具备三重维度的支撑： 超级云厂商，提供稳定现金流和业绩节奏； Neocloud 平台，带来边缘市场的放量增速； 国家级项目，形成跨周期、跨区域的战略锁定。 这三类客户，构成了英伟达今天最值得被重估的基本盘：它已经不只是芯片设计公司，而是全球AI基础设施规则的制定者与分发者。 英伟达未来会否有新的叙事逻辑？ 接下来我们要讨论一个更核心的问题：英伟达的“下一个增长故事”是什么？换句话说，当这轮AI芯片周期逐步成熟，市场的关注点将不再是某一代产品性能领先多少，而是：英伟达还能不能继续引领行业的节奏？还能不能持续绑定资源、定义秩序？ 英伟达显然已经在给出它的答案。它的价值，从来不仅仅是单颗芯片性能的堆叠，而在于产品路线图的可见性与产业节奏的控制力。 2025年即将量产的 Rubin 架构，和已定档2027年的 Rubin Ultra，正是它长期规划中的关键节点。从 Blackwell 到 Rubin 的无缝衔接，不只是技术演进，更是利润节奏的前置编排。竞争对手可能还在追赶当前架构，而英伟达已经在推进下一代的试产。这种“节奏领先”——不是偶发的技术压制，而是系统性战略执行力的体现。 而在技术架构之上，英伟达正推动更底层的统一标准——NVLink Fusion 正是这个战略的代表性动作。未来AI系统的核心不再是“算力多少”，而是“如何协同”。Fusion的目标，是在多芯片、异构算力和系统级调度之间，建立一个可控、统一的连接与通信协议。这种底层协议的建立，本质是对整个AI系统生态的“绑定”。过去是CUDA锁住开发者，这一次，英伟达要锁定的是整套系统的运行方式。 更关键的是，这类平台能力的构建，已经超越企业间的商业合作关系。它开始成为一种“行业通用模板”，渗透到模型开发、系统集成、AI基础设施建设等更广阔的空间。这并非一场产品竞争，而是产业秩序的输出。这就是英伟达正在释放的“平台溢价”——它的核心不在于当前利润有多亮眼，而在于它能以一套稳定的路线图 + 一套可复用的系统架构，牵引整个行业的资源配置、工具选择与边界构建。 所以，今天如果要重新评估英伟达的估值逻辑，不能再用“芯片 × 单价”这种线性模型来看待。 我们真正需要建模的，是三件事： 平台的绑定力； 架构的可复制性； 全球算力网络的集成深度。 这三者决定了它未来五年增长的确定性——不靠单季情绪，而是可以写进长期预期表格的、结构性的主导力。 最后我们来谈股价，现在英伟达在130块附近，离前高153美元不远，技术面上空间相对比较小。尤其是在财报公布前，市场情绪可能已经拉得很满了，再往上冲的话，风险会放大。所以这个位置，不太适合去重仓追涨。 我们的观点一直很清楚：如果你是长期看好英伟达生态护城河的投资人，那就耐心点，等市场情绪消化，回调了再上，性价比会更好。 现在这个位置，更适合少量观察仓，不建议重压。真正的好机会，往往出现在市场反应过头的时候。 我们美股投资网已经在100美元重新建仓英伟达。 好了。你看好英伟达财报吗？你会在这个价格建仓吗？你的成本价多少？欢迎评论区留言一起讨论。 ←左右滑动查看更多产品介绍图→ 精彩深度文章回顾 自动驾驶将在今年大爆发！ 这四家美股公司必须关注！ TSLA LYFT 美股 PLTR和AMD财报预测 深度分析 美股META财报预测，捞底两家公司！ 支撑美股大跌后反弹的底层逻辑！ 捞底前必看！ 每次经济衰退前，这8个信号都提前预警了美股大跌！ 特朗普搞崩英伟达，盘后暴跌6%！是否迎来捞底机会？ 美股4月2日将变盘！交易策略公开，长期看涨的动力因素有哪些？ 特斯拉反弹是否能持续？ 从暴跌背后看做空机构资本运作规律！ 【深度报告】英伟达2025年2月财报预测！业内人士爆料 美股 下一个PLTR HIMS APP如何找？ 他们都有什么共同点？ 美股 特斯拉1月财报预测，风险预警！ 2025年最有潜力10只美股【下集】 不为人知的AI公司！【深度调研】 2025年最有潜力10只美股【中集】 不为人知的AI公司！【深度调研】 2025年最有潜力10只美股【上集】 不为人知的AI公司！【深度调研】 下一个英伟达是AVGO？ 博通凭ASIC能打破英伟达AI芯片垄断地位！ 美股2025年五大主题和估值风险！ 美股 英伟达11月财报预测，太多利空消息了！5000字报告 美股 和8年前相比，特朗普政策将有何不同？ 美股核能股爆涨，哪家最值得投资？OKLO LEU NNE 深度分析特斯拉Robotaxi发布会，是否会翻车？ 我们不看好！ 美股英伟达5月财报预测，深度报告，坚定看涨 美股这只股，快被我做烂了！ 除了英伟达，这4家AI相关的软硬件公司 需要关注 美股投资网 是一家专门研究美股的金融科技公司，成立于美国硅谷，由前纽约证券交易所分析师Ken创立，联合多位摩根斯坦利分析师，谷歌 Meta工程师利用AI和大数据，配合十多年美股实战经验和业内量化模型，建立了一个股市数据库 https://StockWe.com/ 以追踪华尔街机构期权异动，暗池主力大单和每天突发新闻 ，挖掘潜力大牛股，发送美股实时行情、投资策略、交易技巧、公司研究报告、量化交易。 联系方式 客服Telegram meiguM 公众号 TradesMax 邮箱 buy@TradesMax.com 美股投资网 TradesMax.com 美股大数据 StockWe.com"}, {"title": "突发！哈佛大学！", "date": "2025-05-22", "ym": "2025-05", "time": "2025-05-22 15:38:45", "author": "StockWe.com", "desc": "特朗普禁止哈佛大学招收国际学生！", "url": "https://mp.weixin.qq.com/s/W6CB49-lNZ6yGjXZuY-15A", "path": "sources/news/wechat_mp/articles/突发-哈佛大学-2aba78547f.md", "len": 861, "ticks": [], "body": "特朗普政府周四停止了哈佛大学招收国际学生的能力，将矛头指向了这所美国历史最悠久、最富有的大学的一个重要资金来源，这是政府向这所精英学校施压，迫使其与总统议程保持一致的努力的一次重大升级。此举可能会影响到哈佛大学近 6800 名（2024-25 年）国际学生。外国学生约占该校学生总数的 27%。 哈佛大学今年下半年开学的学年学费为 59320 美元，如果加上食宿费用，学费将上涨到近 87000 美元。与其他学生相比，国际学生往往要支付更多的教育费用。这直接导致哈佛损失6亿美元的收入。 据三位了解谈判情况的人士称，特朗普在最近几天就国土安全部调查中提出的大量记录要求的合法性问题来回交涉后，将这一决定通知了哈佛大学。这三位知情人士不愿透露姓名，因为他们无权公开讨论此事。 另一位熟悉哈佛大学想法的人士表示，哈佛大学的最新举措很可能会引发哈佛大学的第二次法律挑战。上个月，哈佛大学就美国政府试图强行改变其课程设置、招生政策和招聘惯例一事起诉了美国政府。 “国土安全部部长克里斯蒂-诺姆（Kristi Noem）在给哈佛大学的一封信中写道：”我特此通知 合规性的重视。 马斯克证实，特斯拉正在与多家主流汽车制造商就授权FSD（完全自动驾驶）技术进行洽谈，如果合作落地，将为公司打开额外的技术授权收入通道。 更具想象空间的是，特斯拉计划推出一个类似Uber与Airbnb的共享出行平台，允许车主将其自动驾驶车辆对外出租。这将进一步拓展特斯拉的商业边界，从一家电动车制造商，走向更广义的出行平台参与者。 当前，特斯拉正在全球范围内测试数千辆自动驾驶汽车，而马斯克预测：“五年内，无人驾驶出租车将随处可见。”在资本市场对自动驾驶和AI技术持续升温的大背景下，TSLA作为该领域少数具备软硬件一体化能力的企业，其中长期投资逻辑正重新被市场审视。 美股投资网认为，随着自动驾驶商业化时间表明确，FSD技术向外授权，以及车主端共享经济模式的逐步推进，TSLA的核心估值逻辑有望从“电动车销量驱动”，逐步转向“技术平台与服务收入”的复合结构。这种结构性转变或将在未来重新塑造市场对特斯拉的定价体系。 美股投资网的选股逻辑 今天美国量子计算公司QBTS狂飙超33%。 消息面上该公司宣布其最先进、性能最强的“Advantage2”量子计算系统正式上市。 Advantage2是D-Wave推出的一款强大且高效的退火型量子计算机，专为解决传统计算机难以应对的复杂计算问题而设计。该系统搭载了D-Wave迄今为止最先进的量子处理器，具有商业级品质，旨在应用于优化、材料模拟、人工智能等多种现实应用场景。 根据D-Wave的官方说明，Advantage2量子处理器相较于上一代产品在性能上有了显著提升。 该处理器采用全新的Zephy拓扑结构，具备高达20路量子比特之间的连接能力，使得更复杂的问题模型得以嵌入和处理。系统的能量尺度提升了40%，并且噪声减少了75%，为复杂计算提供了更高质量的解决方案。此外，Advantage2还具备了快速退火机制，有效支持大规模相干退火计算，显著降低热波动等外部干扰对计算结果的影响。 为了更好地满足企业用户的需求，D-Wave还提供了实时量子云服务Leap，客户可以通过该平台访问Advantage2量子计算系统。Leap已覆盖全球40多个国家，能够为企业提供性能与安全的保障，进一步推动量子计算在实际应用中的普及。 QBTS首席执行官艾伦·巴拉茨（Alan Baratz）表示：“今天不仅是D-Wave的重要里程碑，也是整个量子计算行业的关键节点，我们将第六代量子计算机推向市场，标志着量子计算技术进入了全新的发展阶段。” 对于QBTS，我们美股投资网的VIP会员早在3个月前，5.8美元就已提前布局，截至目前涨幅已达200%！ 截图曝光： 而在一个月前的4月28日，我们再次精准出手，在股价低位6.8美元时提示VIP社群入手QBTS，如今该笔操作也已实现超158%的可观收益！ 连续两次精准把握，背后依靠的正是我们的AI量化模型与深度数据洞察力！ 我们上周公开表示 炒底UNH。周二价格涨到320.14美元 文章回顾： 这家AI新贵狂飙， 英伟达悄然赚翻 CRWV UNH！ 目前我们VIP社群浮盈 23%！ 仓位截图曝光： 此外英伟达“亲儿子”，被称为“算力军火商”的云计算服务商CRWV继续狂飙超10%。 我们美股大数据StockWe.com AI量化选股 5月16日就选出了 CRWV，70美元进场 早在3月底CoreWeave上市之前，我们就以一篇5000字的长文做出前瞻性深度解析，全面覆盖其业务模式、产业链关系、财务结构及华尔街资金的密集布局。如今再看，逻辑正在一一兑现。 CoreWeave上市首日定价仅36美元，而如今股价已飙升至95.48美元，涨幅高达165%，我们美股投资网的精准分析！ 每天或每周都有几只热门股，为什么我们美股投资网能精准捕捉到它们？他们背后有什么隐形的规律？答案是有的， 这些规律隐藏在市场的微观结构数据中。 这些规律并非表面上能直接看到，而是通过海量的高频交易数据、订单簿深度、买卖挂单变化、机构资金流向等复杂信息交织而成。它们构成了市场的“底层逻辑”，但由于这些信息庞杂且变化迅速，传统分析方法难以跟上。 我们只能通过AI量化去数学建模，将这些多维度的数据转化为可预测的信号，从中挖掘出潜在的“隐形信号”，这些信号可能预示着股价波动。 这不仅仅是对股价走势的判断，更是对市场深层次行为模式的深入分析，以及未来趋势的精准洞察。 科技巨头信任瓦解？ 在最近的美股交易中，美股投资网发现逢低买入的情绪依然占据主导地位。然而， 期权市场却释放出一个关键信号：未来几个月，投资者对于科技巨头的走势依旧存在显著分歧。 过去两年引领美股上涨的超级科技股，眼下正面临着看涨与看跌期权的持仓量几乎旗鼓相当的局面，这种局面与期权交易员对大盘的普遍乐观态度形成鲜明对比。尤其在关税紧张局势缓解之后，尽管大盘普遍看涨，但对于科技股的预期却分歧明显，反映出投资者对未来的忧虑和希望并存。 在期权市场，投资者对科技股未来表现的看法出现了明显分化。例如，追踪纳斯达克100指数的Invesco QQQ Trust ETF的期权数据显示，三个月期权中的看涨需求已升至过去一年67%的分位，创下今年1月以来的最高水平。 但与此同时，看跌期权成本也飙升至87%的分位，显示出投资者对科技股的潜在下行风险保持警惕。几周前，这一差距明显偏向看空，但目前已回归到过去一年的中值水平，这表明市场情绪正处于更加复杂的状态。 美股投资网分析认为，交易员正布局这些头寸，因为他们预期市场将面临大幅波动。这一信号揭示出，虽然市场普遍期待反弹，但同时也担心市场可能出现的剧烈波动。 科技股的前景充满不确定性。虽然这些公司通常拥有强大的财务基础，能够有效抵御外部冲击，特别是供应链风险，但其高估值仍然令投资者担忧。尤其是在AI等前沿技术投资的回报问题上，部分投资者保持谨慎态度。部分机构投资者对科技股的短期前景仍持乐观态度，然而对于长远的增长潜力，投资者的信心则显得更加谨慎。 例如，苹果、谷歌、亚马逊和特斯拉等科技巨头的股价在年内仍未摆脱下行趋势，尽管它们在本财报季展示了强劲的盈利韧性。尤其是在特朗普Z府的贸易政策不确定性下，这些公司展现出较强的应对能力。作为“七巨头”中最后公布财报的公司，英伟达的业绩将于5月28日揭晓，这一时刻无疑是市场的关注焦点。 短期来看，部分机构投资者对特定科技股保持乐观情绪。野村控股全球股.票衍生品董事总经理Alex Kosgolyadov指出，交易员们已经大举买入亚马逊和微软等科技巨头的看涨期权，这些期权的到期时间集中在6至8月。这些看涨期权的购买反映了市场对科技股短期反弹的预期。 然而，从长远来看，期权市场依旧显得相对谨慎。芝加哥期权交易所的衍生品市场情报主管Mandy Xu在报告中指出， 针对标普500指数六个月期期权的看涨押注仍显得“相当冷淡”。 这意味着，尽管市场在短期内对反弹持乐观态度，但对未来几个月的持续上涨持更加保守的观点。 总体来看，期权市场的分歧反映出投资者对科技股未来走势的复杂判断。虽然短期内市场情绪偏向乐观，尤其是一些机构对特定科技股的反弹寄予厚望，但从长远角度看，市场对科技股的估值和盈利增长放缓的担忧依旧存在。 我们投资者需关注即将公布财报的公司表现，特别是英伟达的财报，以及宏观经济环境和行业发展趋势，来判断科技股是否能够突破当前的困境，恢复持续增长。 ←左右滑动查看更多产品介绍图→ 浏览器打开官网订阅VIP https://StockWe.com/vip 美股投资网 是一家专门研究美股的金融科技公司，成立于美国硅谷，由前纽约证券交易所分析师Ken创立，联合多位摩根斯坦利分析师，谷歌 Meta工程师利用AI和大数据，配合十多年美股实战经验和业内量化模型，建立了一个股市数据库 https://StockWe.com/ 以追踪华尔街机构期权异动，暗池主力大单和每天突发新闻 ，挖掘潜力大牛股，发送美股实时行情、投资策略、交易技巧、公司研究报告、量化交易。 联系方式 客服Telegram meiguM 公众号 TradesMax 邮箱 buy@TradesMax.com 美股投资网 TradesMax.com 美股大数据 StockWe.com"}, {"title": "美国散户创纪录“逢低买入”，扭转穆迪下调美国信用而引发标普500下跌局势", "date": "2025-05-19", "ym": "2025-05", "time": "2025-05-19 18:29:07", "author": "StockWe.com", "desc": "散户这次战胜了华尔街！", "url": "https://mp.weixin.qq.com/s/sHM3M4FpRjWTe1WLW_p9fA", "path": "sources/news/wechat_mp/articles/美国散户创纪录-逢低买入-扭转穆迪下调美国信用而引发标普500下跌局势-77bab2b89f.md", "len": 1205, "ticks": [], "body": "美股散户的钱真的多，可以不断抄底。周一散户们再度登场：美国评级下调后，周一火线抄底，买入力度创纪录！美股周一小幅收高，标普500指数录得连续第六个交易日上涨。市场基本摆脱了穆迪下调美国信用评级的影响。美联储博斯蒂克强调通胀担忧，预计今年将降息一次。白宫经济委员会主任哈塞特暗示本周将有更多贸易协议。 根据摩根大通量化与衍生品策略师Emma Wu整理的数据，截至纽约时间中午12:30，个人投资者净买入美股总额达到创纪录的41亿美元，这也是首次在中午前突破40亿美元大关。而周一全天散户交易量占到整体市 学 。这一哲学理念贯穿于 Notion 的整个设计和开发过程中，使得 Notion 成为了一款深受用户喜爱的数字工具，在众多同类产品中脱颖而出 。 创业第一课：失败的 Notion 1.0 2013年，他和合伙人 Simon Last 在旧金山创办了 Notion。他们想做的，不是又一款笔记软件，而是一种“像乐高一样”的数字搭建工具。用 block（模块）构建内容，用数据库连接信息流，用简洁的界面让用户自定义他们的工作方式。 最初的 Notion 是失败的。他们在没有明确目标用户的情况下构建了一个庞杂而不稳定的工具。到 2015 年，融资失败，账户见底，公司濒临解散。 在解雇最后一名同事之后，他们搬去了日本京都。一边节省生活成本，一边重写代码。那段时间里，他们的生活只剩下了编写代码和吃饭睡觉。他们遵循 “侘寂美学” 的极简原则，砍掉 90% 的功能，只保留最核心的 “块（Block）” 概念 —— 每个 Block 可以是文字、表格、看板或数据库，用户像搭积木一样自由组合。 赵伊凡在笔记本上写下：“ Notion 不应是瑞士军刀，而应是瑞士军刀的刀柄 —— 用户自己决定安装什么刀片。 ”在那里他们也重构理念——Notion 不该“什么都做”，而该是一个能“帮每个人打造自己工具”的平台。 重新崛起逆袭之路 2018 年重新出发的 Notion 2.0，以 “零市场预算” 开启了病毒式传播。以极简设计和强大功能俘获了第一批科技爱好者和创作者。第一位关键用户是独立开发者 Paul Jarvis，他在博客发文《Notion：重新定义我的工作流》，描述自己用 Notion 搭建个人知识库、客户管理系统甚至食谱数据库的体验。Hacker News 上，一条“Notion 是否能替代 Evernote+Trello+Airtable” 的讨论帖获得 2300 + 点赞，程序员们惊叹于它 “用最简单的交互实现无限可能”。 而真正让 Notion 破圈的，是内容创作者群体。作家 Austin Kleon 用 Notion 管理写作素材，将其比作 “数字抽屉柜”；YouTube 博主 Marques Brownlee 在视频中展示用 Notion 规划拍摄脚本，界面上的手绘插图（与亚美尼亚插画师 Roman Muradov 合作）让科技工具多了一份人文温度。到 2020 年，Notion 用户突破 200 万，其中 35% 来自中小企业，他们用 Notion 搭建内部知识库，替代了原本需要 3-5 款软件的复杂系统。 它吸引了大量“新知识工作者”——自由职业者、远程团队、内容创作者。他们用 Notion 写作、建站、做项目管理、甚至整理人生计划。Notion 成了 “数字生活的万能胶水” 。 此时，赵伊凡的身份已悄然转变：他不仅是一个产品经理，还是全球新一代知识工具哲学的布道者。 东方美学、西方工程 Notion 的收入曲线堪称硅谷奇迹：2019 年 300 万美元，2021 年 3100 万美元，2023 年 2.4 亿美元，2024 年突破 3 亿美元并拥有400 万的用户。更惊人的是用户粘性：70% 的企业用户表示替代了至少 2 款工具，90% 的福布斯云 100 公司在使用。 赵伊凡拒绝将 Notion 定义为 “效率工具”，他在 2023 年罕见接受《连线》采访时说：“当人们用 Notion 规划旅行、记录育儿日记、甚至设计人生目标时，它已经成为思维的外延。就像古人用竹简整理思想，现代人需要的是能随思维生长的数字载体。” 产品界面中，手绘风格的加载动画、可自定义的 “心情模板”、支持 Markdown 与富文本混合的编辑模式，处处体现着 “反科技霸权” 的设计 ——工具不应规定用户如何工作，而应适应每个人独特的思维轨迹。 一位不争而胜的创始人 在硅谷热衷于打造个人 IP 的浪潮中，赵伊凡始终保持低调。他从不参加 TechCrunch Disrupt 演讲，社交媒体账号停更于 2019 年。 唯一一次公开露面是 2022 年在京都举办的 Notion 用户聚会上，他穿着无印良品的亚麻衬衫，用中文夹杂着日语说：“我小时候在新疆看星空，觉得每颗星星都是一个独立的世界。现在我希望 Notion 是一片星空，让每个人都能找到自己的星座。” 这种东方哲学式的谦逊，渗透在 Notion 的企业文化中。公司拒绝激进的增长策略，400 万付费用户中，70% 来自自然流量；总部没有豪华办公室，而是在旧金山租下一栋老仓库，员工工位旁摆放着赵伊凡从新疆带来的手工地毯和水墨屏风。当被问及是否担心竞品模仿时，他引用《道德经》：“夫唯不争，故天下莫能与之争。”—— 真正的壁垒，是对 “工具即人性延伸” 的深刻理解。 当被问及如何看待成功时，赵伊凡说， 他不认为 No ks": ["TSLA", "LYFT"], "body": "今年，自动驾驶市场将迎来一次划时代的爆发！ 特斯拉下月将在奥斯汀启动Robotaxi，UBER和LYFT今年将在德州和亚特兰大推出自动驾驶出租车，谷歌旗下Waymo和Magna International计划到2026年底将亚利桑那州工厂的自动驾驶出租车生产扩大两倍。 这一连串重大举措标志着:今年就是自动驾驶商业化爆发的起点。 而把时间线拉长，我们就知道这是一个万亿美元级的超级市场， 未来十年，自动驾驶市场将从1.7万亿美元飞跃至3.9万亿美元 ，而完全自动驾驶市场将从2024年的600亿美元增长至2033年的2000亿美元！麦肯锡更是预测，到 2035 年自动驾驶可能创造4000亿美元的收入。 今天， 我们美股投资网将给大家深度分析，四家在自动驾驶领域的“佼佼者” ，它们各自的技术优势和护城河？这些美股公司未来的增长潜力又有多大？我相信无论你是正在寻找下一个投资机会，还是想了解未来出行的颠覆性变化，这些公司都将是你必须关注的对象。 大家好，这里是美股投资网， 2008 年成立于美国硅谷 ，由前纽约证券交易所资深分析师 Ken 创立，专注 AI ，挖掘美股投资机会，旗下 AI 量化美股分析工具 - 美股大数据 StockWe.com 每天追踪机构主力资金买卖情况，多空情绪。 关键点 开始前，有个很关键的概念大家必须先搞懂，就是将自动驾驶汽车推向市场主要有两种方式。 一、渐进式部署（辅助驾驶演进路线）也称为从 L2/L3 向 L4 演进的路线。 这种方式是目前大多数传统车企如特斯拉、奔驰、宝马、丰田等采用的方式，通过不断积累用户驾驶数据、训练算法，逐步迈向完全自动驾驶（L4/L5）。 先推出具备部分自动化功能的车辆（如自适应巡航、车道保持、自动变道等）。 逐步在更多场景下提高系统的自动化程度。 通过不断积累用户驾驶数据、训练算法，逐步迈向完全自动驾驶（L4/L5）。 优点：商业化路径明确，可边卖车边迭代。 缺点：需要解决过渡阶段“人机共驾”的责任与安全问题。 2. 直接部署完全自动驾驶系统（即 L4 Robotaxi 路线）。 也称为跳跃式发展路线，由一些技术公司（如 谷歌Waymo、Cruise、百度 Apollo、AutoX）主导。 直接研发面向城市、园区等特定区域（即 geofenced 区域）运行的 L4 自动驾驶车辆。 多用于 Robotaxi（自动驾驶出租车）、无人物流车等形式。 优点：无需依赖驾驶员，真正实现自动驾驶愿景。 缺点：技术门槛高，部署成本高，受限于地理范围，扩展性慢。 美股投资网相信，特斯拉作为头部公司，技术是最好的，数据积累也是最多的，所以今天给大家深入分析另外几家的公司。 自动驾驶核心供应商MBLY 我们要分享的第一家公司是Mobileye ，美股代号 MBLY ，就是专门给第二种方式，提供关键的技术“零部件”供应商。 它主要提供自动驾驶所需要的核心-比如芯片、软件，还有一些传感器，是整个自动驾驶产业链里非常重要的一环。 在高级驾驶辅助系统（ADAS）这个市场里，MBLY的份额高达50% 。 它的核心产品EyeQ芯片已经被装进了全球大约三分之一的新车里。 宝马、大众、福特、吉利、日产这些国际大厂都与它有深度合作。为什么？因为EyeQ不仅能处理复杂的视觉任务，还能在性能、能效和成本之间找到一个聪明的平衡，既能跑得快，又不耗电，还能控制价格，适合大规模量产。 你可以把它理解成自动驾驶版的英伟达，但不同于GPU在消费电子里的泛用，MBLY 是为车而生的，且已经被实打实装进了几千万辆车里。 而这背后，还有一层更深的逻辑。随着自动驾驶技术的普及，硬件差异将逐渐缩小，汽车间的差别会越来越小，未来的自动驾驶车可能都差不多，雷达多不多、算力高不高的差异将变得不再那么显著。 真正的价值将集中在谁能提供最稳定的核心算法、最强的芯片平台、最容易大规模部署的自动驾驶解决方案。 也就是说，卡脖子的不是车本身，而是算法、芯片和系统 MBLY正是这样一家具有代表性的企业。它的芯片和软件平台具备极强的通用性和可扩展性，能够跨多个OEM（原始设备制造商）进行部署，适配不同品牌、不同类型的车辆。可以说，MBLY的技术就像一把通用钥匙，为各大汽车品牌打开了迈向自动驾驶的大门。 当然，再强的技术如果不能实际落地应用，也是没有意义的。为此， MBLY选择与能够接触大量用户的出行平台合作，比如UBER和LYFT。 我们美股投资网认为，UBER作为全球最大的出行平台之一，拥有庞大的国际用户基础，能够帮助MBLY迅速实现自动驾驶技术的普及和商业化。 相比之下，LYFT虽然在美国市场占有一定份额，但其国际影响力和市场规模与UBER相比仍有较大差距。LYFT的合作主要面向美国市场，并计划在2026年于达拉斯启动测试。 尽管它的影响力不如UBER，但对MBLY而言，同样为其提供了一个宝贵的技术验证平台，帮助其优化自动驾驶技术。 （Uber与Lyft用户数对比） 2025年4月24日，大众汽车与UBER宣布建立战略合作伙伴关系，计划在未来十年内在美国部署数千辆自动驾驶ID.Buzz车队。值得注意的是， 大众并不直接研发自动驾驶技术，而是依赖MBLY提供的EyeQ芯片和Drive系统。 以Drive系统为例，它集成了七个摄像头、三个激光雷达，是MBLY目前最先进的全栈自动驾驶方案，每一套硬件的价值高达数千美元。对MBLY而言，这不仅是一次技术展示，更是全球商业化的关键突破口。 预计到2026年，这些车将首先在洛杉矶上线运营，一旦成功，MBLY的技术就能迅速向全球复制，带来源源不断的营收增长。ID.Buzz将在普通车型的生产线上进行制造，意味着生产规模可以根据市场需求快速扩张或收缩。这对于MBLY来说，是一种轻资本的商业模式，他们依赖合作伙伴投资生产、管理车辆，而不需要自己承担整个车队的建设与运营，极大地节省了资本投入。 大众还将MBLY的技术部署到MQB模块化平台上，这个平台被广泛应用于高尔夫、帕萨特、Tiguan等畅销车型。 考虑到大众年销量约为900万辆，其中MQB平台占据了200万辆左右，按每车150到200美元的Surround ADAS单价计算， 这一合作每年可能为MBLY带来1到3亿美元的额外收入。 接下来，值得关注的是MBLY的SuperVision和Chauffeur等高端产品。MBLY计划在2027年或2028年开始实现这些产品的规模化，与奥迪和保时捷的合作将为其提供重要的市场验证。尽管SuperVision初期仅会应用于高端车型，但其1200到1500美元的单车价格远超传统ADAS产品。 结合这一定价， MBLY预计这一产品将在未来几年为其带来1亿到2亿美元的年收入。 SuperVision和Chauffeur不仅展示了MBLY在高端市场的技术优势，还预示着其能够在不同市场细分中通过精确的产品定价和布局，进一步优化其利润结构。 总结来看，我们美股投资网认为MBLY的战略布局非常清晰：先通过EyeQ打好基础，铺设市场覆盖；再通过SuperVision和Chauffeur冲击高端市场，实现更高的利润；最后通过与UBER等出行平台的合作，将其自动驾驶技术从实验室走向商业化，并推动全面落地。 出行巨头UBER与LYFT 在自动驾驶不断走向商业化的过程中，越来越多的技术公司选择与像 UBER 或 LYFT 这样的出行平台合作。 这种合作背后不是简单的资源互补，而是自动驾驶产业从“技术突破”走向“真实落地”的必经之路。 无论是 MBLY 还是后面我们说到的另外一家公司，它们都不直接触达消费者，必须借助一个规模化、有真实需求的运营平台。 而 UBER 拥有全球领先的叫车网络、调度系统和用户覆盖，是将自动驾驶车队推向市场的理想落地点。LYFT 也在这一方向上持续加码，与 MBLY 合作布局达拉斯市场的自动驾驶服务，试图在不大幅增加研发成本的前提下分享行业红利。 这些合作，不只是为了抢先跑通技术，而是抢占用户入口。因为最终决定一家自动驾驶公司是否成功的，不是它能不能跑，而是有没有人愿意坐。而这，正是 UBER 和LYFT 手里真正的筹码。 从市场格局上看，UBER 依然是毫无悬念的第一。 截至2025年，它在美国网约车市场的份额依旧稳定在75%左右，而LYFT稳守25%。UBER 胜出的关键，一方面在于它更大的体量和国际化布局，但更深层的，是 它已经逐步完成了从“烧钱换增长”到“盈利驱动”的转型。 看估值的时候，很多人只盯着企业价值与销售比 EV/Sales 或市销率（P/S），但如果脱离盈利能力看估值，本身就是片面的。 目前 UBER 的远期 EV/Sales 是 3.3 倍，略高于同行平均的 2.8 倍。如果单看这组数字，可能会觉得“有点贵”。但当你把净利润率放进来，就会发现答案完全变了样：UBER 的净利润率高达 22.4%，而同行平均还是负数。用资本市场的语言讲，这不是贵，而是“溢价背后有根”。 而把视角拉回它的主战场——美国本土市场，UBER 的估值逻辑就开始显得更扎实了。 在美国市场，UBER 的市销率和EV倍数几乎与同行持平，甚至还出现了轻微折价。 也就是说，在自己最核心的主场，UBER 的估值并不高估，甚至在某些维度上还有低估的空间。关键还是利润。DoorDash 和 LYFT 的净利润率还停留在1.2%甚至0.4%的水平，而 UBER 已经实打实地跑出超过 22%。它不是增长最快的，但是却是最赚钱的。 LYFT它的增长表现其实并不差。过去一年营收增速达到了 31.4%，明显领先于 UBER 的 18%。这说明 LYFT 仍有强劲的市场拓展能力，也表明它的品牌在一定用户圈层中有非常高的粘性和认可度。但它的问题在于盈利模型尚未跑通。毛利率虽然不低，超过 35%，但净利润率只有 0.4%，也就是说公司赚钱的效率非常低，靠增长拉动估值的逻辑在目前这个利率环境下并不好卖。 两个月前，美股投资网 TradesMax就在内部VIP社群分享过，非常看好 美国网约车公司Lyft( LYFT ) 暑假推出的自动驾驶出租车业务，无需司机，大幅度降低人力成本，12.5美元入手，重仓25%。 本周一，5月5日再次提醒VIP们，入手 LYFT 结果！ LYFT 周五公布靓丽财报后，一天就暴涨28%！ UBER 的优势还不仅仅体现在财报数字上。它在自动驾驶、外卖、货运等多条业务线上已经建立了清晰的生态布局，正在逐步转型成一个多面向的平台型公司。 它和自动驾驶公司的深度绑定，像小马智行、AUR、MBLY，大大增强了未来几年降本增效的确定性。 而LYFT 目前还主要聚焦在网约车本身，虽然与MBLY有合作布局自动驾驶，但规模和深度都远不及 UBER 的开放式生态打法。 所以如果我们从宏观竞争结构、盈利表现、估值合理性和产业协同性等多个维度来衡量，我们美股投资网认为，UBER 目前的市场主导地位毋庸置疑。虽然估值看起来不便宜，但它用利润、现金流和全球化能力，撑起了自己的溢价；而 LYFT 虽然在品牌好感度和用户体验上依旧可圈可点，但想真正威胁到 UBER，可能还需要在盈利能力和平台外延方面有更实质性的突破。 中概自动驾驶软件商PONY 最后给大家分析一支中概股，专门做自动驾驶软件的小马智行（Pony.ai），美股代号 PONY。 首先，中国机器人出租车市场的快速增长，为小马智行提供了前所未有的机遇。 根据高盛的分析，预计到2030年，中国机器人出租车市场将从2023年的5400万美元激增至120亿美元。 这一增长不仅反映了市场需求的快速膨胀，也为小马智行在国内市场的进一步扩展奠定了坚实基础。更为关键的是，到2030年，机器人出租车车队规模预计将从2025年的0.41万辆增至50万辆，标志着公司未来增长潜力的巨大空间。 根据创始人兼首席执行官 James Peng表示，小马智行已经实现了全天候四级无人驾驶，并且能够在各种天气条件下稳定运行。公司已经做好了全面大规模商业化的准备，技术层面无疑已经达到了一个新的高度。 但仅有技术是不够的，小马智行也清楚，政策支持同样至关重要。它 与地方Z府的合作，帮助公司在中国一级城市获得了必要的运营许可证。 最近，小马智行在北京南站、北京大兴机场和亦庄等重要交通枢纽推出了收费机器人出租车服务，吸引了大量用户，未来还会逐步扩展到北京市中心，真正让自动驾驶技术走进大众生活。 与此同时，小马智行在全球市场也逐步扩展。2024年，小马智行与丰田成立了合资企业，共同生产基于bZ4X的自动驾驶出租车。这项合作不仅帮助小马智行提升了生产能力，还为未来的自动驾驶运营价值链打下了基础，涵盖了从车辆维护到充电设施等关键基础设施的建设。 此外， 小马智行与UBER的合作，更是推动其全球化的重要一步。 根据计划，UBER 将把小马智行的自动驾驶车辆接入其全球打车平台，这项合作将在中东市场启动，并计划未来扩展到其他国际市场。通过UBER现有的全球用户网络，小马智行不仅能够迅速进入更多的市场，还可以加速其自动驾驶技术的普及和商业化。 除了车队规模的增长，小马智行的自动驾驶卡车业务也迎来了显著的增长。根据公司财报，自动驾驶卡车服务 已实现 73%的同比增长，并成为公司目前最大的收入来源之一。 我们美股投资网认为，随着在北京和广州新开通的路线， 小马智行的自动驾驶出租车和卡车服务将大幅推动公司的收入增长，且这一领域的商业化进程具有较高的稳定性。 然而，尽管市场潜力巨大，小马智行也面临不小的挑战。首先，公司的商业化初期波动性 是一个不可忽视的问题。公司首席财务官明确表示， 收入和利润率将出现大幅波动，特别是在 自动驾驶服务的初期阶段。这意味着，尽管技术和市场前景广阔，投资者仍需面对 不确定性。在商业化尚未完全稳定的阶段，公司的业绩波动 很可能导致短期内的财务不确定性。 此外，小马智行所面临的市场竞争也日益激烈。除了 百度Apollo、文远知行等公司，更多的竞争者正在涌入自动驾驶市场。虽然 小马智行在技术和政策支持方面有明显的优势，但如何在竞争日益激烈的市场中 保持技术领先 并 扩大市场份额，将是决定公司未来成败的关键。 在盈利模式上，尽管机器人出租车和自动驾驶卡车的市场需求庞大，但其盈利模式尚需进一步验证。未来，如何将这些收入来源长期稳定增长，并提升车费收入和货运服务收入 的可预测性，将决定小马智行是否能真正实现盈利的稳定性。 对于PONY，我们曾多次布局， -05", "ym": "2025-05", "time": "2025-05-05 20:42:52", "author": "StockWe.com", "desc": "如何通过房地产投资、折旧和成本分摊来减少或递延 $300,000 美股资本利得税的最佳策略详细说明：To r", "url": "https://mp.weixin.qq.com/s/yMjm_ZntQ0-lZwZMkxTOKQ", "path": "sources/news/wechat_mp/articles/美股市场赚了钱如何抵税-1800558f16.md", "len": 1357, "ticks": [], "body": "如何通过房地产投资、折旧和成本分摊来减少或递延 $300,000 美股资本利得税的最佳策略详细说明： To reduce or defer taxes on a $300,000 capital gain from the stock market using real estate investment, depreciation, and cost segregation, what is the best approach? 假设你通过美股市场赚了 30万美元（资本利得） 你可以用这笔钱作为首付，购买了一套价值100万美元的投资房产，剩下的部分可以通过贷款融资。 你也可以请专业人士进行 成本分摊研究（Cost Segregation Study） 如果你或者你的配偶符合 房地产专业人士（Real Estate Professional） 的资格，可以用折旧抵消主动收入或资本利得。 你所在州没有州所得税（例如德州或佛州） 你处于37%的联邦所得税税率的地区（或20%的长期资本利得税率） 第一步：估算首年可折旧金额 通常，成本分摊研究会发现，大约 25% 的房产成本属于可以快速折旧的部分（例如5年、7年、15年的资产） • 25% × 100万美元 = 25万美元可快速折旧 • 2025年可使用 40% 的Bonus Depreciation 250,000 × 40% = 100,000 美元的第一年额外折旧 加上普通的年度折旧（例如大约2万美元）： 那你第一年总折旧的总金额是100,000 + 20,000 = 120,000 美元 第二步：节税估算 情况A： 只能抵消资本利得（20%税率） 120,000 × 20% = 24,000 美元节税 情况B： 可以抵消普通收入（37%税率） 120,000 × 37% = 44,400 美元节税 总结 • 如果你是房地产专业人士，并参与管理房产，可节税约 44,400 美元 • 如果你只能用来抵资本利得税，可节税约 24,000 美元 • 虽然不能完全抵掉30万美元的资本利得，但可以大幅度降低你第一年的应税收入 如果你有任何投资美股问题，请加我们美股分析师微信号 MaxFund 美股大数据AI量化团队重磅更新 ，免费给全球投资者提供 美股盘前，盘中和盘后出现异常波动最大的个股，只需登录官网注册免费账户立即使用，让你先人一步发现交易机会！ 浏览器打开官网 https://StockWe.com/move ←左右滑动查看更多产品介绍图→ 美股投资网 是一家专门研究美股的金融科技公司，成立于美国硅谷，由前纽约证券交易所分析师Ken创立，联合多位摩根斯坦利分析师，谷歌 Meta工程师利用AI和大数据，配合十多年美股实战经验和业内量化模型，建立了一个股市数据库 https://StockWe.com/ 以追踪华尔街机构期权异动，暗池主力大单和每天突发新闻 ，挖掘潜力大牛股，发送美股实时行情、投资策略、交易技巧、公司研究报告、量化交易。 联系方式 客服Telegram meiguM 公众号 TradesMax 邮箱 buy@TradesMax.com 美股投资网 TradesMax.com 美股大数据 StockWe.com"}, {"title": "苹果和亚马逊盘后为何大跌！财报透漏了什么信号？", "date": "2025-05-01", "ym": "2025-05", "time": "2025-05-01 21:15:09", "author": "StockWe.com", "desc": "暴雷！", "url": "https://mp.weixin.qq.com/s/OZhjOhje60Tkhg8eGDVnOw", "path": "sources/news/wechat_mp/articles/苹果和亚马逊盘后为何大跌-财报透漏了什么信号-16d6a10c3f.md", "len": 3016, "ticks": [], "body": "微软和Meta的强劲财报， 缓解了市场对AI领域支出放缓的担忧。 微软股价盘中暴涨10%，一度超越苹果，成为全球市值最高的公司。 截至收盘，微软上涨了7.63%，收于1月下旬以来的最高水平，这一涨幅主要受益于其云计算业务Azure的乐观季度增长预期。 Meta股价也上涨了4.23%，创下自4月9日以来的最高水平。该公司强劲的广告业务表现促使其公布了超出市场预期的收入。 两家公司的好财报直接助推今天道指一度重返41000点，纳指盘中涨超2%。 除了财报利好， 特朗普的首席经济顾问释放出贸易谈判的积极信号 ，也为美股上涨提供了额外支持。 截至收盘，道指和标普500 连续第八个交易日上涨。道指涨幅为0.21%；纳指涨幅为1.52%；标普500涨幅为0.63%。 截止周四收盘，标普500指数已接近收复特朗普4月初宣布“解放日”关税后的跌幅。 摩根士丹利在周四的最新报告中将台积电列为“首选”股， 强调在大型科技公司对AI领域的持续强劲资本支出背后，台积电的前景愈加光明。尽管摩根士丹利略微下调了台积电的目标股价，但仍维持该公司股票的“增持”评级。 “增持”评级意味着摩根士丹利分析师预计，未来12至18个月台积电股.票的总回报将超过其所覆盖股票的平均水平。将台积电列为“首选”表明，分析师认为其相较同行具有显著的潜在上行空间。 台积电美股周四一度上涨4.6%，收涨3.6%。 我们4月25日（上周五）提示 期权社群入了英伟达 的看涨期权CALL，行权价110美元，竞价3.9美元。 随着今天英伟达股价的大涨，今天期权的价格已飙升至6.4美元，接近翻倍了。 考虑到明天非农可能暴雷，我们决定果断落袋为安，锁定收益！ 在周五美国Z府就业报告发布之前，本周一系列劳动力市场数据提供了重要线索。 数据显示，上周申请失业救济的人数大幅增加，超出了市场预期，这可能预示着由于关税等因素的影响，未来裁员人数可能进一步上升。 同时，ISM制造业PMI数据显示，美国4月份制造业活动继续收缩，尽管数据略低于市场预期，但高企的投入价格仍表明制造业面临的压力。 在此之前，周三的数据显示 ，美国经济在上个季度出现三年来的首次收缩。 【风险提示】 明天周五有非农就业数据公布，大盘又反弹到压力位置560，明天空头又可能借助大非农就业数据的暴雷，大力做空！大盘可能会回调，在经济不确定性增加的情况下，美国企业对劳动力的需求正在减弱。有“小非农”之称的ADP就业数据在4月增长大幅放缓，远低于市场预期 。 苹果第二财季财报表现 今天盘后，苹果公司公布了2025财年第二财季的财报。报告显示，本季度苹果的收入达到954亿美元，净利润为248亿美元，每股摊薄收益为1.65美元，相较于去年同期的908亿美元收入、236亿美元净利润和1.53美元每股摊薄收益，均有所增长。此外，苹果的服务业务创下了历史新高，推动了整体业绩表现的提升，每股收益也达到了三月季度的最高纪录。 在毛利率方面，本季度达到47.1%，相比去年同期的46.6%有所上升，显示出公司的盈利能力进一步增强。 与此同时， 苹果公司董事会宣布了一项额外1000亿美元的股票回购计划 ，并将股息提高至每股0.26美元，相较去年同期的0.25美元有所上调。该公司还宣布，新的股息将在5月15日支付，支付对象为5月12日登记的股东。 尽管整体业绩超出了市场的预期， 苹果在中国市场的表现却略显疲软 。大中华区的收入为160亿美元，同比下降2.3%，未能达到分析师预期的168.3亿美元，成为唯一出现下滑的地区。这一表现反映出苹果在中国市场面临的挑战，尤其是在维持和吸引用户方面，随着竞争的加剧，苹果在全球第二大市场的增长面临压力。 除此之外， 苹果还指出，关税的增加将导致第三财季的成本大幅上涨，预计将增加约9亿美元 。这意味着，尽管苹果的营收预期将增长，但增幅仅为0%-10%的区间上半部分。 综合这两点不利，苹果股价在盘后交易中一度下跌超过4%。 亚马逊一季度财报表现 亚马逊公布的财报显示，今年一季度的营收增长放缓至自2020年第四季度以来的最低水平，盈利增长也比前一季度有所减速，尽管两项数据均超出分析师预期。 一季度，亚马逊的净销售同比增速从四季度的10%降至8.6%，尽管分析师预期为8.3%。同样，第一季度的每股盈利（EPS）增速从四季度的86%降至62%，但分析师原本预期为38.8%，亚马逊的表现超出预期，EPS较分析师预期高出16.9%。 在营收和营业利润方面，亚马逊的实际表现也超出了公司此前的指导区间，且营业利润比分析师预期高出5%。 令人意外的是， 第一季度的营业利润率并未如分析师预期的那样小幅下降，反而创下了连续第四个季度的单季最高记录。 不过，亚马逊云服务（AWS）依然表现不佳，收入未能达到预期，且首次出现了两年来的环比下降。 一季度AWS的净销售同比增长由四季度的19%放缓至约17%，略低于分析师预期的17.3%。剔除汇率影响后，AWS的同比增长为17%，与四季度持平，而分析师预期为17.2%。 在业绩指引方面，亚马逊预计第二季度净销售将同比增长约7%至11%，这一预期与分析师的预期大致吻合，处于指引区间的中端。按照区间均值计算，净销售同比增长约9%，表明在一季度增速放缓后，亚马逊的二季度营收有望有所回升，增速有所加快。 亚马逊称，营收的指引考虑到了预计汇率因素对增长约有10个基点的负面影响。 然而，亚马逊对营业利润的指引却相对较弱。整个营业利润的预期区间均低于分析师的预期，其中区间上限比分析师预期低约1.8%，而下限则低于分析师预期27%。 这意味着，在亚马逊预测的最差情景下，二季度的营业利润可能比分析师预期低27%。 由于AWS销售放缓以及疲软的利润指引，投资者的反应较为激烈。尽管财报公布后亚马逊股价曾一度上涨超过3%，但盘后交易中股价迅速转跌，盘后一度跌5%，但是很快收窄部分跌幅。 随着特朗普Z府的贸易政策继续影响美国企业，亚马逊和苹果两家公司都在调整策略应对关税压力。 亚马逊本周已向白宫表示，不会在产品定价中直接反映关税上涨 ，而苹果则在加速将iPhone生产线从中国转移，尽管智能手机依然享受免税待遇。这些变化显示出，巨头们不仅在财务上需要应对挑战，还在全球供应链调整中面临更多不确定性。 美股大数据AI量化团队重磅更新 ，免费给全球投资者提供 美股盘前，盘中和盘后出现异常波动最大的个股，只需登录官网注册免费账户立即使用，让你先人一步发现交易机会！ 浏览器打开官网 https://StockWe.com/move ←左右滑动查看更多产品介绍图→ 美股投资网 是一家专门研究美股的金融科技公司，成立于美国硅谷，由前纽约证券交易所分析师Ken创立，联合多位摩根斯坦利分析师，谷歌 Meta工程师利用AI和大数据，配合十多年美股实战经验和业内量化模型，建立了一个股市数据库 https://StockWe.com/ 以追踪华尔街机构期权异动，暗池主力大单和每天突发新闻 ，挖掘潜力大牛股，发送美股实时行情、投资策略、交易技巧、公司研究报告、量化交易。 联系方式 客服Telegram meiguM 公众号 TradesMax 邮箱 buy@TradesMax.com 美股投资网 TradesMax.com 美股大数据 StockWe.com"}, {"title": "美股最后10分钟为何突然暴拉？", "date": "2025-04-30", "ym": "2025-04", "time": "2025-04-30 21:02:58", "author": "StockWe.com", "desc": "美股暴跌瞬间拉升，发生了什么？", "url": "https://mp.weixin.qq.com/s/S-ZiFjLlI2XMM209RGhjHQ", "path": "sources/news/wechat_mp/articles/美股最后10分钟为何突然暴拉-663d2be35d.md", "len": 2718, "ticks": [], "body": "周三美股三大指数早盘一度至少跌近2%。消息面上多个原因导致： 就业市场数据成为引发市场担忧的重要因素之一。“小非农”ADP报告显示，企业为应对特朗普Z府对美国贸易伙伴征收关税可能带来的影响，在4月显著放缓了招聘步伐。4月美国私营部门新增就业人数仅为6.2万人， 这是自2024年7月以来的最小增幅 ，远低于市场预期的11.4万人，也较3月下修后的14.7万人大幅减少。 美股投资网分析认为，不安是当前的主旋律。雇主正试图在政策和消费者不确定性与一系列多数积极的经济数据之间取得平衡。在这样的环境下很难做出招聘决定。 经济整体表现同样不容乐观。受关税前进口激增和消费支出疲软的影响， 美国经济三年来首次出现萎缩。今年一季度GDP年化季环比初值超预期下降0.3%，为2022年以来的首次收缩。 这标志着特朗普关税政策的连锁反应初步显现。如果下一份报告仍旧为负值，那么美国经济将陷入技术性衰退。 美联储最爱的通胀指标3月继续降温，但美国物价猛涨的势头近来已显现，滞胀风险加剧。 通胀的波动使得美联储在制定货币政策时面临两难局面，既要防止经济陷入衰退，又要控制通胀，这增加了市场对货币政策走向的不确定性。 这一系列疲软数据，使得交易员们充分预期美联储今年将有四次25个基点的降息。降息预期升温反映了市场对经济前景的担忧，投资者希望通过降息来刺激经济增长，稳定市场情绪。 不过，午盘时市场出现了转机。特朗普再度释放对中国友善的言论。 他表示：“在某个时候，我希望我们能够与中国达成协议。”特朗普补充说，他对两国贸易的急剧下滑感到“不满”，因为他希望“ desMax.com 美股投资网 TradesMax.com 美股大数据 StockWe.com"}, {"title": "这家美国公司裁员2万！背后是与亚马逊的“分手”？", "date": "2025-04-29", "ym": "2025-04", "time": "2025-04-29 20:52:49", "author": "前纽约证券Ken", "desc": "2万人下岗，73栋大楼关停!", "url": "https://mp.weixin.qq.com/s/svCYsEbBHPLsqxiWpsvo9g", "path": "sources/news/wechat_mp/articles/这家美国公司裁员2万-背后是与亚马逊的-分手-42ed096c74.md", "len": 2342, "ticks": [], "body": "美股周二收高，道指与标普500指数连续第六日上涨。美财长贝森特称贸易谈判取得进展，美商务部长称已与某个国家达成贸易协议，特朗普称“与印度谈判进展非常顺利，我认为我们在关税问题上达成了协议。” 截至收盘，道指涨幅为0.75%；纳指涨幅为0.55%；标普500涨幅为0.58%。 投资者正在为繁忙的财报周做准备，约三分之一的标准普尔500指数上市公司计划在本周发布业绩。 大型科技公司特别受关注，科技股“七大巨头”公司中的四家——亚马逊、苹果、Meta 和微软将在本周发布季度报告。金融股、必需品股和医疗保健股Visa、礼来也将发布季度报告。 根据FactSet数据，超过36%的标准普尔500指数成份股公司已公布财报，其中 约73%的业绩超出了华尔街的预期。 根据FactSet的数据，这略低于77%的5年平均水平。美银指出， 64%的公司每股收益（EPS）超出预期，而上个季度这一比例为71%。 丹麦制药巨头诺和诺德（NVO）周二宣布，其明星级减肥药物Wegovy目前在美国市场已不再短缺。为了扩大药品获取的便利性，公司将通过远程医疗平台HIMS与LFMD进行分销，进一步下沉市场，拓展用户群。 诺和诺德美国业务执行副总裁戴夫·摩尔（Dave Moore）在接受媒体采访时表示：“我们认为与远程医疗公司合作至关重要，这样随着仿制版逐步退出，患者仍能获得Wegovy。” “我们很高兴看到人们对使用品牌版Wegovy的兴趣高涨，并开始转向我们提供的正式渠道，”他说。 据摩尔介绍，患者可以直接通过远程医疗平台获取Wegovy药物，并实现送药上门，“这让取药变得非常简单。” 受此消息提振HIMS今天暴涨23%，LFMD暴涨超41%。 其实我们去年11月美股大数据StockWe.com AI大模型就选出来HIMS，当时我们提示21.4美元附近入场。 文章回顾： 告别英伟达？AI投资的下一个爆点来了！ 美股12月首选这只AI医疗公司！基本面超级好！ 因亚马逊，UPS裁员超20000人！ 4月29日。联合包裹服务公司（UPS）表示将裁撤超过2万名员工 ，涵盖送货司机与包裹处理人员， 裁员比例约占总员工数的4% 。 UPS在声明中指出，由于最大客户未来的包裹量将显著下降，公司必须提前调整人力与资产结构，以适应即将到来的业务变局。这位“最大客户”正是与UPS合作近三十年的亚马逊。 2025年1月，UPS宣布已与亚马逊达成协议，到2026年下半年将其货运量降低50%以上，期限为18个月，以此节约开支，增加盈利。 UPS在今年1月的财报电话会议上就明确表示，将在合同到期时重新评估与亚马逊的合作条款。这是基于现实利润结构的考量。虽然亚马逊提供了庞大的运量支持，但其压价效应亦不容忽视，令UPS在执行大宗运输任务时面临边际收益递减的困境。在人工、能源与仓储成本不断上涨的背景下，这类低利润、大规模的运输业务已不再具有吸引力。 配合整体重组，UPS将于今年6月底前关闭73栋自有或租赁建筑 ，进一步收缩冗余产能，并将视情况考虑是否继续削减设施规模。 与此同时，公司计划通过引入自动化系统来降低对人力的依赖。例如，在包裹分拣环节上线自动贴标装置，在装卸流程中采用智能化拖车操作系统，以此提升运营效率与单位利润率。 这场大规模裁员与基础设施整合，不只是一次阶段性的调整，更是UPS向高附加值业务转型的深层信号。过去数年，公司不断从低利润的电商派送业务中抽身，转而加码温控运输、医疗物资、急件物流等专精业务线。这些业务虽然单量有限，但毛利显著高于传统包裹服务，更能抵御市场周期波动。 UPS希望通过业务结构的战略转向，摆脱对大客户依赖 ，将自身重新定义为一家专业化、技术型物流解决方案提供商，而非传统意义上的“快递公司”。 财务层面，公司预计2025年全年营收将达到890亿美元， 而本轮网络重组将在年内节省约35亿美元成本， 这无疑将显著改善其 报中表示， 对冲基金资金流表现出对共和党主题的强烈偏好 ， 共和党获胜者在过去几周内被买入，持仓接近2年高点，而民主党获胜者被抛售，持仓处于多年低点。 可再生能源（民主党获胜的明显代表）在过去几周被大量抛售， 头寸再次变得更加看跌。 高盛：共和党胜利篮子创下历史新高 共和党胜选情景已成为高盛在选举前的首选交易之一。数据显示， 高盛的共和党胜利篮子创下历史新高，而民主党胜利篮子又回到了拜登的水平。 高盛 FICC 副总裁 Vincent Mistretta在其最新研报中表示： “市场定位倾向于特朗普获胜。在最近市场特朗普获胜的赔率上升之前，情况就已经如此。” 瑞银的共和党获胜篮子也已经击败民主党获胜篮子，连续14天收高。 瑞银交易员Michael Romano在一份报告中写道： “瑞银的共和党vs.民主党选举对冲交易本月迄今已上涨15%，几乎呈现直线上升，达到新高， 这表明市场已大体上消化了特朗普胜选的预期。” 摩根大通与高盛对美股未来十年的前景持不同观点。 摩根大通认为大型公司能提高利润率，加上科技和AI的进步，未来前景乐观，其报告预测未来10至15年美国大型股年化回报率为6.7%。同时，传统的60/40股票债券投资组合年回报率预计为6.4%，仍高于长期平均水平。 相比之下，高盛警告称，未来十年标普500的年回报率仅略高于3%，反映出过去十年大涨时代的结束。然而，摩根大通也承认，全球股票的预期年化回报率为7.1%，非美国市场和新兴市场的回报率更高。 在固定收益方面，摩根大通预计美国中期和长期国债的年化回报率分别为3.8%和5.2%。另类资产如私募股权的回报率预测为9.9%，房地产和基础设施也显示出良好前景。 总体来看，尽管摩根大通的预测较为乐观，但仍低于历史平均水平，反映出华尔街面临的不确定性。分析人士强调，主动管理和多元化投资组合的价值在于抵御市场波动并抓住增长机会。摩根大通认为，AI技术将推动企业收入和利润增长，未来的经济增长前景依然乐观。 +VIP社 群，扫描下方二维码 +客服微信号 MaxFund 或 StockWe8 精彩深度文章 美股核能股爆涨，哪家最值得投资？OKLO LEU NNE SMR CCJ NVDA 深度分析特斯拉Robotaxi发布会，是否会翻车？ 我们不看好！ 美股 捞底特斯拉和英伟达必须注意这3点！ 美联储降息如何布局美股？ 前谷歌CEO泄露AI高级机密，英伟达将引爆“抢购潮” 英伟达短期”见顶” ， 长期“见底”？特斯拉下半年走势预测 英伟达最大风险：垄断！附估值更新 美股英伟达5月财报预测，深度报告，坚定看涨 美股Sell in May，Go Away？我不认同？如何操作？ 美股这只股，快被我做烂了！ 【深度报告】英伟达下周走势会怎么样？ 美股 AI耗电，3只电力能源股必买 VST...... 除了英伟达，这4家AI相关的软硬件公司必买！ 更多深度报告，手机浏览器打开 https://StockWe.com/col/depthreport 美股投资网 成立于美国硅谷，是一家专门研究美国股票的金融科技公司，由前纽约证券交易所分析师Ken创立，联合多位摩根斯坦利分析师，谷歌 Meta工程师利用大数据和人工智能，配合十多年美股实战经验和业内量化模型，建立了一个股市数据 https://StockWe.com/， 以追踪华尔街机构期权异动，暗池主力大单和每天突发新闻 ，挖掘潜力大牛股，发送美股实时行情、投资策略、交易技巧、公司研究报告、量化交易。 联系方式 客服微信号 investMax 或 MaxFund QQ客服 240285991 客服Telegram meiguM 公众号 TradesMax 邮箱 buy@TradesMax.com 美股投资网 TradesMax.com 美股大数据 StockWe.com"}, {"title": "黄仁勋9月又抛售英伟达股份，意味着什么？", "date": "2024-09-08", "ym": "2024-09", "time": "2024-09-08 13:56:08", "author": "前纽约证券Ken", "desc": "老黄又出货了！你接吗？", "url": "https://mp.weixin.qq.com/s/wcZbEetCQWEf8MvD1AWQCA", "path": "sources/news/wechat_mp/articles/黄仁勋9月又抛售英伟达股份-意味着什么-0e0cf355db.md", "len": 558, "ticks": [], "body": "根据美股大数据 量化AI终端 StockWe.com追踪，黄仁勋在8月抛售后，9月继续抛售，意味着什么？ 美股投资网获悉: 往后越尖端强大的芯片，制造难度 as称，“鲍威尔本周五在这一话题上应该会有足够多的保证， 从而在未来两周内看到典型的由杰克逊霍尔年会触发的上涨行情。 ” 美联储9月降息的理由必须足够有力 鲍威尔和他的同事以前也犯过错误。 他们在疫情期间未能及时采取行动遏制通胀上升，导致美联储官员现在决心避免在价格压力下降之际，在就业方面出现类似的灾难。但一直以来意外强劲且具有历史意义的就业市场似乎开始出现裂痕。 上个月，美国雇主放缓了招聘速度，失业率连续第四个月上升，引发了人们对高利率正在将劳动力市场开始出现裂缝的担忧。几位经济学家还预计政府将在周三对截至3月的一年内的就业数据进行大幅下调。 对于关注鲍威尔讲话的人，尤其是在债券市场上的人来说， 一个关键问题是，另一份疲软的就业报告是否会为下个月的大幅降息敞开大门，或者迫使美联储在接下来的几个月内采取积极的降息措施。 美联储主席将在美东时间周五早上10点发表讲话。 “有争论说，美联储一开始可以稍微快一点降息，然后放慢速度，”德意志银行美国首席经济学家Matthew Luzzetti表示。 “我认为，只有当有证据表明劳动力市场正在以更加显著的方式走弱时，这种论点才会真正具有分量。 ” 一年前，当鲍威尔在杰克逊霍尔发表讲话时，他和他的同事似乎仍朝着相反的方向前进。美联储官员在仅仅一个月前才将基准利率上调至5.25%至5.5%的区间，这是几十年来的最高水平。 当时鲍威尔将劳动力市场描述为紧张，称通胀“过高”，并表示美联储“准备在适当的情况下进一步加息”。 此后通胀已经有所缓解，尽管仍高于美联储2%的目标，但它已明显下降。衡量核心通胀压力的一个关键指标在7月连续第四个月下降，证实了通胀的下降趋势。巴克莱经济学家Pooja Sriram表示，“我们预计他会承认，条件已经具备，让他们很快开始调整政策，目前尚不清楚他是否会明确表示是9月还是其他时间，但我认为信息将是，他们似乎已经做好准备这么做了。” 鲍威尔在今年的杰克逊霍尔央行年会上传达的信息可能至关重要： 美联储9月降息的理由必须足够有力，以应对今年大选期间围绕美联储的证治压力。 这可能涉及指出就业市场放缓和经济增长疲软。 但MacroPolicy Perspectives高级经济学家Laura Rosner-Warburton表示，他不会想对经济前景发出过于消极的信息，“为了防止发出负面信号，美联储需要在沟通上非常明确。 ” 自8月初市场出现震荡以来，随着风险资产反弹以及最近的数据（包括指向裁员持续处于低水平和美国消费者韧性的数据）表明经济没有出现断崖式下跌，债券交易员已削减了对美联储的降息预期。 精彩深度文章 前谷歌CEO泄露AI高级机密，英伟达将引爆“抢购潮” 英伟达短期”见顶” ， 长期“见底”？特斯拉下半年走势预测 英伟达最大风险：垄断！附估值更新 美股英伟达5月财报预测，深度报告，坚定看涨 美股Sell in May，Go Away？我不认同？如何操作？ 美股这只股，快被我做烂了！ 【深度报告】英伟达下周走势会怎么样？ 美股 AI耗电，3只电力能源股必买 VST...... 除了英伟达，这4家AI相关的软硬件公司必买！ 订阅深度报告，手机浏览器打开 https://StockWe.com/col/depthreport +30万粉丝社 群，扫描下方二维码 +客服微信号 MaxFund 或 StockWe8 美股投资网 是一家专门研究美国股票的金融科技公司，由前纽约证券交易所分析师Ken创立，联合多位摩根斯坦利分析师，谷歌 Meta工程师利用大数据和人工智能，配合十多年美股实战经验和业内量化模型，建立了一个股市数据库 https://StockWe.com/， 以追踪华尔街机构期权异动，暗池主力大单和每天突发新闻 ，挖掘潜力大牛股，发送美股实时行情、投资策略、交易技巧、公司研究报告、量化交易。 联系方式 客服微信号 investMax 或 MaxFund QQ客服 240285991 客服Telegram meiguM 公众号 TradesMax 邮箱 buy@TradesMax.com 美股投资网 TradesMax.com 美股大数据 StockWe.com"}, {"title": "这些数据表明，美股牛市还没结束！", "date": "2024-08-19", "ym": "2024-08", "time": "2024-08-19 19:39:46", "author": "美国纽约证券Ken", "desc": "美股继续高歌猛进，标普500指数与纳指录得八连涨，太空股ASTS狂飙25%", "url": "https://mp.weixin.qq.com/s/J6lu05JiQwnrR9BTr_QfFw", "path": "sources/news/wech 他们 需要更多买入才能赶上平均水平。 从高盛的经纪业务客户情况来看，他们对信息技术板块的持仓相比标普500低12.6%，仍是10多年来的最轻仓水平之一。 美股投资网的仓位 昨天美股投资网公众号 TradesMax就发文，公布我们的抄底清单，分别是 Meta 英伟达 TSLA 文章回顾 美股七巨头市值蒸发1.3万亿，我们今天抄底了Meta NVDA 今天Meta大涨5%，英伟达狂飙7% 同时，我们新建仓了 台机电，TSM，150美元 VIP社群截图 就在我们抄底后，美股大盘就开始大涨，导致TSM也跟着暴涨6%，全群赚麻！ 多空意见分歧 在全球股市动荡之际，高盛首席执行官David Solomon镇定发声，认为美国股市近期的回调可能是健康的，并表示美国经济没有衰退风险。他预计美联储不会在9月前采取紧急降息行动，而是在今年秋季降息一到两次。 尽管市场对美联储的降息预期较为激进，Solomon认为当前的经济数据和美联储的态度不支持紧急降息。此外，他指出日本央行的加息决策对市场产生了影响，导致套利交易的清盘。 Solomon强调，市场的震荡将持续一段时间，但这种调整可能是健康的。 反对的声音，但也有不少 投资者已经开始认为，在一个估值极高并且屡创新高的市场中，周一的抛售其实早就应该发生了。一些人警告说，以后还后有更多这种痛苦局面。 Truist联席首席投资官Keith Lerner写道：“现在说美股最低点已经到来还为时过早。美股已经蒙受了损坏，修复过程很可能需要一些时间。然而，随着市场对前景的预期重新设定得更低，风险/回报似乎正在逐渐改善。” LPL Financial首席全球策略师Quincy Krosby表示：“在经历了自去年秋季以来如此强劲的上涨之后，美股估值、市场情绪和投资者头寸已经变得过头了。今天市场正在经历的是这种看涨头寸的回缩，这在日元和所谓的套利交易中尤为明显。” 在经历了周一的历史性抛售后，投资者准备迎接更多波动。随着避险资产需求减弱，美国国债回落。10年期美债收益率出现近两周来的首次上涨，市场的焦点转向580亿美元的债券标售。 交易员也降低了美联储年内深度降息的预期，货币市场排除了最快本月紧急降息的情景。 不看太远，明天会怎么样？ GPU芯片服务器的超微电脑 SMCI 公布截至自然年2024年6月30的2024财年第四财季（下称二季度）财务数据，同时公布截至9月30的2025财年第一财季（下称三季度）以及2025全财年的业绩指引。 财报公布后，周二（SMCI）股价盘后跳涨，一度涨超17%，后回吐多数涨幅，盘后反而跌10% 它也是芯片股的风向标之一，随后，英伟达等芯片板块也跟着盘后出现小回调，大盘指数盘后小幅下跌，明天可能再次出现空头的袭击，获利盘出货的情况，请各位粉丝谨慎应对。 想每天跟着我们捕捉市场趋势变化，及时作出反应，查看个股资金流入和流出情况， 登录 美股大数据 StockWe.com +VIP社 群，扫描下方二维码 +客服微信号 MaxFund 或 StockWe8 美股投资网 是一家专门研究美国股票的金融科技公司，由前纽约证券交易所分析师Ken创立，联合多位摩根斯坦利分析师，谷歌 Meta工程师利用大数据和人工智能，配合十多年美股实战经验和业内量化模型，建立了一个股市数据库 https://StockWe.com/， 以追踪华尔街机构期权异动，暗池主力大单和每天突发新闻 ，挖掘潜力大牛股，发送美股实时行情、投资策略、交易技巧、公司研究报告、量化交易。 联系方式 客服微信号 investMax 或 MaxFund QQ客服 240285991 客服Telegram meiguM 公众号 TradesMax 邮箱 buy@TradesMax.com 美股投资网 TradesMax.com 美股大数据 StockWe.com"}, {"title": "曝英伟达“因设计缺陷，新AI芯片推迟发布”，大摩称“暂停生产两周，四季度赶上进度”", "date": "2024-08-03", "ym": "2024-08", "time": "2024-08-03 14:45:03", "author": "StockWe.com", "desc": "英伟达（NVDA）将其下一代人工智能芯片B200至少推迟三个月。大规模出货可能要等到2025年初。", "url": "https://mp.weixin.qq.com/s/VAu46zxV_wXCAJOG1drfkQ", "path": "sources/news/wechat_mp/articles/曝英伟达-因设计缺陷-新AI芯片推迟发布-大摩称-暂停生产两周-四季度赶上进度-272a6f1a5f.md", "len": 1152, "ticks": ["NVDA" 测试的 FSD 版本“确实令人惊叹，但还远远没有达到‘完全’自动驾驶”的程度。 英伟达今日再次遭遇猛烈抛售 英伟达 NVDA 股价今日大跌 8% ，原因是 CEO 黄仁勋昨天又抛售了 24 万股 # 英伟达，总价值 2700 万美元，再加上投资者对于盘后 AMD 和微软 MSFT 财报担忧。 英伟达的 CEO 黄仁勋在 7 月份进行了多次大规模股票卖出交易，总金额超过 2.5 亿美元。 数据来源 StockWe.com 图片中数据的详细分析： 交易时间：数据涵盖了从 2024 年 7 月 5 日到 2024 年 7 月 29 日的内部交易。 高管： Huang Jen Hsun （黄仁勋）， NVIDIA 的总裁兼 CEO ，多次卖出公司股票。 Stevens Mark A ，董事（ Dir ），也有几次卖出交易。 Puri Ajay K ， EVP, Worldwide Field Ops ，也进行了一次卖出交易。 AMD二季度AI收入同比翻倍 7 月 30 日周二美股盘后，在数据中心 GPU 领域奋力追赶英伟达的半导体巨头 AMD 发布了 2024 财年第二季度财报，投资者将密切关注其 MI300 AI 加速器芯片的全年销售额指引。 由于 AMD 的二季度营收和盈利均小幅超过预期，数据中心的 AI 收入同比翻倍并连续两个季度创新高，对三季度的营收指引区间中点为 67 亿美元，也高于市场预期的 66.2 亿美元，令其股价盘后涨 9% ，带动英伟达的股价 转涨约 3% 。 尽管 AMD 是仅次于 英伟达 的第二大数据中心 GPU 供应商，但该公司 2024 年的股价仍下跌了约 6% 。 投资者希望看到 AMD 凭借 MI300X 人工智能芯片从其长期竞争对手 Nvidia 手中夺走市场份额，并释放出数据中心人工智能业务增长的信号。今年早些时候， AMD 曾表示，预计今年的 AI 芯片销售额将达到 40 亿美元，约占公司预期销售额的 15% 。 AMD第二季度财报摘要 收益和收入 ：每股收益（EPS）：调整后69美分，预期68美分。收入：58.3亿美元，预期57.2亿美元 未来展望 ：第三季度收入预期约为67亿美元，预期66.1亿美元。华尔街预期本季度每股收益为93美分 净收入 ：2.65亿美元（每股16美分），去年同期2700万美元（每股2美分） 数据中心部门 ：收入：28亿美元，同比增长115%，超过27.5亿美元的预期。本季度AI芯片销售额超过10亿美元。2024年数据中心GPU收入预期从40亿美元上调至45亿美元以上。 AMD二季度财报亮点：数据中心AI收入翻倍增长，未来前景看好 AMD最新的财报显示，公司在二季度的AI收入翻了一倍，比上一季度增速还要快，显示出强劲的增长势头。 运营利润率：调整后运营利润率为22%，几乎与分析师预期的21.8%一致。 资本开支：二季度资本开支为1.54亿美元，高于分析师预期的1.271亿美元。 研发开支：研发投入为15.8亿美元，符合市场预期。 尽管季度总营收同比增长9%，与去年同期的18.2%相比有所放缓，但非GAAP毛利率继续扩张，调整后每股收益也高于上季度的0.62美元。 数据中心AI收入创历史新高 数据中心收入连续两个季度创下新高，较去年同期翻倍，增幅比一季度的80%还要强劲，也比上季度的环比增长2%显著提速。 管理层对AI业务的乐观展望 AMD的CEO苏姿丰博士在财报声明中表示，数据中心收入创纪录带动了强劲的营收和利润增长。她指出，AI业务正在迅速发展，随着Instinct、EPYC和Ryzen处理器的需求增加，预计今年下半年将实现强劲收入增长。生成式人工智能的快速发展推动了市场对计算需求的增加，这将为AMD带来巨大的增长机会。 CFO Jean Hu补充道，二季度营收高于公司预期的中点，得益于数据中心和客户端部门的强劲增长。她强调，毛利率的持续扩张和战略AI投资为未来的增长奠定了基础。 每年推出新款AI处理器 AMD承诺每年都会推出新款AI处理器/芯片，紧跟竞争对手英伟达的步伐，英伟达已经将新品发布时间表从每两年一次提前至每年一次。 财报特点：数据中心AI收入加速增长，PC芯片收入稳定，游戏和嵌入式业务表现不佳 二季度，AMD的数据中心AI收入同比翻倍，主要得益于Instinct GPU和第四代EPYC CPU的强劲销售。PC芯片收入的增长则主要来自于Ryzen处理器。而游戏部门的收入则因半定制收入下降同比减少一半，嵌入式部门收入也因客户去库存而下降。 尽管市场预期二季度游戏收入会同比骤降超过58%至6.55亿美元，嵌入式事业部收入预计同比下滑近42%至8.5亿美元，实际结果是游戏收入低于预期，嵌入式收入高于预期。 股价表现及分析师观点 今年以来，AMD股价累计下跌近7%，明显跑输标普500指数和费城半导体指数。然而，分析师依然看好AMD的各业务线潜力。尽管英特尔股价今年累计下跌近40%，AMD在AI领域的竞争对手英伟达股价却翻倍至累计上涨114%。 券商Raymond James的分析师Srini Pajjuri对AMD的评级为“跑赢大盘/增持”，他认为AMD第二季度的MI300 AI加速器产品收入可能达到9亿美元，并预计全年销售额将再上调几亿美元，预计MI 300将在2024年带来超过40亿美元的增量收入。 投资者关注重点：AI收入展望及市场竞争 投资者将密切关注AMD的数据中心部门销售业绩，以推测企业的人工智能基础设施支出趋势。Cantor Fitzgerald的分析师C.J. Muse指出，过去两周AMD股价下跌超过20%，主要由于有传闻称微软可能削减对MI300 AI加速器订单。如果AMD无法提高对该关键芯片的全年销售额指引，股价可能面临进一步下跌的风险。 目前，华尔街分析师对AMD的AI收入预期存在分歧。Wedbush认为MI300今年的出货量可能达到60亿美元，而巴克莱认为即使供应链传出负面消息，年销售额50亿美元也可实现。Susquehanna则担心AMD的加速器产品会在英伟达GTC AI开发者大会后遭遇砍单。 AMD与英伟达的竞争焦点 华尔街最关心的是AMD能否在GPU市场上与英伟达有效竞争。Rosenblatt Securities认为，AMD股价面临压力反映了投资者对其产品能否与英伟达竞争的担忧。不过，AMD的MI300研发路线图因软件优化和高带宽内存配置而变得更具竞争力。 同时，AMD在二季报中提到，与行业领导者宣布成立Ultra Accelerator Link推动者小组，利用AMD Infinity Fabric技术推进基于开放标准的AI网络基础设施系统。 分析师认为，尽管高带宽内存可能存在问题，AMD总裁计划退休，但公司的估值倍数有所缓和，市盈率约为30倍，更接近目标水平。 总的来说，投资者应关注AMD在AI收入方面的年度展望，特别是MI300的积压订单、下一代芯片MI325的生产时间表，以及数据中心GPU的客户参与度。如果这些数据表现良好，将为AMD与英伟达的竞争增添信心。 +30万粉丝社 群，扫描下方二维码 更多深度文章 特朗普交易 10只潜力股必买 马斯克最大赌注: 特斯拉Robotaxi！博通仅次于英伟达的牛 英伟达短期”见顶” ， 长期“见底”？特斯拉下半年走势预测 英伟达最大风险：垄断！附估值更新 美股英伟达5月财报预测，深度报告，坚定看涨 美股Sell in May，Go Away？我不认同？如何操作？ 美股这只股，快被我做烂了！ 【深度报告】英伟达下周走势会怎么样？ 美股 AI耗电，3只电力能源股必买 VST...... 除了英伟达，这4家AI相关的软硬件公司必买！ 更多深度文章 https://StockWe.com/col/depthreport +客服微信号 MaxFund 或 StockWe8 美股投资网 是一家专门研究美国股票的金融科技公司，由前纽约证券交易所分析师Ken创立，联合多位摩根斯坦利分析师，谷歌 Meta工程师利用大数据和人工智能，配合十多年美股实战经验和业内量化模型，建立了一个股市数据库 https://StockWe.com/， 以追踪华尔街机构期权异动，暗池主力大单和每天突发新闻 ，挖掘潜力大牛股，发送美股实时行情、投资策略、交易技巧、公司研究报告、量化交易。 联系方式 客服微信号 investMax 或 MaxFund QQ客服 240285991 客服Telegram meiguM 公众号 TradesMax 邮箱 buy@TradesMax.com 美股投资网 TradesMax.com 美股大数据 StockWe.com"}, {"title": "美股真的好有规律！我今天抄底了 英伟达和特斯拉还有….", "date": "2023-08-18", "ym": "2023-08", "time": "2023-08-18 20:31:57", "author": "TradesMax", "desc": "当别人恐慌时，就是我贪婪的时刻！我炒底了什么？", "url": "https://mp.weixin.qq.com/s/Bsl_bAixFLsy1qa3v2BDvQ", "path": "sources/news/wechat_mp/articles/美股真的好有规律-我今天抄底了-英伟达和特斯拉还有-1abcd27480.md", "len": 1070, "ticks": [], "body": "今天美股一开盘一度大跌，延续昨天的跌势，投资者的情绪跌至谷底，科技明星股集体大跌，英伟达NVDA大跌3.8%， const S = DATA.summary, A = DATA.articles;
let activeTick = "", openSet = new Set();

document.getElementById("gen").textContent = S.generated;

// stat cards
const fmt = n => n.toLocaleString("en-US");
document.getElementById("cards").innerHTML = [
  ["文章总数", fmt(S.count) + " <small>篇</small>"],
  ["时间跨度", '<span style="font-size:15px">'+S.date_min+'<br>→ '+S.date_max+'</span>'],
  ["正文总量", fmt(S.total_chars) + " <small>字</small>"],
  ["篇均字数", fmt(S.avg_chars) + " <small>字</small>"],
].map(c => '<div class="card"><div class="k">'+c[0]+'</div><div class="v">'+c[1]+'</div></div>').join("");

// monthly chart
const maxN = Math.max.apply(null, S.months.map(m=>m.n));
document.getElementById("chart").innerHTML = S.months.map(m =>
  '<div class="bar" title="'+m.m+': '+m.n+' 篇"><div class="n">'+m.n+'</div>'+
  '<div class="col" style="height:'+(m.n/maxN*100)+'%"></div>'+
  '<div class="lab">'+m.m+'</div></div>').join("");

// ticker chips
document.getElementById("ticks").innerHTML = S.top_ticks.map(t =>
  '<span class="chip" data-t="'+t.t+'">'+t.t+'<b>'+t.n+'</b></span>').join("");
document.querySelectorAll(".chip").forEach(c => c.onclick = () => {
  const t = c.dataset.t;
  activeTick = (activeTick === t) ? "" : t;
  document.querySelectorAll(".chip").forEach(x => x.classList.toggle("active", x.dataset.t === activeTick));
  render();
});

// month dropdown
const msel = document.getElementById("month");
S.months.slice().reverse().forEach(m => {
  const o = document.createElement("option"); o.value = m.m; o.textContent = m.m+" ("+m.n+")"; msel.appendChild(o);
});

const esc = s => s.replace(/[&<>]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
function hl(s, q){ if(!q) return esc(s); const i = s.toLowerCase().indexOf(q.toLowerCase());
  if(i<0) return esc(s); return esc(s.slice(0,i))+"<mark>"+esc(s.slice(i,i+q.length))+"</mark>"+esc(s.slice(i+q.length)); }

function render(){
  const q = document.getElementById("q").value.trim();
  const mon = document.getElementById("month").value;
  const sort = document.getElementById("sort").value;
  const ql = q.toLowerCase();
  let list = A.filter(a => {
    if(mon && a.ym !== mon) return false;
    if(activeTick && !a.ticks.includes(activeTick)) return false;
    if(ql){ const hay = (a.title+" "+a.desc+" "+a.body).toLowerCase(); if(hay.indexOf(ql)<0) return false; }
    return true;
  });
  if(sort==="date_asc") list.sort((x,y)=> x.time<y.time?-1:1);
  else if(sort==="len_desc") list.sort((x,y)=> y.len-x.len);
  else list.sort((x,y)=> x.time>y.time?-1:1);

  document.getElementById("count").textContent =
    "共 "+list.length+" 篇" + (activeTick?(" · 标的 "+activeTick):"") + (mon?(" · "+mon):"") + (q?(" · 含「"+q+"」"):"");

  const box = document.getElementById("list");
  if(!list.length){ box.innerHTML = '<div class="empty">没有匹配的文章</div>'; return; }
  box.innerHTML = list.map(a => {
    const id = a.path;
    const op = openSet.has(id) ? " open" : "";
    const tks = a.ticks.slice(0,6).map(t=>'<span class="tk">'+t+'</span>').join("");
    let body = a.body || "(正文未抓取)";
    if(q && body.toLowerCase().indexOf(ql)>=0){
      const i = body.toLowerCase().indexOf(ql);
      const start = Math.max(0, i-400);
      body = (start>0?"…":"") + body.slice(start, i+q.length+1200);
    } else { body = body.slice(0, 1600) + (a.body.length>1600?" …":""); }
    return '<div class="item'+op+'" data-id="'+esc(id)+'">'+
      '<div class="head"><div class="meta">'+a.date+'<span class="len">'+fmt(a.len)+' 字</span></div>'+
      '<div class="ti">'+hl(a.title,q)+
        '<span class="d">'+hl(a.desc||"",q)+'</span>'+tks+'</div></div>'+
      '<div class="body">'+esc(body)+
        '<div class="links"><a href="'+esc(a.url)+'" target="_blank" rel="noopener">↗ 原文链接</a>'+
        '<a href="'+esc(a.path.split("sources/news/wechat_mp/")[1]||a.path)+'" target="_blank">📄 本地 Markdown</a></div>'+
      '</div></div>';
  }).join("");
  box.querySelectorAll(".item .head").forEach(h => h.onclick = () => {
    const it = h.parentElement, id = it.dataset.id;
    it.classList.toggle("open");
    if(it.classList.contains("open")) openSet.add(id); else openSet.delete(id);
  });
}

document.getElementById("q").addEventListener("input", render);
document.getElementById("month").addEventListener("change", render);
document.getElementById("sort").addEventListener("change", render);
render();
</script>
