  {cn:"财务趋势质量（会计重构）", en:"Financial Trend Quality", purpose:"财报不是起点，而是趋势和反证系统：重构 owner earnings，识别 SBC/折旧/capex/营运资本扭曲，判断增长是否真的创造价值。", how:["先看趋势：revenue / margin / FCF per share / ROIC / SBC / capex intensity / share count / debt 至少 3-10 年方向","建『会计→经济』桥：净利→+D&A→−维护 capex→−常态化 SBC/稀释→±营运资本→= owner earnings","建 10 年时间序列落到 model/financial_history.csv（历史与预测分离）","capex 拆维护 vs 成长/防御；查红旗（收入涨但每股 owner earnings 停滞、SBC 快于营业利润）"], output:"financial_quality.md + model/financial_history.csv", kt:"财务趋势是在验证这门生意变强，还是说明增长被资本强度吃掉（GOOGL Q1'26 OCF $45.79B vs PPE 购置 $35.674B）？"},
  {cn:"价值链", en:"Value Chain", purpose:"画上下游链条 + 利润池分布，找出钱在哪层被赚走、谁有定价权、卡点在哪。", how:["定义行业边界，多业务分别建链（搜索广告/视频/移动生态/云/AI 计算栈）","做利润池表（各层玩家/收入池/回报特征/议价能力）+ 量化 unit economics 与集中度","用五力 + 利润池 + bottleneck ownership 分析供需与替代品"], output:"value_chain_map.md", kt:"每条链上价值由公司、广告主/客户、芯片商还是模型层捕获——公司是瓶颈拥有者还是仅 capex 出资方？"},
  {cn:"护城河", en:"Moat", purpose:"把『有护城河』从形容词拆成可验证机制，并写清每条怎么被攻破。", how:["逐条填表（来源/证据/指标/durability/attack surface），只有造成持续超额回报/定价权/低成本/强分发/高留存的才算","套 ROIC−WACC 透镜：当前 ROIC、估 WACC、价差、再投资跑道、竞争优势期","每条写 attack surface + 三层时间测试 + falsification 清单，证据分级，负面进风险"], output:"moat_map.md", kt:"AI capex 抬升后能否在增量资本上维持高回报；旧护城河被削弱速度 vs 新护城河形成速度？"},
  {cn:"瓶颈层", en:"Bottleneck", purpose:"识别哪环节短期扩不出、稀缺在哪、谁控制它——可能是定价权也可能是成本黑洞。仅特定行业适用。", how:["适用判定：AI 基建/半导体/机器人/电力/云/医药制造/国防供应链才做，纯软件/广告可跳过","建瓶颈清单表（瓶颈/类型/谁控制/证据/持续时间/受益者）","四问：能否绕过买通？暂时还是结构性？拥有还是依赖？解决它改善经济还是毁回报？"], output:"bottleneck_map.md", kt:"AI 基础设施（数据中心/电力/TPU）对这家是护城河、收费公路，还是 capex 陷阱？"},
  {cn:"管理层尽调", en:"Operator Underwriting", purpose:"研究谁在经营、控制权、性格激励、资本配置历史、董事会约束；只用可观察行为做证据，不做心理诊断。", how:["画 people map（创始人/CEO/CFO/董事会/关键技术负责人 + power source）","建资本配置表（再投资/M&A/回购/分红/发股债的 track record + 现行政策 + 判断）","填 8 维性格记分卡；证据优先级：Proxy→10-K risk→股东信→危机期 call→法庭监管文件"], output:"operator_underwriting.md", kt:"AI 转型期是 wartime operator 还是 consensus manager；双层股权保护长期复利还是削弱外部约束；capex 是否被回报门槛约束？"},
  {cn:"反演 / 失败", en:"Inversion", purpose:"先反问『若要让它十年内失去超额利润会怎么攻击』，把失败具体到机制，区分永久损害 vs 短期波动、已 price-in vs 未 price-in。", how:["扮竞争者/监管者/技术替代者/内部破坏者，建 failure map（路径/攻击者/机制/时间/今日证据/预警），≥9 类","区分短期波动 vs 永久减值并给监控指标","每条失败路径接到护城河 attack surface；影响大但证据不足的写进 Kill Criteria；写 disconfirming evidence 保证可证伪"], output:"inversion_map.md", kt:"哪条失败路径一旦发生会永久损害内在价值、现在是否已有强证据且无对冲？"},
  {cn:"估值 + 安全边际", en:"Valuation", purpose:"估值最后登场：先问市场已经相信什么，再用 owner earnings 桥、bear/base/bull、10 年 IRR 与 margin of safety 判断好生意是不是好投资。", how:["承接财务趋势质量的 owner earnings 与 capex 拆分（无此前置则只能停 shell）","先反推当前价格隐含的增长、利润率、capex 强度和退出倍数","建情景表（各自 revenue CAGR/margin/capex/terminal multiple/10y IRR）落 model/scenario_model.csv","定 margin of safety 表（折扣 20/30/40%、buy below、starter、core、avoid above）"], output:"valuation.md + model/scenario_model.csv", kt:"保守 owner earnings（已扣 AI capex/SBC/稀释/监管）下什么价格才给足安全边际；买入后估值压缩 30-50% 基本面能否弥补？"}
 ],
 outputs:["business_model / financial_quality / value_chain_map / moat_map / bottleneck_map / operator_underwriting / inversion_map / valuation 共 8 类文件（关键判断挂 source_id，文末附 open questions 与回流去向）","model/*.csv（historicals / segments / owner_earnings_bridge / scenario_model / sensitivity，单位显式、历史与预测分离）"],
 gate:"每个模块必须 ① 关键数字/判断回挂 facts 的 source_id，无未入账的新事实；② 文末列 open questions 与回流去向；③ 证据标 Strong/Medium/Weak/Negative，负面进风险。任一模块未引用 facts 或未列 open questions，审计据此压低 verdict ceiling。",
 handoff:"8 模块产出 + model/*.csv 一起汇入第 7 步审计：逐模块核对 source coverage / 无 source_id 的关键 claim / 冲突 / 污染 / 模型错误 / 未验证管理层说法 / 过激估值假设 / 未量化风险，据 Minimum Coverage 完整度卡 verdict ceiling。",
 nonlinear:"8 模块只读同一 facts、互不写对方文件，无固定顺序可完全并行（fan-out）；某模块发现缺口即回流第 4-6 步补料再回来，绝不在分析层造数；模块间有软依赖（估值依赖财务趋势质量、反演依赖护城河、价值链是瓶颈上游）；瓶颈层仅强供给约束行业适用，纯软件/广告可跳过。",
 pitfalls:["在分析层凭空引入 facts 没有的数字而不回挂 source_id","护城河写成形容词（『生态』『平台』『AI』）却给不出机制/证据/attack surface","估值在 owner earnings 桥未完成时硬做，或用激进 terminal multiple 挽救弱当期回报","反演只写『竞争加剧/AI 威胁』笼统话，不到机制、不区分永久 vs 短期","管理层尽调滑向 vibes 心理诊断而非可观察证据","对不适用行业硬套瓶颈层，或对 AI 基建公司跳过瓶颈"],
 tools:["唯一事实源：facts.md + claim_ledger.csv（社媒只能 SENTIMENT/OPEN_QUESTION）","方法论：moat_technical_analysis.md / operator_underwriting.md / munger·inversion_checklist.md / buffett·research_checklist.md","结构模板：_company_research_template 下各 *_map.md / financial_quality.md / valuation.md / model/README.md","补料回流用一手源：10-K/10-Q/8-K、call transcript、proxy、13F、Form 4"],
 googl:"companies/googl 下 8 模块当前多为 skeleton（有框架无数据）。例 1：financial_quality.md 已把 5 个 seed 数字挂上 claim id（FY25 营收 $402.836B-C002、Q1'26 OCF $45.79B 与 PPE $35.674B-C008、Cloud Q1'26 营业利润 $6.598B-C007）并立了会计假设，但 10 年序列、维护 vs 成长 capex 拆分、owner earnings 桥全在 Work To Do——正是估值无法启动的软依赖卡点。例 2：moat_map.md 列 6 类护城河候选 + 各自 attack surface + 4 条 falsification，但标注『Status: skeleton, 勿当结论』，与 inversion_map 的失败路径互为镜像。valuation.md 标 not started，故 verdict ceiling 仍 INFO-GAP。"
},
{
 no:"7", cn:"审计 / 质量闸门", en:"Audit & Quality Gates", zone:"C",
 purpose:"在事实与分析模块完成后、IC Panel 之前设一道独立质检闸门，专职回答『我们是不是被叙事/KOL/标题/模型/欲望带跑了』。它不产生新观点，只验证证据链是否扎实、数字是否自洽、污染是否混入 EVIDENCE，并按信息完整度给出 verdict 上限。",
 inputs:["第 6 步 facts.md + claim_ledger.csv（全部 claim/source_id/destination/冲突/Minimum Coverage Check）","第 7 阶段 B 全部 8 个分析模块 + model/*.csv（审计核对它们是否真引用 facts，而非凭空生成）"],
 how:[
  "Source coverage 逐项查：把每个模块的关键论断回溯到 facts→回溯到 ledger 的 source_id；统计『有 source_id 的关键 claim / 关键 claim 总数』，找不到对应 EVIDENCE 的标记为悬空。",
  "无 source_id 的关键 claim：对每条关键数字检查 value/unit/as_of/source_id 四件套，缺任一不得被引用，退回第 4 步补证据。",
  "冲突数字：同一指标（capex/Cloud 收入/FCF/回购）交叉比对不同来源，不一致项汇总并标哪个来源更高阶（A1/A2 > B1 > C/D），冲突不得悄悄抹掉。",
  "D1/C2 污染检查：核对 destination——社媒/YouTube/二手交易媒体绝不能出现在 EVIDENCE，一旦发现被当事实支撑某判断即判污染、相关结论降级（防 KOL/标题带跑的核心动作）。",
  "Math/model 复核 + 一手源核对 + 管理层未验证 claim：复算 owner earnings 桥与 scenario 勾稽；核对关键判断至少有一条 A1/A2/B1 支撑；把管理层口径（『Cloud 利润率可持续』）单拎出标注是否已被独立数据验证。",
  "completeness% 粗估（宁低勿高）+ 套 verdict ceiling：<40%→INFO-GAP、40-60%→WATCH、60-80%→STARTER、>80%→CORE 可议；再叠加硬否决规则，取『查表上限』与『硬规则上限』中更低者。"
 ],
 outputs:["audit.md（按 11 项清单逐项填：Source coverage / 无 source_id 的关键 claim / 冲突数字 / stale facts / D1-C2 污染 / 模型错误 / 缺一手源 / 管理层未验证 claim / 估值假设过激 / 风险未量化 / Verdict ceiling，并列暴露的缺口与各自回流去向）","⚠ 注意：audit.md 模板当前仓库尚未建，是个待补缺口"],
 gate:"硬否决：无一手源 / 估值未完 / 反演未完 / operator 未完 / 关键数字无 source_id，命中任一→不得进 STARTER/CORE。叠加部门硬规则：无 valuation 或安全边际→封顶 WATCH；无 inversion→封顶 WATCH；无 operator→封顶 STARTER；社媒为主要证据→封顶 INFO-GAP。",
 handoff:"audit.md 的 verdict ceiling 直接成为第 8 步 IC Panel 的硬约束——Panel 只能在 ceiling 之内讨论，不能把结论顶过上限；暴露的缺口清单成为 Panel 必须正面回应的质询点（如 Munger 问失败路径时直接引用『风险未量化』）。",
 nonlinear:"审计是整条流水线唯一系统性『往回送』的节点（总流程图的 I→D 回边）：一旦 completeness 不足或命中硬否决，研究不前进 IC，而是回流——缺 block/范围没覆盖→回第 3 步加 block；关键 claim 无 source_id/缺一手源/污染→回第 4-5 步补证据。audit 是把『信息不足』翻译成『回到哪一步补什么』的分流器。",
 pitfalls:["把审计写成『再夸一遍论点』（应是对抗性自查）","completeness 估高（把『写了文件』当『完成且有证据』）","悄悄抹掉冲突数字让叙事干净","让 D1/C2 以转述方式偷偷进 EVIDENCE","把管理层电话会口径直接当事实","估值只做 base/bull 没 bear 与安全边际却顶到 STARTER/CORE","查表得 ceiling 后忘叠加硬否决（两者取更低）","审计发现不足却仍向前推进 IC（架空闸门）"],
 tools:["rg 全仓回溯 source_id 与关键数字","claim_ledger.csv（四件套 + destination 合法性）","facts.md（五区 + Minimum Coverage Check）","sources/source_policy.md（社媒禁入 EVIDENCE）","model/*.csv（复核勾稽）","一手源核对锚点：10-K / 最新 10-Q / proxy / 13F / Form 4","§9 审计清单 + verdict ceiling 表；buy_side §4 硬规则 + §7 Gate A-E"],
 googl:"按 companies/googl/research_status.md 真实状态推断：Current stage 2，Evidence 与 4A-4E、IC Memo 全 ⏸；facts.md 与 claim_ledger 尚未建成。文件顶部自填 Verdict ceiling = INFO-GAP；底部 9 项 Quality Gates 全未勾。套审计逻辑：completeness ≈ 20-25% → 落 <40% 区间 → ceiling=INFO-GAP；再叠加硬否决，命中『无一手源(ledger 未建)+估值未完+反演未完+operator 未完+关键数字无 source_id』全部五条，硬规则同样封顶 INFO-GAP，与文件自评一致。回流指令：先建 ledger 与 facts（从 FY2025 10-K、Q1 2026、Berkshire/H&H 13F、2026 proxy），source completeness≥60% 再做估值与反演，方可抬到 STARTER 以上进 IC。"
},
{
 no:"8", cn:"IC Panel（五灵魂评审）", en:"Investment Committee", zone:"C",
 purpose:"让五个独立投资人格框架（巴菲特/芒格/段永平/Marks/Klarman）批判同一份已审计的事实，覆盖五个不重叠维度。先各自结构化初评，再一轮显式互相反驳，最后段永平主审综合并可与多数票不一致。铁律：IC 只解读/批判/加权已有事实，绝不新增无 source_id 的事实。",
 inputs:["第 7 步 audit.md：审计结论 + verdict ceiling（panel 最高结论被天花板锁死）","第 0-6 步 facts.md + claim_ledger.csv：每条带 tier 与 source_id 的事实库（panel 唯一弹药，不能引用库外事实）","第 7 阶段 B 各模块：moat / operator / inversion / bottleneck / valuation + model（每灵魂主喂对口模块）"],
 how:[
  "五灵魂各按『必问表』只问自己那列：Buffett——能持有 10 年吗？owner earnings 是什么？够便宜吗？（吃 facts+valuation+moat）；Munger——最可能败在哪？激励是否有毒？有无愚蠢风险？（吃 inversion+operator）；段永平——你真懂吗？用户价值清不清？管理层靠谱吗？贵不贵？（吃全部 + 不为清单 + 100% 私有化测试）；Marks——共识是什么？周期/情绪位置？赔率是否不对称？；Klarman——下行保护在哪？安全边际是否真实？",
  "每位初评走固定四件套（~150 字，刻意短）：① Verdict ∈ {REJECT/WATCH/STARTER/CORE/SKIP/INFO-GAP}；② 一句理由；③ 一条该灵魂 1-2 年内可考证的公开发言/行动（必须真实可溯源，不可编）；④ 一条对本 ticker 的具体应用。短促是为了让 critique 能逐条精确反驳。",
  "一轮（且只一轮）显式 critique 链式互怼：Marks 反驳 Buffett『owner earnings 这维度市场已定价多少？』；Munger 反驳 Marks『择时怎么避免变 market timer？』；Klarman 反驳 Munger『当前价位补偿了这些尾部风险吗？』；段永平反驳全体『你们都默认懂这门生意 5-10 年，真懂吗？』。被反驳者给 50-100 字回应，verdict 变动用 ↑/↓/→ 标注。",
  "段永平主审综合：汇总初评+critique，套『不为清单』4 项 + 100% 私有化测试（列 4 个不能确信的点），给 final verdict（含 STARTER 1-3% / CORE 5%+）+ 3-5 条 Kill Criteria 与监控触发器。关键：主审可与多数票显式不一致（多数票噪音、主审纪律），分歧须写明理由。",
  "扩展灵魂只在核心 5 位指出特定缺口时按需召唤：Buffett『信息不够判断管理层』→ Li Lu + Fisher；Marks『分不清 alpha/beta』→ Lynch + Terry Smith；Munger『反身性在跑』→ Soros；高度宏观敏感 → Dalio；破产边缘 → Graham。全程纪律校验：引用 facts 外无 source_id 的『事实』即越界，作废退回。"
 ],
 outputs:["ic_panel.md（五灵魂四件套初评 + 一轮 critique 反驳与回应含 verdict 箭头 + 按需扩展灵魂 + 段永平主审综合(不为清单+私有化 4 不确信) + final verdict + 多数票 vs 主审分歧说明 + Kill Criteria 与触发器）","⚠ 注意：ic_panel.md 模板当前仓库尚未建，是个待补缺口"],
 gate:"IC 不接受无 source_id 的事实 / 只有观点没证据的护城河 / 没下行情景的估值；且 panel 结论不得突破第 7 步 audit 的 verdict ceiling。",

const ICON={purpose:"🎯",how:"🛠",out:"📤",gate:"🚦",non:"↻",hand:"➡️",pit:"⚠️",tool:"🧰",googl:"🔬"};
const ZONE={A:"阶段 A · 事实工程",B:"阶段 B · 分析层（并行）",C:"阶段 C · 决策与跟踪"};

function esc(s){return s;}
function list(arr,ord){const t=ord?"ol":"ul";return "<"+t+">"+arr.map(x=>"<li>"+x+"</li>").join("")+"</"+t+">";}

function renderCard(s){
  let h="<details id='step-"+s.no+"'><summary><span class='no'>"+s.no+"</span><span>"+s.cn+"</span><span class='en'>"+s.en+"</span><span class='arrow'>▾</span></summary><div class='body'>";
  h+="<div class='purpose'>"+ICON.purpose+" "+s.purpose+"</div>";
  h+="<div class='io'><div class='col in'><h4>⬅️ 输入（来自上游）</h4>"+list(s.inputs)+"</div><div class='col out'><h4>"+ICON.out+" 产出</h4>"+list(s.outputs)+"</div></div>";
  h+="<div class='sec'><h4>"+ICON.how+" 怎么做 / 怎么处理</h4>"+list(s.how,true)+"</div>";
  if(s.submodules){
    h+="<div class='sec'><h4>🧩 8 个并行子模块</h4><div class='subs'>";
    s.submodules.forEach(m=>{h+="<div class='sub'><h5>"+m.cn+" <span class='en'>"+m.en+"</span></h5><p>"+m.purpose+"</p>"+list(m.how)+"<p class='kt'>关键判定："+m.kt+"</p><p><span class='file'>"+m.output+"</span></p></div>";});
    h+="</div></div>";
  }
  h+="<div class='sec box gate'><h4>"+ICON.gate+" 质量门 / 停止条件</h4>"+s.gate+"</div>";
  h+="<div class='sec box non'><h4>"+ICON.non+" 非线性（回流 / 并行 / 可跳过）</h4>"+s.nonlinear+"</div>";
  h+="<div class='sec box handoff'><h4>"+ICON.hand+" 交接下游</h4>"+s.handoff+"</div>";
  h+="<div class='sec'><h4>"+ICON.pit+" 常见错误</h4>"+list(s.pitfalls)+"</div>";
  h+="<div class='sec'><h4>"+ICON.tool+" 工具 / 来源</h4><div class='tags'>"+s.tools.map(t=>"<span class='tag'>"+t+"</span>").join("")+"</div></div>";
  h+="<div class='sec googl'><h4>"+ICON.googl+" GOOGL 实例</h4>"+s.googl+"</div>";
  h+="</div></details>";
  return h;
}

function showStep(no){
  const el=document.getElementById("step-"+no);
  el.open=true; el.scrollIntoView({behavior:"smooth",block:"start"});
}

});
document.getElementById("nav").innerHTML=navH;
document.getElementById("cards").innerHTML=STEPS.map(renderCard).join("");
